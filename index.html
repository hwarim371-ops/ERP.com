<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>화림 자금흐름 클라우드 ERP</title>
  
  <!-- 오류 자동 감지 스크립트 -->
  <script>
    window.addEventListener('error', function(event) {
      const errorDiv = document.createElement('div');
      errorDiv.style.cssText = 'position:fixed; top:0; left:0; width:100%; background:#C62828; color:white; padding:15px; z-index:9999; font-weight:bold; font-family:sans-serif; box-shadow:0 4px 6px rgba(0,0,0,0.3);';
      errorDiv.innerHTML = '🚨 앱 실행 오류 발생: <br/><br/>' + event.message + '<br/><br/>👉 URL을 넣으실 때 양 끝의 따옴표(" ")가 지워졌거나, 코드가 잘못 복사되었는지 확인해 주세요!';
      document.body.prepend(errorDiv);
    });
  </script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (브라우저 컴파일러) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #DFD8CE; border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #B39977; }
    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; margin: 0; padding: 0; background-color: #F5F2EC; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // =====================================================================
    // ⚠️ 대표님의 구글 앱스 스크립트 URL (미리 삽입해두었습니다!) ⚠️
    // =====================================================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyzmdTEBrfbcJsuvr29xOhaemgR3dUsHr8DybTq48dJADT7nHXRTcADK8kafHrdz3tK/exec";
    
    // --- 전역 설정 및 초기 데이터 ---
    const COLUMN_THEMES = {
      wood: { label: '클래식 우드', text: 'text-[#8B5A2B]', bg: 'bg-[#8B5A2B]', light: 'bg-[#EFEBE4]', hover: 'hover:bg-[#DFD8CE]', border: 'border-[#8B5A2B]', ring: 'ring-[#8B5A2B]', panelBg: 'bg-[#F4EBE1]' },
      ocean: { label: '오션 블루', text: 'text-[#0277BD]', bg: 'bg-[#0277BD]', light: 'bg-[#E1F5FE]', hover: 'hover:bg-[#B3E5FC]', border: 'border-[#0277BD]', ring: 'ring-[#0277BD]', panelBg: 'bg-[#E6F3FA]' },
      forest: { label: '포레스트 그린', text: 'text-[#2E7D32]', bg: 'bg-[#2E7D32]', light: 'bg-[#E8F5E9]', hover: 'hover:bg-[#C8E6C9]', border: 'border-[#2E7D32]', ring: 'ring-[#2E7D32]', panelBg: 'bg-[#E9F5EA]' },
      wine: { label: '와인 레드', text: 'text-[#880E4F]', bg: 'bg-[#880E4F]', light: 'bg-[#FCE4EC]', hover: 'hover:bg-[#F8BBD0]', border: 'border-[#880E4F]', ring: 'ring-[#880E4F]', panelBg: 'bg-[#F8EAF0]' },
      slate: { label: '모던 슬레이트', text: 'text-[#455A64]', bg: 'bg-[#455A64]', light: 'bg-[#ECEFF1]', hover: 'hover:bg-[#CFD8DC]', border: 'border-[#455A64]', ring: 'ring-[#455A64]', panelBg: 'bg-[#EAECEE]' },
    };

    const COLOR_TAGS = {
      none: { bg: 'bg-white', border: 'border-[#DFD8CE]' },
      wood: { bg: 'bg-[#F7EFE6]', border: 'border-[#8B5A2B]' }, 
      sand: { bg: 'bg-[#FDF6E9]', border: 'border-[#D2B48C]' },
      forest: { bg: 'bg-[#EBF5EC]', border: 'border-[#4A5D23]' },
      clay: { bg: 'bg-[#FDECE8]', border: 'border-[#C16644]' },
      stone: { bg: 'bg-[#F5F5F5]', border: 'border-[#7A7873]' },
    };

    const INITIAL_ACCOUNTS = [
      { id: 'main', name: '화림 법인 (메인)', bank: '우리은행', accountNo: '1005-704-610473', icon: 'ph-fill ph-buildings', theme: 'wood', reportData: [] },
      { id: 'jecheon1', name: '제천1 (오차드블리드)', bank: '우리은행', accountNo: '1005-504-710497', icon: 'ph-fill ph-hard-hat', theme: 'forest', reportData: [] },
      { id: 'miryang', name: '밀양 (다시,또 여기)', bank: '기업은행', accountNo: '587-076008-04-011', icon: 'ph-fill ph-hard-hat', theme: 'ocean', reportData: [] },
      { id: 'jecheon2', name: '제천2 (덕동골)', bank: '우리은행', accountNo: '1005-804-800910', icon: 'ph-fill ph-hard-hat', theme: 'wine', reportData: [] },
    ];

    const INITIAL_BLOCKS = [
      { id: 'b1', accountId: 'main', label: '매출(세금계산서)', amount: 577257465, color: 'wood', subItems: [] },
      { id: 'b2', accountId: 'main', label: '화림 수수료 수취', amount: 60100000, color: 'forest', subItems: [] },
      { id: 'b4', accountId: 'jecheon1', label: '총 매출/대출 등', amount: 399779948, color: 'wood', subItems: [] },
      { id: 'b5', accountId: 'jecheon1', label: '매입 계산서 지출', amount: -159116581, color: 'none', subItems: [] },
      { id: 'b8', accountId: 'miryang', label: '건축주 입금액', amount: 242405000, color: 'sand', subItems: [] },
      { id: 'b9', accountId: 'miryang', label: '외주 미수금', amount: -294300296, color: 'clay', subItems: [] },
      { id: 'b11', accountId: 'jecheon2', label: '대출금', amount: 54000000, color: 'stone', subItems: [] },
      { id: 'b12', accountId: 'jecheon2', label: '건축주 입금', amount: 20000000, color: 'wood', subItems: [] },
      { id: 'b14', accountId: 'jecheon2', label: '박찬수 부장님 대납', amount: -2750000, color: 'clay', subItems: [] },
    ];

    function App() {
      const [accountsData, setAccountsData] = useState(INITIAL_ACCOUNTS);
      const [blocks, setBlocks] = useState(INITIAL_BLOCKS);
      
      const [draggedBlockId, setDraggedBlockId] = useState(null);
      const [draggedAccountId, setDraggedAccountId] = useState(null);
      const [mergeTargetId, setMergeTargetId] = useState(null);
      const [selectedBlocks, setSelectedBlocks] = useState([]);
      
      const [modal, setModal] = useState({ isOpen: false, mode: 'create', blockData: null, amountInput: '' });
      const [splitModal, setSplitModal] = useState({ isOpen: false, block: null, amountInput: '' });
      const [reportModal, setReportModal] = useState({ isOpen: false, accountId: null });
      const [closeMonthModal, setCloseMonthModal] = useState({ isOpen: false, accountId: null, monthLabel: '' });
      const [settingsModal, setSettingsModal] = useState({ isOpen: false, accountData: null });
      const [isSyncing, setIsSyncing] = useState(false);

      const formatCurrency = (amount) => new Intl.NumberFormat('ko-KR').format(amount || 0);

      // --- 🌐 클라우드 데이터 불러오기 (GET) ---
      useEffect(() => {
        if (!GAS_URL || GAS_URL.includes("여기에")) return;
        
        fetch(GAS_URL)
          .then(async res => {
            const text = await res.text();
            try {
              return JSON.parse(text); // 정상적인 JSON 데이터인지 확인
            } catch (e) {
              // HTML 등 다른 내용이 오면 권한 오류로 간주
              throw new Error("GAS_PERMISSION_ERROR");
            }
          })
          .then(data => {
            if (data && Object.keys(data).length > 0) {
              if (data.accountsData) setAccountsData(data.accountsData);
              if (data.blocks) setBlocks(data.blocks);
            }
          })
          .catch(err => {
            console.error("데이터 불러오기 실패:", err);
            if (err.message === "GAS_PERMISSION_ERROR" || err.message.includes('Failed to fetch')) {
               alert("⚠️ 구글 시트 접근 권한 오류!\n\n구글 스크립트 배포 시 [액세스 권한]이 '모든 사용자'로 설정되지 않았습니다. 앱이 정상 작동하지 않을 수 있으니 권한을 확인해 주세요.");
            }
          });
      }, []);

      // --- 🌐 클라우드에 데이터 저장하기 (POST) ---
      const syncToCloud = async () => {
        if (!GAS_URL || GAS_URL.includes("여기에")) {
          return alert("구글 스크립트 웹앱 URL이 입력되지 않았습니다!");
        }
        setIsSyncing(true);
        try {
          const payload = { accountsData, blocks };
          await fetch(GAS_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
          });
          alert("✅ 구글 시트에 안전하게 백업 및 동기화되었습니다!");
        } catch (err) {
          alert("❌ 동기화 중 오류가 발생했습니다. 권한 설정을 확인해주세요.");
          console.error(err);
        } finally {
          setIsSyncing(false);
        }
      };

      /* --- 블록 다중 선택 로직 --- */
      const handleBlockClick = (e, blockId) => {
        if (e.target.closest('.no-select-trigger')) return;
        if (e.ctrlKey || e.metaKey) {
          setSelectedBlocks(prev => prev.includes(blockId) ? prev.filter(id => id !== blockId) : [...prev, blockId]);
        } else {
          setSelectedBlocks(prev => (prev.length === 1 && prev[0] === blockId) ? [] : [blockId]);
        }
      };

      const handleBgClick = (e) => {
        if (!e.target.closest('.block-item') && !e.target.closest('.selection-bar')) setSelectedBlocks([]);
      };

      const selectedSum = useMemo(() => {
        return blocks.filter(b => selectedBlocks.includes(b.id)).reduce((sum, b) => sum + b.amount, 0);
      }, [blocks, selectedBlocks]);

      /* --- 드래그 앤 드롭 및 병합 --- */
      const handleDragStart = (e, blockId) => {
        setDraggedBlockId(blockId);
        if(e.dataTransfer) {
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', blockId);
        }
        setTimeout(() => { if (e.target) e.target.style.opacity = '0.5'; }, 0);
      };
      
      const handleDragEnd = (e) => {
        if (e.target) e.target.style.opacity = '1';
        setDraggedBlockId(null);
        setMergeTargetId(null);
      };

      const handleDragOverBlock = (e, blockId) => {
        e.preventDefault(); e.stopPropagation();
        if (draggedBlockId && draggedBlockId !== blockId) setMergeTargetId(blockId);
      };

      const handleDragLeaveBlock = () => {
        setMergeTargetId(null);
      };

      const handleDropOnBlock = (e, targetAccountId, targetBlockId) => {
        e.preventDefault(); e.stopPropagation();
        setMergeTargetId(null);
        if (!draggedBlockId || draggedBlockId === targetBlockId) return;

        setBlocks(prev => {
          const source = prev.find(b => b.id === draggedBlockId);
          const newBlocks = prev.filter(b => b.id !== draggedBlockId);
          return newBlocks.map(b => {
            if (b.id === targetBlockId) {
              let newSubItems = b.subItems ? [...b.subItems] : [];
              if (newSubItems.length === 0) {
                newSubItems.push({ id: `s_${Date.now()}_1`, label: '기존 금액', amount: b.amount });
              }
              newSubItems.push({ id: `s_${Date.now()}_2`, label: source.label, amount: source.amount });
              const newTotal = newSubItems.reduce((sum, item) => sum + item.amount, 0);
              return { ...b, subItems: newSubItems, amount: newTotal };
            }
            return b;
          });
        });
      };

      /* --- 현장(통장) 패널 드래그 위치 변경 및 블록 이동 --- */
      const handleDropOnColumn = (e, targetAccountId) => {
        e.preventDefault();
        
        if (draggedAccountId) {
          e.stopPropagation();
          const draggedIdx = accountsData.findIndex(a => a.id === draggedAccountId);
          const targetIdx = accountsData.findIndex(a => a.id === targetAccountId);
          
          if (draggedIdx !== -1 && targetIdx !== -1 && draggedIdx !== targetIdx) {
            const newAccs = [...accountsData];
            const [removed] = newAccs.splice(draggedIdx, 1);
            newAccs.splice(targetIdx, 0, removed);
            setAccountsData(newAccs);
          }
          setDraggedAccountId(null);
          return;
        }

        setMergeTargetId(null);
        if (!draggedBlockId) return;

        setBlocks(prev => {
          const draggedBlock = prev.find(b => b.id === draggedBlockId);
          const newBlocks = prev.filter(b => b.id !== draggedBlockId);
          newBlocks.push({ ...draggedBlock, accountId: targetAccountId });
          return newBlocks;
        });
      };

      /* --- 금액 나누기 (Split) --- */
      const openSplitModal = (block) => {
        if (block.subItems && block.subItems.length > 0) {
          return alert("소분류가 포함된 박스는 한 번에 나눌 수 없습니다.\n먼저 소분류 내역을 밖으로 꺼낸(분리) 뒤 진행해 주세요.");
        }
        setSplitModal({ isOpen: true, block, amountInput: '' });
      };

      const handleSplitAmountChange = (e) => {
        let val = e.target.value.replace(/[^0-9]/g, '');
        setSplitModal(p => ({ ...p, amountInput: val ? formatCurrency(parseInt(val, 10)) : '' }));
      };

      const executeSplit = (e) => {
        e.preventDefault();
        const val = parseInt(splitModal.amountInput.replace(/[^0-9]/g, ''), 10);
        if (!val || val <= 0) return alert('분리해 낼 금액을 정확히 입력하세요.');
        
        const source = blocks.find(b => b.id === splitModal.block.id);
        const sign = source.amount >= 0 ? 1 : -1;
        const splitVal = val * sign;

        if (Math.abs(splitVal) >= Math.abs(source.amount)) {
          return alert('기존에 있던 금액보다 작은 금액만 떼어낼 수 있습니다.');
        }

        setBlocks(prev => {
          const newBlocks = prev.map(b => {
            if (b.id === source.id) return { ...b, amount: b.amount - splitVal };
            return b;
          });

          const targetIndex = newBlocks.findIndex(b => b.id === source.id);
          newBlocks.splice(targetIndex + 1, 0, {
            id: `b_${Date.now()}`,
            accountId: source.accountId,
            label: `${source.label} (분리됨)`,
            amount: splitVal,
            color: source.color,
            subItems: []
          });
          return newBlocks;
        });

        setSplitModal({ isOpen: false, block: null, amountInput: '' });
      };

      /* --- 소분류 밖으로 꺼내기 --- */
      const extractSubItem = (parentId, subItemId) => {
        setBlocks(prev => {
          const parent = prev.find(b => b.id === parentId);
          const subItem = parent.subItems.find(s => s.id === subItemId);
          
          const newBlocks = prev.map(b => {
            if (b.id === parentId) {
              const newSubs = b.subItems.filter(s => s.id !== subItemId);
              const newAmt = newSubs.length > 0 ? newSubs.reduce((sum, item) => sum + item.amount, 0) : (b.amount - subItem.amount);
              return { ...b, subItems: newSubs, amount: newAmt };
            }
            return b;
          });

          const parentIndex = newBlocks.findIndex(b => b.id === parentId);
          newBlocks.splice(parentIndex + 1, 0, {
            id: `b_${Date.now()}_ext`,
            accountId: parent.accountId,
            label: subItem.label,
            amount: subItem.amount,
            color: parent.color || 'none',
            subItems: []
          });

          return newBlocks;
        });
      };

      /* --- 월 마감 (결산 저장) --- */
      const openCloseMonthModal = (accountId) => {
        const today = new Date();
        const defaultMonth = `${today.getFullYear()}. ${String(today.getMonth() + 1).padStart(2, '0')}월`;
        setCloseMonthModal({ isOpen: true, accountId, monthLabel: defaultMonth });
      };

      const executeCloseMonth = (e) => {
        e.preventDefault();
        const { accountId, monthLabel } = closeMonthModal;
        const accountBlocks = blocks.filter(b => b.accountId === accountId);
        
        const blocksSnapshot = accountBlocks.map(b => ({
          id: `snap_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`,
          label: b.label,
          amount: b.amount,
          color: b.color || 'none',
          subItems: b.subItems ? [...b.subItems] : []
        }));

        setAccountsData(prev => prev.map(acc => {
          if (acc.id === accountId) {
            const newReport = { id: `rep_${Date.now()}`, month: monthLabel, blocks: blocksSnapshot };
            return { ...acc, reportData: [newReport, ...acc.reportData] };
          }
          return acc;
        }));

        setCloseMonthModal({ isOpen: false, accountId: null, monthLabel: '' });
      };

      /* --- 가로 결산 상세 내역서 에디터 --- */
      const handleReportBlockChange = (reportId, blockId, field, value) => {
        setAccountsData(prev => prev.map(acc => {
          if (acc.id === reportModal.accountId) {
            return {
              ...acc,
              reportData: acc.reportData.map(rep => {
                if (rep.id === reportId) {
                  return {
                    ...rep,
                    blocks: rep.blocks.map(b => {
                      if (b.id === blockId) {
                        if (field === 'amount') {
                          let val = value.replace(/[^0-9-]/g, '');
                          if (val.lastIndexOf('-') > 0) val = val.replace(/-/g, '').replace(/^/, '-');
                          return { ...b, amountString: val, amount: parseInt(val, 10) || 0 };
                        }
                        return { ...b, [field]: value };
                      }
                      return b;
                    })
                  };
                }
                return rep;
              })
            };
          }
          return acc;
        }));
      };

      const addReportBlock = (reportId) => {
        setAccountsData(prev => prev.map(acc => {
          if (acc.id === reportModal.accountId) {
            return {
              ...acc,
              reportData: acc.reportData.map(rep => {
                if (rep.id === reportId) {
                  return {
                    ...rep,
                    blocks: [...rep.blocks, { id: `snap_${Date.now()}`, label: '', amount: 0, amountString: '', color: 'none', subItems: [] }]
                  };
                }
                return rep;
              })
            };
          }
          return acc;
        }));
      };

      const deleteReportBlock = (reportId, blockId) => {
        setAccountsData(prev => prev.map(acc => {
          if (acc.id === reportModal.accountId) {
            return {
              ...acc,
              reportData: acc.reportData.map(rep => {
                if (rep.id === reportId) {
                  return { ...rep, blocks: rep.blocks.filter(b => b.id !== blockId) };
                }
                return rep;
              })
            };
          }
          return acc;
        }));
      };

      const deleteEntireReport = (reportId) => {
        if(!confirm('이 결산월의 모든 내역을 삭제하시겠습니까?')) return;
        setAccountsData(prev => prev.map(acc => {
          if (acc.id === reportModal.accountId) {
            return { ...acc, reportData: acc.reportData.filter(r => r.id !== reportId) };
          }
          return acc;
        }));
      };

      /* --- 새로운 현장 추가 --- */
      const addNewAccount = () => {
        const newAcc = {
          id: `acc_${Date.now()}`,
          name: '새로운 현장',
          bank: '은행명',
          accountNo: '계좌번호 입력',
          icon: 'ph-fill ph-hard-hat',
          theme: 'slate',
          reportData: []
        };
        setAccountsData([...accountsData, newAcc]);
      };

      const openSettingsModal = (account) => {
        setSettingsModal({ isOpen: true, accountData: { ...account } });
      };

      const saveSettings = (e) => {
        e.preventDefault();
        setAccountsData(prev => prev.map(acc => acc.id === settingsModal.accountData.id ? settingsModal.accountData : acc));
        setSettingsModal({ isOpen: false, accountData: null });
      };

      /* --- 메인 블록 생성/수정 --- */
      const openCreateModal = (accountId) => {
        setModal({ isOpen: true, mode: 'create', amountInput: '', blockData: { id: Date.now().toString(), accountId, label: '새 내역', amount: 0, color: 'none', subItems: [] } });
      };
      
      const openEditModal = (block) => {
        setModal({ isOpen: true, mode: 'edit', amountInput: block.amount === 0 ? '' : formatCurrency(block.amount), blockData: { subItems: [], ...block } });
      };
      
      const closeModals = () => {
        setModal({ isOpen: false, mode: 'create', blockData: null, amountInput: '' });
        setReportModal({ isOpen: false, accountId: null });
      };

      const handleAmountChange = (e) => {
        let val = e.target.value.replace(/[^0-9-]/g, '');
        if (val.lastIndexOf('-') > 0) val = val.replace(/-/g, '').replace(/^/, '-');
        if (val === '' || val === '-') {
          setModal(prev => ({ ...prev, amountInput: val, blockData: { ...prev.blockData, amount: 0 } }));
          return;
        }
        const parsed = parseInt(val, 10);
        setModal(prev => ({ ...prev, amountInput: formatCurrency(parsed), blockData: { ...prev.blockData, amount: parsed } }));
      };

      const handleSubItemChange = (id, field, value) => {
        setModal(prev => {
          const newSubItems = prev.blockData.subItems.map(item => {
            if (item.id === id) {
              if (field === 'amount') {
                let val = value.replace(/[^0-9-]/g, '');
                if (val.lastIndexOf('-') > 0) val = val.replace(/-/g, '').replace(/^/, '-');
                return { ...item, amountString: val, amount: parseInt(val, 10) || 0 };
              }
              return { ...item, [field]: value };
            }
            return item;
          });
          const newTotalAmount = newSubItems.reduce((sum, item) => sum + item.amount, 0);
          return { ...prev, amountInput: formatCurrency(newTotalAmount), blockData: { ...prev.blockData, subItems: newSubItems, amount: newTotalAmount } };
        });
      };

      const addSubItem = () => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, subItems: [...(prev.blockData.subItems || []), { id: Date.now().toString(), label: '', amount: 0, amountString: '' }] } }));
      
      const removeSubItem = (id) => setModal(prev => {
        const newSubItems = prev.blockData.subItems.filter(item => item.id !== id);
        const newTotalAmount = newSubItems.length > 0 ? newSubItems.reduce((sum, item) => sum + item.amount, 0) : prev.blockData.amount;
        return { ...prev, amountInput: formatCurrency(newTotalAmount), blockData: { ...prev.blockData, subItems: newSubItems, amount: newTotalAmount } };
      });

      const saveBlock = (e) => {
        e.preventDefault();
        if (modal.mode === 'create') setBlocks(prev => [...prev, modal.blockData]);
        else setBlocks(prev => prev.map(b => b.id === modal.blockData.id ? modal.blockData : b));
        closeModals();
      };

      const deleteBlock = (blockId) => {
        setBlocks(prev => prev.filter(b => b.id !== blockId));
        setSelectedBlocks(prev => prev.filter(id => id !== blockId));
        closeModals();
      };

      // === 화면 렌더링 ===
      return (
        <div className="h-screen bg-[#F5F2EC] text-[#3D2B1F] font-sans flex flex-col overflow-hidden" onClick={handleBgClick}>
          
          {/* 1. 상단 글로벌 헤더 */}
          <header className="h-[64px] bg-[#FDFCFB] border-b border-[#E6E0D4] flex items-center justify-between px-8 shrink-0 z-10 shadow-sm">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 bg-[#8B5A2B] rounded-lg flex items-center justify-center shadow-inner">
                <i className="ph-fill ph-bank text-white" style={{fontSize: 20}}></i>
              </div>
              <div>
                <h1 className="text-xl font-extrabold text-[#3D2B1F] tracking-tight">화림 자금흐름 ERP</h1>
                <p className="text-[10px] font-bold text-[#A69C8E] uppercase tracking-widest mt-0.5">Cloud Web Application</p>
              </div>
            </div>

            <button 
              onClick={syncToCloud}
              disabled={isSyncing}
              className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold border transition-colors shadow-sm
                ${isSyncing ? 'bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed' : 'bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border-indigo-200'}
              `}
            >
              {isSyncing ? <i className="ph-bold ph-spinner animate-spin" style={{fontSize: 16}}></i> : <i className="ph-fill ph-cloud-arrow-up" style={{fontSize: 16}}></i>} 
              {isSyncing ? '동기화 중...' : '클라우드 저장 및 동기화'}
            </button>
          </header>

          {/* 2. 메인 칸반 보드 영역 */}
          <div className="flex-1 overflow-x-auto overflow-y-hidden p-6 hide-scrollbar relative">
            <div className="flex gap-5 h-full items-start min-w-max">
              
              {accountsData.map(account => {
                const accountBlocks = blocks.filter(b => b.accountId === account.id);
                const accountTotal = accountBlocks.reduce((sum, b) => sum + b.amount, 0);
                const theme = COLUMN_THEMES[account.theme || 'wood'];

                return (
                  <div 
                    key={account.id}
                    onDragOver={(e) => { e.preventDefault(); }}
                    onDrop={(e) => handleDropOnColumn(e, account.id)}
                    className={`w-[360px] h-full flex flex-col rounded-xl border border-[#E6E0D4] shadow-md overflow-hidden transition-colors duration-500 ${theme.panelBg}`}
                  >
                    {/* 2-1. 패널 헤더 */}
                    <div 
                      draggable
                      onDragStart={(e) => {
                        setDraggedAccountId(account.id);
                        if(e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
                      }}
                      onDragEnd={() => setDraggedAccountId(null)}
                      className={`px-5 py-4 bg-white border-b border-[#E6E0D4] shrink-0 ${theme.light} bg-opacity-30 cursor-grab active:cursor-grabbing`}
                      title="클릭하고 드래그하여 패널 순서 변경"
                    >
                      <div className="flex items-center gap-2 mb-1">
                        <i className={`ph-bold ph-dots-six-vertical text-[#A69C8E] mr-1`} style={{fontSize: 20}}></i>
                        <i className={`${account.icon} ${theme.text}`} style={{fontSize: 18}}></i>
                        <h2 className="font-black text-[16px] text-[#2A1D15]">{account.name}</h2>
                      </div>
                      <div className="flex items-center gap-1.5 text-[11px] font-bold text-[#6D5443] ml-10 opacity-80">
                        <i className="ph-fill ph-credit-card" style={{fontSize: 12}}></i> {account.bank} | <span className="font-mono">{account.accountNo}</span>
                      </div>
                    </div>

                    {/* 2-2. 4버튼 툴바 */}
                    <div className="grid grid-cols-4 bg-white/60 backdrop-blur-sm border-b border-[#E6E0D4] shrink-0">
                      <button onClick={() => setReportModal({ isOpen: true, accountId: account.id })} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] border-r border-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-chart-bar ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">결산서</span>
                      </button>
                      <button onClick={() => openCloseMonthModal(account.id)} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] border-r border-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-calendar-check ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">월 마감</span>
                      </button>
                      <button onClick={() => openCreateModal(account.id)} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] border-r border-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-plus-circle ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">자금추가</span>
                      </button>
                      <button onClick={() => openSettingsModal(account)} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-gear ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">설정</span>
                      </button>
                    </div>

                    {/* 2-3. 블록 리스트 영역 */}
                    <div className="flex-1 overflow-y-auto p-3 custom-scrollbar flex flex-col gap-2">
                      {accountBlocks.length === 0 ? (
                        <div className="h-full flex items-center justify-center text-xs text-[#A69C8E] border-2 border-dashed border-[#DFD8CE] rounded-lg bg-white/50 m-2">
                          내역이 없습니다.
                        </div>
                      ) : (
                        accountBlocks.map(block => {
                          const isSelected = selectedBlocks.includes(block.id);
                          const isMergeTarget = mergeTargetId === block.id;
                          const tagColor = COLOR_TAGS[block.color || 'none'];
                          const hasSubItems = block.subItems && block.subItems.length > 0;
                          
                          return (
                            <div
                              key={block.id}
                              draggable
                              onDragStart={(e) => handleDragStart(e, block.id)}
                              onDragEnd={handleDragEnd}
                              onDragOver={(e) => handleDragOverBlock(e, block.id)}
                              onDragLeave={handleDragLeaveBlock}
                              onDrop={(e) => handleDropOnBlock(e, account.id, block.id)}
                              onClick={(e) => handleBlockClick(e, block.id)}
                              className={`
                                block-item relative flex flex-col border rounded-xl shadow-sm cursor-pointer select-none transition-all
                                ${isSelected ? `${theme.border} ring-1 ${theme.ring} ${theme.light} bg-opacity-40` : `${tagColor.bg} ${tagColor.border} hover:shadow-md`}
                                ${draggedBlockId === block.id ? 'opacity-40 scale-[0.98]' : ''}
                                ${isMergeTarget ? 'ring-2 ring-indigo-500 bg-indigo-50/50 scale-[1.02] z-10' : ''}
                              `}
                            >
                              {isMergeTarget && (
                                <div className="absolute inset-0 flex items-center justify-center bg-indigo-500/10 rounded-xl pointer-events-none">
                                  <span className="bg-indigo-600 text-white text-[10px] font-bold px-2 py-1 rounded-full flex items-center gap-1 shadow-lg">
                                    <i className="ph-bold ph-arrow-line-down" style={{fontSize: 12}}></i> 하위 분류로 병합
                                  </span>
                                </div>
                              )}

                              <div className={`flex items-center p-3 ${isMergeTarget ? 'opacity-30' : ''}`}>
                                
                                <div className="no-select-trigger cursor-grab active:cursor-grabbing pr-3 opacity-30 hover:opacity-100">
                                  <i className="ph-bold ph-dots-six-vertical text-[#8B5A2B]" style={{fontSize: 16}}></i>
                                </div>
                                
                                <div className="flex-1 min-w-0 pr-1">
                                  <p className="truncate text-[13px] text-[#2A1D15] font-extrabold leading-tight mb-0.5">{block.label}</p>
                                  <p className={`font-mono text-[16px] font-black tracking-tight ${block.amount >= 0 ? 'text-[#2E7D32]' : 'text-[#C62828]'}`}>
                                    {block.amount > 0 ? '+' : ''}{formatCurrency(block.amount)}
                                  </p>
                                </div>

                                {/* 나누기 & 수정 버튼 그룹 */}
                                <div className="flex items-center gap-1">
                                  <div 
                                    className="no-select-trigger p-1.5 rounded-md hover:bg-black/5 text-[#A69C8E] hover:text-[#0277BD] transition-colors"
                                    onClick={(e) => { e.stopPropagation(); openSplitModal(block); }}
                                    title="금액 일부를 분할하여 나누기"
                                  >
                                    <i className="ph-bold ph-scissors" style={{fontSize: 16}}></i>
                                  </div>
                                  <div 
                                    className="no-select-trigger p-1.5 rounded-md hover:bg-black/5 text-[#A69C8E] hover:text-[#3D2B1F] transition-colors"
                                    onClick={(e) => { e.stopPropagation(); openEditModal(block); }}
                                    title="내역 수정"
                                  >
                                    <i className="ph-bold ph-pencil-simple" style={{fontSize: 16}}></i>
                                  </div>
                                </div>
                              </div>

                              {hasSubItems && (
                                <div className={`px-4 pb-3 pt-0 ${isMergeTarget ? 'opacity-30' : ''}`}>
                                  <div className="border-t border-black/10 pt-2 space-y-1.5">
                                    {block.subItems.map((sub, idx) => (
                                      <div key={idx} className="flex justify-between items-center text-[11px] text-[#6D5443] font-medium group/sub">
                                        <span className="truncate pr-2 flex items-center gap-1.5">
                                          <span className="text-black/20">↳</span> {sub.label || '내용 없음'}
                                        </span>
                                        <div className="flex items-center gap-2">
                                          <span className={`font-mono font-bold ${sub.amount >= 0 ? 'text-[#388E3C]' : 'text-[#D32F2F]'}`}>
                                            {sub.amount > 0 ? '+' : ''}{formatCurrency(sub.amount)}
                                          </span>
                                          {/* 꺼내기 버튼 */}
                                          <button 
                                            onClick={(e) => { e.stopPropagation(); extractSubItem(block.id, sub.id); }}
                                            className="opacity-0 group-hover/sub:opacity-100 p-1 bg-white border border-[#DFD8CE] text-[#8B5A2B] rounded hover:bg-[#F9F6F0] transition-opacity"
                                            title="독립된 박스로 분리해서 밖으로 꺼내기"
                                          >
                                            <i className="ph-bold ph-export" style={{fontSize: 14}}></i>
                                          </button>
                                        </div>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              )}

                              {isSelected && (
                                <div className={`absolute -right-2 -top-2 ${theme.bg} text-white rounded-full p-0.5 shadow-sm`}>
                                  <i className="ph-fill ph-check-circle" style={{fontSize: 12}}></i>
                                </div>
                              )}
                            </div>
                          );
                        })
                      )}
                    </div>

                    {/* 2-4. 잔고 하단 표시 */}
                    <div className="p-5 bg-white border-t border-[#E6E0D4] rounded-b-xl shrink-0">
                      <div className="flex justify-between items-end">
                        <span className="text-xs font-black text-[#6D5443] uppercase tracking-widest">현재 잔고</span>
                        <span className={`text-[26px] font-black tracking-tighter font-mono ${accountTotal >= 0 ? theme.text : 'text-[#C62828]'}`}>
                          {formatCurrency(accountTotal)}
                        </span>
                      </div>
                    </div>
                  </div>
                );
              })}

              {/* === 새로운 현장 추가 버튼 (컬럼) === */}
              <div 
                onClick={addNewAccount}
                className="w-[360px] h-[calc(100vh-140px)] flex flex-col justify-center items-center bg-[#FDFCFB]/60 hover:bg-white rounded-xl border-2 border-dashed border-[#DFD8CE] hover:border-[#8B5A2B] shadow-sm transition-all cursor-pointer group shrink-0"
              >
                <div className="w-14 h-14 bg-[#EFEBE4] group-hover:bg-[#8B5A2B] text-[#A69C8E] group-hover:text-white rounded-full flex items-center justify-center mb-4 transition-colors">
                  <i className="ph-bold ph-plus" style={{fontSize: 28}}></i>
                </div>
                <p className="font-extrabold text-[#6D5443] group-hover:text-[#3D2B1F] transition-colors">새로운 현장/법인 추가</p>
              </div>

            </div>
          </div>

          {/* 3. 다중 선택 계산기 바 */}
          {selectedBlocks.length > 0 && (
            <div className="selection-bar fixed bottom-8 left-1/2 -translate-x-1/2 bg-[#2A1D15] text-[#FDFCFB] px-8 py-4 rounded-full shadow-2xl flex items-center gap-8 z-40 animate-in slide-in-from-bottom-4 border border-[#4A3B32]">
              <div className="flex items-center gap-3">
                <i className="ph-fill ph-calculator text-[#D2B48C]" style={{fontSize: 20}}></i>
                <span className="text-sm font-bold"><span className="text-[#D2B48C] text-lg mr-1">{selectedBlocks.length}</span>개 선택됨</span>
              </div>
              <div className="w-px h-6 bg-[#4A3B32]" />
              <div className="flex items-center gap-4">
                <span className="text-xs font-bold text-[#A69C8E] uppercase tracking-widest">합산 결과</span>
                <span className={`text-2xl font-black font-mono tracking-tight ${selectedSum >= 0 ? 'text-[#81C784]' : 'text-[#E57373]'}`}>
                  {selectedSum > 0 ? '+' : ''}{formatCurrency(selectedSum)}
                </span>
              </div>
              <button onClick={() => setSelectedBlocks([])} className="ml-2 p-2 bg-[#4A3B32] hover:bg-[#6B4423] rounded-full transition-colors text-white">
                <i className="ph-bold ph-x" style={{fontSize: 18}}></i>
              </button>
            </div>
          )}

          {/* --- 모달: 금액 나누기 (Split) --- */}
          {splitModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/80 backdrop-blur-sm">
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]">
                <div className="flex justify-between items-center p-5 border-b border-[#EFEBE4] bg-[#FDFCFB]">
                  <h3 className="font-extrabold text-[#3D2B1F] text-base flex items-center gap-2">
                    <i className="ph-bold ph-scissors text-[#8B5A2B]" style={{fontSize: 18}}></i> 금액 나누기 (분할)
                  </h3>
                  <button onClick={() => setSplitModal({ isOpen: false, block: null, amountInput: '' })} className="p-1.5 hover:bg-[#EFEBE4] rounded-full text-[#A69C8E]"><i className="ph-bold ph-x" style={{fontSize: 18}}></i></button>
                </div>
                
                <form onSubmit={executeSplit} className="p-6">
                  <div className="mb-4 text-sm text-[#6D5443] font-bold text-center bg-[#F9F6F0] p-3 rounded-lg border border-[#DFD8CE]">
                    기존 금액: <span className="font-mono text-lg text-[#2A1D15] block mt-1">{formatCurrency(splitModal.block?.amount)}</span>
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">분리해 낼 금액</label>
                    <input 
                      type="text" required 
                      value={splitModal.amountInput} 
                      onChange={handleSplitAmountChange} 
                      className="w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-xl font-mono font-black text-right focus:outline-none focus:border-[#8B5A2B] transition-colors" 
                      placeholder="0"
                    />
                  </div>

                  <button type="submit" className="w-full py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold flex items-center justify-center gap-2 transition-colors shadow-md">
                    <i className="ph-bold ph-arrows-split" style={{fontSize: 16}}></i> 나누기 확정
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* --- 모달: 현장 설정 --- */}
          {settingsModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/80 backdrop-blur-sm">
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]">
                <div className="flex justify-between items-center p-5 border-b border-[#EFEBE4] bg-[#FDFCFB]">
                  <h3 className="font-extrabold text-[#3D2B1F] text-base flex items-center gap-2">
                    <i className="ph-fill ph-gear text-[#8B5A2B]" style={{fontSize: 18}}></i> 현장 환경 설정
                  </h3>
                  <button onClick={() => setSettingsModal({isOpen:false})} className="p-1.5 hover:bg-[#EFEBE4] rounded-full text-[#A69C8E]"><i className="ph-bold ph-x" style={{fontSize: 18}}></i></button>
                </div>
                
                <form onSubmit={saveSettings} className="p-6">
                  <div className="space-y-4 mb-6">
                    <div>
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-1.5 uppercase">현장명 (주제)</label>
                      <input type="text" required value={settingsModal.accountData.name} onChange={(e) => setSettingsModal(p => ({...p, accountData: {...p.accountData, name: e.target.value}}))} className="w-full border border-[#DFD8CE] rounded-lg p-2.5 text-sm font-bold text-[#2A1D15] focus:border-[#8B5A2B] focus:outline-none"/>
                    </div>
                    <div>
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-1.5 uppercase">은행</label>
                      <input type="text" value={settingsModal.accountData.bank} onChange={(e) => setSettingsModal(p => ({...p, accountData: {...p.accountData, bank: e.target.value}}))} className="w-full border border-[#DFD8CE] rounded-lg p-2.5 text-sm font-bold text-[#2A1D15] focus:border-[#8B5A2B] focus:outline-none"/>
                    </div>
                    <div>
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-1.5 uppercase">계좌번호</label>
                      <input type="text" value={settingsModal.accountData.accountNo} onChange={(e) => setSettingsModal(p => ({...p, accountData: {...p.accountData, accountNo: e.target.value}}))} className="w-full border border-[#DFD8CE] rounded-lg p-2.5 text-sm font-mono font-bold text-[#2A1D15] focus:border-[#8B5A2B] focus:outline-none"/>
                    </div>
                  </div>

                  <div className="mb-8">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-3 uppercase flex items-center gap-1"><i className="ph-fill ph-palette" style={{fontSize: 14}}></i> 패널 테마 색상 (전체 톤 변경)</label>
                    <div className="grid grid-cols-2 gap-2">
                      {Object.keys(COLUMN_THEMES).map(key => (
                        <button
                          key={key} type="button"
                          onClick={() => setSettingsModal(p => ({...p, accountData: {...p.accountData, theme: key}}))}
                          className={`
                            py-2 px-3 rounded-lg border-2 text-xs font-bold transition-all flex items-center justify-center gap-2
                            ${COLUMN_THEMES[key].light} ${COLUMN_THEMES[key].text}
                            ${settingsModal.accountData.theme === key ? `border-[#8B5A2B] ring-2` : 'border-transparent'}
                          `}
                        >
                          <div className={`w-3 h-3 rounded-full ${COLUMN_THEMES[key].bg}`}></div>
                          {COLUMN_THEMES[key].label}
                        </button>
                      ))}
                    </div>
                  </div>

                  <button type="submit" className="w-full py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold flex items-center justify-center gap-2 transition-colors shadow-md">
                    <i className="ph-fill ph-floppy-disk" style={{fontSize: 16}}></i> 설정 저장
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* --- 모달: 월 마감 --- */}
          {closeMonthModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/80 backdrop-blur-sm">
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]">
                <div className="p-6 bg-[#FCFAF8] border-b border-[#EFEBE4] text-center">
                  <div className="w-12 h-12 bg-[#EFEBE4] text-[#8B5A2B] rounded-full flex items-center justify-center mx-auto mb-3">
                    <i className="ph-fill ph-calendar-check" style={{fontSize: 24}}></i>
                  </div>
                  <h3 className="font-extrabold text-[#3D2B1F] text-lg">월별 결산 확정 (저장)</h3>
                  <p className="text-xs font-bold text-[#A69C8E] mt-1">{accountsData.find(a => a.id === closeMonthModal.accountId)?.name}</p>
                </div>
                
                <form onSubmit={executeCloseMonth} className="p-6">
                  <p className="text-sm text-[#6D5443] mb-5 font-bold leading-relaxed text-center bg-[#F9F6F0] p-3 rounded-lg border border-[#DFD8CE]">
                    현재 보드에 등록된 <span className="text-[#8B5A2B]">모든 박스의 항목과 금액 그대로</span> 결산서에 복사하여 보관합니다.<br/><span className="text-[10px] text-[#A69C8E]">(보드 내역은 초기화되지 않습니다)</span>
                  </p>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">결산 월 라벨</label>
                    <input type="text" required value={closeMonthModal.monthLabel} onChange={(e) => setCloseMonthModal(p => ({ ...p, monthLabel: e.target.value }))} className="w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-sm font-bold text-[#2A1D15] focus:outline-none focus:border-[#8B5A2B] text-center"/>
                  </div>

                  <div className="flex gap-3">
                    <button type="button" onClick={() => setCloseMonthModal({ isOpen: false })} className="flex-1 py-3 text-[#6D5443] bg-[#EFEBE4] hover:bg-[#DFD8CE] rounded-xl text-sm font-extrabold transition-colors">취소</button>
                    <button type="submit" className="flex-[2] py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold transition-colors shadow-md">내역 복사 및 저장</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* --- 모달: 결산 내역서 (가로 스크롤 보드형) --- */}
          {reportModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-[#2A1D15]/80 backdrop-blur-sm">
              <div className="bg-[#FDFCFB] rounded-2xl w-[95vw] shadow-2xl overflow-hidden flex flex-col h-[90vh] animate-in zoom-in-95 border border-[#E6E0D4]">
                
                <div className="px-6 py-5 border-b border-[#E6E0D4] bg-white flex justify-between items-center shrink-0">
                  <div className="flex items-center gap-3">
                    <div className="p-2.5 bg-[#EFEBE4] text-[#8B5A2B] rounded-lg">
                      <i className="ph-fill ph-file-text" style={{fontSize: 20}}></i>
                    </div>
                    <div>
                      <h3 className="font-black text-[#2A1D15] text-xl tracking-tight">월별 결산 내역서</h3>
                      <p className="text-xs font-bold text-[#8B5A2B] mt-0.5">{accountsData.find(a => a.id === reportModal.accountId)?.name} 누적 장부</p>
                    </div>
                  </div>
                  <button onClick={closeModals} className="p-2 bg-[#EFEBE4] hover:bg-[#DFD8CE] rounded-full text-[#6D5443] transition-colors"><i className="ph-bold ph-x" style={{fontSize: 20}}></i></button>
                </div>

                {/* 가로로 나열되는 리스트 */}
                <div className="flex flex-1 overflow-x-auto p-8 gap-6 bg-[#F5F2EC] custom-scrollbar items-start">
                  {(() => {
                    const reports = accountsData.find(a => a.id === reportModal.accountId)?.reportData || [];
                    
                    if (reports.length === 0) {
                      return (
                        <div className="w-full h-full flex flex-col items-center justify-center text-[#A69C8E]">
                          <i className="ph-fill ph-chart-bar mb-4 opacity-50" style={{fontSize: 48}}></i>
                          <p className="font-bold text-lg">저장된 결산 기록이 없습니다.</p>
                          <p className="text-sm mt-2">메인 보드에서 [월 마감]을 통해 결산을 저장해보세요.</p>
                        </div>
                      );
                    }

                    return reports.map(activeReport => {
                      const reportTotal = activeReport.blocks.reduce((sum, b) => sum + (b.amount || 0), 0);
                      
                      return (
                        <div key={activeReport.id} className="w-[400px] shrink-0 bg-white border border-[#E6E0D4] rounded-2xl shadow-md flex flex-col max-h-full">
                          
                          <div className="p-5 border-b border-[#E6E0D4] flex justify-between items-end shrink-0 bg-[#FCFAF8] rounded-t-2xl">
                            <h2 className="text-2xl font-black text-[#2A1D15]">{activeReport.month}</h2>
                            <div className="text-right">
                              <p className="text-[10px] font-extrabold text-[#A69C8E] uppercase tracking-widest">최종 결산액</p>
                              <p className={`text-2xl font-black font-mono tracking-tight ${reportTotal >= 0 ? 'text-[#2E7D32]' : 'text-[#C62828]'}`}>
                                {reportTotal > 0 ? '+' : ''}{formatCurrency(reportTotal)}
                              </p>
                            </div>
                          </div>

                          <div className="flex-1 overflow-y-auto p-4 custom-scrollbar flex flex-col gap-2">
                            {activeReport.blocks.map(block => {
                              const tagColor = COLOR_TAGS[block.color || 'none'];
                              return (
                                <div key={block.id} className={`relative flex flex-col border rounded-xl shadow-sm hover:shadow-md transition-shadow group p-1 ${tagColor.bg} ${tagColor.border}`}>
                                  <div className="flex items-center gap-2 p-2">
                                    <div className="flex-1 flex gap-2 items-center">
                                      <input 
                                        type="text" value={block.label}
                                        onChange={(e) => handleReportBlockChange(activeReport.id, block.id, 'label', e.target.value)}
                                        className="flex-1 w-0 bg-transparent font-extrabold text-[14px] text-[#2A1D15] border-b border-transparent focus:border-[#DFD8CE] hover:border-black/10 px-1 py-1 focus:outline-none transition-colors"
                                        placeholder="항목/적요명"
                                      />
                                      <input 
                                        type="text" value={block.amountString ?? (block.amount === 0 ? '' : block.amount)}
                                        readOnly={block.subItems && block.subItems.length > 0}
                                        onChange={(e) => handleReportBlockChange(activeReport.id, block.id, 'amount', e.target.value)}
                                        className={`w-28 bg-transparent font-mono font-black text-right text-[15px] border-b border-transparent focus:border-[#DFD8CE] hover:border-black/10 px-1 py-1 focus:outline-none transition-colors ${block.amount >= 0 ? 'text-[#2E7D32]' : 'text-[#C62828]'} ${(block.subItems && block.subItems.length > 0) ? 'opacity-60 cursor-not-allowed' : ''}`}
                                        placeholder="0"
                                      />
                                    </div>
                                    <button onClick={() => deleteReportBlock(activeReport.id, block.id)} className="w-8 h-8 flex items-center justify-center text-[#A69C8E] hover:text-[#C62828] hover:bg-black/5 rounded-lg transition-colors opacity-0 group-hover:opacity-100 shrink-0">
                                      <i className="ph-bold ph-trash" style={{fontSize: 16}}></i>
                                    </button>
                                  </div>

                                  {block.subItems && block.subItems.length > 0 && (
                                    <div className="px-3 pb-2 pt-0">
                                      <div className="border-t border-black/10 pt-2 space-y-1.5">
                                        {block.subItems.map((sub, idx) => (
                                          <div key={idx} className="flex justify-between items-center text-[11px] text-[#6D5443] font-medium">
                                            <span className="truncate pr-2 flex items-center gap-1.5">
                                              <span className="text-black/20">↳</span> {sub.label || '내용 없음'}
                                            </span>
                                            <span className={`font-mono font-bold ${sub.amount >= 0 ? 'text-[#388E3C]' : 'text-[#D32F2F]'}`}>
                                              {sub.amount > 0 ? '+' : ''}{formatCurrency(sub.amount)}
                                            </span>
                                          </div>
                                        ))}
                                      </div>
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                            
                            <button onClick={() => addReportBlock(activeReport.id)} className="mt-2 w-full py-3.5 border-2 border-dashed border-[#DFD8CE] text-[#8B5A2B] rounded-xl text-sm font-bold hover:bg-[#F9F6F0] hover:border-[#B39977] transition-colors flex items-center justify-center gap-2">
                              <i className="ph-bold ph-plus" style={{fontSize: 16}}></i> 누락된 내역 행 추가
                            </button>
                          </div>

                          <div className="p-4 border-t border-[#E6E0D4] bg-[#FCFAF8] rounded-b-2xl shrink-0 flex justify-end">
                            <button onClick={() => deleteEntireReport(activeReport.id)} className="text-[11px] font-bold text-[#C62828] hover:underline flex items-center gap-1 px-2 py-1">
                              <i className="ph-bold ph-trash" style={{fontSize: 12}}></i> 이 달의 결산 삭제
                            </button>
                          </div>
                        </div>
                      );
                    });
                  })()}
                </div>
              </div>
            </div>
          )}

          {/* --- 모달: 메인 블록 생성/수정 --- */}
          {modal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/60 backdrop-blur-sm">
              <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]">
                
                <div className="flex justify-between items-center p-5 border-b border-[#EFEBE4] bg-[#FDFCFB]">
                  <h3 className="font-extrabold text-[#3D2B1F] text-base flex items-center gap-2">
                    {modal.mode === 'create' ? <i className="ph-fill ph-plus-circle text-[#8B5A2B]" style={{fontSize: 18}}></i> : <i className="ph-bold ph-pencil-simple text-[#8B5A2B]" style={{fontSize: 18}}></i>}
                    {modal.mode === 'create' ? '신규 자금 내역' : '자금 내역 수정'}
                  </h3>
                  <button onClick={closeModals} className="p-1.5 hover:bg-[#EFEBE4] rounded-full text-[#A69C8E]"><i className="ph-bold ph-x" style={{fontSize: 18}}></i></button>
                </div>

                <form onSubmit={saveBlock} className="p-6 max-h-[75vh] overflow-y-auto custom-scrollbar">
                  
                  <div className="mb-5">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">메인 항목명</label>
                    <input type="text" required value={modal.blockData.label} onChange={(e) => setModal(p => ({...p, blockData: {...p.blockData, label: e.target.value}}))} className="w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-sm font-bold text-[#2A1D15] focus:outline-none focus:border-[#8B5A2B] transition-colors" placeholder="예: 건축주 입금액, 장비대금 등"/>
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">박스 컬러 지정 (전체 배경색)</label>
                    <div className="flex gap-3">
                      {Object.keys(COLOR_TAGS).map(key => (
                        <button key={key} type="button" onClick={() => setModal(p => ({...p, blockData: {...p.blockData, color: key}}))} className={`w-8 h-8 rounded-full border-2 transition-all shadow-sm ${COLOR_TAGS[key].bg} ${COLOR_TAGS[key].border} ${modal.blockData.color === key ? 'ring-2 ring-offset-2 ring-[#8B5A2B] scale-110' : 'hover:scale-105'}`}/>
                      ))}
                    </div>
                  </div>

                  <div className="my-6 border-t border-[#EFEBE4]" />

                  <div className="mb-6 bg-[#FDFCFB] p-4 rounded-xl border border-[#E6E0D4]">
                    <div className="flex justify-between items-center mb-3">
                      <label className="block text-xs font-extrabold text-[#6D5443] uppercase flex items-center gap-1.5"><i className="ph-bold ph-list-plus" style={{fontSize: 14}}></i> 상세 내역 (소분류)</label>
                      <button type="button" onClick={addSubItem} className="text-[10px] bg-[#EFEBE4] text-[#8B5A2B] px-2 py-1 rounded font-bold hover:bg-[#DFD8CE] transition-colors">+ 행 추가</button>
                    </div>
                    
                    {modal.blockData.subItems && modal.blockData.subItems.length > 0 ? (
                      <div className="space-y-3 mb-3">
                        {modal.blockData.subItems.map((sub) => (
                          <div key={sub.id} className="flex gap-2 items-start">
                            <div className="flex-1 space-y-2">
                              <input type="text" value={sub.label} onChange={(e) => handleSubItemChange(sub.id, 'label', e.target.value)} placeholder="내용 (예: 장비대 지출)" className="w-full text-[11px] font-bold border border-[#DFD8CE] rounded p-2 focus:outline-none focus:border-[#8B5A2B]" required/>
                              <input type="text" value={sub.amountString ?? (sub.amount === 0 ? '' : sub.amount)} onChange={(e) => handleSubItemChange(sub.id, 'amount', e.target.value)} placeholder="금액 (- 지출)" className="w-full text-xs font-mono font-bold border border-[#DFD8CE] rounded p-2 text-right focus:outline-none focus:border-[#8B5A2B]" required/>
                            </div>
                            <button type="button" onClick={() => removeSubItem(sub.id)} className="p-2 text-[#C62828] bg-white border border-[#DFD8CE] rounded hover:bg-[#FFEBEE]"><i className="ph-bold ph-trash" style={{fontSize: 14}}></i></button>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <p className="text-[11px] text-[#A69C8E] font-medium text-center py-2">다른 박스를 이 위로 <strong>드래그 & 드롭</strong> 하시면<br/>자동으로 소분류로 합쳐집니다.</p>
                    )}
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase flex items-center gap-1.5"><i className="ph-fill ph-currency-circle-dollar" style={{fontSize: 14}}></i> 최종 합계 금액</label>
                    <input
                      type="text" required readOnly={modal.blockData.subItems && modal.blockData.subItems.length > 0}
                      value={modal.amountInput} onChange={handleAmountChange}
                      className={`w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-xl font-mono font-black text-right focus:outline-none transition-colors
                        ${(modal.blockData.subItems && modal.blockData.subItems.length > 0) ? 'bg-[#EFEBE4] text-[#6D5443] cursor-not-allowed' : 'bg-white focus:border-[#8B5A2B]'}
                        ${modal.blockData.amount >= 0 ? 'text-[#2E7D32]' : 'text-[#C62828]'}
                      `}
                      placeholder="0"
                    />
                    
                    {(!modal.blockData.subItems || modal.blockData.subItems.length === 0) && (
                      <div className="flex gap-2 mt-2">
                        <button type="button" onClick={() => {
                            const newAmt = Math.abs(modal.blockData.amount);
                            setModal(p => ({ ...p, amountInput: formatCurrency(newAmt), blockData: { ...p.blockData, amount: newAmt } }));
                          }} className="flex-1 py-2 bg-[#E8F5E9] text-[#2E7D32] text-xs font-extrabold rounded-lg hover:bg-[#C8E6C9] border border-[#C8E6C9]">수입(+)</button>
                        <button type="button" onClick={() => {
                            const newAmt = -Math.abs(modal.blockData.amount);
                            setModal(p => ({ ...p, amountInput: formatCurrency(newAmt), blockData: { ...p.blockData, amount: newAmt } }));
                          }} className="flex-1 py-2 bg-[#FFEBEE] text-[#C62828] text-xs font-extrabold rounded-lg hover:bg-[#FFCDD2] border border-[#FFCDD2]">지출(-)</button>
                      </div>
                    )}
                  </div>

                  <div className="flex gap-3 pt-4 border-t border-[#EFEBE4]">
                    {modal.mode === 'edit' && (
                      <button type="button" onClick={() => deleteBlock(modal.blockData.id)} className="p-3 text-[#C62828] border-2 border-[#FFCDD2] bg-[#FFEBEE] hover:bg-[#FFCDD2] rounded-xl transition-colors" title="삭제">
                        <i className="ph-bold ph-trash" style={{fontSize: 18}}></i>
                      </button>
                    )}
                    <button type="submit" className="flex-1 py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold flex items-center justify-center gap-2 transition-colors shadow-md">
                      <i className="ph-fill ph-floppy-disk" style={{fontSize: 16}}></i> 변경사항 저장
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 렌더링 실행
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
