                      <button type="button" onClick={() => setReportModal(prev => ({ ...prev, viewMode: 'monthly' }))} className={`px-3 py-1.5 rounded-md text-xs font-extrabold transition-colors ${reportModal.viewMode === 'monthly' ? 'bg-[#8B5A2B] text-white shadow-sm' : 'text-[#6D5443] hover:bg-white'}`}>월별</button>
                      <button type="button" onClick={() => setReportModal(prev => ({ ...prev, viewMode: 'quarterly' }))} className={`px-3 py-1.5 rounded-md text-xs font-extrabold transition-colors ${reportModal.viewMode === 'quarterly' ? 'bg-[#8B5A2B] text-white shadow-sm' : 'text-[#6D5443] hover:bg-white'}`}>분기별(3개월)</button>
                    </div>
                    <button onClick={closeModals} className="p-2 bg-[#EFEBE4] hover:bg-[#DFD8CE] rounded-full text-[#6D5443] transition-colors" title="닫기"><i className="ph-bold ph-x" style={{fontSize: 20}}></i></button>
                  </div>
                </div>

                <div className="flex flex-1 overflow-x-auto p-8 gap-6 bg-[#F5F2EC] custom-scrollbar items-start">
                  {(() => {
                    const reportAccount = accountsData.find(a => a.id === reportModal.accountId);
                    const reports = reportAccount ? (reportAccount.reportData || []) : [];
                    
                    if (reports.length === 0) {
                      return (
                        <div className="w-full h-full flex flex-col items-center justify-center text-[#A69C8E]">
                          <i className="ph-fill ph-chart-bar mb-4 opacity-50" style={{fontSize: 48}}></i>
                          <p className="font-bold text-lg">저장된 결산 기록이 없습니다.</p>
                          <p className="text-sm mt-2">메인 보드에서 [월 결산]을 통해 결산을 저장해보세요.</p>
                        </div>
                      );
                    }

                    if (reportModal.viewMode === 'overview') {
                      const overview = getReportOverview(reportAccount, reports);
                      const firstPeriod = overview.entries[0]?.period;
                      const latestPeriod = overview.latest?.period;
                      const periodLabel = firstPeriod && latestPeriod
                        ? `${firstPeriod.year}.${String(firstPeriod.month).padStart(2, '0')} - ${latestPeriod.year}.${String(latestPeriod.month).padStart(2, '0')}`
                        : '기간 정보 없음';
                      const overviewMetrics = [
                        { label: '누적 순현금', value: overview.netCash, icon: 'ph-arrows-left-right', bg: 'bg-[#F4F7F5]', text: overview.netCash >= 0 ? 'text-[#2E7D32]' : 'text-[#C62828]' },
                        { label: '최신 결산 잔고', value: overview.latestBalance, icon: 'ph-wallet', bg: 'bg-[#F7F5F2]', text: overview.latestBalance >= 0 ? 'text-[#3D2B1F]' : 'text-[#C62828]' },
                        { label: '최신 미지급', value: overview.latestCredit, icon: 'ph-clock', bg: 'bg-[#FFF8E8]', text: 'text-[#A35E00]' },
                        { label: '실제 부가세', value: overview.actualVat, icon: 'ph-percent', bg: 'bg-[#E8F5F3]', text: 'text-[#00796B]' },
                        { label: '은행 부가세', value: overview.bankVat, icon: 'ph-bank', bg: 'bg-[#EEF0FA]', text: 'text-[#3949AB]' },
                        { label: '부가세 차이', value: overview.vatGap, icon: 'ph-scales', bg: 'bg-[#F6EDF8]', text: overview.vatGap === 0 ? 'text-[#455A64]' : 'text-[#6A1B9A]' },
                      ];
                      return (
                        <div className="w-full min-w-[1020px] max-w-[1500px] mx-auto space-y-4">
                          <section className="bg-white border border-[#D8D2C9] rounded-xl shadow-sm overflow-hidden">
                            <div className="px-5 py-4 border-b border-[#E6E0D4] bg-[#FCFAF8] flex items-center justify-between">
                              <div>
                                <p className="text-[10px] font-black text-[#8B5A2B] uppercase">결산 기간</p>
                                <h2 className="text-lg font-black text-[#2A1D15] mt-0.5">{periodLabel}</h2>
                              </div>
                              <div className="text-right">
                                <p className="text-[10px] font-bold text-[#8B8175]">저장된 결산</p>
                                <p className="text-lg font-black text-[#3D2B1F]">{overview.entries.length}개월</p>
                              </div>
                            </div>
                            <div className="grid grid-cols-6 divide-x divide-[#E6E0D4]">
                              {overviewMetrics.map(metric => (
                                <div key={metric.label} className={`px-4 py-4 min-w-0 ${metric.bg}`}>
                                  <p className={`text-[10px] font-extrabold flex items-center gap-1.5 ${metric.text}`}><i className={`ph-bold ${metric.icon}`} style={{fontSize: 13}}></i>{metric.label}</p>
                                  <p className={`mt-1.5 font-mono text-[15px] font-black truncate ${metric.text}`} title={formatSignedCurrency(metric.value)}>{formatSignedCurrency(metric.value)}</p>
                                </div>
                              ))}
                            </div>
                          </section>

                          <div className="grid grid-cols-[1fr_280px] gap-4 items-start">
                            <section className="bg-white border border-[#D8D2C9] rounded-xl shadow-sm overflow-hidden">
                              <div className="px-5 py-3.5 border-b border-[#E6E0D4] flex items-center justify-between">
                                <div>
                                  <h3 className="text-sm font-black text-[#2A1D15]">월별 결산 흐름</h3>
                                  <p className="text-[10px] font-bold text-[#8B8175] mt-0.5">입금 · 지출 · 순현금 · 미지급 · 부가세 · 잔고</p>
                                </div>
                                <span className="text-[10px] font-extrabold text-[#6D5443] bg-[#F5F2EC] px-2 py-1 rounded-md">지출률 {overview.expenseRate}%</span>
                              </div>
                              <div className="max-h-[430px] overflow-y-auto custom-scrollbar">
                                <table className="w-full text-[11px] border-collapse">
                                  <thead className="sticky top-0 bg-[#F5F2EC] text-[#6D5443] z-10">
                                    <tr>
                                      <th className="px-3 py-2.5 text-left font-black">결산월</th>
                                      <th className="px-3 py-2.5 text-right font-black">입금</th>
                                      <th className="px-3 py-2.5 text-right font-black">지출</th>
                                      <th className="px-3 py-2.5 text-right font-black">순현금</th>
                                      <th className="px-3 py-2.5 text-right font-black">미지급</th>
                                      <th className="px-3 py-2.5 text-right font-black">실제 VAT</th>
                                      <th className="px-3 py-2.5 text-right font-black">은행 VAT</th>
                                      <th className="px-3 py-2.5 text-right font-black">잔고</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    {[...overview.entries].reverse().map(entry => {
                                      const monthlyNet = entry.summary.income - entry.summary.expense;
                                      return (
                                        <tr key={entry.report.id} className="border-t border-[#EFEBE4] hover:bg-[#FCFAF8]">
                                          <td className="px-3 py-3 font-extrabold text-[#2A1D15] whitespace-nowrap">{entry.report.month}</td>
                                          <td className="px-3 py-3 font-mono font-bold text-right text-[#2E7D32]">{formatSignedCurrency(entry.summary.income)}</td>
                                          <td className="px-3 py-3 font-mono font-bold text-right text-[#C62828]">{formatCurrency(entry.summary.expense)}</td>
                                          <td className={`px-3 py-3 font-mono font-black text-right ${monthlyNet >= 0 ? 'text-[#2E7D32]' : 'text-[#C62828]'}`}>{formatSignedCurrency(monthlyNet)}</td>
                                          <td className="px-3 py-3 font-mono font-bold text-right text-[#A35E00]">{formatSignedCurrency(entry.summary.credit)}</td>
                                          <td className="px-3 py-3 font-mono font-bold text-right text-[#00796B]">{formatSignedCurrency(entry.summary.calculatedVat)}</td>
                                          <td className="px-3 py-3 font-mono font-bold text-right text-[#3949AB]">{formatSignedCurrency(entry.summary.reportedVat)}</td>
                                          <td className={`px-3 py-3 font-mono font-black text-right ${entry.summary.balance >= 0 ? 'text-[#3D2B1F]' : 'text-[#C62828]'}`}>{formatSignedCurrency(entry.summary.balance)}</td>
                                        </tr>
                                      );
                                    })}
                                  </tbody>
                                </table>
                              </div>
                            </section>

                            <aside className="space-y-4">
                              <section className="bg-white border border-[#D8D2C9] rounded-xl shadow-sm overflow-hidden">
                                <div className="px-4 py-3 border-b border-[#E6E0D4] bg-[#FCFAF8]">
                                  <h3 className="text-sm font-black text-[#2A1D15]">확인 필요 항목</h3>
                                </div>
                                <div className="divide-y divide-[#EFEBE4]">
                                  {overview.alerts.map((alert, idx) => {
                                    const tone = alert.tone === 'danger' ? 'text-[#C62828] bg-[#FFF4F4]' : alert.tone === 'warning' ? 'text-[#A35E00] bg-[#FFF9EC]' : alert.tone === 'info' ? 'text-[#3949AB] bg-[#F5F6FC]' : 'text-[#2E7D32] bg-[#F4FAF4]';
                                    return (
                                      <div key={`${alert.label}-${idx}`} className={`px-4 py-3 ${tone}`}>
                                        <div className="flex items-center justify-between gap-2">
                                          <span className="text-[11px] font-black">{alert.label}</span>
                                          <span className="font-mono text-[11px] font-black">{formatSignedCurrency(alert.value)}</span>
                                        </div>
                                        <p className="text-[10px] font-bold opacity-75 mt-1 leading-relaxed">{alert.detail}</p>
                                      </div>
                                    );
                                  })}
                                </div>
                              </section>
                              <section className="bg-white border border-[#D8D2C9] rounded-xl shadow-sm overflow-hidden">
                                <div className="px-4 py-3 border-b border-[#E6E0D4] bg-[#FCFAF8]">
                                  <h3 className="text-sm font-black text-[#2A1D15]">운영 지표</h3>
                                </div>
                                <div className="px-4 py-2 divide-y divide-[#EFEBE4] text-[11px]">
                                  <div className="flex justify-between py-2.5"><span className="font-bold text-[#6D5443]">누적 입금</span><span className="font-mono font-black text-[#2E7D32]">{formatSignedCurrency(overview.income)}</span></div>
                                  <div className="flex justify-between py-2.5"><span className="font-bold text-[#6D5443]">누적 지출</span><span className="font-mono font-black text-[#C62828]">{formatCurrency(overview.expense)}</span></div>
                                  <div className="flex justify-between py-2.5"><span className="font-bold text-[#6D5443]">전월 대비 잔고</span><span className={`font-mono font-black ${overview.balanceChange >= 0 ? 'text-[#2E7D32]' : 'text-[#C62828]'}`}>{formatSignedCurrency(overview.balanceChange)}</span></div>
                                  <div className="flex justify-between py-2.5"><span className="font-bold text-[#6D5443]">지출률</span><span className="font-mono font-black text-[#3D2B1F]">{overview.expenseRate}%</span></div>
                                </div>
                              </section>
                            </aside>
                          </div>
                        </div>
                      );
                    }

                    if (reportModal.viewMode === 'quarterly') {
                      const quarterlyReports = buildQuarterlyReports(reportAccount, reports);
                      if (quarterlyReports.length === 0) {
                        return <div className="w-full h-full flex items-center justify-center text-sm font-bold text-[#A69C8E]">연도와 월을 확인할 수 있는 결산 기록이 없습니다.</div>;
                      }
                      return quarterlyReports.map(group => (
                        <div key={group.key} className="w-[520px] shrink-0 bg-white border border-[#E6E0D4] rounded-2xl shadow-md overflow-hidden">
                          <div className="px-5 py-4 bg-[#FCFAF8] border-b border-[#E6E0D4] flex items-center justify-between">
                            <div>
                              <p className="text-[10px] font-black text-[#A69C8E] uppercase">3개월 합산 결과</p>
                              <h2 className="text-2xl font-black text-[#2A1D15]">{group.year}년 {group.quarter}분기</h2>
                            </div>
                            <span className="text-xs font-extrabold text-[#8B5A2B]">{group.reports.length}개월</span>
                          </div>
                          <div className="grid grid-cols-3 border-b border-[#E6E0D4]">
                            {REPORT_SUMMARY_ITEMS.map((metric, index) => {
                              const value = group.summary[metric.key] || 0;
                              return (
                                <div key={metric.key} className={`px-3 py-3 ${metric.bg} ${index % 3 !== 2 ? 'border-r border-white' : ''} ${index < 3 ? 'border-b border-white' : ''}`}>
                                  <p className={`text-[9px] font-black flex items-center gap-1 ${metric.text}`}><i className={`ph-bold ${metric.icon}`}></i>{metric.label}</p>
                                  <p className={`font-mono text-[13px] font-black truncate ${metric.text}`}>{metric.key === 'expense' ? formatCurrency(Math.abs(value)) : formatSignedCurrency(value)}</p>
                                </div>
                              );
                            })}
                          </div>
                          <div className="p-4">
                            <div className="grid grid-cols-[90px_1fr_1fr_1fr] px-3 py-2 bg-[#F9F6F0] text-[10px] font-black text-[#6D5443] rounded-t-lg">
                              <span>결산월</span><span className="text-right">입금</span><span className="text-right">지출</span><span className="text-right">실제/은행 VAT</span>
                            </div>
                            {group.reports.map(report => {
                              const summary = getReportSummary(reportAccount, report);
                              return (
                                <div key={report.id} className="grid grid-cols-[90px_1fr_1fr_1fr] items-center px-3 py-2.5 border-b border-[#EFEBE4] text-[11px]">
                                  <span className="font-extrabold text-[#3D2B1F] truncate">{report.month}</span>
                                  <span className="font-mono font-bold text-right text-[#2E7D32]">{formatSignedCurrency(summary.income)}</span>
                                  <span className="font-mono font-bold text-right text-[#C62828]">{formatCurrency(summary.expense)}</span>
                                  <span className="font-mono font-bold text-right text-[#0277BD]">{formatSignedCurrency(summary.calculatedVat)} / <span className="text-[#7B1FA2]">{formatSignedCurrency(summary.reportedVat)}</span></span>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      ));
                    }

                    return reports.map(storedReport => {
                      const isEditing = reportEditDraft?.id === storedReport.id;
                      const activeReport = isEditing ? reportEditDraft : storedReport;
                      const reportSummary = getReportSummary(reportAccount, activeReport);
                      const reportTotal = reportSummary.balance;
                      
                      return (
                        <div key={storedReport.id} className={`w-[460px] shrink-0 bg-white border rounded-2xl shadow-md flex flex-col max-h-full ${isEditing ? 'border-[#8B5A2B] ring-2 ring-[#D2B48C]' : 'border-[#E6E0D4]'}`}>
                          <div className="p-5 border-b border-[#E6E0D4] flex justify-between items-end shrink-0 bg-[#FCFAF8] rounded-t-2xl">
                            <div className="min-w-0 flex-1 pr-3">
                              {isEditing ? (
                                <input type="text" value={activeReport.month || ''} onChange={(e) => handleReportMonthChange(e.target.value)} className="w-full text-xl font-black text-[#2A1D15] bg-white border-2 border-[#D2B48C] rounded-lg px-2.5 py-1.5 focus:outline-none focus:border-[#8B5A2B]" aria-label="결산 월 수정" />
                              ) : (
                                <h2 className="text-2xl font-black text-[#2A1D15] truncate">{activeReport.month}</h2>
                              )}
                              {activeReport.closeMode && <span className={`inline-flex mt-1 px-2 py-0.5 rounded-md text-[9px] font-black ${activeReport.closeMode === 'reset' ? 'bg-[#EEF0FA] text-[#3949AB]' : 'bg-[#F5F2EC] text-[#6D5443]'}`}>{activeReport.closeMode === 'reset' ? '초기화 결산' : '유지 결산'}</span>}
                              {isEditing && <span className="inline-flex ml-1 mt-1 px-2 py-0.5 rounded-md text-[9px] font-black bg-[#FFF3D6] text-[#A35E00]">수정 중</span>}
                            </div>
                            <div className="text-right">
                              <p className="text-[10px] font-extrabold text-[#A69C8E] uppercase tracking-widest">최종 결산액</p>
                              <p className={`text-2xl font-black font-mono tracking-tight ${reportTotal >= 0 ? 'text-[#2E7D32]' : 'text-[#C62828]'}`}>
                                {reportTotal > 0 ? '+' : ''}{formatCurrency(reportTotal)}
                              </p>
                            </div>
                          </div>
                          <div className="grid grid-cols-3 shrink-0 border-b border-[#E6E0D4]">
                            {REPORT_SUMMARY_ITEMS.map((metric, index) => {
                              const value = reportSummary[metric.key] || 0;
                              return (
                                <div key={metric.key} className={`px-3 py-2.5 ${metric.bg} ${index % 3 !== 2 ? 'border-r border-white' : ''} ${index < 3 ? 'border-b border-white' : ''}`}>
                                  <p className={`text-[9px] font-black flex items-center gap-1 ${metric.text}`}><i className={`ph-bold ${metric.icon}`}></i>{metric.label}</p>
                                  <p className={`font-mono text-[12px] font-black truncate ${metric.text}`}>{metric.key === 'expense' ? formatCurrency(Math.abs(value)) : formatSignedCurrency(value)}</p>
                                </div>
                              );
                            })}
                          </div>
                          <div className="flex-1 overflow-y-auto p-4 custom-scrollbar flex flex-col gap-2">
                            {activeReport.blocks.map(block => {
                              const tagColor = COLOR_TAGS[block.color] || COLOR_TAGS['none'];
                              const isPlanned = !!block.isPlanned;
                              const hasSubItems = block.subItems && block.subItems.length > 0;
                              const blockAmount = getBlockAmount(block);
                              return (
                                <div key={block.id} className={`relative flex flex-col border rounded-xl shadow-sm hover:shadow-md transition-shadow group p-1 ${tagColor.bg} ${tagColor.border}`}>
                                  <div className="flex items-center gap-2 p-2">
                                    <div className="flex-1 flex gap-2 items-center">
                                      <input 
                                        type="text" value={block.label}
                                        onChange={(e) => handleReportBlockChange(activeReport.id, block.id, 'label', e.target.value)}
                                        readOnly={!isEditing}
                                        className={`flex-1 w-0 bg-transparent font-extrabold text-[14px] text-[#2A1D15] border-b px-1 py-1 focus:outline-none transition-colors ${isEditing ? 'border-[#D2B48C] focus:border-[#8B5A2B]' : 'border-transparent cursor-default'}`}
                                        placeholder="항목/적요명"
                                      />
                                      {(block.isCarryover || block.isCarryoverDetail) && <span className="shrink-0 text-[9px] font-black px-1.5 py-0.5 rounded-full bg-[#ECEFF1] text-[#455A64] border border-[#B0BEC5]">이월</span>}
                                      {block.carryoverSelected && <span className="shrink-0 text-[9px] font-black px-1.5 py-0.5 rounded-full bg-[#EEF0FA] text-[#3949AB] border border-[#C5CAE9]">다음 달 이월</span>}
                                      {isPlanned && <span className="shrink-0 text-[10px] font-black px-1.5 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">미지급</span>}
                                      {getStoredVatMode(block) !== 'none' && <span className="shrink-0 text-[9px] font-black px-1.5 py-0.5 rounded-full bg-[#E8F2FC] text-[#0277BD] border border-[#90CAF9]">{getVatBadgeText(block, blockAmount)}</span>}
                                      <input 
                                        type="text" value={hasSubItems ? formatCurrency(blockAmount) : (block.amountString != null ? block.amountString : (block.amount === 0 ? '' : block.amount))}
                                        readOnly={hasSubItems || !isEditing}
                                        onChange={(e) => handleReportBlockChange(activeReport.id, block.id, 'amount', e.target.value)}
                                        className={`w-28 bg-transparent font-mono font-black text-right text-[15px] border-b px-1 py-1 focus:outline-none transition-colors ${getAmountTextClass(blockAmount, 'auto', isPlanned)} ${hasSubItems ? 'opacity-60 cursor-not-allowed border-transparent' : isEditing ? 'border-[#D2B48C] focus:border-[#8B5A2B]' : 'border-transparent cursor-default'}`}
                                        placeholder="0"
                                      />
                                    </div>
                                    {isEditing && <button onClick={() => deleteReportBlock(activeReport.id, block.id)} className="w-8 h-8 flex items-center justify-center text-[#A69C8E] hover:text-[#C62828] hover:bg-black/5 rounded-lg transition-colors shrink-0" title="결산 항목 삭제"><i className="ph-bold ph-trash" style={{fontSize: 16}}></i></button>}
                                  </div>

                                  {hasSubItems && (
                                    <div className="px-3 pb-2 pt-0">
                                      <div className="border-t border-black/10 pt-2 space-y-1.5">
                                        {block.subItems.map((sub, idx) => {
                                          const childItems = getChildItems(sub);
                                          const subAmount = getSubItemAmount(sub);
                                          return (
                                            <div key={sub.id || idx} className="rounded-lg border border-[#E6E0D4] bg-white/70 px-2 py-1.5 text-[#6D5443] font-medium">
                                              <div className="flex justify-between items-center">
                                                <span className="min-w-0 flex-1 pr-2 flex items-center gap-1.5">
                                                  <i className="ph-bold ph-corner-down-right text-[#A69C8E]" style={{fontSize: 14}}></i>
                                                  {isEditing ? <input type="text" value={sub.label || ''} onChange={(e) => handleReportSubChange(activeReport.id, block.id, sub.id, 'label', e.target.value)} className="min-w-0 flex-1 text-[12px] font-bold text-[#3D2B1F] bg-white border-b border-[#D2B48C] px-1 py-0.5 focus:outline-none focus:border-[#8B5A2B]" aria-label="결산 중분류 이름" /> : <span className="truncate text-[12px] font-bold text-[#3D2B1F]">{sub.label || '내용 없음'}</span>}
                                                </span>
                                                <div className="flex items-center gap-2">
                                                  {isEditing ? <input type="text" value={sub.amountString != null ? sub.amountString : (sub.amount === 0 ? '' : sub.amount)} onChange={(e) => handleReportSubChange(activeReport.id, block.id, sub.id, 'amount', e.target.value)} className={`w-24 text-[12px] font-mono font-bold text-right bg-white border-b border-[#D2B48C] px-1 py-0.5 focus:outline-none focus:border-[#8B5A2B] ${getAmountTextClass(subAmount, sub.amountColor || 'auto', sub.isPlanned)}`} aria-label="결산 중분류 금액" /> : <span className={`text-[12px] font-mono font-bold ${getAmountTextClass(subAmount, sub.amountColor || 'auto', sub.isPlanned)}`}>{subAmount > 0 ? '+' : ''}{formatCurrency(subAmount)}</span>}
                                                  {sub.isPlanned && <span className="text-[10px] font-black px-1.5 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">미지급</span>}
                                                  {getStoredVatMode(sub) !== 'none' && <span className="text-[9px] font-black px-1 py-0.5 rounded-full bg-[#E8F2FC] text-[#0277BD] border border-[#90CAF9]">{getVatBadgeText(sub, subAmount)}</span>}
                                                </div>
                                              </div>
                                              {childItems.length > 0 && (
                                                <div className="mt-1.5 ml-3 space-y-1 border-l-2 border-[#EFEBE4] pl-2">
                                                  {childItems.map((child, childIdx) => (
                                                    <div key={child.id || childIdx} className="flex justify-between items-center gap-2">
                                                      <span className="min-w-0 flex-1 flex items-center gap-1.5">
                                                        <i className="ph-bold ph-arrow-elbow-down-right text-[#D2B48C]" style={{fontSize: 12}}></i>
                                                        {isEditing ? <input type="text" value={child.label || ''} onChange={(e) => handleReportChildChange(activeReport.id, block.id, sub.id, child.id, 'label', e.target.value)} className="min-w-0 flex-1 text-[11px] font-bold text-[#6D5443] bg-white border-b border-[#D2B48C] px-1 py-0.5 focus:outline-none focus:border-[#8B5A2B]" aria-label="결산 소분류 이름" /> : <span className="truncate text-[11px] font-bold text-[#6D5443]">{child.label || '소분류 없음'}</span>}
                                                      </span>
                                                      <div className="flex items-center gap-1.5 shrink-0">
                                                        {isEditing ? <input type="text" value={child.amountString != null ? child.amountString : (child.amount === 0 ? '' : child.amount)} onChange={(e) => handleReportChildChange(activeReport.id, block.id, sub.id, child.id, 'amount', e.target.value)} className={`w-20 text-[11px] font-mono font-bold text-right bg-white border-b border-[#D2B48C] px-1 py-0.5 focus:outline-none focus:border-[#8B5A2B] ${getAmountTextClass(child.amount, child.amountColor || 'auto', child.isPlanned)}`} aria-label="결산 소분류 금액" /> : <span className={`text-[11px] font-mono font-bold ${getAmountTextClass(child.amount, child.amountColor || 'auto', child.isPlanned)}`}>{child.amount > 0 ? '+' : ''}{formatCurrency(child.amount)}</span>}
                                                        {child.isPlanned && <span className="text-[9px] font-black px-1 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">미지급</span>}
                                                        {getStoredVatMode(child) !== 'none' && <span className="text-[9px] font-black px-1 py-0.5 rounded-full bg-[#E8F2FC] text-[#0277BD] border border-[#90CAF9]">{getVatBadgeText(child, child.amount)}</span>}
                                                      </div>
                                                    </div>
                                                  ))}
                                                </div>
                                              )}
                                            </div>
                                          );
                                        })}
                                      </div>
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                            {isEditing && <button onClick={() => addReportBlock(activeReport.id)} className="mt-2 w-full py-3.5 border-2 border-dashed border-[#DFD8CE] text-[#8B5A2B] rounded-xl text-sm font-bold hover:bg-[#F9F6F0] hover:border-[#B39977] transition-colors flex items-center justify-center gap-2"><i className="ph-bold ph-plus" style={{fontSize: 16}}></i> 누락된 내역 행 추가</button>}
                          </div>

                          <div className="p-4 border-t border-[#E6E0D4] bg-[#FCFAF8] rounded-b-2xl shrink-0 flex justify-between items-center gap-2">
                            {!isEditing ? <button onClick={() => downloadReportAsExcel(reportAccount, storedReport)} className="text-[11px] font-bold text-[#2E7D32] hover:bg-[#E8F5E9] border border-[#C8E6C9] bg-white rounded-lg flex items-center gap-1 px-2.5 py-1.5 transition-colors"><i className="ph-bold ph-file-xls" style={{fontSize: 12}}></i> 엑셀 다운로드</button> : <span className="text-[10px] font-bold text-[#A35E00]">저장 전에는 원본 결산이 유지됩니다.</span>}
                            <div className="flex items-center gap-2">
                              {isEditing ? (
                                <>
                                  <button type="button" onClick={cancelReportEdit} className="px-3 py-1.5 rounded-lg border border-[#DFD8CE] bg-white text-[11px] font-extrabold text-[#6D5443] hover:bg-[#F5F2EC]">취소</button>
                                  <button type="button" onClick={saveReportEdit} className="px-3 py-1.5 rounded-lg bg-[#8B5A2B] text-white text-[11px] font-extrabold hover:bg-[#6B4423] flex items-center gap-1"><i className="ph-bold ph-floppy-disk"></i>수정 저장</button>
                                </>
                              ) : (
                                <>
                                  <button type="button" onClick={() => beginReportEdit(storedReport)} className="px-3 py-1.5 rounded-lg border border-[#D2B48C] bg-white text-[11px] font-extrabold text-[#8B5A2B] hover:bg-[#F9F6F0] flex items-center gap-1"><i className="ph-bold ph-pencil-simple"></i>수정</button>
                                  <button onClick={() => deleteEntireReport(storedReport.id)} className="text-[11px] font-bold text-[#C62828] hover:underline flex items-center gap-1 px-2 py-1"><i className="ph-bold ph-trash" style={{fontSize: 12}}></i>삭제</button>
                                </>
                              )}
                            </div>
                          </div>
                        </div>
                      );
                    });
                  })()}
                </div>
              </div>
            </div>
          )}

          {/* --- 💡 모달: 메인 블록 생성/수정 --- */}
          {modal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/60 backdrop-blur-sm" onContextMenu={(e) => { e.preventDefault(); e.stopPropagation(); }}>
              <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]">
                
                <div className="flex justify-between items-center p-5 border-b border-[#EFEBE4] bg-[#FDFCFB]">
                  <h3 className="font-extrabold text-[#3D2B1F] text-base flex items-center gap-2">
                    {modal.mode === 'create' ? <i className="ph-fill ph-plus-circle text-[#8B5A2B]" style={{fontSize: 18}}></i> : <i className="ph-bold ph-pencil-simple text-[#8B5A2B]" style={{fontSize: 18}}></i>}
                    {modal.mode === 'create' ? '신규 자금 내역' : '자금 내역 수정'}
                  </h3>
                  <button onClick={closeModals} className="p-1.5 hover:bg-[#EFEBE4] rounded-full text-[#A69C8E]"><i className="ph-bold ph-x" style={{fontSize: 18}}></i></button>
                </div>

                <form onSubmit={saveBlock} className="p-6 max-h-[75vh] overflow-y-auto custom-scrollbar">
                  
                  <div className="mb-5 flex flex-col sm:flex-row gap-3">
                    <div className="flex-[2]">
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">항목 박스 이름</label>
                      <input type="text" required value={modal.blockData.label} onChange={(e) => setModal(p => ({...p, blockData: {...p.blockData, label: e.target.value}}))} className="w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-sm font-bold text-[#2A1D15] focus:outline-none focus:border-[#8B5A2B] transition-colors" placeholder="예: 건축주 입금액, 장비대금 등"/>
                    </div>
                    {/* 💡 자체 금액 입력칸: 하위 항목이 있으면 숨김 */}
                    {(!modal.blockData.subItems || modal.blockData.subItems.length === 0) && (
                      <div className="flex-1">
                        <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase text-right">자체 금액</label>
                        <input 
                          type="text" required 
                          value={modal.amountInput} onChange={handleAmountChange} 
                          className={`w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-sm font-mono font-black text-right text-[#2A1D15] focus:outline-none focus:border-[#8B5A2B] transition-colors ${getAmountTextClass(modal.blockData.amount, 'auto', modal.blockData.isPlanned)}`} 
                          placeholder="0"
                        />
                      </div>
                    )}
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">박스 컬러 지정 (전체 배경색)</label>
                    <div className="flex flex-wrap gap-3">
                      {Object.keys(COLOR_TAGS).map(key => (
                        <button key={key} type="button" title={getBlockColorLabel(key)} onClick={() => setModal(p => ({...p, blockData: {...p.blockData, color: key}}))} className={`w-8 h-8 rounded-full border-2 transition-all shadow-sm ${COLOR_TAGS[key].bg} ${COLOR_TAGS[key].border} ${modal.blockData.color === key ? 'ring-2 ring-offset-2 ring-[#8B5A2B] scale-110' : 'hover:scale-105'}`}/>
                      ))}
                    </div>
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">금액 유형</label>
                    <button
                      type="button"
                      onClick={toggleModalPlanned}
                      className={`w-full rounded-xl border-2 p-3 flex items-center justify-between gap-3 text-sm font-extrabold transition-colors
                        ${modal.blockData.isPlanned ? 'bg-[#FDF6E9] border-[#D2B48C] text-[#8B5A2B]' : 'bg-white border-[#E6E0D4] text-[#6D5443] hover:border-[#D2B48C]'}
                      `}
                    >
                      <span className="flex items-center gap-2">
                        <i className="ph-bold ph-clock" style={{fontSize: 16}}></i>
                        미지급 체크 · 미지급 합계 표시
                      </span>
                      <span className={`text-[10px] px-2 py-1 rounded-full ${modal.blockData.isPlanned ? 'bg-[#8B5A2B] text-white' : 'bg-[#EFEBE4] text-[#A69C8E]'}`}>
                        {modal.blockData.isPlanned ? '켜짐' : '꺼짐'}
                      </span>
                    </button>
                    <div className="mt-3">
                      <div className="flex items-center justify-between mb-2">
                        <span className="text-xs font-extrabold text-[#6D5443]">부가세 계산 방식</span>
                        <span className="text-[10px] font-black text-[#0277BD]">{VAT_MODES[getStoredVatMode(modal.blockData)].label}</span>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        {['none', 'included', 'additional', 'full'].map(vatMode => {
                          const isActive = getStoredVatMode(modal.blockData) === vatMode;
                          return (
                            <button key={vatMode} type="button" onClick={() => setModalVatMode(vatMode)} className={`min-h-[68px] rounded-lg border-2 px-3 py-2 text-left transition-colors ${isActive ? 'bg-[#E8F2FC] border-[#0277BD] text-[#01579B]' : 'bg-white border-[#E6E0D4] text-[#6D5443] hover:border-[#90CAF9]'}`}>
                              <span className="flex items-center gap-1.5 text-[11px] font-black"><i className={`ph-bold ${isActive ? 'ph-check-circle' : vatMode === 'none' ? 'ph-x-circle' : 'ph-percent'}`}></i>{VAT_MODES[vatMode].label}</span>
                              <span className="block text-[9px] font-bold opacity-75 mt-1 leading-relaxed">{VAT_MODES[vatMode].description}</span>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </div>

                  <div className="my-6 border-t border-[#EFEBE4]" />

                  <div className="mb-6 bg-[#FDFCFB] p-4 rounded-xl border border-[#E6E0D4]">
                    <div className="flex justify-between items-center mb-3">
                      <label className="block text-xs font-extrabold text-[#6D5443] uppercase flex items-center gap-1.5"><i className="ph-bold ph-folder-simple" style={{fontSize: 14}}></i> 하위 항목</label>
                      <button type="button" onClick={addSubItem} className="text-[10px] bg-[#EFEBE4] text-[#8B5A2B] px-2 py-1 rounded font-bold hover:bg-[#DFD8CE] transition-colors">+ 하위 항목 추가</button>
                    </div>
                    
                    {modal.blockData.subItems && modal.blockData.subItems.length > 0 ? (
                      <div className="space-y-3 mb-3">
                        {modal.blockData.subItems.map((sub, idx) => {
                          const childItems = getChildItems(sub);
                          const hasChildItems = childItems.length > 0;
                          return (
                          <div key={sub.id} className="rounded-lg border bg-white p-3 shadow-sm transition-colors">
                            <div className="flex gap-2 items-start">
                              <div className="flex-1 space-y-2">
                                <input type="text" value={sub.label} onChange={(e) => handleSubItemChange(sub.id, 'label', e.target.value)} placeholder="하위 항목 이름 (예: 장비대)" className="w-full text-[12px] font-bold border border-[#DFD8CE] rounded p-2 focus:outline-none focus:border-[#8B5A2B]" required/>
                                {/* 💡 자체 금액 입력칸: 소분류가 생기면 입력 막힘, 순수 자기 금액만 입력 */}
                                {!hasChildItems ? (
                                  <input type="text" value={sub.amountString != null ? sub.amountString : (sub.amount === 0 ? '' : sub.amount)} onChange={(e) => handleSubItemChange(sub.id, 'amount', e.target.value)} placeholder="금액 입력" className={`w-full text-xs font-mono font-bold border border-[#DFD8CE] rounded p-2 text-right focus:outline-none focus:border-[#8B5A2B] ${getAmountTextClass(sub.amount, sub.amountColor || 'auto', sub.isPlanned)}`} required/>
                                ) : (
                                  <div className="flex justify-between items-center p-2 bg-[#F9F6F0] border border-[#DFD8CE] rounded text-right text-xs font-mono font-bold text-[#A69C8E]">
                                    <span className="text-[10px]">소분류 합계 표시안함</span>
                                    <span>-</span>
                                  </div>
                                )}
                              </div>
                              <div className="flex flex-col gap-1">
                                <button type="button" onClick={() => removeSubItem(sub.id)} className="p-1.5 text-[#C62828] bg-white border border-[#DFD8CE] rounded hover:bg-[#FFEBEE]" title="삭제">
                                  <i className="ph-bold ph-trash" style={{fontSize: 13}}></i>
                                </button>
                              </div>
                            </div>

                            <div className="mt-3 pt-3 border-t border-[#EFEBE4]">
                              <div className="flex items-center justify-between gap-2 mb-2">
                                <span className="text-[10px] font-extrabold text-[#6D5443] flex items-center gap-1.5">
                                  <i className="ph-fill ph-palette" style={{fontSize: 13}}></i> 색상변경
                                </span>
                                <span className="text-[10px] font-bold text-[#A69C8E]">
                                  {(SUBITEM_AMOUNT_COLORS[sub.amountColor || 'auto'] || SUBITEM_AMOUNT_COLORS.auto).label}
                                </span>
                              </div>
                              <div className="flex flex-wrap gap-1.5">
                                {SUBITEM_COLOR_ORDER.map(colorKey => {
                                  const color = SUBITEM_AMOUNT_COLORS[colorKey];
                                  const isActiveColor = (sub.amountColor || 'auto') === colorKey;
                                  return (
                                    <button
                                      key={colorKey}
                                      type="button"
                                      onClick={() => setSubItemColor(sub.id, colorKey)}
                                      className={`px-2.5 py-1.5 rounded-full border text-[10px] font-extrabold flex items-center gap-1.5 transition-all
                                        ${isActiveColor ? 'border-[#8B5A2B] bg-[#F9F6F0] text-[#3D2B1F] ring-1 ring-[#8B5A2B]' : 'border-[#DFD8CE] bg-white text-[#6D5443] hover:bg-[#F9F6F0]'}
                                      `}
                                      title={`${color.label} 색상으로 표시`}
                                    >
                                      <span className={`w-3 h-3 rounded-full border border-black/10 ${color.swatch}`}></span>
                                      {color.label}
                                    </button>
                                  );
                                })}
                              </div>
                            </div>

                            <div className="mt-3 pt-3 border-t border-[#EFEBE4] bg-[#FCFAF8] rounded-lg p-2">
                              <div className="flex items-center justify-between gap-2 mb-2">
                                <span className="text-[10px] font-extrabold text-[#6D5443] flex items-center gap-1.5">
                                  <i className="ph-bold ph-arrow-elbow-down-right" style={{fontSize: 13}}></i> 세부 항목 (소분류)
                                </span>
                                <button type="button" onClick={() => addChildItem(sub.id)} className="text-[10px] bg-white border border-[#DFD8CE] text-[#8B5A2B] px-2 py-1 rounded font-bold hover:bg-[#F9F6F0] transition-colors">+ 세부항목 추가</button>
                              </div>

                              {/* === 모달 내부 소분류 리스트 === */}
                              {childItems.length > 0 ? (
                                <div className="space-y-2">
                                  {childItems.map((child, childIdx) => (
                                    <div key={child.id} className="rounded-md border border-[#DFD8CE] bg-white p-2 transition-colors select-none">
                                      <div className="flex gap-2 items-start">
                                        <div className="flex-1 space-y-1.5">
                                          <input type="text" value={child.label} onChange={(e) => handleChildItemChange(sub.id, child.id, 'label', e.target.value)} placeholder="세부 내용" className="w-full text-[11px] font-bold border border-[#DFD8CE] rounded p-2 focus:outline-none focus:border-[#8B5A2B]" />
                                          <input type="text" value={child.amountString != null ? child.amountString : (child.amount === 0 ? '' : child.amount)} onChange={(e) => handleChildItemChange(sub.id, child.id, 'amount', e.target.value)} placeholder="금액" className={`w-full text-xs font-mono font-bold border border-[#DFD8CE] rounded p-2 text-right focus:outline-none focus:border-[#8B5A2B] ${getAmountTextClass(child.amount, child.amountColor || 'auto', child.isPlanned)}`} />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                          <button type="button" onClick={() => removeChildItem(sub.id, child.id)} className="p-1.5 text-[#C62828] bg-white border border-[#DFD8CE] rounded hover:bg-[#FFEBEE]" title="삭제">
                                            <i className="ph-bold ph-trash" style={{fontSize: 12}}></i>
                                          </button>
                                        </div>
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              ) : (
                                <p className="text-[10px] text-[#A69C8E] font-bold text-center py-2">이 항목 안에 더 작은 단위의 세부 항목을 나열할 수 있습니다.</p>
                              )}
                            </div>
                          </div>
                          );
                        })}
                      </div>
                    ) : (
                      <p className="text-[11px] text-[#A69C8E] font-medium text-center py-2">수정창에서는 드래그 앤 드롭이 비활성화됩니다.<br/>메인 보드 화면에서 박스를 합치거나 뺄 수 있습니다.</p>
                    )}
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase flex items-center justify-between gap-1.5">
                      <span className="flex items-center gap-1.5"><i className="ph-fill ph-currency-circle-dollar" style={{fontSize: 14}}></i> 최종 합계 금액 <span className="text-[10px] font-normal opacity-80">(박스 자체 + 중분류)</span></span>
                    </label>
                    <input
                      type="text" readOnly
                      value={formatCurrency(getBlockAmount(modal.blockData))}
                      className={`w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-xl font-mono font-black text-right bg-[#EFEBE4] text-[#6D5443] cursor-not-allowed transition-colors
                        ${getAmountTextClass(getBlockAmount(modal.blockData), 'auto', modal.blockData.isPlanned)}
                      `}
                      placeholder="0"
                    />
                    
                    {(!modal.blockData.subItems || modal.blockData.subItems.length === 0) && (
                      <div className="flex gap-2 mt-2">
                        <button type="button" onClick={() => {
                            const newAmt = Math.abs(modal.blockData.amount);
                            setModal(p => ({ ...p, amountInput: formatCurrency(newAmt), blockData: { ...p.blockData, amount: newAmt } }));
                          }} className="flex-1 py-2 bg-[#E8F5E9] text-[#2E7D32] text-xs font-extrabold rounded-lg hover:bg-[#C8E6C9] border border-[#C8E6C9]">수입(+)</button>
                        <button type="button" onClick={() => {
                            const newAmt = -Math.abs(modal.blockData.amount);
                            setModal(p => ({ ...p, amountInput: formatCurrency(newAmt), blockData: { ...p.blockData, amount: newAmt } }));
                          }} className="flex-1 py-2 bg-[#FFEBEE] text-[#C62828] text-xs font-extrabold rounded-lg hover:bg-[#FFCDD2] border border-[#FFCDD2]">지출(-)</button>
                      </div>
                    )}
                  </div>

                  <div className="flex gap-3 pt-4 border-t border-[#EFEBE4]">
                    {modal.mode === 'edit' && (
                      <button type="button" onClick={() => deleteBlock(modal.blockData.id)} className="p-3 text-[#C62828] border-2 border-[#FFCDD2] bg-[#FFEBEE] hover:bg-[#FFCDD2] rounded-xl transition-colors" title="삭제">
                        <i className="ph-bold ph-trash" style={{fontSize: 18}}></i>
                      </button>
                    )}
                    <button type="submit" className="flex-1 py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold flex items-center justify-center gap-2 transition-colors shadow-md">
                      <i className="ph-fill ph-floppy-disk" style={{fontSize: 16}}></i> 변경사항 저장
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
