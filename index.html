                                                            draggable={true}
                                                            onDragStart={(e) => handleBoardChildDragStart(e, block.id, sub.id, child.id)}
                                                            onDragEnd={clearAllDragStates}
                                                            onDragOver={(e) => handleDragOverItem(e, child.id)}
                                                            onDragLeave={(e) => handleDragLeaveItem(e, child.id)}
                                                            onDrop={(e) => handleDropOnChildItem(e, block.id, sub.id, child.id)}
                                                            onDoubleClick={(e) => openSplitModal(e, 'child', block, sub, child)}
                                                            className={`cursor-grab active:cursor-grabbing select-none flex justify-between items-center gap-2 rounded px-1.5 py-1 transition-colors
                                                              ${draggedBoardChild && draggedBoardChild.childId === child.id ? 'opacity-50' : 'hover:bg-black/5'}
                                                              ${dragOverId === child.id ? 'ring-2 ring-[#8B5A2B] bg-[#FDFCFB]' : ''}
                                                            `}
                                                            title="더블클릭: 금액 분할 / 드래그: 이동"
                                                          >
                                                            <span className="truncate flex items-center gap-1.5 pointer-events-none">
                                                              <i className="ph-bold ph-arrow-elbow-down-right text-[#D2B48C]" style={{fontSize: 12}}></i>
                                                              <span className="text-[11px] font-bold text-[#6D5443]">{child.label || '소분류 없음'}</span>
                                                            </span>
                                                            <span className={`text-[11px] font-mono font-bold pointer-events-none ${getAmountTextClass(child.amount, child.amountColor || 'auto')}`}>
                                                              {child.amount > 0 ? '+' : ''}{formatCurrency(child.amount)}
                                                            </span>
                                                          </div>
                                                        </div>
                                                      ))}
                                                      <div
                                                        onDragOver={(e) => handleDragOverItem(e, `${sub.id}_child_bottom`)}
                                                        onDragLeave={(e) => handleDragLeaveItem(e, `${sub.id}_child_bottom`)}
                                                        onDrop={(e) => handleDropOnChildItemReorder(e, block.id, sub.id, null)}
                                                        className={`h-1.5 rounded-full transition-colors z-10 mt-0.5 ${dragOverId === `${sub.id}_child_bottom` ? 'bg-[#8B5A2B] scale-y-150' : 'bg-transparent'}`}
                                                      />
                                                    </div>
                                                  )}
                                                </div>
                                              </div>
                                            );
                                          })}
                                          <div
                                            onDragOver={(e) => handleDragOverItem(e, `${block.id}_sub_bottom`)}
                                            onDragLeave={(e) => handleDragLeaveItem(e, `${block.id}_sub_bottom`)}
                                            onDrop={(e) => handleDropOnSubItemReorder(e, block.id, null)}
                                            className={`h-2 rounded-full transition-colors z-10 mt-0.5 ${dragOverId === `${block.id}_sub_bottom` ? 'bg-[#8B5A2B] scale-y-150' : 'bg-transparent'}`}
                                          />
                                        </div>
                                      )}
                                    </div>
                                  </div>
                                )}
                              </div>
                            </Fragment>
                          );
                        })
                      )}
                      
                      {/* 💡 패널 맨 아랫부분 이동용 드롭존 */}
                      <div 
                        onDragOver={(e) => handleDragOverItem(e, `${account.id}_bottom`)}
                        onDragLeave={(e) => handleDragLeaveItem(e, `${account.id}_bottom`)}
                        onDrop={(e) => { setDragOverId(null); handleDropOnColumn(e, account.id); }}
                        className={`flex-1 min-h-[40px] transition-colors rounded-lg ${dragOverId === `${account.id}_bottom` ? 'bg-[#EFEBE4] ring-2 ring-[#8B5A2B] border-2 border-dashed border-[#8B5A2B]' : 'bg-transparent'}`}
                      />
                    </div>

                    {/* 2-4. 잔고 하단 표시 */}
                    <div className="p-5 bg-white border-t border-[#E6E0D4] rounded-b-xl shrink-0">
                      <div className="flex justify-between items-end">
                        <span className="text-xs font-black text-[#6D5443] uppercase tracking-widest">현재 잔고</span>
                        <span className={`text-[26px] font-black tracking-tighter font-mono ${accountTotal >= 0 ? theme.text : 'text-[#C62828]'}`}>
                          {formatCurrency(accountTotal)}
                        </span>
                      </div>
                    </div>
                  </div>
                );
              })}

              {/* === 새로운 현장 추가 버튼 (컬럼) === */}
              <div 
                onClick={addNewAccount}
                className="w-[360px] min-h-[220px] flex flex-col justify-center items-center bg-[#FDFCFB]/60 hover:bg-white rounded-xl border-2 border-dashed border-[#DFD8CE] hover:border-[#8B5A2B] shadow-sm transition-colors cursor-pointer group shrink-0"
              >
                <div className="w-14 h-14 bg-[#EFEBE4] group-hover:bg-[#8B5A2B] text-[#A69C8E] group-hover:text-white rounded-full flex items-center justify-center mb-4 transition-colors">
                  <i className="ph-bold ph-plus" style={{fontSize: 28}}></i>
                </div>
                <p className="font-extrabold text-[#6D5443] group-hover:text-[#3D2B1F] transition-colors">새로운 현장/법인 추가</p>
              </div>

            </div>
          </div>

          {/* 3. 다중 선택 계산기 바 */}
          {selectedBlocks.length > 0 && (
            <div className="selection-bar fixed bottom-8 left-1/2 -translate-x-1/2 bg-[#2A1D15] text-[#FDFCFB] px-8 py-4 rounded-full shadow-2xl flex items-center gap-8 z-40 animate-in slide-in-from-bottom-4 border border-[#4A3B32]">
              <div className="flex items-center gap-3">
                <i className="ph-fill ph-calculator text-[#D2B48C]" style={{fontSize: 20}}></i>
                <span className="text-sm font-bold"><span className="text-[#D2B48C] text-lg mr-1">{selectedBlocks.length}</span>개 선택됨</span>
              </div>
              <div className="w-px h-6 bg-[#4A3B32]" />
              <div className="flex items-center gap-4">
                <span className="text-xs font-bold text-[#A69C8E] uppercase tracking-widest">잔고 반영 합산</span>
                <span className={`text-2xl font-black font-mono tracking-tight ${selectedSum >= 0 ? 'text-[#81C784]' : 'text-[#E57373]'}`}>
                  {selectedSum > 0 ? '+' : ''}{formatCurrency(selectedSum)}
                </span>
              </div>
              <button onClick={() => setSelectedBlocks([])} className="ml-2 p-2 bg-[#4A3B32] hover:bg-[#6B4423] rounded-full transition-colors text-white">
                <i className="ph-bold ph-x" style={{fontSize: 18}}></i>
              </button>
            </div>
          )}

          {/* --- 모달: 금액 나누기 (Split) --- */}
          {splitModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/80 backdrop-blur-sm" onClick={() => setSplitModal({ isOpen: false, targetType: null, blockId: null, subItemId: null, childId: null, sourceAmount: 0, amountInput: '', label: '' })}>
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]" onClick={(e) => e.stopPropagation()}>
                <div className="flex justify-between items-center p-5 border-b border-[#EFEBE4] bg-[#FDFCFB]">
                  <h3 className="font-extrabold text-[#3D2B1F] text-base flex items-center gap-2">
                    <i className="ph-bold ph-scissors text-[#8B5A2B]" style={{fontSize: 18}}></i> 금액 나누기 (분할)
                  </h3>
                  <button onClick={() => setSplitModal({ isOpen: false, targetType: null, blockId: null, subItemId: null, childId: null, sourceAmount: 0, amountInput: '', label: '' })} className="p-1.5 hover:bg-[#EFEBE4] rounded-full text-[#A69C8E]"><i className="ph-bold ph-x" style={{fontSize: 18}}></i></button>
                </div>
                
                <form onSubmit={executeSplit} className="p-6">
                  <div className="mb-4 text-sm text-[#6D5443] font-bold text-center bg-[#F9F6F0] p-4 rounded-lg border border-[#DFD8CE]">
                    <div className="text-[11px] text-[#A69C8E] mb-1">{splitModal.label}</div>
                    기존 금액: <span className="font-mono text-xl text-[#2A1D15] font-black block mt-1">{formatCurrency(splitModal.sourceAmount)}</span>
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">분리해 낼 금액</label>
                    <input 
                      type="text" required autoFocus
                      value={splitModal.amountInput} 
                      onChange={handleSplitAmountChange} 
                      className="w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-xl font-mono font-black text-right focus:outline-none focus:border-[#8B5A2B] transition-colors" 
                      placeholder="0"
                    />
                  </div>

                  <button type="submit" className="w-full py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold flex items-center justify-center gap-2 transition-colors shadow-md">
                    <i className="ph-bold ph-arrows-split" style={{fontSize: 16}}></i> 나누기 확정
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* --- 모달: 현장 설정 --- */}
          {settingsModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/80 backdrop-blur-sm">
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]">
                <div className="flex justify-between items-center p-5 border-b border-[#EFEBE4] bg-[#FDFCFB]">
                  <h3 className="font-extrabold text-[#3D2B1F] text-base flex items-center gap-2">
                    <i className="ph-fill ph-gear text-[#8B5A2B]" style={{fontSize: 18}}></i> 현장 환경 설정
                  </h3>
                  <button onClick={() => setSettingsModal({isOpen:false})} className="p-1.5 hover:bg-[#EFEBE4] rounded-full text-[#A69C8E]"><i className="ph-bold ph-x" style={{fontSize: 18}}></i></button>
                </div>
                
                <form onSubmit={saveSettings} className="p-6">
                  <div className="space-y-4 mb-6">
                    <div>
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-1.5 uppercase">현장명 (주제)</label>
                      <input type="text" required value={settingsModal.accountData.name} onChange={(e) => setSettingsModal(p => ({...p, accountData: {...p.accountData, name: e.target.value}}))} className="w-full border border-[#DFD8CE] rounded-lg p-2.5 text-sm font-bold text-[#2A1D15] focus:border-[#8B5A2B] focus:outline-none"/>
                    </div>
                    <div>
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-1.5 uppercase">은행</label>
                      <input type="text" value={settingsModal.accountData.bank} onChange={(e) => setSettingsModal(p => ({...p, accountData: {...p.accountData, bank: e.target.value}}))} className="w-full border border-[#DFD8CE] rounded-lg p-2.5 text-sm font-bold text-[#2A1D15] focus:border-[#8B5A2B] focus:outline-none"/>
                    </div>
                    <div>
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-1.5 uppercase">계좌번호</label>
                      <input type="text" value={settingsModal.accountData.accountNo} onChange={(e) => setSettingsModal(p => ({...p, accountData: {...p.accountData, accountNo: e.target.value}}))} className="w-full border border-[#DFD8CE] rounded-lg p-2.5 text-sm font-mono font-bold text-[#2A1D15] focus:border-[#8B5A2B] focus:outline-none"/>
                    </div>
                    <div>
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-1.5 uppercase">카드 보유자</label>
                      <input type="text" value={settingsModal.accountData.cardHolder || ''} onChange={(e) => setSettingsModal(p => ({...p, accountData: {...p.accountData, cardHolder: e.target.value}}))} className="w-full border border-[#DFD8CE] rounded-lg p-2.5 text-sm font-bold text-[#2A1D15] focus:border-[#8B5A2B] focus:outline-none" placeholder="예: 이사님, 대표"/>
                    </div>
                  </div>

                  <div className="mb-8">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-3 uppercase flex items-center gap-1"><i className="ph-fill ph-palette" style={{fontSize: 14}}></i> 패널 테마 색상 (전체 톤 변경)</label>
                    <div className="grid grid-cols-2 gap-2">
                      {Object.keys(COLUMN_THEMES).map(key => (
                        <button
                          key={key} type="button"
                          onClick={() => setSettingsModal(p => ({...p, accountData: {...p.accountData, theme: key}}))}
                          className={`
                            py-2 px-3 rounded-lg border-2 text-xs font-bold transition-all flex items-center justify-center gap-2
                            ${COLUMN_THEMES[key].light} ${COLUMN_THEMES[key].text}
                            ${settingsModal.accountData.theme === key ? `border-[#8B5A2B] ring-2` : 'border-transparent'}
                          `}
                        >
                          <div className={`w-3 h-3 rounded-full ${COLUMN_THEMES[key].bg}`}></div>
                          {COLUMN_THEMES[key].label}
                        </button>
                      ))}
                    </div>
                  </div>

                  <button type="submit" className="w-full py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold flex items-center justify-center gap-2 transition-colors shadow-md">
                    <i className="ph-fill ph-floppy-disk" style={{fontSize: 16}}></i> 설정 저장
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* --- 모달: 월 마감 --- */}
          {closeMonthModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/80 backdrop-blur-sm">
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]">
                <div className="p-6 bg-[#FCFAF8] border-b border-[#EFEBE4] text-center">
                  <div className="w-12 h-12 bg-[#EFEBE4] text-[#8B5A2B] rounded-full flex items-center justify-center mx-auto mb-3">
                    <i className="ph-fill ph-calendar-check" style={{fontSize: 24}}></i>
                  </div>
                  <h3 className="font-extrabold text-[#3D2B1F] text-lg">월별 결산 확정 (저장)</h3>
                  <p className="text-xs font-bold text-[#A69C8E] mt-1">{(accountsData.find(a => a.id === closeMonthModal.accountId) || {}).name}</p>
                </div>
                
                <form onSubmit={executeCloseMonth} className="p-6">
                  <p className="text-sm text-[#6D5443] mb-5 font-bold leading-relaxed text-center bg-[#F9F6F0] p-3 rounded-lg border border-[#DFD8CE]">
                    현재 보드에 등록된 <span className="text-[#8B5A2B]">모든 박스의 항목과 금액 그대로</span> 결산서에 복사하여 보관합니다.<br/><span className="text-[10px] text-[#A69C8E]">(보드 내역은 초기화되지 않습니다)</span>
                  </p>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">결산 월 라벨</label>
                    <input type="text" required value={closeMonthModal.monthLabel} onChange={(e) => setCloseMonthModal(p => ({ ...p, monthLabel: e.target.value }))} className="w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-sm font-bold text-[#2A1D15] focus:outline-none focus:border-[#8B5A2B] text-center"/>
                  </div>

                  <div className="flex gap-3">
                    <button type="button" onClick={() => setCloseMonthModal({ isOpen: false })} className="flex-1 py-3 text-[#6D5443] bg-[#EFEBE4] hover:bg-[#DFD8CE] rounded-xl text-sm font-extrabold transition-colors">취소</button>
                    <button type="submit" className="flex-[2] py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold transition-colors shadow-md">내역 복사 및 저장</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* --- 모달: 결산 내역서 (가로 스크롤 보드형) --- */}
          {reportModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-[#2A1D15]/80 backdrop-blur-sm">
              <div className="bg-[#FDFCFB] rounded-2xl w-[95vw] shadow-2xl overflow-hidden flex flex-col h-[90vh] animate-in zoom-in-95 border border-[#E6E0D4]">
                
                <div className="px-6 py-5 border-b border-[#E6E0D4] bg-white flex justify-between items-center shrink-0">
                  <div className="flex items-center gap-3">
                    <div className="p-2.5 bg-[#EFEBE4] text-[#8B5A2B] rounded-lg">
                      <i className="ph-fill ph-file-text" style={{fontSize: 20}}></i>
                    </div>
                    <div>
                      <h3 className="font-black text-[#2A1D15] text-xl tracking-tight">월별 결산 내역서</h3>
                      <p className="text-xs font-bold text-[#8B5A2B] mt-0.5">{(accountsData.find(a => a.id === reportModal.accountId) || {}).name} 누적 장부</p>
                    </div>
                  </div>
                  <button onClick={closeModals} className="p-2 bg-[#EFEBE4] hover:bg-[#DFD8CE] rounded-full text-[#6D5443] transition-colors"><i className="ph-bold ph-x" style={{fontSize: 20}}></i></button>
                </div>

                {/* 가로로 나열되는 리스트 */}
                <div className="flex flex-1 overflow-x-auto p-8 gap-6 bg-[#F5F2EC] custom-scrollbar items-start">
                  {(() => {
                    const reportAccount = accountsData.find(a => a.id === reportModal.accountId);
                    const reports = reportAccount ? (reportAccount.reportData || []) : [];
                    
                    if (reports.length === 0) {
                      return (
                        <div className="w-full h-full flex flex-col items-center justify-center text-[#A69C8E]">
                          <i className="ph-fill ph-chart-bar mb-4 opacity-50" style={{fontSize: 48}}></i>
                          <p className="font-bold text-lg">저장된 결산 기록이 없습니다.</p>
                          <p className="text-sm mt-2">메인 보드에서 [월 마감]을 통해 결산을 저장해보세요.</p>
                        </div>
                      );
                    }

                    return reports.map(activeReport => {
                      const reportTotal = activeReport.blocks.reduce((sum, b) => sum + getEffectiveAmount(b), 0);
                      
                      return (
                        <div key={activeReport.id} className="w-[400px] shrink-0 bg-white border border-[#E6E0D4] rounded-2xl shadow-md flex flex-col max-h-full">
                          
                          <div className="p-5 border-b border-[#E6E0D4] flex justify-between items-end shrink-0 bg-[#FCFAF8] rounded-t-2xl">
                            <h2 className="text-2xl font-black text-[#2A1D15]">{activeReport.month}</h2>
                            <div className="text-right">
                              <p className="text-[10px] font-extrabold text-[#A69C8E] uppercase tracking-widest">최종 결산액</p>
                              <p className={`text-2xl font-black font-mono tracking-tight ${reportTotal >= 0 ? 'text-[#2E7D32]' : 'text-[#C62828]'}`}>
                                {reportTotal > 0 ? '+' : ''}{formatCurrency(reportTotal)}
                              </p>
                            </div>
                          </div>

                          <div className="flex-1 overflow-y-auto p-4 custom-scrollbar flex flex-col gap-2">
                            {activeReport.blocks.map(block => {
                              const tagColor = COLOR_TAGS[block.color || 'none'];
                              const isPlanned = !!block.isPlanned;
                              const hasSubItems = block.subItems && block.subItems.length > 0;
                              const blockAmount = getBlockAmount(block);
                              return (
                                <div key={block.id} className={`relative flex flex-col border rounded-xl shadow-sm hover:shadow-md transition-shadow group p-1 ${tagColor.bg} ${tagColor.border}`}>
                                  <div className="flex items-center gap-2 p-2">
                                    <div className="flex-1 flex gap-2 items-center">
                                      <input 
                                        type="text" value={block.label}
                                        onChange={(e) => handleReportBlockChange(activeReport.id, block.id, 'label', e.target.value)}
                                        className="flex-1 w-0 bg-transparent font-extrabold text-[14px] text-[#2A1D15] border-b border-transparent focus:border-[#DFD8CE] hover:border-black/10 px-1 py-1 focus:outline-none transition-colors"
                                        placeholder="항목/적요명"
                                      />
                                      {isPlanned && (
                                        <span className="shrink-0 text-[10px] font-black px-1.5 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">예정</span>
                                      )}
                                      <input 
                                        type="text" value={hasSubItems ? formatCurrency(blockAmount) : (block.amountString != null ? block.amountString : (block.amount === 0 ? '' : block.amount))}
                                        readOnly={hasSubItems}
                                        onChange={(e) => handleReportBlockChange(activeReport.id, block.id, 'amount', e.target.value)}
                                        className={`w-28 bg-transparent font-mono font-black text-right text-[15px] border-b border-transparent focus:border-[#DFD8CE] hover:border-black/10 px-1 py-1 focus:outline-none transition-colors ${getAmountTextClass(blockAmount, 'auto', isPlanned)} ${hasSubItems ? 'opacity-60 cursor-not-allowed' : ''}`}
                                        placeholder="0"
                                      />
                                    </div>
                                    <button onClick={() => deleteReportBlock(activeReport.id, block.id)} className="w-8 h-8 flex items-center justify-center text-[#A69C8E] hover:text-[#C62828] hover:bg-black/5 rounded-lg transition-colors opacity-0 group-hover:opacity-100 shrink-0">
                                      <i className="ph-bold ph-trash" style={{fontSize: 16}}></i>
                                    </button>
                                  </div>

                                  {hasSubItems && (
                                    <div className="px-3 pb-2 pt-0">
                                      <div className="border-t border-black/10 pt-2 space-y-1.5">
                                        {block.subItems.map((sub, idx) => {
                                          const childItems = getChildItems(sub);
                                          const subAmount = getSubItemAmount(sub);
                                          return (
                                            <div key={idx} className="rounded-lg border border-[#E6E0D4] bg-white/70 px-2 py-1.5 text-[#6D5443] font-medium">
                                              <div className="flex justify-between items-center">
                                                <span className="truncate pr-2 flex items-center gap-1.5">
                                                  <i className="ph-bold ph-corner-down-right text-[#A69C8E]" style={{fontSize: 14}}></i>
                                                  <span className="text-[12px] font-bold text-[#3D2B1F]">{sub.label || '내용 없음'}</span>
                                                </span>
                                                <div className="flex items-center gap-2">
                                                  <span className={`text-[12px] font-mono font-bold ${getAmountTextClass(subAmount, sub.amountColor || 'auto', sub.isPlanned)}`}>
                                                    {subAmount > 0 ? '+' : ''}{formatCurrency(subAmount)}
                                                  </span>
                                                  {sub.isPlanned && <span className="text-[10px] font-black px-1.5 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">예정</span>}
                                                </div>
                                              </div>
                                              {childItems.length > 0 && (
                                                <div className="mt-1.5 ml-3 space-y-1 border-l-2 border-[#EFEBE4] pl-2">
                                                  {childItems.map((child, childIdx) => (
                                                    <div key={childIdx} className="flex justify-between items-center gap-2">
                                                      <span className="truncate flex items-center gap-1.5">
                                                        <i className="ph-bold ph-arrow-elbow-down-right text-[#D2B48C]" style={{fontSize: 12}}></i>
                                                        <span className="text-[11px] font-bold text-[#6D5443]">{child.label || '소분류 없음'}</span>
                                                      </span>
                                                      <span className={`text-[11px] font-mono font-bold ${getAmountTextClass(child.amount, child.amountColor || 'auto')}`}>
                                                        {child.amount > 0 ? '+' : ''}{formatCurrency(child.amount)}
                                                      </span>
                                                    </div>
                                                  ))}
                                                </div>
                                              )}
                                            </div>
                                          );
                                        })}
                                      </div>
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                            
                            <button onClick={() => addReportBlock(activeReport.id)} className="mt-2 w-full py-3.5 border-2 border-dashed border-[#DFD8CE] text-[#8B5A2B] rounded-xl text-sm font-bold hover:bg-[#F9F6F0] hover:border-[#B39977] transition-colors flex items-center justify-center gap-2">
                              <i className="ph-bold ph-plus" style={{fontSize: 16}}></i> 누락된 내역 행 추가
                            </button>
                          </div>

                          <div className="p-4 border-t border-[#E6E0D4] bg-[#FCFAF8] rounded-b-2xl shrink-0 flex justify-end">
                            <button onClick={() => deleteEntireReport(activeReport.id)} className="text-[11px] font-bold text-[#C62828] hover:underline flex items-center gap-1 px-2 py-1">
                              <i className="ph-bold ph-trash" style={{fontSize: 12}}></i> 이 달의 결산 삭제
                            </button>
                          </div>
                        </div>
                      );
                    });
                  })()}
                </div>
              </div>
            </div>
          )}

          {/* --- 모달: 메인 블록 생성/수정 --- */}
          {modal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/60 backdrop-blur-sm">
              <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]">
                
                <div className="flex justify-between items-center p-5 border-b border-[#EFEBE4] bg-[#FDFCFB]">
                  <h3 className="font-extrabold text-[#3D2B1F] text-base flex items-center gap-2">
                    {modal.mode === 'create' ? <i className="ph-fill ph-plus-circle text-[#8B5A2B]" style={{fontSize: 18}}></i> : <i className="ph-bold ph-pencil-simple text-[#8B5A2B]" style={{fontSize: 18}}></i>}
                    {modal.mode === 'create' ? '신규 자금 내역' : '자금 내역 수정'}
                  </h3>
                  <button onClick={closeModals} className="p-1.5 hover:bg-[#EFEBE4] rounded-full text-[#A69C8E]"><i className="ph-bold ph-x" style={{fontSize: 18}}></i></button>
                </div>

                <form onSubmit={saveBlock} className="p-6 max-h-[75vh] overflow-y-auto custom-scrollbar">
                  
                  <div className="mb-5">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">항목 박스 이름</label>
                    <input type="text" required value={modal.blockData.label} onChange={(e) => setModal(p => ({...p, blockData: {...p.blockData, label: e.target.value}}))} className="w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-sm font-bold text-[#2A1D15] focus:outline-none focus:border-[#8B5A2B] transition-colors" placeholder="예: 건축주 입금액, 장비대금 등"/>
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">박스 컬러 지정 (전체 배경색)</label>
                    <div className="flex gap-3">
                      {Object.keys(COLOR_TAGS).map(key => (
                        <button key={key} type="button" onClick={() => setModal(p => ({...p, blockData: {...p.blockData, color: key}}))} className={`w-8 h-8 rounded-full border-2 transition-all shadow-sm ${COLOR_TAGS[key].bg} ${COLOR_TAGS[key].border} ${modal.blockData.color === key ? 'ring-2 ring-offset-2 ring-[#8B5A2B] scale-110' : 'hover:scale-105'}`}/>
                      ))}
                    </div>
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">금액 유형</label>
                    <button
                      type="button"
                      onClick={toggleModalPlanned}
                      className={`w-full rounded-xl border-2 p-3 flex items-center justify-between gap-3 text-sm font-extrabold transition-colors
                        ${modal.blockData.isPlanned ? 'bg-[#FDF6E9] border-[#D2B48C] text-[#8B5A2B]' : 'bg-white border-[#E6E0D4] text-[#6D5443] hover:border-[#D2B48C]'}
                      `}
                    >
                      <span className="flex items-center gap-2">
                        <i className="ph-bold ph-clock" style={{fontSize: 16}}></i>
                        예정금액 · 현재 잔고 제외
                      </span>
                      <span className={`text-[10px] px-2 py-1 rounded-full ${modal.blockData.isPlanned ? 'bg-[#8B5A2B] text-white' : 'bg-[#EFEBE4] text-[#A69C8E]'}`}>
                        {modal.blockData.isPlanned ? '켜짐' : '꺼짐'}
                      </span>
                    </button>
                  </div>

                  <div className="my-6 border-t border-[#EFEBE4]" />

                  <div className="mb-6 bg-[#FDFCFB] p-4 rounded-xl border border-[#E6E0D4]">
                    <div className="flex justify-between items-center mb-3">
                      <label className="block text-xs font-extrabold text-[#6D5443] uppercase flex items-center gap-1.5"><i className="ph-bold ph-folder-simple" style={{fontSize: 14}}></i> 하위 항목</label>
                      <button type="button" onClick={addSubItem} className="text-[10px] bg-[#EFEBE4] text-[#8B5A2B] px-2 py-1 rounded font-bold hover:bg-[#DFD8CE] transition-colors">+ 하위 항목 추가</button>
                    </div>
                    
                    {modal.blockData.subItems && modal.blockData.subItems.length > 0 ? (
                      <div
                        onDragOver={handleGenericDragOver}
                        onDrop={(e) => handleModalSubItemDrop(e, null)}
                        className="space-y-3 mb-3"
                      >
                        {/* === 모달 내부 중분류 리스트 === */}
                        {modal.blockData.subItems.map((sub, idx) => {
                          const childItems = getChildItems(sub);
                          const hasChildItems = childItems.length > 0;
                          return (
                          <div
                            key={sub.id}
                            onDragOver={handleGenericDragOver}
                            onDrop={(e) => handleModalSubItemDrop(e, sub.id)}
                            className={`rounded-lg border bg-white p-3 shadow-sm transition-colors select-none ${draggedModalSubItemId === sub.id ? 'opacity-50 border-[#8B5A2B]' : 'border-[#E6E0D4]'}`}
                          >
                            <div className="flex gap-2 items-start">
                              <div
                                draggable={true}
                                onDragStart={(e) => handleModalSubItemDragStart(e, sub.id)}
                                onDragEnd={clearAllDragStates}
                                className="shrink-0 mt-1.5 flex items-center justify-center p-1.5 rounded bg-[#F9F6F0] text-[#A69C8E] cursor-grab active:cursor-grabbing hover:bg-[#EFEBE4] hover:text-[#8B5A2B] transition-colors"
                                title="드래그해서 위아래로 이동"
                              >
                                <i className="ph-bold ph-arrows-down-up" style={{fontSize: 14}}></i>
                              </div>
                              <div className="flex-1 space-y-2">
                                <input type="text" value={sub.label} onChange={(e) => handleSubItemChange(sub.id, 'label', e.target.value)} placeholder="하위 항목 이름 (예: 장비대)" className="w-full text-[12px] font-bold border border-[#DFD8CE] rounded p-2 focus:outline-none focus:border-[#8B5A2B]" required/>
                                <input type="text" value={hasChildItems ? formatCurrency(getSubItemAmount(sub)) : (sub.amountString != null ? sub.amountString : (sub.amount === 0 ? '' : sub.amount))} onChange={(e) => handleSubItemChange(sub.id, 'amount', e.target.value)} readOnly={hasChildItems} placeholder="금액 입력" className={`w-full text-xs font-mono font-bold border border-[#DFD8CE] rounded p-2 text-right focus:outline-none focus:border-[#8B5A2B] ${hasChildItems ? 'bg-[#F9F6F0] cursor-not-allowed' : ''} ${getAmountTextClass(getSubItemAmount(sub), sub.amountColor || 'auto', sub.isPlanned)}`} required/>
                              </div>
                              <div className="flex flex-col gap-1">
                                <button type="button" onClick={() => removeSubItem(sub.id)} className="p-1.5 text-[#C62828] bg-white border border-[#DFD8CE] rounded hover:bg-[#FFEBEE]" title="삭제">
                                  <i className="ph-bold ph-trash" style={{fontSize: 13}}></i>
                                </button>
                              </div>
                            </div>

                            <div className="mt-3 pt-3 border-t border-[#EFEBE4]">
                              <div className="flex items-center justify-between gap-2 mb-2">
                                <span className="text-[10px] font-extrabold text-[#6D5443] flex items-center gap-1.5">
                                  <i className="ph-fill ph-palette" style={{fontSize: 13}}></i> 색상변경
                                </span>
                                <span className="text-[10px] font-bold text-[#A69C8E]">
                                  {(SUBITEM_AMOUNT_COLORS[sub.amountColor || 'auto'] || SUBITEM_AMOUNT_COLORS.auto).label}
                                </span>
                              </div>
                              <div className="flex flex-wrap gap-1.5">
                                {SUBITEM_COLOR_ORDER.map(colorKey => {
                                  const color = SUBITEM_AMOUNT_COLORS[colorKey];
                                  const isActiveColor = (sub.amountColor || 'auto') === colorKey;
                                  return (
                                    <button
                                      key={colorKey}
                                      type="button"
                                      onClick={() => setSubItemColor(sub.id, colorKey)}
                                      className={`px-2.5 py-1.5 rounded-full border text-[10px] font-extrabold flex items-center gap-1.5 transition-all
                                        ${isActiveColor ? 'border-[#8B5A2B] bg-[#F9F6F0] text-[#3D2B1F] ring-1 ring-[#8B5A2B]' : 'border-[#DFD8CE] bg-white text-[#6D5443] hover:bg-[#F9F6F0]'}
                                      `}
                                      title={`${color.label} 색상으로 표시`}
                                    >
                                      <span className={`w-3 h-3 rounded-full border border-black/10 ${color.swatch}`}></span>
                                      {color.label}
                                    </button>
                                  );
                                })}
                              </div>
                            </div>

                            <div
                              onDragOver={handleGenericDragOver}
                              onDrop={(e) => handleModalChildDrop(e, sub.id, null)}
                              className="mt-3 pt-3 border-t border-[#EFEBE4] bg-[#FCFAF8] rounded-lg p-2"
                            >
                              <div className="flex items-center justify-between gap-2 mb-2">
                                <span className="text-[10px] font-extrabold text-[#6D5443] flex items-center gap-1.5">
                                  <i className="ph-bold ph-arrow-elbow-down-right" style={{fontSize: 13}}></i> 세부 항목
                                </span>
                                <button type="button" onClick={() => addChildItem(sub.id)} className="text-[10px] bg-white border border-[#DFD8CE] text-[#8B5A2B] px-2 py-1 rounded font-bold hover:bg-[#F9F6F0] transition-colors">+ 세부항목 추가</button>
                              </div>

                              {/* === 모달 내부 소분류 리스트 === */}
                              {childItems.length > 0 ? (
                                <div className="space-y-2">
                                  {childItems.map((child, childIdx) => (
                                    <div
                                      key={child.id}
                                      onDragOver={handleGenericDragOver}
                                      onDrop={(e) => handleModalChildDrop(e, sub.id, child.id)}
                                      className={`rounded-md border border-[#DFD8CE] bg-white p-2 transition-colors select-none ${draggedModalChild && draggedModalChild.childId === child.id ? 'opacity-50 border-[#8B5A2B]' : ''}`}
                                    >
                                      <div className="flex gap-2 items-start">
                                        <div
                                          draggable={true}
                                          onDragStart={(e) => handleModalChildDragStart(e, sub.id, child.id)}
                                          onDragEnd={clearAllDragStates}
                                          className="shrink-0 mt-1.5 flex items-center justify-center p-1 rounded bg-[#F9F6F0] text-[#A69C8E] cursor-grab active:cursor-grabbing hover:bg-[#EFEBE4] hover:text-[#8B5A2B] transition-colors"
                                          title="드래그해서 위아래로 이동"
                                        >
                                          <i className="ph-bold ph-arrows-down-up" style={{fontSize: 12}}></i>
                                        </div>
                                        <div className="flex-1 space-y-1.5">
                                          <input type="text" value={child.label} onChange={(e) => handleChildItemChange(sub.id, child.id, 'label', e.target.value)} placeholder="세부 내용" className="w-full text-[11px] font-bold border border-[#DFD8CE] rounded p-2 focus:outline-none focus:border-[#8B5A2B]" />
                                          <input type="text" value={child.amountString != null ? child.amountString : (child.amount === 0 ? '' : child.amount)} onChange={(e) => handleChildItemChange(sub.id, child.id, 'amount', e.target.value)} placeholder="금액" className={`w-full text-xs font-mono font-bold border border-[#DFD8CE] rounded p-2 text-right focus:outline-none focus:border-[#8B5A2B] ${getAmountTextClass(child.amount, child.amountColor || 'auto')}`} />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                          <button type="button" onClick={() => removeChildItem(sub.id, child.id)} className="p-1.5 text-[#C62828] bg-white border border-[#DFD8CE] rounded hover:bg-[#FFEBEE]" title="삭제">
                                            <i className="ph-bold ph-trash" style={{fontSize: 12}}></i>
                                          </button>
                                        </div>
                                      </div>
                                      <div className="flex flex-wrap gap-1 mt-2">
                                        {SUBITEM_COLOR_ORDER.map(colorKey => {
                                          const color = SUBITEM_AMOUNT_COLORS[colorKey];
                                          const isActiveChildColor = (child.amountColor || 'auto') === colorKey;
                                          return (
                                            <button
                                              key={colorKey}
                                              type="button"
                                              onClick={() => setChildItemColor(sub.id, child.id, colorKey)}
                                              className={`px-2 py-1 rounded-full border text-[9px] font-extrabold flex items-center gap-1 transition-all
                                                ${isActiveChildColor ? 'border-[#8B5A2B] bg-[#F9F6F0] text-[#3D2B1F] ring-1 ring-[#8B5A2B]' : 'border-[#DFD8CE] bg-white text-[#6D5443] hover:bg-[#F9F6F0]'}
                                              `}
                                            >
                                              <span className={`w-2.5 h-2.5 rounded-full border border-black/10 ${color.swatch}`}></span>
                                              {color.label}
                                            </button>
                                          );
                                        })}
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              ) : (
                                <p className="text-[10px] text-[#A69C8E] font-bold text-center py-2">이 항목 안에 더 작은 단위의 세부 항목을 나열할 수 있습니다.</p>
                              )}
                            </div>
                          </div>
                          );
                        })}
                      </div>
                    ) : (
                      <p className="text-[11px] text-[#A69C8E] font-medium text-center py-2">다른 박스를 이 위로 <strong>드래그 & 드롭</strong> 하시면<br/>자동으로 하위 항목으로 합쳐집니다.</p>
                    )}
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase flex items-center gap-1.5"><i className="ph-fill ph-currency-circle-dollar" style={{fontSize: 14}}></i> 최종 합계 금액</label>
                    <input
                      type="text" required readOnly={modal.blockData.subItems && modal.blockData.subItems.length > 0}
                      value={modal.amountInput} onChange={handleAmountChange}
                      className={`w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-xl font-mono font-black text-right focus:outline-none transition-colors
                        ${(modal.blockData.subItems && modal.blockData.subItems.length > 0) ? 'bg-[#EFEBE4] text-[#6D5443] cursor-not-allowed' : 'bg-white focus:border-[#8B5A2B]'}
                        ${getAmountTextClass(modal.blockData.amount, 'auto', modal.blockData.isPlanned)}
                      `}
                      placeholder="0"
                    />
                    
                    {(!modal.blockData.subItems || modal.blockData.subItems.length === 0) && (
                      <div className="flex gap-2 mt-2">
                        <button type="button" onClick={() => {
                            const newAmt = Math.abs(modal.blockData.amount);
                            setModal(p => ({ ...p, amountInput: formatCurrency(newAmt), blockData: { ...p.blockData, amount: newAmt } }));
                          }} className="flex-1 py-2 bg-[#E8F5E9] text-[#2E7D32] text-xs font-extrabold rounded-lg hover:bg-[#C8E6C9] border border-[#C8E6C9]">수입(+)</button>
                        <button type="button" onClick={() => {
                            const newAmt = -Math.abs(modal.blockData.amount);
                            setModal(p => ({ ...p, amountInput: formatCurrency(newAmt), blockData: { ...p.blockData, amount: newAmt } }));
                          }} className="flex-1 py-2 bg-[#FFEBEE] text-[#C62828] text-xs font-extrabold rounded-lg hover:bg-[#FFCDD2] border border-[#FFCDD2]">지출(-)</button>
                      </div>
                    )}
                  </div>

                  <div className="flex gap-3 pt-4 border-t border-[#EFEBE4]">
                    {modal.mode === 'edit' && (
                      <button type="button" onClick={() => deleteBlock(modal.blockData.id)} className="p-3 text-[#C62828] border-2 border-[#FFCDD2] bg-[#FFEBEE] hover:bg-[#FFCDD2] rounded-xl transition-colors" title="삭제">
                        <i className="ph-bold ph-trash" style={{fontSize: 18}}></i>
                      </button>
                    )}
                    <button type="submit" className="flex-1 py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold flex items-center justify-center gap-2 transition-colors shadow-md">
                      <i className="ph-fill ph-floppy-disk" style={{fontSize: 16}}></i> 변경사항 저장
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 렌더링 실행
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
