                          >
                            <div className="flex gap-2 items-start">
                              <div
                                draggable
                                onDragStart={(e) => handleSubItemDragStart(e, sub.id)}
                                onDragEnd={handleSubItemDragEnd}
                                className="shrink-0 mt-1 p-1.5 rounded bg-[#F9F6F0] border border-[#E6E0D4] text-[#A69C8E] hover:text-[#8B5A2B] cursor-grab active:cursor-grabbing"
                                title="중분류를 드래그해서 이동"
                              >
                                <i className="ph-bold ph-dots-six-vertical" style={{fontSize: 14}}></i>
                              </div>
                              <div className="flex-1 space-y-2">
                                <input type="text" value={sub.label} onChange={(e) => handleSubItemChange(sub.id, 'label', e.target.value)} placeholder="중분류 이름 (예: 장비대)" className="w-full text-[11px] font-bold border border-[#DFD8CE] rounded p-2 focus:outline-none focus:border-[#8B5A2B]" required/>
                                <input type="text" value={hasChildItems ? formatCurrency(getSubItemAmount(sub)) : (sub.amountString != null ? sub.amountString : (sub.amount === 0 ? '' : sub.amount))} onChange={(e) => handleSubItemChange(sub.id, 'amount', e.target.value)} readOnly={hasChildItems} placeholder="중분류 금액 (- 지출)" className={`w-full text-xs font-mono font-bold border border-[#DFD8CE] rounded p-2 text-right focus:outline-none focus:border-[#8B5A2B] ${hasChildItems ? 'bg-[#F9F6F0] cursor-not-allowed' : ''} ${getAmountTextClass(getSubItemAmount(sub), sub.amountColor || 'auto', sub.isPlanned)}`} required/>
                              </div>
                              <div className="flex flex-col gap-1">
                                <button type="button" onClick={() => moveSubItem(sub.id, -1)} disabled={idx === 0} className={`p-1.5 border border-[#DFD8CE] rounded bg-white ${idx === 0 ? 'text-[#CFC7BC] cursor-not-allowed' : 'text-[#6D5443] hover:bg-[#F9F6F0]'}`} title="위로 이동">
                                  <i className="ph-bold ph-arrow-up" style={{fontSize: 13}}></i>
                                </button>
                                <button type="button" onClick={() => moveSubItem(sub.id, 1)} disabled={idx === modal.blockData.subItems.length - 1} className={`p-1.5 border border-[#DFD8CE] rounded bg-white ${idx === modal.blockData.subItems.length - 1 ? 'text-[#CFC7BC] cursor-not-allowed' : 'text-[#6D5443] hover:bg-[#F9F6F0]'}`} title="아래로 이동">
                                  <i className="ph-bold ph-arrow-down" style={{fontSize: 13}}></i>
                                </button>
                                <button type="button" onClick={() => removeSubItem(sub.id)} className="p-1.5 text-[#C62828] bg-white border border-[#DFD8CE] rounded hover:bg-[#FFEBEE]" title="삭제">
                                  <i className="ph-bold ph-trash" style={{fontSize: 13}}></i>
                                </button>
                              </div>
                            </div>

                            <div className="mt-3 pt-3 border-t border-[#EFEBE4]">
                              <div className="flex items-center justify-between gap-2 mb-2">
                                <span className="text-[10px] font-extrabold text-[#6D5443] flex items-center gap-1.5">
                                  <i className="ph-fill ph-palette" style={{fontSize: 13}}></i> 색상변경
                                </span>
                                <span className="text-[10px] font-bold text-[#A69C8E]">
                                  {(SUBITEM_AMOUNT_COLORS[sub.amountColor || 'auto'] || SUBITEM_AMOUNT_COLORS.auto).label}
                                </span>
                              </div>
                              <div className="flex flex-wrap gap-1.5">
                                {SUBITEM_COLOR_ORDER.map(colorKey => {
                                  const color = SUBITEM_AMOUNT_COLORS[colorKey];

                                  return (
                                    <button
                                      key={colorKey}
                                      type="button"
                                      onClick={() => setSubItemColor(sub.id, colorKey)}
                                      className={`px-2.5 py-1.5 rounded-full border text-[10px] font-extrabold flex items-center gap-1.5 transition-all
                                        ${isActiveColor ? 'border-[#8B5A2B] bg-[#F9F6F0] text-[#3D2B1F] ring-1 ring-[#8B5A2B]' : 'border-[#DFD8CE] bg-white text-[#6D5443] hover:bg-[#F9F6F0]'}
                                      `}
                                      title={`${color.label} 색상으로 표시`}
                                    >
                                      <span className={`w-3 h-3 rounded-full border border-black/10 ${color.swatch}`}></span>
                                      {color.label}
                                    </button>
                                  );
                                })}
                              </div>
                            </div>

                            <div
                              onDragOver={handleChildDragOver}
                              onDrop={(e) => handleChildDropOnSubItem(e, sub.id)}
                              className={`mt-3 pt-3 border-t border-[#EFEBE4] bg-[#FCFAF8] rounded-lg p-2 transition-all ${draggedModalChild ? 'ring-1 ring-[#D2B48C]' : ''}`}
                            >
                              <div className="flex items-center justify-between gap-2 mb-2">
                                <span className="text-[10px] font-extrabold text-[#6D5443] flex items-center gap-1.5">
                                  <i className="ph-bold ph-list-bullets" style={{fontSize: 13}}></i> 소분류 박스
                                </span>
                                <button type="button" onClick={() => addChildItem(sub.id)} className="text-[10px] bg-white border border-[#DFD8CE] text-[#8B5A2B] px-2 py-1 rounded font-bold hover:bg-[#F9F6F0] transition-colors">+ 소분류 추가</button>
                              </div>

                              {childItems.length > 0 ? (
                                <div className="space-y-2">
                                  {childItems.map((child, childIdx) => (
                                    <div
                                      key={child.id}
                                      onDragOver={handleChildDragOver}
                                      onDrop={(e) => handleChildDropOnChild(e, sub.id, child.id)}
                                      className={`rounded-md border border-[#DFD8CE] bg-white p-2 transition-all ${draggedModalChild && draggedModalChild.childId === child.id ? 'opacity-60 ring-2 ring-[#8B5A2B]' : ''}`}
                                    >
                                      <div className="flex gap-2 items-start">
                                        <div
                                          draggable
                                          onDragStart={(e) => handleChildDragStart(e, sub.id, child.id)}
                                          onDragEnd={handleChildDragEnd}
                                          className="shrink-0 mt-1 p-1.5 rounded bg-[#F9F6F0] border border-[#E6E0D4] text-[#A69C8E] hover:text-[#8B5A2B] cursor-grab active:cursor-grabbing"

                                        >

                                        </div>
                                        <div className="flex-1 space-y-1.5">
                                          <input type="text" value={child.label} onChange={(e) => handleChildItemChange(sub.id, child.id, 'label', e.target.value)} placeholder="소분류 이름" className="w-full text-[11px] font-bold border border-[#DFD8CE] rounded p-2 focus:outline-none focus:border-[#8B5A2B]" />

                                        </div>
                                        <div className="flex flex-col gap-1">
                                          <button type="button" onClick={() => moveChildItem(sub.id, child.id, -1)} disabled={childIdx === 0} className={`p-1.5 border border-[#DFD8CE] rounded bg-white ${childIdx === 0 ? 'text-[#CFC7BC] cursor-not-allowed' : 'text-[#6D5443] hover:bg-[#F9F6F0]'}`} title="위로 이동">
                                            <i className="ph-bold ph-arrow-up" style={{fontSize: 12}}></i>
                                          </button>
                                          <button type="button" onClick={() => moveChildItem(sub.id, child.id, 1)} disabled={childIdx === childItems.length - 1} className={`p-1.5 border border-[#DFD8CE] rounded bg-white ${childIdx === childItems.length - 1 ? 'text-[#CFC7BC] cursor-not-allowed' : 'text-[#6D5443] hover:bg-[#F9F6F0]'}`} title="아래로 이동">
                                            <i className="ph-bold ph-arrow-down" style={{fontSize: 12}}></i>
                                          </button>
                                          <button type="button" onClick={() => removeChildItem(sub.id, child.id)} className="p-1.5 text-[#C62828] bg-white border border-[#DFD8CE] rounded hover:bg-[#FFEBEE]" title="삭제">
                                            <i className="ph-bold ph-trash" style={{fontSize: 12}}></i>
                                          </button>
                                        </div>
                                      </div>
                                      <div className="flex flex-wrap gap-1 mt-2">
                                        {SUBITEM_COLOR_ORDER.map(colorKey => {
                                          const color = SUBITEM_AMOUNT_COLORS[colorKey];
                                          const isActiveChildColor = (child.amountColor || 'auto') === colorKey;
                                          return (
                                            <button
                                              key={colorKey}
                                              type="button"
                                              onClick={() => setChildItemColor(sub.id, child.id, colorKey)}
                                              className={`px-2 py-1 rounded-full border text-[9px] font-extrabold flex items-center gap-1 transition-all
                                                ${isActiveChildColor ? 'border-[#8B5A2B] bg-[#F9F6F0] text-[#3D2B1F] ring-1 ring-[#8B5A2B]' : 'border-[#DFD8CE] bg-white text-[#6D5443] hover:bg-[#F9F6F0]'}
                                              `}
                                            >
                                              <span className={`w-2.5 h-2.5 rounded-full border border-black/10 ${color.swatch}`}></span>
                                              {color.label}
                                            </button>
                                          );
                                        })}
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              ) : (
                                <p className="text-[10px] text-[#A69C8E] font-bold text-center py-2">이 중분류 안에 소분류 박스를 추가할 수 있습니다.</p>
                              )}
                            </div>
                          </div>
                          );
                        })}
                      </div>
                    ) : (
                      <p className="text-[11px] text-[#A69C8E] font-medium text-center py-2">다른 박스를 이 위로 <strong>드래그 & 드롭</strong> 하시면<br/>자동으로 중분류 박스로 합쳐집니다.</p>
                    )}
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase flex items-center gap-1.5"><i className="ph-fill ph-currency-circle-dollar" style={{fontSize: 14}}></i> 최종 합계 금액</label>
                    <input
                      type="text" required readOnly={modal.blockData.subItems && modal.blockData.subItems.length > 0}
                      value={modal.amountInput} onChange={handleAmountChange}
                      className={`w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-xl font-mono font-black text-right focus:outline-none transition-colors
                        ${(modal.blockData.subItems && modal.blockData.subItems.length > 0) ? 'bg-[#EFEBE4] text-[#6D5443] cursor-not-allowed' : 'bg-white focus:border-[#8B5A2B]'}
                        ${getAmountTextClass(modal.blockData.amount, 'auto', modal.blockData.isPlanned)}
                      `}
                      placeholder="0"
                    />
                    
                    {(!modal.blockData.subItems || modal.blockData.subItems.length === 0) && (
                      <div className="flex gap-2 mt-2">
                        <button type="button" onClick={() => {
                            const newAmt = Math.abs(modal.blockData.amount);
                            setModal(p => ({ ...p, amountInput: formatCurrency(newAmt), blockData: { ...p.blockData, amount: newAmt } }));
                          }} className="flex-1 py-2 bg-[#E8F5E9] text-[#2E7D32] text-xs font-extrabold rounded-lg hover:bg-[#C8E6C9] border border-[#C8E6C9]">수입(+)</button>
                        <button type="button" onClick={() => {
                            const newAmt = -Math.abs(modal.blockData.amount);
                            setModal(p => ({ ...p, amountInput: formatCurrency(newAmt), blockData: { ...p.blockData, amount: newAmt } }));
                          }} className="flex-1 py-2 bg-[#FFEBEE] text-[#C62828] text-xs font-extrabold rounded-lg hover:bg-[#FFCDD2] border border-[#FFCDD2]">지출(-)</button>
                      </div>
                    )}
                  </div>

                  <div className="flex gap-3 pt-4 border-t border-[#EFEBE4]">
                    {modal.mode === 'edit' && (
                      <button type="button" onClick={() => deleteBlock(modal.blockData.id)} className="p-3 text-[#C62828] border-2 border-[#FFCDD2] bg-[#FFEBEE] hover:bg-[#FFCDD2] rounded-xl transition-colors" title="삭제">
                        <i className="ph-bold ph-trash" style={{fontSize: 18}}></i>
                      </button>
                    )}
                    <button type="submit" className="flex-1 py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold flex items-center justify-center gap-2 transition-colors shadow-md">
                      <i className="ph-fill ph-floppy-disk" style={{fontSize: 16}}></i> 변경사항 저장
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 렌더링 실행
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
