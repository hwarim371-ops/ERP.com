                          value={modal.amountInput} onChange={handleAmountChange} 
                          className={`w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-sm font-mono font-black text-right text-[#2A1D15] focus:outline-none focus:border-[#8B5A2B] transition-colors ${getAmountTextClass(modal.blockData.amount, 'auto', modal.blockData.isPlanned)}`} 
                          placeholder="0"
                        />
                      </div>
                    )}
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">박스 컬러 지정 (전체 배경색)</label>
                    <div className="flex gap-3">
                      {Object.keys(COLOR_TAGS).map(key => (
                        <button key={key} type="button" onClick={() => setModal(p => ({...p, blockData: {...p.blockData, color: key}}))} className={`w-8 h-8 rounded-full border-2 transition-all shadow-sm ${COLOR_TAGS[key].bg} ${COLOR_TAGS[key].border} ${modal.blockData.color === key ? 'ring-2 ring-offset-2 ring-[#8B5A2B] scale-110' : 'hover:scale-105'}`}/>
                      ))}
                    </div>
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">금액 유형</label>
                    <button
                      type="button"
                      onClick={toggleModalPlanned}
                      className={`w-full rounded-xl border-2 p-3 flex items-center justify-between gap-3 text-sm font-extrabold transition-colors
                        ${modal.blockData.isPlanned ? 'bg-[#FDF6E9] border-[#D2B48C] text-[#8B5A2B]' : 'bg-white border-[#E6E0D4] text-[#6D5443] hover:border-[#D2B48C]'}
                      `}
                    >
                      <span className="flex items-center gap-2">
                        <i className="ph-bold ph-clock" style={{fontSize: 16}}></i>
                        외상금액 · 잔고 합계 별도계산
                      </span>
                      <span className={`text-[10px] px-2 py-1 rounded-full ${modal.blockData.isPlanned ? 'bg-[#8B5A2B] text-white' : 'bg-[#EFEBE4] text-[#A69C8E]'}`}>
                        {modal.blockData.isPlanned ? '켜짐' : '꺼짐'}
                      </span>
                    </button>
                  </div>

                  <div className="my-6 border-t border-[#EFEBE4]" />

                  <div className="mb-6 bg-[#FDFCFB] p-4 rounded-xl border border-[#E6E0D4]">
                    <div className="flex justify-between items-center mb-3">
                      <label className="block text-xs font-extrabold text-[#6D5443] uppercase flex items-center gap-1.5"><i className="ph-bold ph-folder-simple" style={{fontSize: 14}}></i> 하위 항목</label>
                      <button type="button" onClick={addSubItem} className="text-[10px] bg-[#EFEBE4] text-[#8B5A2B] px-2 py-1 rounded font-bold hover:bg-[#DFD8CE] transition-colors">+ 하위 항목 추가</button>
                    </div>
                    
                    {modal.blockData.subItems && modal.blockData.subItems.length > 0 ? (
                      <div className="space-y-3 mb-3">
                        {modal.blockData.subItems.map((sub, idx) => {
                          const childItems = getChildItems(sub);
                          const hasChildItems = childItems.length > 0;
                          return (
                          <div key={sub.id} className="rounded-lg border bg-white p-3 shadow-sm transition-colors">
                            <div className="flex gap-2 items-start">
                              <div className="flex-1 space-y-2">
                                <input type="text" value={sub.label} onChange={(e) => handleSubItemChange(sub.id, 'label', e.target.value)} placeholder="하위 항목 이름 (예: 장비대)" className="w-full text-[12px] font-bold border border-[#DFD8CE] rounded p-2 focus:outline-none focus:border-[#8B5A2B]" required/>
                                {/* 💡 자체 금액 입력칸: 소분류가 생기면 입력 막힘, 순수 자기 금액만 입력 */}
                                {!hasChildItems ? (
                                  <input type="text" value={sub.amountString != null ? sub.amountString : (sub.amount === 0 ? '' : sub.amount)} onChange={(e) => handleSubItemChange(sub.id, 'amount', e.target.value)} placeholder="금액 입력" className={`w-full text-xs font-mono font-bold border border-[#DFD8CE] rounded p-2 text-right focus:outline-none focus:border-[#8B5A2B] ${getAmountTextClass(sub.amount, sub.amountColor || 'auto', sub.isPlanned)}`} required/>
                                ) : (
                                  <div className="flex justify-between items-center p-2 bg-[#F9F6F0] border border-[#DFD8CE] rounded text-right text-xs font-mono font-bold text-[#A69C8E]">
                                    <span className="text-[10px]">소분류 합계 표시안함</span>
                                    <span>-</span>
                                  </div>
                                )}
                              </div>
                              <div className="flex flex-col gap-1">
                                <button type="button" onClick={() => removeSubItem(sub.id)} className="p-1.5 text-[#C62828] bg-white border border-[#DFD8CE] rounded hover:bg-[#FFEBEE]" title="삭제">
                                  <i className="ph-bold ph-trash" style={{fontSize: 13}}></i>
                                </button>
                              </div>
                            </div>

                            <div className="mt-3 pt-3 border-t border-[#EFEBE4]">
                              <div className="flex items-center justify-between gap-2 mb-2">
                                <span className="text-[10px] font-extrabold text-[#6D5443] flex items-center gap-1.5">
                                  <i className="ph-fill ph-palette" style={{fontSize: 13}}></i> 색상변경
                                </span>
                                <span className="text-[10px] font-bold text-[#A69C8E]">
                                  {(SUBITEM_AMOUNT_COLORS[sub.amountColor || 'auto'] || SUBITEM_AMOUNT_COLORS.auto).label}
                                </span>
                              </div>
                              <div className="flex flex-wrap gap-1.5">
                                {SUBITEM_COLOR_ORDER.map(colorKey => {
                                  const color = SUBITEM_AMOUNT_COLORS[colorKey];
                                  const isActiveColor = (sub.amountColor || 'auto') === colorKey;
                                  return (
                                    <button
                                      key={colorKey}
                                      type="button"
                                      onClick={() => setSubItemColor(sub.id, colorKey)}
                                      className={`px-2.5 py-1.5 rounded-full border text-[10px] font-extrabold flex items-center gap-1.5 transition-all
                                        ${isActiveColor ? 'border-[#8B5A2B] bg-[#F9F6F0] text-[#3D2B1F] ring-1 ring-[#8B5A2B]' : 'border-[#DFD8CE] bg-white text-[#6D5443] hover:bg-[#F9F6F0]'}
                                      `}
                                      title={`${color.label} 색상으로 표시`}
                                    >
                                      <span className={`w-3 h-3 rounded-full border border-black/10 ${color.swatch}`}></span>
                                      {color.label}
                                    </button>
                                  );
                                })}
                              </div>
                            </div>

                            <div className="mt-3 pt-3 border-t border-[#EFEBE4] bg-[#FCFAF8] rounded-lg p-2">
                              <div className="flex items-center justify-between gap-2 mb-2">
                                <span className="text-[10px] font-extrabold text-[#6D5443] flex items-center gap-1.5">
                                  <i className="ph-bold ph-arrow-elbow-down-right" style={{fontSize: 13}}></i> 세부 항목 (소분류)
                                </span>
                                <button type="button" onClick={() => addChildItem(sub.id)} className="text-[10px] bg-white border border-[#DFD8CE] text-[#8B5A2B] px-2 py-1 rounded font-bold hover:bg-[#F9F6F0] transition-colors">+ 세부항목 추가</button>
                              </div>

                              {/* === 모달 내부 소분류 리스트 === */}
                              {childItems.length > 0 ? (
                                <div className="space-y-2">
                                  {childItems.map((child, childIdx) => (
                                    <div key={child.id} className="rounded-md border border-[#DFD8CE] bg-white p-2 transition-colors select-none">
                                      <div className="flex gap-2 items-start">
                                        <div className="flex-1 space-y-1.5">
                                          <input type="text" value={child.label} onChange={(e) => handleChildItemChange(sub.id, child.id, 'label', e.target.value)} placeholder="세부 내용" className="w-full text-[11px] font-bold border border-[#DFD8CE] rounded p-2 focus:outline-none focus:border-[#8B5A2B]" />
                                          <input type="text" value={child.amountString != null ? child.amountString : (child.amount === 0 ? '' : child.amount)} onChange={(e) => handleChildItemChange(sub.id, child.id, 'amount', e.target.value)} placeholder="금액" className={`w-full text-xs font-mono font-bold border border-[#DFD8CE] rounded p-2 text-right focus:outline-none focus:border-[#8B5A2B] ${getAmountTextClass(child.amount, child.amountColor || 'auto', child.isPlanned)}`} />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                          <button type="button" onClick={() => removeChildItem(sub.id, child.id)} className="p-1.5 text-[#C62828] bg-white border border-[#DFD8CE] rounded hover:bg-[#FFEBEE]" title="삭제">
                                            <i className="ph-bold ph-trash" style={{fontSize: 12}}></i>
                                          </button>
                                        </div>
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              ) : (
                                <p className="text-[10px] text-[#A69C8E] font-bold text-center py-2">이 항목 안에 더 작은 단위의 세부 항목을 나열할 수 있습니다.</p>
                              )}
                            </div>
                          </div>
                          );
                        })}
                      </div>
                    ) : (
                      <p className="text-[11px] text-[#A69C8E] font-medium text-center py-2">수정창에서는 드래그 앤 드롭이 비활성화됩니다.<br/>메인 보드 화면에서 박스를 합치거나 뺄 수 있습니다.</p>
                    )}
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase flex items-center justify-between gap-1.5">
                      <span className="flex items-center gap-1.5"><i className="ph-fill ph-currency-circle-dollar" style={{fontSize: 14}}></i> 최종 합계 금액 <span className="text-[10px] font-normal opacity-80">(박스 자체 + 중분류)</span></span>
                    </label>
                    <input
                      type="text" readOnly
                      value={formatCurrency(getBlockAmount(modal.blockData))}
                      className={`w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-xl font-mono font-black text-right bg-[#EFEBE4] text-[#6D5443] cursor-not-allowed transition-colors
                        ${getAmountTextClass(getBlockAmount(modal.blockData), 'auto', modal.blockData.isPlanned)}
                      `}
                      placeholder="0"
                    />
                    
                    {(!modal.blockData.subItems || modal.blockData.subItems.length === 0) && (
                      <div className="flex gap-2 mt-2">
                        <button type="button" onClick={() => {
                            const newAmt = Math.abs(modal.blockData.amount);
                            setModal(p => ({ ...p, amountInput: formatCurrency(newAmt), blockData: { ...p.blockData, amount: newAmt } }));
                          }} className="flex-1 py-2 bg-[#E8F5E9] text-[#2E7D32] text-xs font-extrabold rounded-lg hover:bg-[#C8E6C9] border border-[#C8E6C9]">수입(+)</button>
                        <button type="button" onClick={() => {
                            const newAmt = -Math.abs(modal.blockData.amount);
                            setModal(p => ({ ...p, amountInput: formatCurrency(newAmt), blockData: { ...p.blockData, amount: newAmt } }));
                          }} className="flex-1 py-2 bg-[#FFEBEE] text-[#C62828] text-xs font-extrabold rounded-lg hover:bg-[#FFCDD2] border border-[#FFCDD2]">지출(-)</button>
                      </div>
                    )}
                  </div>

                  <div className="flex gap-3 pt-4 border-t border-[#EFEBE4]">
                    {modal.mode === 'edit' && (
                      <button type="button" onClick={() => deleteBlock(modal.blockData.id)} className="p-3 text-[#C62828] border-2 border-[#FFCDD2] bg-[#FFEBEE] hover:bg-[#FFCDD2] rounded-xl transition-colors" title="삭제">
                        <i className="ph-bold ph-trash" style={{fontSize: 18}}></i>
                      </button>
                    )}
                    <button type="submit" className="flex-1 py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold flex items-center justify-center gap-2 transition-colors shadow-md">
                      <i className="ph-fill ph-floppy-disk" style={{fontSize: 16}}></i> 변경사항 저장
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
