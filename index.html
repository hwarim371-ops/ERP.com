    window.addEventListener('error', function(event) {
      if (event.message === 'Script error.') return;
      const errorDiv = document.createElement('div');
      errorDiv.style.cssText = 'position:fixed; top:0; left:0; width:100%; background:#C62828; color:white; padding:15px; z-index:9999; font-weight:bold; font-family:sans-serif; box-shadow:0 4px 6px rgba(0,0,0,0.3);';
      errorDiv.innerHTML = '🚨 앱 실행 오류 발생: <br/><br/>' + event.message + '<br/><br/>위치: ' + (event.filename || '앱 내부') + ':' + (event.lineno || '-');
      document.body.prepend(errorDiv);
    });
  </script>

    const INITIAL_ACCOUNTS = [
      { id: 'main', name: '화림 법인 (메인)', bank: '우리은행', accountNo: '1005-704-610473', icon: 'ph-fill ph-buildings', theme: 'wood', cardHolder: '대표', reportData: [] },
      { id: 'jecheon1', name: '제천1 (오차드블리드)', bank: '우리은행', accountNo: '1005-504-710497', icon: 'ph-fill ph-hard-hat', theme: 'forest', cardHolder: '이사님', reportData: [] },
      { id: 'miryang', name: '밀양 (다시,또 여기)', bank: '기업은행', accountNo: '587-076008-04-011', icon: 'ph-fill ph-hard-hat', theme: 'ocean', cardHolder: '대표', reportData: [] },
      { id: 'jecheon2', name: '제천2 (덕동골)', bank: '우리은행', accountNo: '1005-804-800910', icon: 'ph-fill ph-hard-hat', theme: 'wine', cardHolder: '이사님', reportData: [] },
    ];

    const INITIAL_BLOCKS = [
      { id: 'b1', accountId: 'main', label: '매출(세금계산서)', amount: 577257465, color: 'wood', subItems: [] },
      { id: 'b2', accountId: 'main', label: '화림 수수료 수취', amount: 60100000, color: 'forest', subItems: [] },
      { id: 'b4', accountId: 'jecheon1', label: '총 매출/대출 등', amount: 399779948, color: 'wood', subItems: [] },
      { id: 'b5', accountId: 'jecheon1', label: '매입 계산서 지출', amount: -159116581, color: 'none', subItems: [] },
      { id: 'b8', accountId: 'miryang', label: '건축주 입금액', amount: 242405000, color: 'sand', subItems: [] },
      { id: 'b9', accountId: 'miryang', label: '외주 미수금', amount: -294300296, color: 'clay', subItems: [] },
      { id: 'b11', accountId: 'jecheon2', label: '대출금', amount: 54000000, color: 'stone', subItems: [] },
      { id: 'b12', accountId: 'jecheon2', label: '건축주 입금', amount: 20000000, color: 'wood', subItems: [] },
      { id: 'b14', accountId: 'jecheon2', label: '박찬수 부장님 대납', amount: -2750000, color: 'clay', subItems: [] },
    ];

    function App() {
      const [accountsData, setAccountsData] = useState(INITIAL_ACCOUNTS);
      const [blocks, setBlocks] = useState(INITIAL_BLOCKS);
      
      const [draggedItem, setDraggedItem] = useState(null); 
      const [dragOverZone, setDragOverZone] = useState(null); 
      
      const [selectedBlocks, setSelectedBlocks] = useState([]);
      const [collapsedSubItems, setCollapsedSubItems] = useState([]);
      
      const [modal, setModal] = useState({ isOpen: false, mode: 'create', blockData: null, amountInput: '' });
      const [splitModal, setSplitModal] = useState({ isOpen: false, targetType: null, blockId: null, subItemId: null, childId: null, sourceAmount: 0, amountInput: '', label: '' });
      const [reportModal, setReportModal] = useState({ isOpen: false, accountId: null });
      const [closeMonthModal, setCloseMonthModal] = useState({ isOpen: false, accountId: null, monthLabel: '' });
      const [settingsModal, setSettingsModal] = useState({ isOpen: false, accountData: null });
      const [contextMenu, setContextMenu] = useState({ isOpen: false, x: 0, y: 0, target: null });
      const [colorModal, setColorModal] = useState({ isOpen: false, target: null, currentColor: 'none' });
      const [dialog, setDialog] = useState({ isOpen: false, type: '', message: '', defaultValue: '', onConfirm: null });
      
      const [isSyncing, setIsSyncing] = useState(false);
      const [isInitialLoading, setIsInitialLoading] = useState(true);
      const [lastSavedAt, setLastSavedAt] = useState(null);

      /* --- 💡 기본 헬퍼 함수 --- */
      const formatCurrency = (amount) => new Intl.NumberFormat('ko-KR').format(amount || 0);
      const twoDigits = (value) => String(value).padStart(2, '0');
      const formatLastSavedAt = (value) => {
        if (!value) return '저장 기록 없음';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '저장 시간 확인 필요';
        return `${date.getFullYear()}년 ${twoDigits(date.getMonth() + 1)}월 ${twoDigits(date.getDate())}일 ${twoDigits(date.getHours())}시 ${twoDigits(date.getMinutes())}분 데이터`;
      };
      
      /* --- 💡 완벽 무결점 계산 엔진 --- */
      const getAmountValue = (item) => Number(item && item.amount) || 0;
      const getChildItems = (item) => (item && item.childItems) ? item.childItems : [];
      
      // 어떤 항목이든(대분류/중분류/소분류) UI에 표시될 때 가져야 할 '실질적 통합 금액'을 구하는 절대 함수
      const getUniversalAmount = (item) => {
        if (!item) return 0;
        if (item.subItems && item.subItems.length > 0) return getBlockAmount(item);
        return getAmountValue(item);
      };

      // 중분류: 소분류는 계산에서 완전 무시! 오직 자체 금액만 반환.
      const getSubItemAmount = (item) => getAmountValue(item);
      
      // 대분류 총액 = 하위 중분류들의 합 (없으면 자체 금액)
      const getBlockAmount = (block) => {
        if (!block) return 0;
        if (block.subItems && block.subItems.length > 0) {
          return block.subItems.reduce((sum, sub) => sum + getSubItemAmount(sub), 0);
        }
        return getAmountValue(block);
      };

      const getChildEffectiveAmount = (child) => child && !child.isPlanned ? getAmountValue(child) : 0;

      const getSubEffectiveAmount = (sub) => {
        if (!sub || sub.isPlanned) return 0;
        const children = getChildItems(sub);
        if (children.length > 0) return children.reduce((sum, child) => sum + getChildEffectiveAmount(child), 0);
        return getSubItemAmount(sub);
      };

      const getChildCreditAmount = (child) => child && child.isPlanned ? getAmountValue(child) : 0;

      const getSubCreditAmount = (sub) => {
        if (!sub) return 0;
        if (sub.isPlanned) return getSubItemAmount(sub);
        const children = getChildItems(sub);
        if (children.length > 0) return children.reduce((sum, child) => sum + getChildCreditAmount(child), 0);
        return 0;
      };

      const getCreditAmount = (block) => {
        if (!block) return 0;
        if (block.isPlanned) return getBlockAmount(block);
        if (block.subItems && block.subItems.length > 0) {
          return block.subItems.reduce((sum, sub) => sum + getSubCreditAmount(sub), 0);
        }
        return 0;
      };
      
      const getEffectiveAmount = (block) => {
        if (!block || block.isPlanned) return 0;
        if (block.subItems && block.subItems.length > 0) {
          return block.subItems.reduce((sum, sub) => sum + getSubEffectiveAmount(sub), 0);
        }
        return getAmountValue(block);
      };

      const getAmountTextClass = (amount, colorKey = 'auto', isPlanned = false) => {
        if (isPlanned) return 'text-[#8B5A2B]';
        if (colorKey && colorKey !== 'auto' && SUBITEM_AMOUNT_COLORS[colorKey]) return SUBITEM_AMOUNT_COLORS[colorKey].text;
        return amount >= 0 ? 'text-[#2E7D32]' : 'text-[#C62828]';
      };

      const getCardHolders = (account) => {
        const text = (account && (account.cardHolder || DEFAULT_CARD_HOLDERS[account.id])) || '';
        return text.split(/[,，\/|]+/).map(name => name.trim()).filter(Boolean);
      };

      /* --- 💡 자동 정리(Auto Cleanup) 엔진 (빈 껍데기 박멸) --- */
      const cleanupBlocks = (blocksArray) => {
        return blocksArray.map(b => {
          let newSubs = (b.subItems || []).map(s => {
            let newChildren = (s.childItems || []);
            // 중분류 알맹이가 1개고 자체금액이 0이면 자동 언랩 (소분류 -> 중분류 승격)
            if (newChildren.length === 1 && getAmountValue(s) === 0) {
              const singleChild = newChildren[0];
              return { ...s, label: s.label || singleChild.label, amount: getAmountValue(singleChild), amountColor: singleChild.amountColor, isPlanned: !!(s.isPlanned || singleChild.isPlanned), childItems: [] };
            }
            return { ...s, childItems: newChildren };
          }).filter(s => !(s.childItems.length === 0 && getAmountValue(s) === 0));
          
          // 대분류 알맹이가 1개고 자체금액이 0이면 자동 언랩 (중분류 -> 대분류 승격)
          if (newSubs.length === 1 && getAmountValue(b) === 0) {
            const singleSub = newSubs[0];
            if (!singleSub.childItems || singleSub.childItems.length === 0) {
              return { ...b, label: b.label || singleSub.label, amount: getAmountValue(singleSub), isPlanned: !!singleSub.isPlanned, color: b.color || 'none', subItems: [] };
            }
          }
          return { ...b, subItems: newSubs };
        }).filter(b => !(b.subItems.length === 0 && getAmountValue(b) === 0));
      };

      // 다이얼로그 헬퍼
      const openDialog = (type, message, defaultValue = '', onConfirm) => setDialog({ isOpen: true, type, message, defaultValue, onConfirm });
      const closeDialog = () => setDialog({ isOpen: false, type: '', message: '', defaultValue: '', onConfirm: null });
      const handleDialogConfirm = (val) => { if (dialog.onConfirm) dialog.onConfirm(val); closeDialog(); };

      // 변환 헬퍼 (드래그 시 금액 손실 방지 적용 - 안전한 색상 매핑)
      const toBlock = (item, accountId) => {
        const uAmt = getUniversalAmount(item);
        const hasSubs = (item.subItems && item.subItems.length > 0) || (item.childItems && item.childItems.length > 0);
        const validColor = COLOR_TAGS[item.color] ? item.color : (COLOR_TAGS[item.amountColor] ? item.amountColor : 'none');
        return { id: createId('b'), accountId, label: item.label || '새 항목', amount: hasSubs ? 0 : uAmt, color: validColor, isPlanned: !!item.isPlanned, subItems: item.subItems || item.childItems || [] };
      };
      const toSub = (item) => {
        const validColor = SUBITEM_AMOUNT_COLORS[item.amountColor] ? item.amountColor : (SUBITEM_AMOUNT_COLORS[item.color] ? item.color : 'auto');
        return { id: createId('s'), label: item.label || '새 항목', amount: getUniversalAmount(item), amountColor: validColor, isPlanned: !!item.isPlanned, childItems: item.childItems || item.subItems || [] };
      };
      const toChild = (item) => {
        const validColor = SUBITEM_AMOUNT_COLORS[item.amountColor] ? item.amountColor : (SUBITEM_AMOUNT_COLORS[item.color] ? item.color : 'auto');
        return { id: createId('c'), label: item.label || '새 항목', amount: getUniversalAmount(item), amountColor: validColor, isPlanned: !!item.isPlanned };
      };

      const getSelectionKey = (type, id) => `${type}:${id}`;
      const splitSelectionKey = (selectionKey) => {
        if (!selectionKey) return { type: '', id: '' };
        if (!selectionKey.includes(':')) return { type: 'block', id: selectionKey };
        const [type, id] = selectionKey.split(':');
        return { type, id };
      };
      const getTargetId = (type, block, subItem, childItem) => type === 'block' ? block?.id : type === 'sub' ? subItem?.id : childItem?.id;
      const isItemSelected = (type, id) => selectedBlocks.includes(getSelectionKey(type, id)) || (type === 'block' && selectedBlocks.includes(id));
      const resolveSelectionItem = (selectionKey) => {
        const { type, id } = splitSelectionKey(selectionKey);
        for (const block of blocks) {
          if (type === 'block' && block.id === id) {
            return { key: getSelectionKey('block', block.id), type, id, blockId: block.id, label: block.label, amount: getEffectiveAmount(block) };
          }
          for (const sub of (block.subItems || [])) {
            if (type === 'sub' && sub.id === id) {
              return { key: getSelectionKey('sub', sub.id), type, id, blockId: block.id, subItemId: sub.id, label: sub.label, amount: getSubEffectiveAmount(sub) };
            }
            for (const child of getChildItems(sub)) {
              if (type === 'child' && child.id === id) {
                return { key: getSelectionKey('child', child.id), type, id, blockId: block.id, subItemId: sub.id, childId: child.id, label: child.label, amount: getChildEffectiveAmount(child) };
              }
            }
          }
        }
        return null;
      };

      const getTotalsForBlocks = (targetBlocks) => targetBlocks.reduce((totals, block) => {
        const amount = getEffectiveAmount(block);
        if (amount > 0) totals.income += amount;
        if (amount < 0) totals.expense += amount;
        totals.credit += getCreditAmount(block);
        totals.balance += amount;
        return totals;
      }, { income: 0, expense: 0, credit: 0, balance: 0 });

      const selectedItems = useMemo(() => selectedBlocks.map(resolveSelectionItem).filter(Boolean), [blocks, selectedBlocks]);
      const selectedSum = useMemo(() => selectedItems.reduce((sum, item) => sum + item.amount, 0), [selectedItems]);

      useEffect(() => {
        if (!GAS_URL || GAS_URL.includes("여기에")) { setIsInitialLoading(false); return; }
        fetch(GAS_URL)
          .then(async res => { const text = await res.text(); try { return JSON.parse(text); } catch (e) { throw new Error("GAS_PERMISSION_ERROR"); } })
          .then(data => {
            if (data && Object.keys(data).length > 0) {
              if (Array.isArray(data.accountsData)) setAccountsData(data.accountsData);
              if (Array.isArray(data.blocks)) setBlocks(cleanupBlocks(data.blocks));
              if (data.lastSavedAt) setLastSavedAt(data.lastSavedAt);
            }
            setIsInitialLoading(false);
          })
          .catch(err => { console.error(err); setIsInitialLoading(false); });
      }, []);

      const syncToCloud = async () => {
        if (!GAS_URL || GAS_URL.includes("여기에")) return openDialog('alert', "구글 스크립트 웹앱 URL이 입력되지 않았습니다!");
        setIsSyncing(true);
        try {
          const savedAt = new Date().toISOString();
          const payload = { accountsData, blocks: blocks.map(block => ({ ...block, id: block.id || createId('b') })), lastSavedAt: savedAt };
          await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
          setLastSavedAt(savedAt);
          openDialog('alert', "✅ 안전하게 백업 및 동기화되었습니다!");

      const addChildItem = (subItemId) => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, subItems: prev.blockData.subItems.map(item => item.id === subItemId ? { ...item, childItems: [...(item.childItems||[]), { id: createId('c'), label: '', amount: 0, amountString: '', amountColor: 'auto', isPlanned: false }] } : item) } }));
      const handleChildItemChange = (subItemId, childId, field, value) => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, subItems: prev.blockData.subItems.map(item => item.id === subItemId ? { ...item, childItems: item.childItems.map(child => child.id === childId ? { ...child, [field === 'amount' ? 'amountString' : field]: field === 'amount' ? value.replace(/[^0-9-]/g, '') : value, ...(field==='amount' && {amount: parseInt(value.replace(/[^0-9-]/g, ''), 10) || 0}) } : child) } : item) } }));
      const removeChildItem = (subItemId, childId) => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, subItems: prev.blockData.subItems.map(item => item.id === subItemId ? { ...item, childItems: item.childItems.filter(child => child.id !== childId) } : item) } }));
      const setChildItemColor = (subItemId, childId, colorKey) => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, subItems: prev.blockData.subItems.map(item => item.id === subItemId ? { ...item, childItems: item.childItems.map(child => child.id === childId ? { ...child, amountColor: colorKey } : child) } : item) } }));

      // Modal Local DND (Same logic as global DND)
      const handleModalDragStart = (e, type, id) => { if (['BUTTON', 'INPUT'].includes(e.target.tagName)) return; e.stopPropagation(); setDraggedItem({ type, id }); e.dataTransfer.effectAllowed = 'move'; };
      const handleModalDrop = (e, targetType, targetId, position) => {
        e.preventDefault(); e.stopPropagation(); setDragOverZone(null);
        if (!draggedItem || draggedItem.id === targetId) { setDraggedItem(null); return; }
        const { type, id } = draggedItem;
        
        setModal(prev => {
           let extracted = null;
           let subItems = [...(prev.blockData.subItems || [])];
           
           if (type === 'sub') {
             const idx = subItems.findIndex(s => s.id === id);
             if (idx > -1) { extracted = subItems[idx]; subItems.splice(idx, 1); }
           } else if (type === 'child') {
             subItems = subItems.map(s => {
               const idx = (s.childItems||[]).findIndex(c => c.id === id);
               if (idx > -1) { extracted = s.childItems[idx]; const next = [...s.childItems]; next.splice(idx, 1); return { ...s, childItems: next }; }
               return s;
             });
           }
           if (!extracted) return prev;

           if (targetType === 'sub' && position === 'before') {
             const idx = subItems.findIndex(s => s.id === targetId);
             if (idx > -1) subItems.splice(idx, 0, extracted);
           } else if (targetType === 'child') {
             subItems = subItems.map(s => {
               const idx = (s.childItems||[]).findIndex(c => c.id === targetId);
               if (idx > -1) {
                 const next = [...s.childItems];
                 if(position === 'before') next.splice(idx, 0, extracted); else next.splice(idx+1, 0, extracted);
                 return { ...s, childItems: next };
               }
               return s;
             });
           } else if (targetType === 'sub' && position === 'inside') {
             subItems = subItems.map(s => {
               if (s.id === targetId) return { ...s, childItems: [...(s.childItems||[]), extracted] };
               return s;
             });
           }
           return { ...prev, blockData: { ...prev.blockData, subItems } };
        });
        setDraggedItem(null);
      };

      return (
        <div className="min-h-screen bg-[#F5F2EC] text-[#3D2B1F] font-sans flex flex-col overflow-x-hidden" onClick={handleBgClick} onContextMenu={(e) => { e.preventDefault(); handleBgClick(); }}>
          {isInitialLoading && (
            <div className="fixed inset-0 z-[100] bg-[#F5F2EC] flex flex-col items-center justify-center text-[#3D2B1F]">
              <div className="w-14 h-14 bg-white border border-[#E6E0D4] rounded-2xl shadow-lg flex items-center justify-center mb-5">
                <i className="ph-bold ph-spinner animate-spin text-[#8B5A2B]" style={{fontSize: 28}}></i>
              </div>
              <p className="text-lg font-black">최신 화면 불러오는 중</p>
              <p className="text-xs font-bold text-[#A69C8E] mt-2">클라우드 데이터 확인 후 화면을 보여드립니다.</p>
            </div>
          )}

          {/* 💡 자체 내장 커스텀 팝업 (Alert / Confirm / Prompt 대체) */}
          {dialog.isOpen && (
            <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" onClick={closeDialog}>
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl p-6 animate-in zoom-in-95 border border-[#E6E0D4]" onClick={e => e.stopPropagation()}>
                <h3 className="text-lg font-black text-[#3D2B1F] mb-2 flex items-center gap-2">
                  <i className={`ph-fill ${dialog.type === 'alert' ? 'ph-warning-circle text-[#C62828]' : 'ph-info text-[#0277BD]'}`} style={{fontSize: 24}}></i>
                  {dialog.type === 'alert' ? '알림' : dialog.type === 'confirm' ? '확인' : '이름 변경'}
                </h3>
                <p className="text-sm font-bold text-[#6D5443] mb-5 whitespace-pre-wrap">{dialog.message}</p>
                
                {dialog.type === 'prompt' && (
                  <input 
                    type="text" autoFocus
                    defaultValue={dialog.defaultValue}
                    id="dialogPromptInput"
                    className="w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-sm font-bold text-[#2A1D15] focus:outline-none focus:border-[#8B5A2B] transition-colors mb-5"
                    onKeyDown={(e) => { if(e.key === 'Enter') { e.preventDefault(); handleDialogConfirm(e.target.value); } }}
                  />
                )}

                <div className="flex gap-2 justify-end">
                  {dialog.type !== 'alert' && (
                    <button onClick={closeDialog} className="px-4 py-2.5 bg-[#EFEBE4] text-[#6D5443] rounded-xl text-sm font-extrabold hover:bg-[#DFD8CE] transition-colors">취소</button>
                  )}
                  <button 
                    onClick={() => {
                      const val = dialog.type === 'prompt' ? document.getElementById('dialogPromptInput')?.value : true;
                      handleDialogConfirm(val);
                    }}
                    className="px-5 py-2.5 bg-[#8B5A2B] text-white rounded-xl text-sm font-extrabold hover:bg-[#6B4423] transition-colors shadow-md"
                  >
                    확인
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* 💡 우클릭 팝업 메뉴 (Context Menu) */}
          {contextMenu.isOpen && (() => {
            const target = contextMenu.target;
            const targetItem = target?.type === 'block' ? target.block : target?.type === 'sub' ? target.subItem : target?.childItem;
            const isCredit = !!targetItem?.isPlanned;
            return (
              <div
                className="context-menu-enter fixed z-[9999] bg-white rounded-xl shadow-2xl border border-[#DFD8CE] py-1.5 w-40 overflow-hidden"
                style={{ top: contextMenu.y, left: contextMenu.x }}
              >
                <button 
                  onClick={handleContextMenuRename} 
                  className="w-full text-left px-4 py-2.5 text-[12px] font-bold text-[#3D2B1F] hover:bg-[#F9F6F0] hover:text-[#8B5A2B] flex items-center gap-2 transition-colors"
                >
                  <i className="ph-bold ph-pencil-simple text-[#A69C8E]"></i> 이름 변경
                </button>
                <button 
                  onClick={handleContextMenuSplit} 
                  className="w-full text-left px-4 py-2.5 text-[12px] font-bold text-[#3D2B1F] hover:bg-[#F9F6F0] hover:text-[#8B5A2B] flex items-center gap-2 transition-colors"
                >
                  <i className="ph-bold ph-scissors text-[#A69C8E]"></i> 금액 분리
                </button>
                <button 
                  onClick={handleContextMenuCredit} 
                  className={`w-full text-left px-4 py-2.5 text-[12px] font-bold flex items-center gap-2 transition-colors ${isCredit ? 'text-[#8B5A2B] bg-[#FDF6E9] hover:bg-[#F9F6F0]' : 'text-[#3D2B1F] hover:bg-[#F9F6F0] hover:text-[#8B5A2B]'}`}
                >
                  <i className="ph-bold ph-clock text-[#A69C8E]"></i> {isCredit ? '외상 해제' : '외상 설정'}
                </button>
                <div className="h-px bg-[#EFEBE4] my-1"></div>
                <button 
                  onClick={handleContextMenuColor} 
                  className="w-full text-left px-4 py-2.5 text-[12px] font-bold text-[#3D2B1F] hover:bg-[#F9F6F0] hover:text-[#8B5A2B] flex items-center gap-2 transition-colors"
                >
                  <i className="ph-fill ph-palette text-[#A69C8E]"></i> 색상 설정
                </button>
              </div>
            );
          })()}

          {colorModal.isOpen && (() => {
            const isBlockColor = colorModal.target?.type === 'block';
            const options = isBlockColor ? Object.keys(COLOR_TAGS) : SUBITEM_COLOR_ORDER;
            const title = isBlockColor ? '박스 배경 색상' : '금액 표시 색상';
            return (
              <div className="fixed inset-0 z-[9998] flex items-center justify-center p-4 bg-[#2A1D15]/50 backdrop-blur-sm" onClick={() => setColorModal({ isOpen: false, target: null, currentColor: 'none' })}>
                <div className="bg-white rounded-2xl w-full max-w-xs shadow-2xl overflow-hidden border border-[#E6E0D4]" onClick={(e) => e.stopPropagation()}>
                  <div className="p-5 border-b border-[#EFEBE4] bg-[#FDFCFB]">
                    <h3 className="font-extrabold text-[#3D2B1F] text-base flex items-center gap-2">
                      <i className="ph-fill ph-palette text-[#8B5A2B]" style={{fontSize: 18}}></i> 색상 설정
                    </h3>
                    <p className="text-[11px] font-bold text-[#A69C8E] mt-1">{title}</p>
                  </div>
                  <div className="p-5 grid grid-cols-2 gap-2">
                    {options.map(colorKey => {
                      const color = isBlockColor ? COLOR_TAGS[colorKey] : SUBITEM_AMOUNT_COLORS[colorKey];
                      const isActive = colorModal.currentColor === colorKey;
                      return (
                        <button
                          key={colorKey}
                          type="button"
                          onClick={() => applyContextColor(colorKey)}
                          className={`px-3 py-2 rounded-lg border text-[12px] font-extrabold flex items-center gap-2 transition-all
                            ${isActive ? 'border-[#8B5A2B] bg-[#F9F6F0] text-[#3D2B1F] ring-1 ring-[#8B5A2B]' : 'border-[#DFD8CE] bg-white text-[#6D5443] hover:bg-[#F9F6F0]'}
                          `}
                        >
                          <span className={`w-4 h-4 rounded-full border border-black/10 ${isBlockColor ? `${color.bg} ${color.border}` : color.swatch}`}></span>
                          {isBlockColor ? colorKey : color.label}
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            );
          })()}
          
          <header className="min-h-[72px] bg-[#FDFCFB] border-b border-[#E6E0D4] flex flex-wrap items-center justify-between gap-4 px-4 sm:px-8 py-3 shrink-0 sticky top-0 z-30 shadow-sm">
            <div className="flex items-center gap-3 min-w-0">
              <HwarimLogo />
              <div>
                <h1 className="text-xl font-extrabold text-[#3D2B1F] tracking-tight">화림 ERP</h1>
                <p className="text-[10px] font-bold text-[#A69C8E] uppercase tracking-widest mt-0.5">Cloud Web Application</p>
              </div>
            </div>

            <div className="flex items-center gap-3 shrink-0">
              <div className="text-right max-w-[260px]">
                <p className="text-[10px] font-extrabold text-[#A69C8E] uppercase tracking-widest">마지막 클라우드 저장</p>
                <p className="text-[11px] font-bold text-[#6D5443] mt-0.5">{formatLastSavedAt(lastSavedAt)}</p>
              </div>
              <button 
                onClick={syncToCloud}
                disabled={isSyncing}
                className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold border transition-colors shadow-sm
                  ${isSyncing ? 'bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed' : 'bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border-indigo-200'}
                `}
              >
                {isSyncing ? <i className="ph-bold ph-spinner animate-spin" style={{fontSize: 16}}></i> : <i className="ph-fill ph-cloud-arrow-up" style={{fontSize: 16}}></i>} 
                {isSyncing ? '동기화 중...' : '클라우드 저장'}
              </button>
            </div>
          </header>

          <div className="flex-1 overflow-x-auto overflow-y-visible p-6 hide-scrollbar relative">
            <div className="flex gap-5 items-start min-w-max">
              
              {accountsData.map(account => {
                const accountBlocks = blocks.filter(b => b.accountId === account.id);
                const accountTotals = getTotalsForBlocks(accountBlocks);
                const theme = COLUMN_THEMES[account.theme || 'wood'];
                const cardHolders = getCardHolders(account);

                return (
                  <div 
                    key={account.id}
                    onDragOver={(e) => handleDragOver(e, `column-${account.id}-bottom`)}
                    onDragLeave={handleDragLeave}
                    onDrop={(e) => handleDrop(e, 'column', account.id, 'bottom', account.id)}
                    className={`w-[360px] flex flex-col rounded-xl border-2 shadow-lg overflow-hidden transition-colors duration-200 shrink-0 ${theme.panelBg}
                      ${dragOverZone === `column-${account.id}-bottom` ? 'border-[#8B5A2B] ring-4 ring-indigo-200 bg-[#EFEBE4]' : theme.border}
                    `}
                  >
                    <div 
                      draggable={true}
                      onDragStart={(e) => handleDragStart(e, 'column', account.id)}
                      onDragEnd={clearAllDragStates}
                      className={`px-5 py-4 bg-white border-b border-[#E6E0D4] shrink-0 ${theme.light} bg-opacity-30 select-none`}
                    >
                      <div className="flex items-center gap-2 mb-1 min-w-0 pointer-events-none">
                        <i className={`ph-bold ph-dots-six-vertical text-[#A69C8E] mr-1`} style={{fontSize: 20}}></i>
                        <i className={`${account.icon} ${theme.text}`} style={{fontSize: 18}}></i>
                        <h2 className="font-black text-[16px] text-[#2A1D15] truncate flex-1 min-w-0">{account.name}</h2>
                        {cardHolders.map(holder => (
                          <span key={holder} className="shrink-0 text-[10px] font-black px-1.5 py-0.5 rounded-md bg-white border border-[#D2B48C] text-[#8B5A2B] flex items-center gap-1 shadow-sm">
                            <i className="ph-fill ph-credit-card" style={{fontSize: 11}}></i>카드[{holder}]
                          </span>
                        ))}
                      </div>
                      <div className="flex items-center gap-1.5 text-[11px] font-bold text-[#6D5443] ml-10 opacity-80 pointer-events-none">
                        <i className="ph-fill ph-credit-card" style={{fontSize: 12}}></i> {account.bank} | <span className="font-mono">{account.accountNo}</span>
                      </div>
                    </div>

                    <div className="grid grid-cols-4 bg-white/60 backdrop-blur-sm border-b border-[#E6E0D4] shrink-0">
                      <button onClick={() => setReportModal({ isOpen: true, accountId: account.id })} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] border-r border-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-chart-bar ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">결산서</span>
                      </button>
                      <button onClick={() => openCloseMonthModal(account.id)} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] border-r border-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-calendar-check ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">월 마감</span>
                      </button>
                      <button onClick={() => openCreateModal(account.id)} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] border-r border-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-plus-circle ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">자금추가</span>
                      </button>
                      <button onClick={() => openSettingsModal(account)} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-gear ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">설정</span>
                      </button>
                    </div>

                    <div className="p-3 flex flex-col gap-0 flex-1 min-h-[150px]">
                      {accountBlocks.length === 0 ? (
                        <div className="min-h-[110px] flex items-center justify-center text-xs text-[#A69C8E] border-2 border-dashed border-[#DFD8CE] rounded-lg bg-white/50 m-2 pointer-events-none">
                          내역이 없습니다.
                        </div>
                      ) : (
                        accountBlocks.map((block, idx) => {
                          const isSelected = isItemSelected('block', block.id);
                          const tagColor = COLOR_TAGS[block.color] || COLOR_TAGS['none'];
                          const hasSubItems = block.subItems && block.subItems.length > 0;
                          const blockAmount = getBlockAmount(block);
                          const isPlanned = !!block.isPlanned;
                          const isSubItemsCollapsed = collapsedSubItems.includes(block.id);
                           
                          return (
                            <Fragment key={block.id}>
                              <div
                                onDragOver={(e) => handleDragOver(e, `block-${block.id}-before`)}
                                onDragLeave={handleDragLeave}
                                onDrop={(e) => handleDrop(e, 'block', block.id, 'before', account.id)}
                                className={`h-2 transition-all w-full my-0.5 z-10 ${dragOverZone === `block-${block.id}-before` ? 'bg-[#8B5A2B] scale-y-150 rounded-full shadow-md' : 'bg-transparent'}`}
                              />
                              
                              <div
                                draggable
                                onDragStart={(e) => handleDragStart(e, 'block', block.id)}
                                onDragOver={(e) => handleDragOver(e, `block-${block.id}-inside`)}
                                onDragLeave={handleDragLeave}
                                onDrop={(e) => handleDrop(e, 'block', block.id, 'inside', account.id)}
                                onDragEnd={clearAllDragStates}
                                onClick={(e) => handleItemClick(e, 'block', block, null, null)}
                                onContextMenu={(e) => handleContextMenu(e, 'block', block, null, null)}
                                className={`
                                  selectable-item block-item relative flex flex-col border rounded-xl shadow-sm cursor-grab active:cursor-grabbing select-none transition-colors group/block
                                  ${isSelected ? `${theme.border} ring-1 ${theme.ring} ${theme.light} bg-opacity-40` : `${tagColor.bg} ${tagColor.border}`}
                                  ${draggedItem?.id === block.id ? 'opacity-50' : 'hover:shadow-md'}
                                  ${dragOverZone === `block-${block.id}-inside` ? '!border-[#8B5A2B] ring-2 ring-[#8B5A2B] bg-[#FDFCFB]' : ''}
                                `}
                              >
                                <div className="flex items-center px-3 py-3 pointer-events-none">
                                  <div className="flex-1 min-w-0 pr-1 flex flex-col justify-center">
                                    <div className="flex items-center gap-2 mb-0.5">
                                      <p 
                                        className="truncate text-[14px] text-[#2A1D15] font-extrabold leading-tight pointer-events-auto cursor-pointer hover:text-indigo-600 hover:underline decoration-dashed underline-offset-4"
                                        onDoubleClick={(e) => { e.stopPropagation(); handleRenameLabel('block', block.id, null, null, block.label); }}
                                      >
                                        {block.label}
                                      </p>
                                      {isPlanned && <span className="shrink-0 text-[10px] font-black px-1.5 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">외상</span>}
                                    </div>
                                    <div className="flex items-center gap-2 pointer-events-auto mt-0.5">
                                      <p className={`font-mono text-[16px] font-black tracking-tight ${getAmountTextClass(blockAmount, 'auto', isPlanned)}`}>
                                        {hasSubItems && <span className="text-[10px] font-bold text-[#A69C8E] mr-1.5 inline-block border border-[#DFD8CE] bg-white px-1.5 py-0.5 rounded align-middle shadow-sm">총합계</span>}
                                        {blockAmount > 0 ? '+' : ''}{formatCurrency(blockAmount)}
                                      </p>
                                      
                                      {/* 💡 최적화된 뱃지형 접기/펼치기 버튼 */}
                                      {hasSubItems && (
                                        <button
                                          onClick={(e) => { e.stopPropagation(); toggleSubItems(block.id); }}
                                          className="ml-1 flex items-center justify-center w-5 h-5 bg-[#F9F6F0] border border-[#D2B48C] text-[#8B5A2B] rounded-full hover:bg-[#EFEBE4] transition-colors shadow-sm"
                                          title={isSubItemsCollapsed ? '세부항목 펼치기' : '세부항목 접기'}
                                        >
                                          <i className={`ph-bold ph-caret-${isSubItemsCollapsed ? 'down' : 'up'} text-[12px]`}></i>
                                        </button>
                                      )}
                                    </div>
                                  </div>

                                  <div className="flex items-center gap-1 shrink-0 pointer-events-auto">
                                    <button
                                      type="button"
                                      className={`no-select-trigger p-1.5 rounded-md hover:bg-black/5 transition-colors cursor-pointer ${isPlanned ? 'text-[#8B5A2B] bg-[#FDF6E9]' : 'text-[#A69C8E] hover:text-[#8B5A2B]'}`}
                                      onClick={(e) => { e.stopPropagation(); toggleBlockPlanned(block.id); }}
                                      title={isPlanned ? '외상 해제' : '외상 설정'}
                                    >
                                      <i className="ph-bold ph-clock" style={{fontSize: 16}}></i>
                                    </button>
                                    <div 
                                      className="no-select-trigger p-1.5 rounded-md hover:bg-black/5 text-[#A69C8E] hover:text-[#3D2B1F] transition-colors cursor-pointer"
                                      onClick={(e) => { e.stopPropagation(); openEditModal(block); }}
                                    >
                                      <i className="ph-bold ph-pencil-simple" style={{fontSize: 16}}></i>
                                    </div>
                                  </div>
                                </div>

                                {hasSubItems && !isSubItemsCollapsed && (
                                  <div className="px-3 pb-3 pt-0">
                                    <div className="border-t border-black/10 pt-2 flex flex-col gap-0">
                                      {block.subItems.map((sub, sIdx) => {
                                        const childItems = getChildItems(sub);
                                        const subAmount = getSubItemAmount(sub);
                                        const isSubSelected = isItemSelected('sub', sub.id);
                                        return (
                                          <Fragment key={sub.id}>
                                            <div
                                              onDragOver={(e) => handleDragOver(e, `sub-${sub.id}-before`)}
                                              onDragLeave={handleDragLeave}
                                              onDrop={(e) => handleDrop(e, 'sub', sub.id, 'before', account.id)}
                                              className={`h-1.5 w-full my-0.5 z-10 transition-all ${dragOverZone === `sub-${sub.id}-before` ? 'bg-[#8B5A2B] scale-y-150 rounded-full shadow-md' : 'bg-transparent'}`}
                                            />
                                            <div
                                              draggable
                                              onDragStart={(e) => handleDragStart(e, 'sub', sub.id)}
                                              onDragOver={(e) => handleDragOver(e, `sub-${sub.id}-inside`)}
                                              onDragLeave={handleDragLeave}
                                              onDrop={(e) => handleDrop(e, 'sub', sub.id, 'inside', account.id)}
                                              onDragEnd={clearAllDragStates}
                                              onClick={(e) => handleItemClick(e, 'sub', block, sub, null)}
                                              onContextMenu={(e) => handleContextMenu(e, 'sub', block, sub, null)}
                                              className={`selectable-item cursor-grab active:cursor-grabbing select-none rounded-lg border bg-white/70 px-2 py-1.5 text-[#6D5443] font-medium transition-colors
                                                ${isSubSelected ? 'border-[#8B5A2B] ring-1 ring-[#8B5A2B] bg-[#FDF6E9]' : (draggedItem?.id === sub.id ? 'opacity-50 border-[#8B5A2B]' : 'border-[#E6E0D4]')} 
                                                ${dragOverZone === `sub-${sub.id}-inside` ? '!border-[#8B5A2B] ring-2 ring-[#8B5A2B] bg-[#FDFCFB]' : ''}
                                              `}
                                            >
                                              <div className="flex justify-between items-center pointer-events-none">
                                                <span className="truncate pr-2 flex items-center gap-1.5 pointer-events-auto">
                                                  <i className="ph-bold ph-corner-down-right text-[#A69C8E]" style={{fontSize: 14}}></i> 
                                                  <span 
                                                    className="text-[12px] font-bold text-[#3D2B1F] cursor-pointer hover:text-indigo-600 hover:underline decoration-dashed underline-offset-4"
                                                    onDoubleClick={(e) => { e.stopPropagation(); handleRenameLabel('sub', block.id, sub.id, null, sub.label); }}
                                                  >
                                                    {sub.label || '내용 없음'}
                                                  </span>
                                                </span>
                                                <div className="flex items-center gap-2 pointer-events-auto">
                                                  <span className={`text-[12px] font-mono font-bold ${getAmountTextClass(subAmount, sub.amountColor || 'auto', sub.isPlanned)}`}>
                                                    {subAmount > 0 ? '+' : ''}{formatCurrency(subAmount)}
                                                  </span>
                                                  {sub.isPlanned && <span className="text-[10px] font-black px-1.5 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">외상</span>}
                                                </div>
                                              </div>
                                              
                                              {(childItems.length > 0) && (
                                                <div className={`mt-1.5 ml-3 pl-2 border-l-2 border-[#EFEBE4] flex flex-col gap-0 transition-colors`}>
                                                  {childItems.map((child, cIdx) => {
                                                    const isChildSelected = isItemSelected('child', child.id);
                                                    return (
                                                    <Fragment key={child.id}>
                                                      <div
                                                        onDragOver={(e) => handleDragOver(e, `child-${child.id}-before`)}
                                                        onDragLeave={handleDragLeave}
                                                        onDrop={(e) => handleDrop(e, 'child', child.id, 'before', account.id)}
                                                        className={`h-1 w-full my-0.5 z-10 transition-all ${dragOverZone === `child-${child.id}-before` ? 'bg-[#8B5A2B] scale-y-150 rounded-full shadow-md' : 'bg-transparent'}`}
                                                      />
                                                      <div
                                                        draggable
                                                        onDragStart={(e) => handleDragStart(e, 'child', child.id)}
                                                        onDragEnd={clearAllDragStates}
                                                        onClick={(e) => handleItemClick(e, 'child', block, sub, child)}
                                                        onContextMenu={(e) => handleContextMenu(e, 'child', block, sub, child)}
                                                        className={`selectable-item cursor-grab active:cursor-grabbing select-none flex justify-between items-center gap-2 rounded px-1.5 py-0.5 transition-colors
                                                          ${isChildSelected ? 'bg-[#FDF6E9] ring-1 ring-[#8B5A2B]' : (draggedItem?.id === child.id ? 'opacity-50' : 'hover:bg-black/5')}
                                                        `}
                                                      >
                                                        <span className="truncate flex items-center gap-1.5 pointer-events-none">
                                                          <i className="ph-bold ph-arrow-elbow-down-right text-[#D2B48C]" style={{fontSize: 12}}></i>
                                                          <span 
                                                            className="text-[11px] font-bold text-[#6D5443] cursor-pointer hover:text-indigo-600 hover:underline decoration-dashed underline-offset-4 pointer-events-auto"
                                                            onDoubleClick={(e) => { e.stopPropagation(); handleRenameLabel('child', block.id, sub.id, child.id, child.label); }}
                                                          >
                                                            {child.label || '소분류 없음'}
                                                          </span>
                                                        </span>
                                                        <div className="flex items-center gap-1.5 shrink-0 pointer-events-none">
                                                          <span className={`text-[11px] font-mono font-bold opacity-60 ${getAmountTextClass(child.amount, child.amountColor || 'auto', child.isPlanned)}`}>
                                                            {child.amount > 0 ? '+' : ''}{formatCurrency(child.amount)}
                                                          </span>
                                                          {child.isPlanned && <span className="text-[9px] font-black px-1 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">외상</span>}
                                                        </div>
                                                      </div>
                                                    </Fragment>
                                                  );
                                                  })}
                                                  <div
                                                    onDragOver={(e) => handleDragOver(e, `sub-${sub.id}-child-bottom`)}
                                                    onDragLeave={handleDragLeave}
                                                    onDrop={(e) => handleDrop(e, 'child-bottom', sub.id, 'append', account.id)}
                                                    className={`h-1.5 rounded-full transition-colors z-10 mt-0.5 ${dragOverZone === `sub-${sub.id}-child-bottom` ? 'bg-[#8B5A2B] scale-y-150' : 'bg-transparent'}`}
                                                  />
                                                </div>
                                              )}
                                            </div>
                                          </Fragment>
                                        );
                                      })}
                                      <div
                                        onDragOver={(e) => handleDragOver(e, `block-${block.id}-sub-bottom`)}
                                        onDragLeave={handleDragLeave}
                                        onDrop={(e) => handleDrop(e, 'sub-bottom', block.id, 'append', account.id)}
                                        className={`h-2 rounded-full transition-colors z-10 mt-0.5 ${dragOverZone === `block-${block.id}-sub-bottom` ? 'bg-[#8B5A2B] scale-y-150' : 'bg-transparent'}`}
                                      />
                                    </div>
                                  </div>
                                )}
                              </div>
                            </Fragment>
                          );
                        })
                      )}
                      
                      <div 
                        onDragOver={(e) => handleDragOver(e, `column-${account.id}-bottom`)}
                        onDragLeave={handleDragLeave}
                        onDrop={(e) => handleDrop(e, 'column', account.id, 'bottom', account.id)}
                        className="flex-1 min-h-[40px] mt-2 transition-colors rounded-lg bg-transparent"
                      />
                    </div>

                    <div className="p-4 bg-white border-t border-[#E6E0D4] rounded-b-xl shrink-0">
                      <div className="grid grid-cols-2 gap-2">
                        <div className="rounded-lg border border-[#C8E6C9] bg-[#F1F8E9] px-3 py-2">
                          <p className="text-[10px] font-black text-[#2E7D32] uppercase tracking-widest">총 입금</p>
                          <p className="mt-1 text-[15px] font-black font-mono text-[#2E7D32] truncate">+{formatCurrency(accountTotals.income)}</p>
                        </div>
                        <div className="rounded-lg border border-[#FFCDD2] bg-[#FFEBEE] px-3 py-2">
                          <p className="text-[10px] font-black text-[#C62828] uppercase tracking-widest">총 출금</p>
                          <p className="mt-1 text-[15px] font-black font-mono text-[#C62828] truncate">{accountTotals.expense < 0 ? '-' : ''}{formatCurrency(Math.abs(accountTotals.expense))}</p>
                        </div>
                        <div className="rounded-lg border border-[#D2B48C] bg-[#FDF6E9] px-3 py-2">
                          <p className="text-[10px] font-black text-[#8B5A2B] uppercase tracking-widest">외상 별도</p>
                          <p className={`mt-1 text-[15px] font-black font-mono truncate ${accountTotals.credit >= 0 ? 'text-[#8B5A2B]' : 'text-[#C62828]'}`}>
                            {accountTotals.credit > 0 ? '+' : ''}{formatCurrency(accountTotals.credit)}
                          </p>
                        </div>
                        <div className="rounded-lg border border-[#E6E0D4] bg-[#FCFAF8] px-3 py-2">
                          <p className="text-[10px] font-black text-[#6D5443] uppercase tracking-widest">잔고</p>
                          <p className={`mt-1 text-[18px] font-black font-mono tracking-tight truncate ${accountTotals.balance >= 0 ? theme.text : 'text-[#C62828]'}`}>
                            {accountTotals.balance > 0 ? '+' : ''}{formatCurrency(accountTotals.balance)}
                          </p>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}

              <div 
                onClick={addNewAccount}
                className="w-[360px] min-h-[220px] flex flex-col justify-center items-center bg-[#FDFCFB]/60 hover:bg-white rounded-xl border-2 border-dashed border-[#DFD8CE] hover:border-[#8B5A2B] shadow-sm transition-colors cursor-pointer group shrink-0"
              >
                <div className="w-14 h-14 bg-[#EFEBE4] group-hover:bg-[#8B5A2B] text-[#A69C8E] group-hover:text-white rounded-full flex items-center justify-center mb-4 transition-colors">
                  <i className="ph-bold ph-plus" style={{fontSize: 28}}></i>
                </div>
                <p className="font-extrabold text-[#6D5443] group-hover:text-[#3D2B1F] transition-colors">새로운 현장/법인 추가</p>
              </div>

            </div>
          </div>

          {/* 3. 다중 선택 계산기 바 */}
          {selectedItems.length > 0 && (
            <div className="selection-bar fixed bottom-8 left-1/2 -translate-x-1/2 bg-[#2A1D15] text-[#FDFCFB] px-8 py-4 rounded-full shadow-2xl flex items-center gap-8 z-40 animate-in slide-in-from-bottom-4 border border-[#4A3B32]">
              <div className="flex items-center gap-3">
                <i className="ph-fill ph-calculator text-[#D2B48C]" style={{fontSize: 20}}></i>
                <span className="text-sm font-bold"><span className="text-[#D2B48C] text-lg mr-1">{selectedItems.length}</span>개 선택됨</span>
              </div>
              <div className="w-px h-6 bg-[#4A3B32]" />
              <div className="flex items-center gap-4">
                <span className="text-xs font-bold text-[#A69C8E] uppercase tracking-widest">잔고 반영 합산</span>
                <span className={`text-2xl font-black font-mono tracking-tight ${selectedSum >= 0 ? 'text-[#81C784]' : 'text-[#E57373]'}`}>
                  {selectedSum > 0 ? '+' : ''}{formatCurrency(selectedSum)}
                </span>
              </div>
              <button onClick={() => setSelectedBlocks([])} className="ml-2 p-2 bg-[#4A3B32] hover:bg-[#6B4423] rounded-full transition-colors text-white">
                <i className="ph-bold ph-x" style={{fontSize: 18}}></i>
              </button>
            </div>
          )}

          {/* --- 모달: 금액 나누기 (Split) --- */}
          {splitModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/80 backdrop-blur-sm" onClick={() => setSplitModal({ isOpen: false, targetType: null, blockId: null, subItemId: null, childId: null, sourceAmount: 0, amountInput: '', label: '' })}>
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]" onClick={(e) => e.stopPropagation()}>
                <div className="flex justify-between items-center p-5 border-b border-[#EFEBE4] bg-[#FDFCFB]">
                  <h3 className="font-extrabold text-[#3D2B1F] text-base flex items-center gap-2">
                    <i className="ph-bold ph-scissors text-[#8B5A2B]" style={{fontSize: 18}}></i> 금액 나누기 (분할)
                  </h3>
                  <button onClick={() => setSplitModal({ isOpen: false, targetType: null, blockId: null, subItemId: null, childId: null, sourceAmount: 0, amountInput: '', label: '' })} className="p-1.5 hover:bg-[#EFEBE4] rounded-full text-[#A69C8E]"><i className="ph-bold ph-x" style={{fontSize: 18}}></i></button>
                </div>
                
                <form onSubmit={executeSplit} className="p-6">
                  <div className="mb-4 text-sm text-[#6D5443] font-bold text-center bg-[#F9F6F0] p-4 rounded-lg border border-[#DFD8CE]">
                    <div className="text-[11px] text-[#A69C8E] mb-1">{splitModal.label}</div>
                    기존 금액: <span className="font-mono text-xl text-[#2A1D15] font-black block mt-1">{formatCurrency(splitModal.sourceAmount)}</span>
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">분리해 낼 금액</label>
                    <input 
                      type="text" required autoFocus
                      value={splitModal.amountInput} 
                      onChange={handleSplitAmountChange} 
                      className="w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-xl font-mono font-black text-right focus:outline-none focus:border-[#8B5A2B] transition-colors" 
                      placeholder="0"
                    />
                  </div>

                  <button type="submit" className="w-full py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold flex items-center justify-center gap-2 transition-colors shadow-md">
                    <i className="ph-bold ph-arrows-split" style={{fontSize: 16}}></i> 나누기 확정
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* --- 모달: 현장 설정 --- */}
          {settingsModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/80 backdrop-blur-sm">
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]">
                <div className="flex justify-between items-center p-5 border-b border-[#EFEBE4] bg-[#FDFCFB]">
                  <h3 className="font-extrabold text-[#3D2B1F] text-base flex items-center gap-2">
                    <i className="ph-fill ph-gear text-[#8B5A2B]" style={{fontSize: 18}}></i> 현장 환경 설정
                  </h3>
                  <button onClick={() => setSettingsModal({isOpen:false})} className="p-1.5 hover:bg-[#EFEBE4] rounded-full text-[#A69C8E]"><i className="ph-bold ph-x" style={{fontSize: 18}}></i></button>
                </div>
                
                <form onSubmit={saveSettings} className="p-6">
                  <div className="space-y-4 mb-6">
                    <div>
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-1.5 uppercase">현장명 (주제)</label>
                      <input type="text" required value={settingsModal.accountData.name} onChange={(e) => setSettingsModal(p => ({...p, accountData: {...p.accountData, name: e.target.value}}))} className="w-full border border-[#DFD8CE] rounded-lg p-2.5 text-sm font-bold text-[#2A1D15] focus:border-[#8B5A2B] focus:outline-none"/>
                    </div>
                    <div>
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-1.5 uppercase">은행</label>
                      <input type="text" value={settingsModal.accountData.bank} onChange={(e) => setSettingsModal(p => ({...p, accountData: {...p.accountData, bank: e.target.value}}))} className="w-full border border-[#DFD8CE] rounded-lg p-2.5 text-sm font-bold text-[#2A1D15] focus:border-[#8B5A2B] focus:outline-none"/>
                    </div>
                    <div>
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-1.5 uppercase">계좌번호</label>
                      <input type="text" value={settingsModal.accountData.accountNo} onChange={(e) => setSettingsModal(p => ({...p, accountData: {...p.accountData, accountNo: e.target.value}}))} className="w-full border border-[#DFD8CE] rounded-lg p-2.5 text-sm font-mono font-bold text-[#2A1D15] focus:border-[#8B5A2B] focus:outline-none"/>
                    </div>
                    <div>
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-1.5 uppercase">카드 보유자</label>
                      <input type="text" value={settingsModal.accountData.cardHolder || ''} onChange={(e) => setSettingsModal(p => ({...p, accountData: {...p.accountData, cardHolder: e.target.value}}))} className="w-full border border-[#DFD8CE] rounded-lg p-2.5 text-sm font-bold text-[#2A1D15] focus:border-[#8B5A2B] focus:outline-none" placeholder="예: 이사님, 대표"/>
                    </div>
                  </div>

                  <div className="mb-8">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-3 uppercase flex items-center gap-1"><i className="ph-fill ph-palette" style={{fontSize: 14}}></i> 패널 테마 색상 (전체 톤 변경)</label>
                    <div className="grid grid-cols-2 gap-2">
                      {Object.keys(COLUMN_THEMES).map(key => (
                        <button
                          key={key} type="button"
                          onClick={() => setSettingsModal(p => ({...p, accountData: {...p.accountData, theme: key}}))}
                          className={`
                            py-2 px-3 rounded-lg border-2 text-xs font-bold transition-all flex items-center justify-center gap-2
                            ${COLUMN_THEMES[key].light} ${COLUMN_THEMES[key].text}
                            ${settingsModal.accountData.theme === key ? `border-[#8B5A2B] ring-2` : 'border-transparent'}
                          `}
                        >
                          <div className={`w-3 h-3 rounded-full ${COLUMN_THEMES[key].bg}`}></div>
                          {COLUMN_THEMES[key].label}
                        </button>
                      ))}
                    </div>
                  </div>

                  <button type="submit" className="w-full py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold flex items-center justify-center gap-2 transition-colors shadow-md">
                    <i className="ph-fill ph-floppy-disk" style={{fontSize: 16}}></i> 설정 저장
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* --- 모달: 월 마감 --- */}
          {closeMonthModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/80 backdrop-blur-sm">
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]">
                <div className="p-6 bg-[#FCFAF8] border-b border-[#EFEBE4] text-center">
                  <div className="w-12 h-12 bg-[#EFEBE4] text-[#8B5A2B] rounded-full flex items-center justify-center mx-auto mb-3">
                    <i className="ph-fill ph-calendar-check" style={{fontSize: 24}}></i>
                  </div>
                  <h3 className="font-extrabold text-[#3D2B1F] text-lg">월별 결산 확정 (저장)</h3>
                  <p className="text-xs font-bold text-[#A69C8E] mt-1">{(accountsData.find(a => a.id === closeMonthModal.accountId) || {}).name}</p>
                </div>
                
                <form onSubmit={executeCloseMonth} className="p-6">
                  <p className="text-sm text-[#6D5443] mb-5 font-bold leading-relaxed text-center bg-[#F9F6F0] p-3 rounded-lg border border-[#DFD8CE]">
                    현재 보드에 등록된 <span className="text-[#8B5A2B]">모든 박스의 항목과 금액 그대로</span> 결산서에 복사하여 보관합니다.<br/><span className="text-[10px] text-[#A69C8E]">(보드 내역은 초기화되지 않습니다)</span>
                  </p>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">결산 월 라벨</label>
                    <input type="text" required value={closeMonthModal.monthLabel} onChange={(e) => setCloseMonthModal(p => ({ ...p, monthLabel: e.target.value }))} className="w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-sm font-bold text-[#2A1D15] focus:outline-none focus:border-[#8B5A2B] text-center"/>
                  </div>

                  <div className="flex gap-3">
                    <button type="button" onClick={() => setCloseMonthModal({ isOpen: false })} className="flex-1 py-3 text-[#6D5443] bg-[#EFEBE4] hover:bg-[#DFD8CE] rounded-xl text-sm font-extrabold transition-colors">취소</button>
                    <button type="submit" className="flex-[2] py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold transition-colors shadow-md">내역 복사 및 저장</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* --- 모달: 결산 내역서 --- */}
          {reportModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-[#2A1D15]/80 backdrop-blur-sm">
              <div className="bg-[#FDFCFB] rounded-2xl w-[95vw] shadow-2xl overflow-hidden flex flex-col h-[90vh] animate-in zoom-in-95 border border-[#E6E0D4]">
                
                <div className="px-6 py-5 border-b border-[#E6E0D4] bg-white flex justify-between items-center shrink-0">
                  <div className="flex items-center gap-3">
                    <div className="p-2.5 bg-[#EFEBE4] text-[#8B5A2B] rounded-lg">
                      <i className="ph-fill ph-file-text" style={{fontSize: 20}}></i>
                    </div>
                    <div>
                      <h3 className="font-black text-[#2A1D15] text-xl tracking-tight">월별 결산 내역서</h3>
                      <p className="text-xs font-bold text-[#8B5A2B] mt-0.5">{(accountsData.find(a => a.id === reportModal.accountId) || {}).name} 누적 장부</p>
                    </div>
                  </div>
                  <button onClick={closeModals} className="p-2 bg-[#EFEBE4] hover:bg-[#DFD8CE] rounded-full text-[#6D5443] transition-colors"><i className="ph-bold ph-x" style={{fontSize: 20}}></i></button>
                </div>

                <div className="flex flex-1 overflow-x-auto p-8 gap-6 bg-[#F5F2EC] custom-scrollbar items-start">
                  {(() => {
                    const reportAccount = accountsData.find(a => a.id === reportModal.accountId);
                    const reports = reportAccount ? (reportAccount.reportData || []) : [];
                    
                    if (reports.length === 0) {
                      return (
                        <div className="w-full h-full flex flex-col items-center justify-center text-[#A69C8E]">
                          <i className="ph-fill ph-chart-bar mb-4 opacity-50" style={{fontSize: 48}}></i>
                          <p className="font-bold text-lg">저장된 결산 기록이 없습니다.</p>
                          <p className="text-sm mt-2">메인 보드에서 [월 마감]을 통해 결산을 저장해보세요.</p>
                        </div>
                      );
                    }

                    return reports.map(activeReport => {
                      const reportTotal = activeReport.blocks.reduce((sum, b) => sum + getEffectiveAmount(b), 0);
                      
                      return (
                        <div key={activeReport.id} className="w-[400px] shrink-0 bg-white border border-[#E6E0D4] rounded-2xl shadow-md flex flex-col max-h-full">
                          <div className="p-5 border-b border-[#E6E0D4] flex justify-between items-end shrink-0 bg-[#FCFAF8] rounded-t-2xl">
                            <h2 className="text-2xl font-black text-[#2A1D15]">{activeReport.month}</h2>
                            <div className="text-right">
                              <p className="text-[10px] font-extrabold text-[#A69C8E] uppercase tracking-widest">최종 결산액</p>
                              <p className={`text-2xl font-black font-mono tracking-tight ${reportTotal >= 0 ? 'text-[#2E7D32]' : 'text-[#C62828]'}`}>
                                {reportTotal > 0 ? '+' : ''}{formatCurrency(reportTotal)}
                              </p>
                            </div>
                          </div>
                          <div className="flex-1 overflow-y-auto p-4 custom-scrollbar flex flex-col gap-2">
                            {activeReport.blocks.map(block => {
                              const tagColor = COLOR_TAGS[block.color] || COLOR_TAGS['none'];
                              const isPlanned = !!block.isPlanned;
                              const hasSubItems = block.subItems && block.subItems.length > 0;
                              const blockAmount = getBlockAmount(block);
                              return (
                                <div key={block.id} className={`relative flex flex-col border rounded-xl shadow-sm hover:shadow-md transition-shadow group p-1 ${tagColor.bg} ${tagColor.border}`}>
                                  <div className="flex items-center gap-2 p-2">
                                    <div className="flex-1 flex gap-2 items-center">
                                      <input 
                                        type="text" value={block.label}
                                        onChange={(e) => handleReportBlockChange(activeReport.id, block.id, 'label', e.target.value)}
                                        className="flex-1 w-0 bg-transparent font-extrabold text-[14px] text-[#2A1D15] border-b border-transparent focus:border-[#DFD8CE] hover:border-black/10 px-1 py-1 focus:outline-none transition-colors"
                                        placeholder="항목/적요명"
                                      />
                                      {isPlanned && <span className="shrink-0 text-[10px] font-black px-1.5 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">외상</span>}
                                      <input 
                                        type="text" value={hasSubItems ? formatCurrency(blockAmount) : (block.amountString != null ? block.amountString : (block.amount === 0 ? '' : block.amount))}
                                        readOnly={hasSubItems}
                                        onChange={(e) => handleReportBlockChange(activeReport.id, block.id, 'amount', e.target.value)}
                                        className={`w-28 bg-transparent font-mono font-black text-right text-[15px] border-b border-transparent focus:border-[#DFD8CE] hover:border-black/10 px-1 py-1 focus:outline-none transition-colors ${getAmountTextClass(blockAmount, 'auto', isPlanned)} ${hasSubItems ? 'opacity-60 cursor-not-allowed' : ''}`}
                                        placeholder="0"
                                      />
                                    </div>
                                    <button onClick={() => deleteReportBlock(activeReport.id, block.id)} className="w-8 h-8 flex items-center justify-center text-[#A69C8E] hover:text-[#C62828] hover:bg-black/5 rounded-lg transition-colors opacity-0 group-hover:opacity-100 shrink-0">
                                      <i className="ph-bold ph-trash" style={{fontSize: 16}}></i>
                                    </button>
                                  </div>

                                  {hasSubItems && (
                                    <div className="px-3 pb-2 pt-0">
                                      <div className="border-t border-black/10 pt-2 space-y-1.5">
                                        {block.subItems.map((sub, idx) => {
                                          const childItems = getChildItems(sub);
                                          const subAmount = getSubItemAmount(sub);
                                          return (
                                            <div key={idx} className="rounded-lg border border-[#E6E0D4] bg-white/70 px-2 py-1.5 text-[#6D5443] font-medium">
                                              <div className="flex justify-between items-center">
                                                <span className="truncate pr-2 flex items-center gap-1.5">
                                                  <i className="ph-bold ph-corner-down-right text-[#A69C8E]" style={{fontSize: 14}}></i>
                                                  <span className="text-[12px] font-bold text-[#3D2B1F]">{sub.label || '내용 없음'}</span>
                                                </span>
                                                <div className="flex items-center gap-2">
                                                  <span className={`text-[12px] font-mono font-bold ${getAmountTextClass(subAmount, sub.amountColor || 'auto', sub.isPlanned)}`}>
                                                    {subAmount > 0 ? '+' : ''}{formatCurrency(subAmount)}
                                                  </span>
                                                  {sub.isPlanned && <span className="text-[10px] font-black px-1.5 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">외상</span>}
                                                </div>
                                              </div>
                                              {childItems.length > 0 && (
                                                <div className="mt-1.5 ml-3 space-y-1 border-l-2 border-[#EFEBE4] pl-2">
                                                  {childItems.map((child, childIdx) => (
                                                    <div key={childIdx} className="flex justify-between items-center gap-2">
                                                      <span className="truncate flex items-center gap-1.5">
                                                        <i className="ph-bold ph-arrow-elbow-down-right text-[#D2B48C]" style={{fontSize: 12}}></i>
                                                        <span className="text-[11px] font-bold text-[#6D5443]">{child.label || '소분류 없음'}</span>
                                                      </span>
                                                      <div className="flex items-center gap-1.5 shrink-0">
                                                        <span className={`text-[11px] font-mono font-bold ${getAmountTextClass(child.amount, child.amountColor || 'auto', child.isPlanned)}`}>
                                                          {child.amount > 0 ? '+' : ''}{formatCurrency(child.amount)}
                                                        </span>
                                                        {child.isPlanned && <span className="text-[9px] font-black px-1 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">외상</span>}
                                                      </div>
                                                    </div>
                                                  ))}
                                                </div>
                                              )}
                                            </div>
                                          );
                                        })}
                                      </div>
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                            <button onClick={() => addReportBlock(activeReport.id)} className="mt-2 w-full py-3.5 border-2 border-dashed border-[#DFD8CE] text-[#8B5A2B] rounded-xl text-sm font-bold hover:bg-[#F9F6F0] hover:border-[#B39977] transition-colors flex items-center justify-center gap-2">
                              <i className="ph-bold ph-plus" style={{fontSize: 16}}></i> 누락된 내역 행 추가
                            </button>
                          </div>

                          <div className="p-4 border-t border-[#E6E0D4] bg-[#FCFAF8] rounded-b-2xl shrink-0 flex justify-end">
                            <button onClick={() => deleteEntireReport(activeReport.id)} className="text-[11px] font-bold text-[#C62828] hover:underline flex items-center gap-1 px-2 py-1">
                              <i className="ph-bold ph-trash" style={{fontSize: 12}}></i> 이 달의 결산 삭제
                            </button>
                          </div>
                        </div>
                      );
                    });
                  })()}
                </div>
              </div>
            </div>
          )}

          {/* --- 💡 모달: 메인 블록 생성/수정 --- */}
          {modal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/60 backdrop-blur-sm" onContextMenu={(e) => { e.preventDefault(); e.stopPropagation(); }}>
              <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]">
                
                <div className="flex justify-between items-center p-5 border-b border-[#EFEBE4] bg-[#FDFCFB]">
                  <h3 className="font-extrabold text-[#3D2B1F] text-base flex items-center gap-2">
                    {modal.mode === 'create' ? <i className="ph-fill ph-plus-circle text-[#8B5A2B]" style={{fontSize: 18}}></i> : <i className="ph-bold ph-pencil-simple text-[#8B5A2B]" style={{fontSize: 18}}></i>}
                    {modal.mode === 'create' ? '신규 자금 내역' : '자금 내역 수정'}
                  </h3>
                  <button onClick={closeModals} className="p-1.5 hover:bg-[#EFEBE4] rounded-full text-[#A69C8E]"><i className="ph-bold ph-x" style={{fontSize: 18}}></i></button>
                </div>

                <form onSubmit={saveBlock} className="p-6 max-h-[75vh] overflow-y-auto custom-scrollbar">
                  
                  <div className="mb-5 flex flex-col sm:flex-row gap-3">
                    <div className="flex-[2]">
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">항목 박스 이름</label>
                      <input type="text" required value={modal.blockData.label} onChange={(e) => setModal(p => ({...p, blockData: {...p.blockData, label: e.target.value}}))} className="w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-sm font-bold text-[#2A1D15] focus:outline-none focus:border-[#8B5A2B] transition-colors" placeholder="예: 건축주 입금액, 장비대금 등"/>
                    </div>
                    {/* 💡 자체 금액 입력칸: 하위 항목이 있으면 숨김 */}
                    {(!modal.blockData.subItems || modal.blockData.subItems.length === 0) && (
                      <div className="flex-1">
                        <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase text-right">자체 금액</label>
                        <input 
                          type="text" required
