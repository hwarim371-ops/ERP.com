<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>화림 ERP</title>
  
  <!-- 오류 자동 감지 스크립트 -->
  <script>
    window.addEventListener('error', function(event) {
      if (event.message === 'Script error.') {
        console.warn('외부 스크립트 오류가 감지되었지만 앱 화면은 계속 표시합니다.', event);
        return;
      }
      const errorDiv = document.createElement('div');
      errorDiv.style.cssText = 'position:fixed; top:0; left:0; width:100%; background:#C62828; color:white; padding:15px; z-index:9999; font-weight:bold; font-family:sans-serif; box-shadow:0 4px 6px rgba(0,0,0,0.3);';
      errorDiv.innerHTML = '🚨 앱 실행 오류 발생: <br/><br/>' + event.message + '<br/><br/>위치: ' + (event.filename || '앱 내부') + ':' + (event.lineno || '-') + '<br/><br/>👉 코드가 잘못 복사되었거나 외부 라이브러리 로딩이 막혔는지 확인해 주세요!';
      document.body.prepend(errorDiv);
    });
  </script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (브라우저 컴파일러) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #DFD8CE; border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #B39977; }
    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; margin: 0; padding: 0; background-color: #F5F2EC; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // =====================================================================
    // ⚠️ 대표님의 구글 앱스 스크립트 URL (미리 삽입해두었습니다!) ⚠️
    // =====================================================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyzmdTEBrfbcJsuvr29xOhaemgR3dUsHr8DybTq48dJADT7nHXRTcADK8kafHrdz3tK/exec";
    
    // --- 전역 설정 및 초기 데이터 ---
    const COLUMN_THEMES = {
      wood: { label: '클래식 우드', text: 'text-[#8B5A2B]', bg: 'bg-[#8B5A2B]', light: 'bg-[#EFEBE4]', hover: 'hover:bg-[#DFD8CE]', border: 'border-[#8B5A2B]', ring: 'ring-[#8B5A2B]', panelBg: 'bg-[#F4EBE1]' },
      ocean: { label: '오션 블루', text: 'text-[#0277BD]', bg: 'bg-[#0277BD]', light: 'bg-[#E1F5FE]', hover: 'hover:bg-[#B3E5FC]', border: 'border-[#0277BD]', ring: 'ring-[#0277BD]', panelBg: 'bg-[#E6F3FA]' },
      forest: { label: '포레스트 그린', text: 'text-[#2E7D32]', bg: 'bg-[#2E7D32]', light: 'bg-[#E8F5E9]', hover: 'hover:bg-[#C8E6C9]', border: 'border-[#2E7D32]', ring: 'ring-[#2E7D32]', panelBg: 'bg-[#E9F5EA]' },
      wine: { label: '와인 레드', text: 'text-[#880E4F]', bg: 'bg-[#880E4F]', light: 'bg-[#FCE4EC]', hover: 'hover:bg-[#F8BBD0]', border: 'border-[#880E4F]', ring: 'ring-[#880E4F]', panelBg: 'bg-[#F8EAF0]' },
      slate: { label: '모던 슬레이트', text: 'text-[#455A64]', bg: 'bg-[#455A64]', light: 'bg-[#ECEFF1]', hover: 'hover:bg-[#CFD8DC]', border: 'border-[#455A64]', ring: 'ring-[#455A64]', panelBg: 'bg-[#EAECEE]' },
    };

    const COLOR_TAGS = {
      none: { bg: 'bg-white', border: 'border-[#DFD8CE]' },
      wood: { bg: 'bg-[#F7EFE6]', border: 'border-[#8B5A2B]' }, 
      sand: { bg: 'bg-[#FDF6E9]', border: 'border-[#D2B48C]' },
      forest: { bg: 'bg-[#EBF5EC]', border: 'border-[#4A5D23]' },
      clay: { bg: 'bg-[#FDECE8]', border: 'border-[#C16644]' },
      stone: { bg: 'bg-[#F5F5F5]', border: 'border-[#7A7873]' },
    };

    const SUBITEM_AMOUNT_COLORS = {
      auto: { label: '자동', text: '', swatch: 'bg-gradient-to-r from-[#2E7D32] to-[#C62828]' },
      green: { label: '초록', text: 'text-[#2E7D32]', swatch: 'bg-[#2E7D32]' },
      red: { label: '빨강', text: 'text-[#C62828]', swatch: 'bg-[#C62828]' },
      yellow: { label: '노랑', text: 'text-[#B7791F]', swatch: 'bg-[#F2C94C]' },
      blue: { label: '파랑', text: 'text-[#0277BD]', swatch: 'bg-[#0277BD]' },
      brown: { label: '갈색', text: 'text-[#8B5A2B]', swatch: 'bg-[#8B5A2B]' },
      black: { label: '검정', text: 'text-[#111827]', swatch: 'bg-[#111827]' },
      slate: { label: '회색', text: 'text-[#455A64]', swatch: 'bg-[#455A64]' },
    };
    const SUBITEM_COLOR_ORDER = Object.keys(SUBITEM_AMOUNT_COLORS);

    const DEFAULT_CARD_HOLDERS = {
      main: '대표',
      jecheon1: '이사님',
      miryang: '대표',
      jecheon2: '이사님',
    };

    function HwarimLogo() {
      return (
        <div className="w-[96px] h-[46px] rounded-lg border border-[#D2B48C] overflow-hidden shadow-inner bg-[#D8B27A] shrink-0">
          <svg viewBox="0 0 160 76" className="w-full h-full" role="img" aria-label="화림 로고">
            <defs>
              <linearGradient id="woodLogoBg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stopColor="#E7C28B" />
                <stop offset="100%" stopColor="#C79255" />
              </linearGradient>
            </defs>
            <rect width="160" height="76" fill="url(#woodLogoBg)" />
            <path d="M15 18 C45 13, 72 23, 103 14 C122 9, 141 13, 158 20" stroke="#B07C46" strokeWidth="2" fill="none" opacity="0.35" />
            <path d="M2 58 C37 47, 72 63, 112 50 C132 44, 146 47, 160 54" stroke="#9A6A3A" strokeWidth="2" fill="none" opacity="0.3" />
            <g stroke="#3B2418" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" fill="none">
              <path d="M38 59 V25" />
              <path d="M50 59 V18" />
              <path d="M62 59 V28" />
              <path d="M50 28 C41 22, 36 16, 34 10" />
              <path d="M50 31 C61 22, 66 16, 71 8" />
              <path d="M39 39 C31 34, 25 30, 21 23" />
              <path d="M62 39 C72 33, 79 27, 84 19" />
              <path d="M31 48 C24 45, 19 42, 15 37" />
              <path d="M70 49 C78 45, 85 41, 91 35" />
            </g>
            <g fill="#3B2418">
              <ellipse cx="28" cy="20" rx="3" ry="6" transform="rotate(-35 28 20)" />
              <ellipse cx="73" cy="16" rx="3" ry="6" transform="rotate(35 73 16)" />
              <ellipse cx="18" cy="35" rx="3" ry="5" transform="rotate(-48 18 35)" />
              <ellipse cx="88" cy="31" rx="3" ry="5" transform="rotate(45 88 31)" />
              <ellipse cx="45" cy="12" rx="3" ry="5" />
            </g>
            <text x="94" y="32" fontFamily="Malgun Gothic, sans-serif" fontSize="12" fontWeight="800" fill="#3B2418">조화로움이</text>
            <text x="98" y="47" fontFamily="Malgun Gothic, sans-serif" fontSize="12" fontWeight="800" fill="#3B2418">숲을 이룬다</text>
            <text x="92" y="66" fontFamily="Malgun Gothic, sans-serif" fontSize="29" fontWeight="900" fill="#3B2418">화림</text>
          </svg>
        </div>
      );
    }

    const INITIAL_ACCOUNTS = [
      { id: 'main', name: '화림 법인 (메인)', bank: '우리은행', accountNo: '1005-704-610473', icon: 'ph-fill ph-buildings', theme: 'wood', cardHolder: '대표', reportData: [] },
      { id: 'jecheon1', name: '제천1 (오차드블리드)', bank: '우리은행', accountNo: '1005-504-710497', icon: 'ph-fill ph-hard-hat', theme: 'forest', cardHolder: '이사님', reportData: [] },
      { id: 'miryang', name: '밀양 (다시,또 여기)', bank: '기업은행', accountNo: '587-076008-04-011', icon: 'ph-fill ph-hard-hat', theme: 'ocean', cardHolder: '대표', reportData: [] },
      { id: 'jecheon2', name: '제천2 (덕동골)', bank: '우리은행', accountNo: '1005-804-800910', icon: 'ph-fill ph-hard-hat', theme: 'wine', cardHolder: '이사님', reportData: [] },
    ];

    const INITIAL_BLOCKS = [
      { id: 'b1', accountId: 'main', label: '매출(세금계산서)', amount: 577257465, color: 'wood', subItems: [] },
      { id: 'b2', accountId: 'main', label: '화림 수수료 수취', amount: 60100000, color: 'forest', subItems: [] },
      { id: 'b4', accountId: 'jecheon1', label: '총 매출/대출 등', amount: 399779948, color: 'wood', subItems: [] },
      { id: 'b5', accountId: 'jecheon1', label: '매입 계산서 지출', amount: -159116581, color: 'none', subItems: [] },
      { id: 'b8', accountId: 'miryang', label: '건축주 입금액', amount: 242405000, color: 'sand', subItems: [] },
      { id: 'b9', accountId: 'miryang', label: '외주 미수금', amount: -294300296, color: 'clay', subItems: [] },
      { id: 'b11', accountId: 'jecheon2', label: '대출금', amount: 54000000, color: 'stone', subItems: [] },
      { id: 'b12', accountId: 'jecheon2', label: '건축주 입금', amount: 20000000, color: 'wood', subItems: [] },
      { id: 'b14', accountId: 'jecheon2', label: '박찬수 부장님 대납', amount: -2750000, color: 'clay', subItems: [] },
    ];

    function App() {
      const [accountsData, setAccountsData] = useState(INITIAL_ACCOUNTS);
      const [blocks, setBlocks] = useState(INITIAL_BLOCKS);
      
      const [draggedBlockId, setDraggedBlockId] = useState(null);
      const [draggedAccountId, setDraggedAccountId] = useState(null);
      const [mergeTargetId, setMergeTargetId] = useState(null);
      const [selectedBlocks, setSelectedBlocks] = useState([]);
      
      const [modal, setModal] = useState({ isOpen: false, mode: 'create', blockData: null, amountInput: '' });
      const [splitModal, setSplitModal] = useState({ isOpen: false, block: null, amountInput: '' });
      const [reportModal, setReportModal] = useState({ isOpen: false, accountId: null });
      const [closeMonthModal, setCloseMonthModal] = useState({ isOpen: false, accountId: null, monthLabel: '' });
      const [settingsModal, setSettingsModal] = useState({ isOpen: false, accountData: null });
      const [isSyncing, setIsSyncing] = useState(false);
      const [isInitialLoading, setIsInitialLoading] = useState(true);
      const [lastSavedAt, setLastSavedAt] = useState(null);
      const [collapsedSubItems, setCollapsedSubItems] = useState([]);
      const [draggedModalSubItemId, setDraggedModalSubItemId] = useState(null);
      const [draggedModalChild, setDraggedModalChild] = useState(null);

      const formatCurrency = (amount) => new Intl.NumberFormat('ko-KR').format(amount || 0);
      const twoDigits = (value) => String(value).padStart(2, '0');
      const formatLastSavedAt = (value) => {
        if (!value) return '저장 기록 없음';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '저장 시간 확인 필요';
        return `${date.getFullYear()}년 ${twoDigits(date.getMonth() + 1)}월 ${twoDigits(date.getDate())}일 ${twoDigits(date.getHours())}시 ${twoDigits(date.getMinutes())}분 데이터`;
      };
      const getAmountValue = (item) => Number(item && item.amount) || 0;
      const getChildItems = (item) => (item && item.childItems) ? item.childItems : [];
      const getSubItemAmount = (item) => {
        const childItems = getChildItems(item);
        if (childItems.length > 0) {
          return childItems.reduce((sum, child) => sum + getAmountValue(child), 0);
        }
        return getAmountValue(item);
      };
      const getBlockAmount = (item) => {
        if (item && item.subItems && item.subItems.length > 0) {
          return item.subItems.reduce((sum, sub) => sum + getSubItemAmount(sub), 0);
        }
        return getAmountValue(item);
      };
      const getEffectiveAmount = (item) => {
        if (!item || item.isPlanned) return 0;
        if (item.subItems && item.subItems.length > 0) {
          return item.subItems.reduce((sum, sub) => sum + (sub.isPlanned ? 0 : getSubItemAmount(sub)), 0);
        }
        return getAmountValue(item);
      };
      const getAmountTextClass = (amount, colorKey = 'auto', isPlanned = false) => {
        if (isPlanned) return 'text-[#8B5A2B]';
        if (colorKey && colorKey !== 'auto' && SUBITEM_AMOUNT_COLORS[colorKey]) return SUBITEM_AMOUNT_COLORS[colorKey].text;
        return amount >= 0 ? 'text-[#2E7D32]' : 'text-[#C62828]';
      };
      const getCardHolders = (account) => {
        const text = (account && (account.cardHolder || DEFAULT_CARD_HOLDERS[account.id])) || '';
        return text.split(/[,，\/|]+/).map(name => name.trim()).filter(Boolean);
      };
      const normalizeSubItem = (item) => {
        const childItems = item.childItems ? item.childItems.map(child => ({ ...child, amountColor: child.amountColor || 'auto' })) : [];
        const childTotal = childItems.reduce((sum, child) => sum + getAmountValue(child), 0);
        return {
          ...item,
          amount: childItems.length > 0 ? childTotal : getAmountValue(item),
          amountString: childItems.length > 0 ? String(childTotal) : item.amountString,
          amountColor: item.amountColor || 'auto',
          childItems
        };
      };
      const normalizeBlock = (block) => {
        const subItems = block.subItems ? block.subItems.map(item => normalizeSubItem(item)) : [];
        const amount = subItems.length > 0 ? subItems.reduce((sum, item) => sum + getSubItemAmount(item), 0) : getAmountValue(block);
        return { ...block, amount, subItems };
      };
      const updateModalSubItems = (prev, newSubItems) => {
        const newTotalAmount = newSubItems.reduce((sum, item) => sum + getSubItemAmount(item), 0);
        return { ...prev, amountInput: formatCurrency(newTotalAmount), blockData: { ...prev.blockData, subItems: newSubItems, amount: newTotalAmount } };
      };

      // --- 🌐 클라우드 데이터 불러오기 (GET) ---
      useEffect(() => {
        if (!GAS_URL || GAS_URL.includes("여기에")) {
          setIsInitialLoading(false);
          return;
        }
        
        fetch(GAS_URL)
          .then(async res => {
            const text = await res.text();
            try {
              return JSON.parse(text); // 정상적인 JSON 데이터인지 확인
            } catch (e) {
              // HTML 등 다른 내용이 오면 권한 오류로 간주
              throw new Error("GAS_PERMISSION_ERROR");
            }
          })
          .then(data => {
            if (data && Object.keys(data).length > 0) {
              if (Array.isArray(data.accountsData)) setAccountsData(data.accountsData);
              if (Array.isArray(data.blocks)) setBlocks(data.blocks.map(block => normalizeBlock(block)));
              if (data.lastSavedAt) setLastSavedAt(data.lastSavedAt);
            }
            setIsInitialLoading(false);
          })
          .catch(err => {
            console.error("데이터 불러오기 실패:", err);
            if (err.message === "GAS_PERMISSION_ERROR" || err.message.includes('Failed to fetch')) {
               alert("⚠️ 구글 시트 접근 권한 오류!\n\n구글 스크립트 배포 시 [액세스 권한]이 '모든 사용자'로 설정되지 않았습니다. 앱이 정상 작동하지 않을 수 있으니 권한을 확인해 주세요.");
            }
            setIsInitialLoading(false);
          });
      }, []);

      // --- 🌐 클라우드에 데이터 저장하기 (POST) ---
      const syncToCloud = async () => {
        if (!GAS_URL || GAS_URL.includes("여기에")) {
          return alert("구글 스크립트 웹앱 URL이 입력되지 않았습니다!");
        }
          setIsSyncing(true);
          try {
            const savedAt = new Date().toISOString();
            const payload = { accountsData, blocks: blocks.map(block => normalizeBlock(block)), lastSavedAt: savedAt };
          await fetch(GAS_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
          });
          setLastSavedAt(savedAt);
          alert("✅ 구글 시트에 안전하게 백업 및 동기화되었습니다!");
        } catch (err) {
          alert("❌ 동기화 중 오류가 발생했습니다. 권한 설정을 확인해주세요.");
          console.error(err);
        } finally {
          setIsSyncing(false);
        }
      };

      /* --- 블록 다중 선택 로직 --- */
      const handleBlockClick = (e, blockId) => {
        if (e.target.closest('.no-select-trigger')) return;
        if (e.ctrlKey || e.metaKey) {
          setSelectedBlocks(prev => prev.includes(blockId) ? prev.filter(id => id !== blockId) : [...prev, blockId]);
        } else {
          setSelectedBlocks(prev => (prev.length === 1 && prev[0] === blockId) ? [] : [blockId]);
        }
      };

      const handleBgClick = (e) => {
        if (!e.target.closest('.block-item') && !e.target.closest('.selection-bar')) setSelectedBlocks([]);
      };

      const selectedSum = useMemo(() => {
        return blocks.filter(b => selectedBlocks.includes(b.id)).reduce((sum, b) => sum + getEffectiveAmount(b), 0);
      }, [blocks, selectedBlocks]);

      /* --- 드래그 앤 드롭 및 병합 --- */
      const handleDragStart = (e, blockId) => {
        setDraggedBlockId(blockId);
        if(e.dataTransfer) {
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', blockId);
        }
        setTimeout(() => { if (e.target) e.target.style.opacity = '0.5'; }, 0);
      };
      
      const handleDragEnd = (e) => {
        if (e.target) e.target.style.opacity = '1';
        setDraggedBlockId(null);
        setMergeTargetId(null);
      };

      const handleDragOverBlock = (e, blockId) => {
        e.preventDefault(); e.stopPropagation();
        if (draggedBlockId && draggedBlockId !== blockId) setMergeTargetId(blockId);
      };

      const handleDragLeaveBlock = () => {
        setMergeTargetId(null);
      };

      const handleDropOnBlock = (e, targetAccountId, targetBlockId) => {
        e.preventDefault(); e.stopPropagation();
        setMergeTargetId(null);
        if (!draggedBlockId || draggedBlockId === targetBlockId) return;

        setBlocks(prev => {
          const rawSource = prev.find(b => b.id === draggedBlockId);
          if (!rawSource) return prev;
          const source = normalizeBlock(rawSource);
          const newBlocks = prev.filter(b => b.id !== draggedBlockId);
          return newBlocks.map(b => {
            if (b.id === targetBlockId) {
              let newSubItems = b.subItems ? b.subItems.map(item => ({ ...normalizeSubItem(item), isPlanned: !!b.isPlanned || !!item.isPlanned })) : [];
              if (newSubItems.length === 0) {
                newSubItems.push({ id: `s_${Date.now()}_1`, label: '기존 금액', amount: b.amount, isPlanned: !!b.isPlanned, amountColor: 'auto', childItems: [] });
              }
              newSubItems.push({
                id: `s_${Date.now()}_2`,
                label: source.label,
                amount: getBlockAmount(source),
                isPlanned: !!source.isPlanned,
                amountColor: 'auto',
                childItems: source.subItems ? source.subItems.map(item => ({ id: `c_${Date.now()}_${item.id}`, label: item.label, amount: getSubItemAmount(item), amountColor: item.amountColor || 'auto' })) : []
              });
              const newTotal = newSubItems.reduce((sum, item) => sum + getSubItemAmount(item), 0);
              return { ...b, isPlanned: false, subItems: newSubItems, amount: newTotal };
            }
            return b;
          });
        });
      };

      /* --- 현장(통장) 패널 드래그 위치 변경 및 블록 이동 --- */
      const handleDropOnColumn = (e, targetAccountId) => {
        e.preventDefault();
        
        if (draggedAccountId) {
          e.stopPropagation();
          const draggedIdx = accountsData.findIndex(a => a.id === draggedAccountId);
          const targetIdx = accountsData.findIndex(a => a.id === targetAccountId);
          
          if (draggedIdx !== -1 && targetIdx !== -1 && draggedIdx !== targetIdx) {
            const newAccs = [...accountsData];
            const [removed] = newAccs.splice(draggedIdx, 1);
            newAccs.splice(targetIdx, 0, removed);
            setAccountsData(newAccs);
          }
          setDraggedAccountId(null);
          return;
        }

        setMergeTargetId(null);
        if (!draggedBlockId) return;

        setBlocks(prev => {
          const draggedBlock = prev.find(b => b.id === draggedBlockId);
          const newBlocks = prev.filter(b => b.id !== draggedBlockId);
          newBlocks.push({ ...draggedBlock, accountId: targetAccountId });
          return newBlocks;
        });
      };

      /* --- 금액 나누기 (Split) --- */
      const openSplitModal = (block) => {
        if (block.subItems && block.subItems.length > 0) {
          return alert("중분류가 포함된 박스는 한 번에 나눌 수 없습니다.\n먼저 중분류 내역을 밖으로 꺼낸(분리) 뒤 진행해 주세요.");
        }
        setSplitModal({ isOpen: true, block, amountInput: '' });
      };

      const handleSplitAmountChange = (e) => {
        let val = e.target.value.replace(/[^0-9]/g, '');
        setSplitModal(p => ({ ...p, amountInput: val ? formatCurrency(parseInt(val, 10)) : '' }));
      };

      const executeSplit = (e) => {
        e.preventDefault();
        const val = parseInt(splitModal.amountInput.replace(/[^0-9]/g, ''), 10);
        if (!val || val <= 0) return alert('분리해 낼 금액을 정확히 입력하세요.');
        
        const source = blocks.find(b => b.id === splitModal.block.id);
        const sign = source.amount >= 0 ? 1 : -1;
        const splitVal = val * sign;

        if (Math.abs(splitVal) >= Math.abs(source.amount)) {
          return alert('기존에 있던 금액보다 작은 금액만 떼어낼 수 있습니다.');
        }

        setBlocks(prev => {
          const newBlocks = prev.map(b => {
            if (b.id === source.id) return { ...b, amount: b.amount - splitVal };
            return b;
          });

          const targetIndex = newBlocks.findIndex(b => b.id === source.id);
          newBlocks.splice(targetIndex + 1, 0, {
            id: `b_${Date.now()}`,
            accountId: source.accountId,
            label: `${source.label} (분리됨)`,
            amount: splitVal,
            color: source.color,
            isPlanned: !!source.isPlanned,
            subItems: []
          });
          return newBlocks;
        });

        setSplitModal({ isOpen: false, block: null, amountInput: '' });
      };

      /* --- 중분류 밖으로 꺼내기 --- */
      const extractSubItem = (parentId, subItemId) => {
        setBlocks(prev => {
          const parent = prev.find(b => b.id === parentId);
          const subItem = parent.subItems.find(s => s.id === subItemId);
          const subItemAmount = getSubItemAmount(subItem);
          
          const newBlocks = prev.map(b => {
            if (b.id === parentId) {
              const newSubs = b.subItems.filter(s => s.id !== subItemId);
              const newAmt = newSubs.length > 0 ? newSubs.reduce((sum, item) => sum + getSubItemAmount(item), 0) : (b.amount - subItemAmount);
              return { ...b, subItems: newSubs, amount: newAmt };
            }
            return b;
          });

          const parentIndex = newBlocks.findIndex(b => b.id === parentId);
          newBlocks.splice(parentIndex + 1, 0, {
            id: `b_${Date.now()}_ext`,
            accountId: parent.accountId,
            label: subItem.label,
            amount: subItemAmount,
            color: parent.color || 'none',
            isPlanned: !!subItem.isPlanned,
            subItems: getChildItems(subItem).map(child => ({ ...child, childItems: [] }))
          });

          return newBlocks;
        });
      };

      /* --- 월 마감 (결산 저장) --- */
      const openCloseMonthModal = (accountId) => {
        const today = new Date();
        const defaultMonth = `${today.getFullYear()}. ${String(today.getMonth() + 1).padStart(2, '0')}월`;
        setCloseMonthModal({ isOpen: true, accountId, monthLabel: defaultMonth });
      };

      const executeCloseMonth = (e) => {
        e.preventDefault();
        const { accountId, monthLabel } = closeMonthModal;
        const accountBlocks = blocks.filter(b => b.accountId === accountId);
        
        const blocksSnapshot = accountBlocks.map(b => {
          const normalizedBlock = normalizeBlock(b);
          return {
            id: `snap_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`,
            label: normalizedBlock.label,
            amount: normalizedBlock.amount,
            color: normalizedBlock.color || 'none',
            isPlanned: !!normalizedBlock.isPlanned,
            subItems: normalizedBlock.subItems
          };
        });

        setAccountsData(prev => prev.map(acc => {
          if (acc.id === accountId) {
            const newReport = { id: `rep_${Date.now()}`, month: monthLabel, blocks: blocksSnapshot };
            return { ...acc, reportData: [newReport, ...(acc.reportData || [])] };
          }
          return acc;
        }));

        setCloseMonthModal({ isOpen: false, accountId: null, monthLabel: '' });
      };

      /* --- 가로 결산 상세 내역서 에디터 --- */
      const handleReportBlockChange = (reportId, blockId, field, value) => {
        setAccountsData(prev => prev.map(acc => {
          if (acc.id === reportModal.accountId) {
            return {
              ...acc,
              reportData: acc.reportData.map(rep => {
                if (rep.id === reportId) {
                  return {
                    ...rep,
                    blocks: rep.blocks.map(b => {
                      if (b.id === blockId) {
                        if (field === 'amount') {
                          let val = value.replace(/[^0-9-]/g, '');
                          if (val.lastIndexOf('-') > 0) val = val.replace(/-/g, '').replace(/^/, '-');
                          return { ...b, amountString: val, amount: parseInt(val, 10) || 0 };
                        }
                        return { ...b, [field]: value };
                      }
                      return b;
                    })
                  };
                }
                return rep;
              })
            };
          }
          return acc;
        }));
      };

      const addReportBlock = (reportId) => {
        setAccountsData(prev => prev.map(acc => {
          if (acc.id === reportModal.accountId) {
            return {
              ...acc,
              reportData: acc.reportData.map(rep => {
                if (rep.id === reportId) {
                  return {
                    ...rep,
                    blocks: [...rep.blocks, { id: `snap_${Date.now()}`, label: '', amount: 0, amountString: '', color: 'none', isPlanned: false, subItems: [] }]
                  };
                }
                return rep;
              })
            };
          }
          return acc;
        }));
      };

      const deleteReportBlock = (reportId, blockId) => {
        setAccountsData(prev => prev.map(acc => {
          if (acc.id === reportModal.accountId) {
            return {
              ...acc,
              reportData: acc.reportData.map(rep => {
                if (rep.id === reportId) {
                  return { ...rep, blocks: rep.blocks.filter(b => b.id !== blockId) };
                }
                return rep;
              })
            };
          }
          return acc;
        }));
      };

      const deleteEntireReport = (reportId) => {
        if(!confirm('이 결산월의 모든 내역을 삭제하시겠습니까?')) return;
        setAccountsData(prev => prev.map(acc => {
          if (acc.id === reportModal.accountId) {
            return { ...acc, reportData: acc.reportData.filter(r => r.id !== reportId) };
          }
          return acc;
        }));
      };

      /* --- 새로운 현장 추가 --- */
      const addNewAccount = () => {
        const newAcc = {
          id: `acc_${Date.now()}`,
          name: '새로운 현장',
          bank: '은행명',
          accountNo: '계좌번호 입력',
          icon: 'ph-fill ph-hard-hat',
          theme: 'slate',
          cardHolder: '이사님',
          reportData: []
        };
        setAccountsData([...accountsData, newAcc]);
      };

      const openSettingsModal = (account) => {
        setSettingsModal({ isOpen: true, accountData: { ...account, cardHolder: account.cardHolder || DEFAULT_CARD_HOLDERS[account.id] || '' } });
      };

      const saveSettings = (e) => {
        e.preventDefault();
        setAccountsData(prev => prev.map(acc => acc.id === settingsModal.accountData.id ? settingsModal.accountData : acc));
        setSettingsModal({ isOpen: false, accountData: null });
      };

      /* --- 메인 블록 생성/수정 --- */
      const openCreateModal = (accountId) => {
        setModal({ isOpen: true, mode: 'create', amountInput: '', blockData: { id: Date.now().toString(), accountId, label: '새 내역', amount: 0, color: 'none', isPlanned: false, subItems: [] } });
      };
      
      const openEditModal = (block) => {
        const normalizedBlock = normalizeBlock({ isPlanned: false, subItems: [], ...block });
        setModal({ isOpen: true, mode: 'edit', amountInput: normalizedBlock.amount === 0 ? '' : formatCurrency(normalizedBlock.amount), blockData: normalizedBlock });
      };
      
      const closeModals = () => {
        setModal({ isOpen: false, mode: 'create', blockData: null, amountInput: '' });
        setReportModal({ isOpen: false, accountId: null });
      };

      const handleAmountChange = (e) => {
        let val = e.target.value.replace(/[^0-9-]/g, '');
        if (val.lastIndexOf('-') > 0) val = val.replace(/-/g, '').replace(/^/, '-');
        if (val === '' || val === '-') {
          setModal(prev => ({ ...prev, amountInput: val, blockData: { ...prev.blockData, amount: 0 } }));
          return;
        }
        const parsed = parseInt(val, 10);
        setModal(prev => ({ ...prev, amountInput: formatCurrency(parsed), blockData: { ...prev.blockData, amount: parsed } }));
      };

      const handleSubItemChange = (id, field, value) => {
        setModal(prev => {
          const newSubItems = prev.blockData.subItems.map(item => {
            if (item.id === id) {
              if (field === 'amount') {
                if (getChildItems(item).length > 0) return item;
                let val = value.replace(/[^0-9-]/g, '');
                if (val.lastIndexOf('-') > 0) val = val.replace(/-/g, '').replace(/^/, '-');
                return { ...item, amountString: val, amount: parseInt(val, 10) || 0 };
              }
              return { ...item, [field]: value };
            }
            return item;
          });
          return updateModalSubItems(prev, newSubItems);
        });
      };

      const addSubItem = () => setModal(prev => updateModalSubItems(prev, [...(prev.blockData.subItems || []), { id: Date.now().toString(), label: '', amount: 0, amountString: '', amountColor: 'auto', isPlanned: false, childItems: [] }]));
      
      const removeSubItem = (id) => setModal(prev => {
        const newSubItems = prev.blockData.subItems.filter(item => item.id !== id);
        return updateModalSubItems(prev, newSubItems);
      });

      const moveSubItem = (id, direction) => setModal(prev => {
        const newSubItems = [...prev.blockData.subItems];
        const currentIndex = newSubItems.findIndex(item => item.id === id);
        const targetIndex = currentIndex + direction;
        if (currentIndex < 0 || targetIndex < 0 || targetIndex >= newSubItems.length) return prev;
        const currentItem = newSubItems[currentIndex];
        newSubItems[currentIndex] = newSubItems[targetIndex];
        newSubItems[targetIndex] = currentItem;
        return { ...prev, blockData: { ...prev.blockData, subItems: newSubItems } };
      });

      const handleSubItemDragStart = (e, id) => {
        e.stopPropagation();
        setDraggedModalSubItemId(id);
        setDraggedModalChild(null);
        if (e.dataTransfer) {
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', id);
        }
      };

      const handleSubItemDragOver = (e) => {
        if (!draggedModalSubItemId) return;
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
      };

      const handleSubItemDrop = (e, targetId) => {
        if (!draggedModalSubItemId) return;
        e.preventDefault();
        e.stopPropagation();
        if (draggedModalSubItemId === targetId) {
          setDraggedModalSubItemId(null);
          return;
        }

        setModal(prev => {
          const newSubItems = [...(prev.blockData.subItems || [])];
          const currentIndex = newSubItems.findIndex(item => item.id === draggedModalSubItemId);
          const targetIndex = newSubItems.findIndex(item => item.id === targetId);
          if (currentIndex < 0 || targetIndex < 0) return prev;
          const currentItem = newSubItems[currentIndex];
          newSubItems.splice(currentIndex, 1);
          newSubItems.splice(targetIndex, 0, currentItem);
          return updateModalSubItems(prev, newSubItems);
        });
        setDraggedModalSubItemId(null);
      };

      const handleSubItemDragEnd = () => {
        setDraggedModalSubItemId(null);
      };

      const setSubItemColor = (id, colorKey) => setModal(prev => {
        const newSubItems = prev.blockData.subItems.map(item => {
          if (item.id !== id) return item;
          return { ...item, amountColor: colorKey };
        });
        return { ...prev, blockData: { ...prev.blockData, subItems: newSubItems } };
      });

      const addChildItem = (subItemId) => setModal(prev => {
        const newSubItems = prev.blockData.subItems.map(item => {
          if (item.id !== subItemId) return item;
          let childItems = getChildItems(item).map(child => ({ ...child }));
          if (childItems.length === 0 && getAmountValue(item) !== 0) {
            childItems.push({ id: `c_${Date.now()}_base`, label: '기존 금액', amount: item.amount, amountString: String(item.amount), amountColor: item.amountColor || 'auto' });
          }
          childItems.push({ id: `c_${Date.now()}`, label: '', amount: 0, amountString: '', amountColor: 'auto' });
          const newAmount = childItems.reduce((sum, child) => sum + getAmountValue(child), 0);
          return { ...item, childItems, amount: newAmount, amountString: String(newAmount) };
        });
        return updateModalSubItems(prev, newSubItems);
      });

      const handleChildItemChange = (subItemId, childId, field, value) => setModal(prev => {
        const newSubItems = prev.blockData.subItems.map(item => {
          if (item.id !== subItemId) return item;
          const childItems = getChildItems(item).map(child => {
            if (child.id !== childId) return child;
            if (field === 'amount') {
              let val = value.replace(/[^0-9-]/g, '');
              if (val.lastIndexOf('-') > 0) val = val.replace(/-/g, '').replace(/^/, '-');
              return { ...child, amountString: val, amount: parseInt(val, 10) || 0 };
            }
            return { ...child, [field]: value };
          });
          const newAmount = childItems.reduce((sum, child) => sum + getAmountValue(child), 0);
          return { ...item, childItems, amount: newAmount, amountString: String(newAmount) };
        });
        return updateModalSubItems(prev, newSubItems);
      });

      const removeChildItem = (subItemId, childId) => setModal(prev => {
        const newSubItems = prev.blockData.subItems.map(item => {
          if (item.id !== subItemId) return item;
          const childItems = getChildItems(item).filter(child => child.id !== childId);
          const newAmount = childItems.reduce((sum, child) => sum + getAmountValue(child), 0);
          return { ...item, childItems, amount: newAmount, amountString: String(newAmount) };
        });
        return updateModalSubItems(prev, newSubItems);
      });

      const recalcSubItem = (item, childItems) => {
        const newAmount = childItems.reduce((sum, child) => sum + getAmountValue(child), 0);
        return { ...item, childItems, amount: newAmount, amountString: String(newAmount) };
      };

      const moveChildItem = (subItemId, childId, direction) => setModal(prev => {
        const newSubItems = prev.blockData.subItems.map(item => {
          if (item.id !== subItemId) return item;
          const childItems = getChildItems(item).map(child => ({ ...child }));
          const currentIndex = childItems.findIndex(child => child.id === childId);
          const targetIndex = currentIndex + direction;
          if (currentIndex < 0 || targetIndex < 0 || targetIndex >= childItems.length) return item;
          const currentItem = childItems[currentIndex];
          childItems[currentIndex] = childItems[targetIndex];
          childItems[targetIndex] = currentItem;
          return { ...item, childItems };
        });
        return updateModalSubItems(prev, newSubItems);
      });

      const handleChildDragStart = (e, subItemId, childId) => {
        e.stopPropagation();
        setDraggedModalChild({ subItemId, childId });
        setDraggedModalSubItemId(null);
        if (e.dataTransfer) {
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', childId);
        }
      };

      const handleChildDragOver = (e) => {
        if (!draggedModalChild) return;
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
      };

      const moveDraggedChildTo = (targetSubItemId, targetChildId) => {
        if (!draggedModalChild) return;
        if (draggedModalChild.subItemId === targetSubItemId && draggedModalChild.childId === targetChildId) {
          setDraggedModalChild(null);
          return;
        }

        setModal(prev => {
          let movedChild = null;
          const withoutDragged = (prev.blockData.subItems || []).map(item => {
            let childItems = getChildItems(item).map(child => ({ ...child }));
            if (item.id === draggedModalChild.subItemId) {
              const currentIndex = childItems.findIndex(child => child.id === draggedModalChild.childId);
              if (currentIndex >= 0) {
                movedChild = childItems[currentIndex];
                childItems.splice(currentIndex, 1);
              }
              return recalcSubItem(item, childItems);
            }
            return { ...item, childItems };
          });

          if (!movedChild) return prev;

          const newSubItems = withoutDragged.map(item => {
            if (item.id !== targetSubItemId) return item;
            let childItems = getChildItems(item).map(child => ({ ...child }));
            if (childItems.length === 0 && getAmountValue(item) !== 0) {
              childItems.push({ id: `c_${Date.now()}_base_${item.id}`, label: '기존 금액', amount: item.amount, amountString: String(item.amount), amountColor: item.amountColor || 'auto' });
            }
            let insertIndex = targetChildId ? childItems.findIndex(child => child.id === targetChildId) : childItems.length;
            if (insertIndex < 0) insertIndex = childItems.length;
            childItems.splice(insertIndex, 0, movedChild);
            return recalcSubItem(item, childItems);
          });

          return updateModalSubItems(prev, newSubItems);
        });
        setDraggedModalChild(null);
      };

      const handleChildDropOnChild = (e, targetSubItemId, targetChildId) => {
        if (!draggedModalChild) return;
        e.preventDefault();
        e.stopPropagation();
        moveDraggedChildTo(targetSubItemId, targetChildId);
      };

      const handleChildDropOnSubItem = (e, targetSubItemId) => {
        if (!draggedModalChild) return;
        e.preventDefault();
        e.stopPropagation();
        moveDraggedChildTo(targetSubItemId, null);
      };

      const handleChildDragEnd = () => {
        setDraggedModalChild(null);
      };

      const setChildItemColor = (subItemId, childId, colorKey) => setModal(prev => {
        const newSubItems = prev.blockData.subItems.map(item => {
          if (item.id !== subItemId) return item;
          const childItems = getChildItems(item).map(child => child.id === childId ? { ...child, amountColor: colorKey } : child);
          return { ...item, childItems };
        });
        return { ...prev, blockData: { ...prev.blockData, subItems: newSubItems } };
      });

      const toggleModalPlanned = () => {
        setModal(prev => ({ ...prev, blockData: { ...prev.blockData, isPlanned: !prev.blockData.isPlanned } }));
      };

      const toggleBlockPlanned = (blockId) => {
        setBlocks(prev => prev.map(b => b.id === blockId ? { ...b, isPlanned: !b.isPlanned } : b));
      };

      const toggleSubItems = (blockId) => {
        setCollapsedSubItems(prev => prev.includes(blockId) ? prev.filter(id => id !== blockId) : [...prev, blockId]);
      };

      const saveBlock = (e) => {
        e.preventDefault();
        const blockToSave = normalizeBlock(modal.blockData);
        if (modal.mode === 'create') setBlocks(prev => [...prev, blockToSave]);
        else setBlocks(prev => prev.map(b => b.id === blockToSave.id ? blockToSave : b));
        closeModals();
      };

      const deleteBlock = (blockId) => {
        setBlocks(prev => prev.filter(b => b.id !== blockId));
        setSelectedBlocks(prev => prev.filter(id => id !== blockId));
        closeModals();
      };

      // === 화면 렌더링 ===
      return (
        <div className="min-h-screen bg-[#F5F2EC] text-[#3D2B1F] font-sans flex flex-col overflow-x-hidden" onClick={handleBgClick}>
          {isInitialLoading && (
            <div className="fixed inset-0 z-[100] bg-[#F5F2EC] flex flex-col items-center justify-center text-[#3D2B1F]">
              <div className="w-14 h-14 bg-white border border-[#E6E0D4] rounded-2xl shadow-lg flex items-center justify-center mb-5">
                <i className="ph-bold ph-spinner animate-spin text-[#8B5A2B]" style={{fontSize: 28}}></i>
              </div>
              <p className="text-lg font-black">최신 화면 불러오는 중</p>
              <p className="text-xs font-bold text-[#A69C8E] mt-2">클라우드 데이터 확인 후 화면을 보여드립니다.</p>
            </div>
          )}
          
          {/* 1. 상단 글로벌 헤더 */}
          <header className="min-h-[72px] bg-[#FDFCFB] border-b border-[#E6E0D4] flex flex-wrap items-center justify-between gap-4 px-4 sm:px-8 py-3 shrink-0 sticky top-0 z-30 shadow-sm">
            <div className="flex items-center gap-3 min-w-0">
              <HwarimLogo />
              <div>
                <h1 className="text-xl font-extrabold text-[#3D2B1F] tracking-tight">화림 ERP</h1>
                <p className="text-[10px] font-bold text-[#A69C8E] uppercase tracking-widest mt-0.5">Cloud Web Application</p>
              </div>
            </div>

            <div className="flex items-center gap-3 shrink-0">
              <div className="text-right max-w-[260px]">
                <p className="text-[10px] font-extrabold text-[#A69C8E] uppercase tracking-widest">마지막 클라우드 저장</p>
                <p className="text-[11px] font-bold text-[#6D5443] mt-0.5">{formatLastSavedAt(lastSavedAt)}</p>
              </div>
              <button 
                onClick={syncToCloud}
                disabled={isSyncing}
                className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold border transition-colors shadow-sm
                  ${isSyncing ? 'bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed' : 'bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border-indigo-200'}
                `}
              >
                {isSyncing ? <i className="ph-bold ph-spinner animate-spin" style={{fontSize: 16}}></i> : <i className="ph-fill ph-cloud-arrow-up" style={{fontSize: 16}}></i>} 
                {isSyncing ? '동기화 중...' : '클라우드 저장'}
              </button>
            </div>
          </header>

          {/* 2. 메인 칸반 보드 영역 */}
          <div className="flex-1 overflow-x-auto overflow-y-visible p-6 hide-scrollbar relative">
            <div className="flex gap-5 items-start min-w-max">
              
              {accountsData.map(account => {
                const accountBlocks = blocks.filter(b => b.accountId === account.id);
                const accountTotal = accountBlocks.reduce((sum, b) => sum + getEffectiveAmount(b), 0);
                const theme = COLUMN_THEMES[account.theme || 'wood'];
                const cardHolders = getCardHolders(account);

                return (
                  <div 
                    key={account.id}
                    onDragOver={(e) => { e.preventDefault(); }}
                    onDrop={(e) => handleDropOnColumn(e, account.id)}
                    className={`w-[360px] flex flex-col rounded-xl border-2 ${theme.border} shadow-lg overflow-hidden transition-colors duration-500 shrink-0 ${theme.panelBg}`}
                  >
                    {/* 2-1. 패널 헤더 */}
                    <div 
                      draggable
                      onDragStart={(e) => {
                        setDraggedAccountId(account.id);
                        if(e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
                      }}
                      onDragEnd={() => setDraggedAccountId(null)}
                      className={`px-5 py-4 bg-white border-b border-[#E6E0D4] shrink-0 ${theme.light} bg-opacity-30 cursor-grab active:cursor-grabbing`}
                      title="클릭하고 드래그하여 패널 순서 변경"
                    >
                      <div className="flex items-center gap-2 mb-1 min-w-0">
                        <i className={`ph-bold ph-dots-six-vertical text-[#A69C8E] mr-1`} style={{fontSize: 20}}></i>
                        <i className={`${account.icon} ${theme.text}`} style={{fontSize: 18}}></i>
                        <h2 className="font-black text-[16px] text-[#2A1D15] truncate flex-1 min-w-0">{account.name}</h2>
                        {cardHolders.map(holder => (
                          <span key={holder} className="shrink-0 text-[10px] font-black px-1.5 py-0.5 rounded-md bg-white border border-[#D2B48C] text-[#8B5A2B] flex items-center gap-1 shadow-sm">
                            <i className="ph-fill ph-credit-card" style={{fontSize: 11}}></i>카드[{holder}]
                          </span>
                        ))}
                      </div>
                      <div className="flex items-center gap-1.5 text-[11px] font-bold text-[#6D5443] ml-10 opacity-80">
                        <i className="ph-fill ph-credit-card" style={{fontSize: 12}}></i> {account.bank} | <span className="font-mono">{account.accountNo}</span>
                      </div>
                    </div>

                    {/* 2-2. 4버튼 툴바 */}
                    <div className="grid grid-cols-4 bg-white/60 backdrop-blur-sm border-b border-[#E6E0D4] shrink-0">
                      <button onClick={() => setReportModal({ isOpen: true, accountId: account.id })} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] border-r border-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-chart-bar ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">결산서</span>
                      </button>
                      <button onClick={() => openCloseMonthModal(account.id)} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] border-r border-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-calendar-check ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">월 마감</span>
                      </button>
                      <button onClick={() => openCreateModal(account.id)} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] border-r border-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-plus-circle ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">자금추가</span>
                      </button>
                      <button onClick={() => openSettingsModal(account)} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-gear ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">설정</span>
                      </button>
                    </div>

                    {/* 2-3. 블록 리스트 영역 */}
                    <div className="p-3 flex flex-col gap-2">
                      {accountBlocks.length === 0 ? (
                        <div className="min-h-[110px] flex items-center justify-center text-xs text-[#A69C8E] border-2 border-dashed border-[#DFD8CE] rounded-lg bg-white/50 m-2">
                          내역이 없습니다.
                        </div>
                      ) : (
                        accountBlocks.map(block => {
                          const isSelected = selectedBlocks.includes(block.id);
                          const isMergeTarget = mergeTargetId === block.id;
                          const tagColor = COLOR_TAGS[block.color || 'none'];
                          const hasSubItems = block.subItems && block.subItems.length > 0;
                          const blockAmount = getBlockAmount(block);
                          const isPlanned = !!block.isPlanned;
                          const isSubItemsCollapsed = collapsedSubItems.includes(block.id);
                           
                          return (
                              <div
                              key={block.id}
                              draggable
                              onDragStart={(e) => handleDragStart(e, block.id)}
                              onDragEnd={handleDragEnd}
                              onDragOver={(e) => handleDragOverBlock(e, block.id)}
                              onDragLeave={handleDragLeaveBlock}
                              onDrop={(e) => handleDropOnBlock(e, account.id, block.id)}
                              onClick={(e) => handleBlockClick(e, block.id)}
                              className={`
                                block-item relative flex flex-col border rounded-xl shadow-sm cursor-pointer select-none transition-all
                                ${isSelected ? `${theme.border} ring-1 ${theme.ring} ${theme.light} bg-opacity-40` : `${tagColor.bg} ${tagColor.border} hover:shadow-md`}
                                ${draggedBlockId === block.id ? 'opacity-40 scale-[0.98]' : ''}
                                ${isMergeTarget ? 'ring-2 ring-indigo-500 bg-indigo-50/50 scale-[1.02] z-10' : ''}
                              `}
                            >
                              {isMergeTarget && (
                                <div className="absolute inset-0 flex items-center justify-center bg-indigo-500/10 rounded-xl pointer-events-none">
                                  <span className="bg-indigo-600 text-white text-[10px] font-bold px-2 py-1 rounded-full flex items-center gap-1 shadow-lg">
                                    <i className="ph-bold ph-arrow-line-down" style={{fontSize: 12}}></i> 하위 분류로 병합
                                  </span>
                                </div>
                              )}

                              <div className={`flex items-center p-3 ${isMergeTarget ? 'opacity-30' : ''}`}>
                                
                                <div className="no-select-trigger cursor-grab active:cursor-grabbing pr-3 opacity-30 hover:opacity-100">
                                  <i className="ph-bold ph-dots-six-vertical text-[#8B5A2B]" style={{fontSize: 16}}></i>
                                </div>
                                
                                <div className="flex-1 min-w-0 pr-1">
                                  <div className="flex items-center gap-2 mb-0.5">
                                    <span className="shrink-0 text-[9px] font-black px-1 py-0.5 rounded bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">대</span>
                                    <p className="truncate text-[13px] text-[#2A1D15] font-extrabold leading-tight">{block.label}</p>
                                    {isPlanned && (
                                      <span className="shrink-0 text-[10px] font-black px-1.5 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">예정</span>
                                    )}
                                  </div>
                                  <p className={`font-mono text-[16px] font-black tracking-tight ${getAmountTextClass(blockAmount, 'auto', isPlanned)}`}>
                                    {blockAmount > 0 ? '+' : ''}{formatCurrency(blockAmount)}
                                  </p>
                                </div>

                                {/* 나누기 & 수정 버튼 그룹 */}
                                <div className="flex items-center gap-1">
                                  <div 
                                    className="no-select-trigger p-1.5 rounded-md hover:bg-black/5 text-[#A69C8E] hover:text-[#0277BD] transition-colors"
                                    onClick={(e) => { e.stopPropagation(); openSplitModal(block); }}
                                    title="금액 일부를 분할하여 나누기"
                                  >
                                    <i className="ph-bold ph-scissors" style={{fontSize: 16}}></i>
                                  </div>
                                  <button
                                    type="button"
                                    className={`no-select-trigger p-1.5 rounded-md hover:bg-black/5 transition-colors ${isPlanned ? 'text-[#8B5A2B] bg-[#FDF6E9]' : 'text-[#A69C8E] hover:text-[#8B5A2B]'}`}
                                    onClick={(e) => { e.stopPropagation(); toggleBlockPlanned(block.id); }}
                                    title={isPlanned ? '현재 잔고 계산에 포함하기' : '예정금액으로 전환하여 현재 잔고에서 제외'}
                                  >
                                    <i className="ph-bold ph-clock" style={{fontSize: 16}}></i>
                                  </button>
                                  <div 
                                    className="no-select-trigger p-1.5 rounded-md hover:bg-black/5 text-[#A69C8E] hover:text-[#3D2B1F] transition-colors"
                                    onClick={(e) => { e.stopPropagation(); openEditModal(block); }}
                                    title="내역 수정"
                                  >
                                    <i className="ph-bold ph-pencil-simple" style={{fontSize: 16}}></i>
                                  </div>
                                </div>
                              </div>

                              {hasSubItems && (
                                <div className={`px-4 pb-3 pt-0 ${isMergeTarget ? 'opacity-30' : ''}`}>
                                  <div className="border-t border-black/10 pt-2">
                                    <button
                                      type="button"
                                      onClick={(e) => { e.stopPropagation(); toggleSubItems(block.id); }}
                                      className="no-select-trigger w-full flex items-center justify-between gap-2 px-2 py-1.5 mb-2 rounded-lg bg-white/70 border border-[#DFD8CE] text-[#6D5443] hover:bg-white transition-colors"
                                      title={isSubItemsCollapsed ? '세부항목 펼치기' : '세부항목 접기'}
                                    >
                                      <span className="text-[11px] font-extrabold flex items-center gap-1.5">
                                        <i className="ph-bold ph-list-bullets" style={{fontSize: 13}}></i>
                                        중분류 {block.subItems.length}개
                                      </span>
                                      <span className="text-[10px] font-black text-[#8B5A2B] flex items-center gap-1">
                                        {isSubItemsCollapsed ? '펼치기' : '접기'}
                                        <i className={`ph-bold ${isSubItemsCollapsed ? 'ph-caret-down' : 'ph-caret-up'}`} style={{fontSize: 12}}></i>
                                      </span>
                                    </button>

                                    {!isSubItemsCollapsed && (
                                      <div className="space-y-1.5">
                                        {block.subItems.map((sub, idx) => {
                                          const childItems = getChildItems(sub);
                                          const subAmount = getSubItemAmount(sub);
                                          return (
                                            <div key={idx} className="rounded-lg border border-[#E6E0D4] bg-white/70 px-2 py-1.5 text-[11px] text-[#6D5443] font-medium group/sub">
                                              <div className="flex justify-between items-center">
                                                <span className="truncate pr-2 flex items-center gap-1.5">
                                                  <span className="text-[9px] font-black px-1 py-0.5 rounded bg-[#EEF6FF] text-[#0277BD] border border-[#B3E5FC]">중</span> {sub.label || '내용 없음'}
                                                </span>
                                                <div className="flex items-center gap-2">
                                                  <span className={`font-mono font-bold ${getAmountTextClass(subAmount, sub.amountColor || 'auto', sub.isPlanned)}`}>
                                                    {subAmount > 0 ? '+' : ''}{formatCurrency(subAmount)}
                                                  </span>
                                                  {sub.isPlanned && <span className="text-[10px] font-black px-1.5 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">예정</span>}
                                                  <button 
                                                    onClick={(e) => { e.stopPropagation(); extractSubItem(block.id, sub.id); }}
                                                    className="opacity-0 group-hover/sub:opacity-100 p-1 bg-white border border-[#DFD8CE] text-[#8B5A2B] rounded hover:bg-[#F9F6F0] transition-opacity"
                                                    title="독립된 박스로 분리해서 밖으로 꺼내기"
                                                  >
                                                    <i className="ph-bold ph-export" style={{fontSize: 14}}></i>
                                                  </button>
                                                </div>
                                              </div>
                                              {childItems.length > 0 && (
                                                <div className="mt-1.5 ml-4 space-y-1 border-l border-[#DFD8CE] pl-2">
                                                  {childItems.map((child, childIdx) => (
                                                    <div key={childIdx} className="flex justify-between items-center gap-2">
                                                      <span className="truncate flex items-center gap-1.5">
                                                        <span className="text-[9px] font-black px-1 py-0.5 rounded bg-[#EBF5EC] text-[#2E7D32] border border-[#C8E6C9]">소</span> {child.label || '소분류 없음'}
                                                      </span>
                                                      <span className={`font-mono font-bold ${getAmountTextClass(child.amount, child.amountColor || 'auto')}`}>
                                                        {child.amount > 0 ? '+' : ''}{formatCurrency(child.amount)}
                                                      </span>
                                                    </div>
                                                  ))}
                                                </div>
                                              )}
                                            </div>
                                          );
                                        })}
                                      </div>
                                    )}
                                  </div>
                                </div>
                              )}

                              {isSelected && (
                                <div className={`absolute -right-2 -top-2 ${theme.bg} text-white rounded-full p-0.5 shadow-sm`}>
                                  <i className="ph-fill ph-check-circle" style={{fontSize: 12}}></i>
                                </div>
                              )}
                            </div>
                          );
                        })
                      )}
                    </div>

                    {/* 2-4. 잔고 하단 표시 */}
                    <div className="p-5 bg-white border-t border-[#E6E0D4] rounded-b-xl shrink-0">
                      <div className="flex justify-between items-end">
                        <span className="text-xs font-black text-[#6D5443] uppercase tracking-widest">현재 잔고</span>
                        <span className={`text-[26px] font-black tracking-tighter font-mono ${accountTotal >= 0 ? theme.text : 'text-[#C62828]'}`}>
                          {formatCurrency(accountTotal)}
                        </span>
                      </div>
                    </div>
                  </div>
                );
              })}

              {/* === 새로운 현장 추가 버튼 (컬럼) === */}
              <div 
                onClick={addNewAccount}
                className="w-[360px] min-h-[220px] flex flex-col justify-center items-center bg-[#FDFCFB]/60 hover:bg-white rounded-xl border-2 border-dashed border-[#DFD8CE] hover:border-[#8B5A2B] shadow-sm transition-all cursor-pointer group shrink-0"
              >
                <div className="w-14 h-14 bg-[#EFEBE4] group-hover:bg-[#8B5A2B] text-[#A69C8E] group-hover:text-white rounded-full flex items-center justify-center mb-4 transition-colors">
                  <i className="ph-bold ph-plus" style={{fontSize: 28}}></i>
                </div>
                <p className="font-extrabold text-[#6D5443] group-hover:text-[#3D2B1F] transition-colors">새로운 현장/법인 추가</p>
              </div>

            </div>
          </div>

          {/* 3. 다중 선택 계산기 바 */}
          {selectedBlocks.length > 0 && (
            <div className="selection-bar fixed bottom-8 left-1/2 -translate-x-1/2 bg-[#2A1D15] text-[#FDFCFB] px-8 py-4 rounded-full shadow-2xl flex items-center gap-8 z-40 animate-in slide-in-from-bottom-4 border border-[#4A3B32]">
              <div className="flex items-center gap-3">
                <i className="ph-fill ph-calculator text-[#D2B48C]" style={{fontSize: 20}}></i>
                <span className="text-sm font-bold"><span className="text-[#D2B48C] text-lg mr-1">{selectedBlocks.length}</span>개 선택됨</span>
              </div>
              <div className="w-px h-6 bg-[#4A3B32]" />
              <div className="flex items-center gap-4">
                <span className="text-xs font-bold text-[#A69C8E] uppercase tracking-widest">잔고 반영 합산</span>
                <span className={`text-2xl font-black font-mono tracking-tight ${selectedSum >= 0 ? 'text-[#81C784]' : 'text-[#E57373]'}`}>
                  {selectedSum > 0 ? '+' : ''}{formatCurrency(selectedSum)}
                </span>
              </div>
              <button onClick={() => setSelectedBlocks([])} className="ml-2 p-2 bg-[#4A3B32] hover:bg-[#6B4423] rounded-full transition-colors text-white">
                <i className="ph-bold ph-x" style={{fontSize: 18}}></i>
              </button>
            </div>
          )}

          {/* --- 모달: 금액 나누기 (Split) --- */}
          {splitModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/80 backdrop-blur-sm">
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]">
                <div className="flex justify-between items-center p-5 border-b border-[#EFEBE4] bg-[#FDFCFB]">
                  <h3 className="font-extrabold text-[#3D2B1F] text-base flex items-center gap-2">
                    <i className="ph-bold ph-scissors text-[#8B5A2B]" style={{fontSize: 18}}></i> 금액 나누기 (분할)
                  </h3>
                  <button onClick={() => setSplitModal({ isOpen: false, block: null, amountInput: '' })} className="p-1.5 hover:bg-[#EFEBE4] rounded-full text-[#A69C8E]"><i className="ph-bold ph-x" style={{fontSize: 18}}></i></button>
                </div>
                
                <form onSubmit={executeSplit} className="p-6">
                  <div className="mb-4 text-sm text-[#6D5443] font-bold text-center bg-[#F9F6F0] p-3 rounded-lg border border-[#DFD8CE]">
                    기존 금액: <span className="font-mono text-lg text-[#2A1D15] block mt-1">{formatCurrency(splitModal.block && splitModal.block.amount)}</span>
                  </div>

                  <div className="mb-6">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">분리해 낼 금액</label>
                    <input 
                      type="text" required 
                      value={splitModal.amountInput} 
                      onChange={handleSplitAmountChange} 
                      className="w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-xl font-mono font-black text-right focus:outline-none focus:border-[#8B5A2B] transition-colors" 
                      placeholder="0"
                    />
                  </div>

                  <button type="submit" className="w-full py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold flex items-center justify-center gap-2 transition-colors shadow-md">
                    <i className="ph-bold ph-arrows-split" style={{fontSize: 16}}></i> 나누기 확정
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* --- 모달: 현장 설정 --- */}
          {settingsModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/80 backdrop-blur-sm">
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]">
                <div className="flex justify-between items-center p-5 border-b border-[#EFEBE4] bg-[#FDFCFB]">
                  <h3 className="font-extrabold text-[#3D2B1F] text-base flex items-center gap-2">
                    <i className="ph-fill ph-gear text-[#8B5A2B]" style={{fontSize: 18}}></i> 현장 환경 설정
                  </h3>
                  <button onClick={() => setSettingsModal({isOpen:false})} className="p-1.5 hover:bg-[#EFEBE4] rounded-full text-[#A69C8E]"><i className="ph-bold ph-x" style={{fontSize: 18}}></i></button>
                </div>
                
                <form onSubmit={saveSettings} className="p-6">
                  <div className="space-y-4 mb-6">
                    <div>
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-1.5 uppercase">현장명 (주제)</label>
                      <input type="text" required value={settingsModal.accountData.name} onChange={(e) => setSettingsModal(p => ({...p, accountData: {...p.accountData, name: e.target.value}}))} className="w-full border border-[#DFD8CE] rounded-lg p-2.5 text-sm font-bold text-[#2A1D15] focus:border-[#8B5A2B] focus:outline-none"/>
                    </div>
                    <div>
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-1.5 uppercase">은행</label>
                      <input type="text" value={settingsModal.accountData.bank} onChange={(e) => setSettingsModal(p => ({...p, accountData: {...p.accountData, bank: e.target.value}}))} className="w-full border border-[#DFD8CE] rounded-lg p-2.5 text-sm font-bold text-[#2A1D15] focus:border-[#8B5A2B] focus:outline-none"/>
                    </div>
                    <div>
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-1.5 uppercase">계좌번호</label>
                      <input type="text" value={settingsModal.accountData.accountNo} onChange={(e) => setSettingsModal(p => ({...p, accountData: {...p.accountData, accountNo: e.target.value}}))} className="w-full border border-[#DFD8CE] rounded-lg p-2.5 text-sm font-mono font-bold text-[#2A1D15] focus:border-[#8B5A2B] focus:outline-none"/>
                    </div>
                    <div>
                      <label className="block text-xs font-extrabold text-[#6D5443] mb-1.5 uppercase">카드 보유자</label>
                      <input type="text" value={settingsModal.accountData.cardHolder || ''} onChange={(e) => setSettingsModal(p => ({...p, accountData: {...p.accountData, cardHolder: e.target.value}}))} className="w-full border border-[#DFD8CE] rounded-lg p-2.5 text-sm font-bold text-[#2A1D15] focus:border-[#8B5A2B] focus:outline-none" placeholder="예: 이사님, 대표"/>
                    </div>
                  </div>

                  <div className="mb-8">
                    <label className="block text-xs font-extrabold text-[#6D5443] mb-3 uppercase flex items-center gap-1"><i className="ph-fill ph-palette" style={{fontSize: 14}}></i> 패널 테마 색상 (전체 톤 변경)</label>
                    <div className="grid grid-cols-2 gap-2">
                      {Object.keys(COLUMN_THEMES).map(key => (
                        <button
                          key={key} type="button"
                          onClick={() => setSettingsModal(p => ({...p, accountData: {...p.accountData, theme: key}}))}
                          className={`
                            py-2 px-3 rounded-lg border-2 text-xs font-bold transition-all flex items-center justify-center gap-2
                            ${COLUMN_THEMES[key].light} ${COLUMN_THEMES[key].text}
                            ${settingsModal.accountData.theme === key ? `border-[#8B5A2B] ring-2` : 'border-transparent'}
                          `}
                        >
                          <div className={`w-3 h-3 rounded-full ${COLUMN_THEMES[key].bg}`}></div>
                          {COLUMN_THEMES[key].label}
                        </button>
                      ))}
                    </div>
                  </div>

                  <button type="submit" className="w-full py-3 bg-[#8B5A2B] text-white hover:bg-[#6B4423] rounded-xl text-sm font-extrabold flex items-center justify-center gap-2 transition-colors shadow-md">
                    <i className="ph-fill ph-floppy-disk" style={{fontSize: 16}}></i> 설정 저장
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* --- 모달: 월 마감 --- */}
          {closeMonthModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2A1D15]/80 backdrop-blur-sm">
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in zoom-in-95 border border-[#E6E0D4]">
                <div className="p-6 bg-[#FCFAF8] border-b border-[#EFEBE4] text-center">
                  <div className="w-12 h-12 bg-[#EFEBE4] text-[#8B5A2B] rounded-full flex items-center justify-center mx-auto mb-3">
                    <i className="ph-fill ph-calendar-check" style={{fontSize: 24}}></i>
                  </div>
                  <h3 className="font-extrabold text-[#3D2B1F] text-lg">월별 결산 확정 (저장)</h3>
                  <p className="text-xs font-bold text-[#A69C8E] mt-1">{(accountsData.find(a => a.id === closeMonthModal.accountId) || {}).name}</p>
                </div>
                
                <form onSubmit={executeCloseMonth} className="p-6">

                          <p className="text-sm mt-2">메인 보드에서 [월 마감]을 통해 결산을 저장해보세요.</p>
                        </div>

                    }

                      const reportTotal = activeReport.blocks.reduce((sum, b) => sum + getEffectiveAmount(b), 0);

                          <div className="p-5 border-b border-[#E6E0D4] flex justify-between items-end shrink-0 bg-[#FCFAF8] rounded-t-2xl">
                            <h2 className="text-2xl font-black text-[#2A1D15]">{activeReport.month}</h2>
                            <div className="text-right">

                              return (

                                        <span className="shrink-0 text-[10px] font-black px-1.5 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">예정</span>

                                      />

                                    <button onClick={() => deleteReportBlock(activeReport.id, block.id)} className="w-8 h-8 flex items-center justify-center text-[#A69C8E] hover:text-[#C62828] hover:bg-black/5 rounded-lg transition-colors opacity-0 group-hover:opacity-100 shrink-0">

                                    </button>
                                  </div>

                                    <div className="px-3 pb-2 pt-0">
                                      <div className="border-t border-black/10 pt-2 space-y-1.5">

                                          const childItems = getChildItems(sub);
                                          const subAmount = getSubItemAmount(sub);
                                          return (

                                                <div className="flex items-center gap-2">
                                                  <span className={`font-mono font-bold ${getAmountTextClass(subAmount, sub.amountColor || 'auto', sub.isPlanned)}`}>

                                                  {sub.isPlanned && <span className="text-[10px] font-black px-1.5 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">예정</span>}

                                                        <span className="text-[9px] font-black px-1 py-0.5 rounded bg-[#EBF5EC] text-[#2E7D32] border border-[#C8E6C9]">소</span> {child.label || '소분류 없음'}

                                                      <span className={`font-mono font-bold ${getAmountTextClass(child.amount, child.amountColor || 'auto')}`}>

                                                    </div>
                                                  ))}
                                                </div>
                                              )}
                                            </div>
                                          );
                                        })}
                                      </div>
                                    </div>
                                  )}

                              <i className="ph-bold ph-trash" style={{fontSize: 12}}></i> 이 달의 결산 삭제
                            </button>
                          </div>

                      {Object.keys(COLOR_TAGS).map(key => (
                        <button key={key} type="button" onClick={() => setModal(p => ({...p, blockData: {...p.blockData, color: key}}))} className={`w-8 h-8 rounded-full border-2 transition-all shadow-sm ${COLOR_TAGS[key].bg} ${COLOR_TAGS[key].border} ${modal.blockData.color === key ? 'ring-2 ring-offset-2 ring-[#8B5A2B] scale-110' : 'hover:scale-105'}`}/>
                      ))}
                    </div>
                  </div>

                    <label className="block text-xs font-extrabold text-[#6D5443] mb-2 uppercase">금액 유형</label>

                      type="button"
                      onClick={toggleModalPlanned}
                      className={`w-full rounded-xl border-2 p-3 flex items-center justify-between gap-3 text-sm font-extrabold transition-colors
                        ${modal.blockData.isPlanned ? 'bg-[#FDF6E9] border-[#D2B48C] text-[#8B5A2B]' : 'bg-white border-[#E6E0D4] text-[#6D5443] hover:border-[#D2B48C]'}
                      `}
                    >
                      <span className="flex items-center gap-2">
                        <i className="ph-bold ph-clock" style={{fontSize: 16}}></i>

                      </span>
                      <span className={`text-[10px] px-2 py-1 rounded-full ${modal.blockData.isPlanned ? 'bg-[#8B5A2B] text-white' : 'bg-[#EFEBE4] text-[#A69C8E]'}`}>
                        {modal.blockData.isPlanned ? '켜짐' : '꺼짐'}
                      </span>
                    </button>
                  </div>

                  <div className="my-6 border-t border-[#EFEBE4]" />

                  <div className="mb-6 bg-[#FDFCFB] p-4 rounded-xl border border-[#E6E0D4]">
                    <div className="flex justify-between items-center mb-3">
                      <label className="block text-xs font-extrabold text-[#6D5443] uppercase flex items-center gap-1.5"><i className="ph-bold ph-folder-simple" style={{fontSize: 14}}></i> 중분류 박스</label>

                    </div>

                      <div className="space-y-3 mb-3">

                          <div
                            key={sub.id}
                            onDragOver={handleSubItemDragOver}
                            onDrop={(e) => handleSubItemDrop(e, sub.id)}
