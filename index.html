<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>화림 ERP</title>
  
  <!-- 오류 자동 감지 스크립트 -->
  <script>
    window.addEventListener('error', function(event) {
      if (event.message === 'Script error.') {
        console.warn('외부 스크립트 오류가 감지되었지만 앱 화면은 계속 표시합니다.', event);
        return;
      }
      const errorDiv = document.createElement('div');
      errorDiv.style.cssText = 'position:fixed; top:0; left:0; width:100%; background:#C62828; color:white; padding:15px; z-index:9999; font-weight:bold; font-family:sans-serif; box-shadow:0 4px 6px rgba(0,0,0,0.3);';
      errorDiv.innerHTML = '🚨 앱 실행 오류 발생: <br/><br/>' + event.message + '<br/><br/>위치: ' + (event.filename || '앱 내부') + ':' + (event.lineno || '-') + '<br/><br/>👉 코드가 잘못 복사되었거나 외부 라이브러리 로딩이 막혔는지 확인해 주세요!';
      document.body.prepend(errorDiv);
    });
  </script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (브라우저 컴파일러) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #DFD8CE; border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #B39977; }
    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; margin: 0; padding: 0; background-color: #F5F2EC; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, Fragment } = React;

    // 절대 중복되지 않는 고유 ID 생성기
    const createId = (prefix) => `${prefix}_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;

    // =====================================================================
    // ⚠️ 대표님의 구글 앱스 스크립트 URL ⚠️
    // =====================================================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyzmdTEBrfbcJsuvr29xOhaemgR3dUsHr8DybTq48dJADT7nHXRTcADK8kafHrdz3tK/exec";
    
    // --- 전역 설정 및 초기 데이터 ---
    const COLUMN_THEMES = {
      wood: { label: '클래식 우드', text: 'text-[#8B5A2B]', bg: 'bg-[#8B5A2B]', light: 'bg-[#EFEBE4]', hover: 'hover:bg-[#DFD8CE]', border: 'border-[#8B5A2B]', ring: 'ring-[#8B5A2B]', panelBg: 'bg-[#F4EBE1]' },

    const SUBITEM_AMOUNT_COLORS = {

      blue: { label: '파랑', text: 'text-[#0277BD]', swatch: 'bg-[#0277BD]' },
      brown: { label: '갈색', text: 'text-[#8B5A2B]', swatch: 'bg-[#8B5A2B]' },
      black: { label: '검정', text: 'text-[#111827]', swatch: 'bg-[#111827]' },

    const SUBITEM_COLOR_ORDER = Object.keys(SUBITEM_AMOUNT_COLORS);

    const DEFAULT_CARD_HOLDERS = {

    }

    const INITIAL_ACCOUNTS = [
      { id: 'main', name: '화림 법인 (메인)', bank: '우리은행', accountNo: '1005-704-610473', icon: 'ph-fill ph-buildings', theme: 'wood', cardHolder: '대표', reportData: [] },
      { id: 'jecheon1', name: '제천1 (오차드블리드)', bank: '우리은행', accountNo: '1005-504-710497', icon: 'ph-fill ph-hard-hat', theme: 'forest', cardHolder: '이사님', reportData: [] },
      { id: 'miryang', name: '밀양 (다시,또 여기)', bank: '기업은행', accountNo: '587-076008-04-011', icon: 'ph-fill ph-hard-hat', theme: 'ocean', cardHolder: '대표', reportData: [] },
      { id: 'jecheon2', name: '제천2 (덕동골)', bank: '우리은행', accountNo: '1005-804-800910', icon: 'ph-fill ph-hard-hat', theme: 'wine', cardHolder: '이사님', reportData: [] },
    ];

    const INITIAL_BLOCKS = [
      { id: 'b1', accountId: 'main', label: '매출(세금계산서)', amount: 577257465, color: 'wood', subItems: [] },
      { id: 'b2', accountId: 'main', label: '화림 수수료 수취', amount: 60100000, color: 'forest', subItems: [] },
      { id: 'b4', accountId: 'jecheon1', label: '총 매출/대출 등', amount: 399779948, color: 'wood', subItems: [] },
      { id: 'b5', accountId: 'jecheon1', label: '매입 계산서 지출', amount: -159116581, color: 'none', subItems: [] },
      { id: 'b8', accountId: 'miryang', label: '건축주 입금액', amount: 242405000, color: 'sand', subItems: [] },
      { id: 'b9', accountId: 'miryang', label: '외주 미수금', amount: -294300296, color: 'clay', subItems: [] },
      { id: 'b11', accountId: 'jecheon2', label: '대출금', amount: 54000000, color: 'stone', subItems: [] },
      { id: 'b12', accountId: 'jecheon2', label: '건축주 입금', amount: 20000000, color: 'wood', subItems: [] },
      { id: 'b14', accountId: 'jecheon2', label: '박찬수 부장님 대납', amount: -2750000, color: 'clay', subItems: [] },
    ];

    function App() {
      const [accountsData, setAccountsData] = useState(INITIAL_ACCOUNTS);
      const [blocks, setBlocks] = useState(INITIAL_BLOCKS);
      
      const [draggedBlockId, setDraggedBlockId] = useState(null);
      const [draggedAccountId, setDraggedAccountId] = useState(null);
      const [selectedBlocks, setSelectedBlocks] = useState([]);
      
      const [modal, setModal] = useState({ isOpen: false, mode: 'create', blockData: null, amountInput: '' });
      const [splitModal, setSplitModal] = useState({ isOpen: false, targetType: null, blockId: null, subItemId: null, childId: null, sourceAmount: 0, amountInput: '', label: '' });
      const [reportModal, setReportModal] = useState({ isOpen: false, accountId: null });
      const [closeMonthModal, setCloseMonthModal] = useState({ isOpen: false, accountId: null, monthLabel: '' });
      const [settingsModal, setSettingsModal] = useState({ isOpen: false, accountData: null });
      const [isSyncing, setIsSyncing] = useState(false);
      const [isInitialLoading, setIsInitialLoading] = useState(true);
      const [lastSavedAt, setLastSavedAt] = useState(null);
      
      const [collapsedSubItems, setCollapsedSubItems] = useState([]);
      
      // 드래그 상태 관리
      const [dragOverId, setDragOverId] = useState(null);
      const [draggedBoardSubItem, setDraggedBoardSubItem] = useState(null);
      const [draggedBoardChild, setDraggedBoardChild] = useState(null);
      const [draggedModalSubItemId, setDraggedModalSubItemId] = useState(null);
      const [draggedModalChild, setDraggedModalChild] = useState(null);

      const formatCurrency = (amount) => new Intl.NumberFormat('ko-KR').format(amount || 0);
      const twoDigits = (value) => String(value).padStart(2, '0');
      const formatLastSavedAt = (value) => {
        if (!value) return '저장 기록 없음';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '저장 시간 확인 필요';
        return `${date.getFullYear()}년 ${twoDigits(date.getMonth() + 1)}월 ${twoDigits(date.getDate())}일 ${twoDigits(date.getHours())}시 ${twoDigits(date.getMinutes())}분 데이터`;
      };
      
      const getAmountValue = (item) => Number(item && item.amount) || 0;
      const getChildItems = (item) => (item && item.childItems) ? item.childItems : [];
      const getSubItemAmount = (item) => {
        const childItems = getChildItems(item);
        if (childItems.length > 0) {
          return childItems.reduce((sum, child) => sum + getAmountValue(child), 0);
        }
        return getAmountValue(item);
      };
      const getBlockAmount = (item) => {
        if (item && item.subItems && item.subItems.length > 0) {
          return item.subItems.reduce((sum, sub) => sum + getSubItemAmount(sub), 0);
        }
        return getAmountValue(item);
      };
      const getEffectiveAmount = (item) => {
        if (!item || item.isPlanned) return 0;
        if (item.subItems && item.subItems.length > 0) {
          return item.subItems.reduce((sum, sub) => sum + (sub.isPlanned ? 0 : getSubItemAmount(sub)), 0);
        }
        return getAmountValue(item);
      };
      const getAmountTextClass = (amount, colorKey = 'auto', isPlanned = false) => {
        if (isPlanned) return 'text-[#8B5A2B]';
        if (colorKey && colorKey !== 'auto' && SUBITEM_AMOUNT_COLORS[colorKey]) return SUBITEM_AMOUNT_COLORS[colorKey].text;
        return amount >= 0 ? 'text-[#2E7D32]' : 'text-[#C62828]';
      };
      const getCardHolders = (account) => {
        const text = (account && (account.cardHolder || DEFAULT_CARD_HOLDERS[account.id])) || '';
        return text.split(/[,，\/|]+/).map(name => name.trim()).filter(Boolean);
      };

      const normalizeSubItem = (item) => {
        const childItems = item.childItems ? item.childItems.map(child => ({ ...child, id: child.id || createId('c'), amountColor: child.amountColor || 'auto' })) : [];
        const childTotal = childItems.reduce((sum, child) => sum + getAmountValue(child), 0);
        return {
          ...item,
          id: item.id || createId('s'),
          amount: childItems.length > 0 ? childTotal : getAmountValue(item),
          amountString: childItems.length > 0 ? String(childTotal) : item.amountString,
          amountColor: item.amountColor || 'auto',
          childItems
        };
      };
      const normalizeBlock = (block) => {
        const subItems = block.subItems ? block.subItems.map(item => normalizeSubItem(item)) : [];
        const amount = subItems.length > 0 ? subItems.reduce((sum, item) => sum + getSubItemAmount(item), 0) : getAmountValue(block);
        return { ...block, id: block.id || createId('b'), amount, subItems };
      };
      const updateModalSubItems = (prev, newSubItems) => {
        const newTotalAmount = newSubItems.reduce((sum, item) => sum + getSubItemAmount(item), 0);
        return { ...prev, amountInput: formatCurrency(newTotalAmount), blockData: { ...prev.blockData, subItems: newSubItems, amount: newTotalAmount } };
      };

      const selectedSum = useMemo(() => {
        return blocks.filter(b => selectedBlocks.includes(b.id)).reduce((sum, b) => sum + getEffectiveAmount(b), 0);
      }, [blocks, selectedBlocks]);

      useEffect(() => {
        if (!GAS_URL || GAS_URL.includes("여기에")) {
          setIsInitialLoading(false);
          return;
        }
        fetch(GAS_URL)
          .then(async res => {
            const text = await res.text();
            try { return JSON.parse(text); } catch (e) { throw new Error("GAS_PERMISSION_ERROR"); }
          })
          .then(data => {
            if (data && Object.keys(data).length > 0) {
              if (Array.isArray(data.accountsData)) setAccountsData(data.accountsData);
              if (Array.isArray(data.blocks)) setBlocks(data.blocks.map(block => normalizeBlock(block)));
              if (data.lastSavedAt) setLastSavedAt(data.lastSavedAt);
            }
            setIsInitialLoading(false);
          })
          .catch(err => {
            console.error(err);
            setIsInitialLoading(false);
          });
      }, []);

      const syncToCloud = async () => {
        if (!GAS_URL || GAS_URL.includes("여기에")) return alert("구글 스크립트 웹앱 URL이 입력되지 않았습니다!");
        setIsSyncing(true);
        try {
          const savedAt = new Date().toISOString();
          const payload = { accountsData, blocks: blocks.map(block => normalizeBlock(block)), lastSavedAt: savedAt };
          await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
          setLastSavedAt(savedAt);
          alert("✅ 안전하게 백업 및 동기화되었습니다!");
        } catch (err) {
          alert("❌ 동기화 오류가 발생했습니다.");
        } finally {
          setIsSyncing(false);
        }
      };

      /* --- 💡 드래그 중 휠 스크롤 및 화면 끝 자동 스크롤(Edge Scroll) 지원 --- */
      useEffect(() => {
        let scrollInterval = null;
        let lastX = 0, lastY = 0;

        const isDragging = draggedBlockId || draggedBoardSubItem || draggedBoardChild || draggedAccountId || draggedModalSubItemId || draggedModalChild;

        // 1. 마우스 휠 스크롤 수동 지원 (HTML5 DnD 중 휠이 막히는 브라우저 대응)
        const handleWheel = (e) => {
          if (!isDragging) return;
          
          if (modal.isOpen) {
            const modalScroll = document.querySelector('.custom-scrollbar');
            if (modalScroll) modalScroll.scrollTop += e.deltaY;
          } else {
            const hContainer = document.querySelector('.overflow-x-auto');
            if (hContainer && (e.shiftKey || Math.abs(e.deltaX) > Math.abs(e.deltaY))) {
              hContainer.scrollLeft += (e.deltaX || e.deltaY);
            } else {
              window.scrollBy({ top: e.deltaY, left: 0 });
            }
          }
        };

        // 2. 화면 가장자리 자동 스크롤 (Edge Scroll)
        const handleDragOver = (e) => {
          if (!isDragging) return;
          lastX = e.clientX;
          lastY = e.clientY;

          if (!scrollInterval) {
            scrollInterval = setInterval(() => {
              const edgeSize = 80; // 화면 끝에서 80px 이내면 스크롤
              const speed = 20;    // 스크롤 속도
              let sx = 0, sy = 0;

              if (lastY < edgeSize) sy = -speed;
              else if (window.innerHeight - lastY < edgeSize) sy = speed;

              if (lastX < edgeSize) sx = -speed;
              else if (window.innerWidth - lastX < edgeSize) sx = speed;

              if (sx === 0 && sy === 0) return;

              if (modal.isOpen) {
                const mScroll = document.querySelector('.custom-scrollbar');
                if (mScroll) mScroll.scrollTop += sy;
              } else {
                window.scrollBy(0, sy);
                const hContainer = document.querySelector('.overflow-x-auto');
                if (hContainer && sx !== 0) hContainer.scrollLeft += sx;
              }
            }, 16);
          }
        };

        const stopScroll = () => {
          if (scrollInterval) {
            clearInterval(scrollInterval);
            scrollInterval = null;
          }
        };

        if (isDragging) {
          window.addEventListener('wheel', handleWheel, { passive: false });
          window.addEventListener('dragover', handleDragOver);
          window.addEventListener('dragend', stopScroll);
          window.addEventListener('drop', stopScroll);
        }

        return () => {
          window.removeEventListener('wheel', handleWheel);
          window.removeEventListener('dragover', handleDragOver);
          window.removeEventListener('dragend', stopScroll);
          window.removeEventListener('drop', stopScroll);
          stopScroll();
        };
      }, [draggedBlockId, draggedBoardSubItem, draggedBoardChild, draggedAccountId, draggedModalSubItemId, draggedModalChild, modal.isOpen]);


      /* --- 드래그 핸들러 (이벤트 버블링 차단) --- */
      const clearAllDragStates = () => {
        setDraggedBlockId(null);
        setDraggedAccountId(null);
        setDraggedBoardSubItem(null);
        setDraggedBoardChild(null);
        setDragOverId(null);
        setDraggedModalSubItemId(null);
        setDraggedModalChild(null);
      };

      const handleGenericDragOver = (e) => {
        e.preventDefault();
        e.stopPropagation();
      };

      const handleDragOverItem = (e, targetId) => {
        e.preventDefault();
        e.stopPropagation();
        if (dragOverId !== targetId) {
          setDragOverId(targetId);
        }
      };

      const handleDragLeaveItem = (e, targetId) => {
        e.preventDefault();
        e.stopPropagation();
        if (dragOverId === targetId) {
          setDragOverId(null);
        }
      };

      const handleDragStart = (e, blockId) => {
        if (['BUTTON', 'INPUT', 'TEXTAREA'].includes(e.target.tagName) || e.target.closest('button')) {
          e.preventDefault(); return;
        }
        e.stopPropagation();
        if(e.dataTransfer) { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', blockId); }
        setTimeout(() => {
          clearAllDragStates();
          setDraggedBlockId(blockId);
        }, 0);
      };

      const handleBoardSubItemDragStart = (e, blockId, subItemId) => {
        if (['BUTTON', 'INPUT', 'TEXTAREA'].includes(e.target.tagName) || e.target.closest('button')) {
          e.preventDefault(); return;
        }
        e.stopPropagation();
        if (e.dataTransfer) { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', subItemId); }
        setTimeout(() => {
          clearAllDragStates();
          setDraggedBoardSubItem({ blockId, subItemId });
        }, 0);
      };

      const handleBoardChildDragStart = (e, blockId, subItemId, childId) => {
        if (['BUTTON', 'INPUT', 'TEXTAREA'].includes(e.target.tagName) || e.target.closest('button')) {
          e.preventDefault(); return;
        }
        e.stopPropagation();
        if (e.dataTransfer) { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', childId); }
        setTimeout(() => {
          clearAllDragStates();
          setDraggedBoardChild({ blockId, subItemId, childId });
        }, 0);
      };

      /* --- 드롭 처리 헬퍼 함수들 --- */
      const rebuildBlockWithSubItems = (block, subItems) => {
        const normalizedSubItems = subItems.map(item => normalizeSubItem(item));
        const amount = normalizedSubItems.length > 0 ? normalizedSubItems.reduce((sum, item) => sum + getSubItemAmount(item), 0) : 0;
        return { ...block, subItems: normalizedSubItems, amount };
      };

      // 💡 [순서 변경] - 박스 사이에 넣을 때
      const moveBoardSubItemTo = (targetBlockId, targetSubItemId) => {
        if (!draggedBoardSubItem) return;
        if (draggedBoardSubItem.blockId === targetBlockId && draggedBoardSubItem.subItemId === targetSubItemId) return;

        setBlocks(prev => {
          let movedSubItem = null;
          let sourceIndex = -1;
          let targetOriginalIndex = -1;

          const sBlock = prev.find(b => b.id === draggedBoardSubItem.blockId);
          if (sBlock) sourceIndex = (sBlock.subItems || []).findIndex(s => s.id === draggedBoardSubItem.subItemId);
          const tBlock = prev.find(b => b.id === targetBlockId);
          if (tBlock && targetSubItemId) targetOriginalIndex = (tBlock.subItems || []).findIndex(s => s.id === targetSubItemId);

          let nextBlocks = prev.map(block => {
            if (block.id !== draggedBoardSubItem.blockId) return block;
            const subItems = (block.subItems || []).filter(item => {
              if (item.id === draggedBoardSubItem.subItemId) { movedSubItem = normalizeSubItem(item); return false; }
              return true;
            });
            return rebuildBlockWithSubItems(block, subItems);
          });

          if (!movedSubItem) return prev;

          return nextBlocks.map(block => {
            if (block.id !== targetBlockId) return block;
            const subItems = (block.subItems || []).map(item => normalizeSubItem(item));
            let insertIndex = subItems.length;
            if (targetSubItemId) {
              insertIndex = subItems.findIndex(item => item.id === targetSubItemId);
              if (draggedBoardSubItem.blockId === targetBlockId && sourceIndex > -1 && targetOriginalIndex > -1 && sourceIndex < targetOriginalIndex) {
                insertIndex += 1; 
              }
            }
            if (insertIndex < 0) insertIndex = subItems.length;
            subItems.splice(insertIndex, 0, movedSubItem);
            return rebuildBlockWithSubItems(block, subItems);
          });
        });
      };

      const promoteBoardChildToSubItem = (targetBlockId, targetSubItemId) => {
        if (!draggedBoardChild) return;
        setBlocks(prev => {
          let movedChild = null;
          let nextBlocks = prev.map(block => {
            if (block.id !== draggedBoardChild.blockId) return block;
            const subItems = (block.subItems || []).map(item => {
              const normalizedItem = normalizeSubItem(item);
              if (normalizedItem.id !== draggedBoardChild.subItemId) return normalizedItem;
              const childItems = getChildItems(normalizedItem).filter(child => {
                if (child.id === draggedBoardChild.childId) { movedChild = { ...child }; return false; }
                return true;
              });
              return recalcSubItem(normalizedItem, childItems);
            });
            return rebuildBlockWithSubItems(block, subItems);
          });
          if (!movedChild) return prev;

          const movedSubItem = childToSubItem(movedChild);
          return nextBlocks.map(block => {
            if (block.id !== targetBlockId) return block;
            const subItems = (block.subItems || []).map(item => normalizeSubItem(item));
            let insertIndex = targetSubItemId ? subItems.findIndex(item => item.id === targetSubItemId) : subItems.length;
            if (insertIndex < 0) insertIndex = subItems.length;
            subItems.splice(insertIndex, 0, movedSubItem);
            return rebuildBlockWithSubItems(block, subItems);
          });
        });
      };

      const moveBoardChildTo = (targetBlockId, targetSubItemId, targetChildId) => {
        if (!draggedBoardChild) return;
        setBlocks(prev => {
          let movedChild = null;
          let sourceIndex = -1;
          let targetOriginalIndex = -1;

          const sBlock = prev.find(b => b.id === draggedBoardChild.blockId);
          if (sBlock) {
             const sSub = (sBlock.subItems || []).find(s => s.id === draggedBoardChild.subItemId);
             if (sSub) sourceIndex = getChildItems(sSub).findIndex(c => c.id === draggedBoardChild.childId);
          }
          const tBlock = prev.find(b => b.id === targetBlockId);
          if (tBlock && targetSubItemId && targetChildId) {
             const tSub = (tBlock.subItems || []).find(s => s.id === targetSubItemId);
             if (tSub) targetOriginalIndex = getChildItems(tSub).findIndex(c => c.id === targetChildId);
          }

          let nextBlocks = prev.map(block => {
            if (block.id !== draggedBoardChild.blockId) return block;
            const subItems = (block.subItems || []).map(item => {
              const normalizedItem = normalizeSubItem(item);
              if (normalizedItem.id !== draggedBoardChild.subItemId) return normalizedItem;
              const childItems = getChildItems(normalizedItem).filter(child => {
                if (child.id === draggedBoardChild.childId) { movedChild = { ...child }; return false; }
                return true;
              });
              return recalcSubItem(normalizedItem, childItems);
            });
            return rebuildBlockWithSubItems(block, subItems);
          });
          
          if (!movedChild) return prev;

          return nextBlocks.map(block => {
            if (block.id !== targetBlockId) return block;
            const subItems = (block.subItems || []).map(item => {
              const normalizedItem = normalizeSubItem(item);
              if (normalizedItem.id !== targetSubItemId) return normalizedItem;
              let childItems = getChildItems(normalizedItem).map(child => ({ ...child }));
              
              let insertIndex = childItems.length;
              if (targetChildId) {
                insertIndex = childItems.findIndex(child => child.id === targetChildId);
                if (draggedBoardChild.blockId === targetBlockId && draggedBoardChild.subItemId === targetSubItemId && sourceIndex > -1 && targetOriginalIndex > -1 && sourceIndex < targetOriginalIndex) {
                  insertIndex += 1;
                }
              }
              
              if (insertIndex < 0) insertIndex = childItems.length;
              childItems.splice(insertIndex, 0, movedChild);
              return recalcSubItem(normalizedItem, childItems);
            });
            return rebuildBlockWithSubItems(block, subItems);
          });
        });
      };

      // 💡 [병합] - 박스 몸통 정중앙에 넣을 때 하위로 쏙! (기존 금액 생성 안 함)
      const moveBoardSubItemIntoChild = (targetBlockId, targetSubItemId) => {
        if (!draggedBoardSubItem) return;
        if (draggedBoardSubItem.blockId === targetBlockId && draggedBoardSubItem.subItemId === targetSubItemId) return; // 자신한테 들어가는 오류 방지

        setBlocks(prev => {
          let movedSubItem = null;
          let nextBlocks = prev.map(block => {
            if (block.id !== draggedBoardSubItem.blockId) return block;
            const subItems = (block.subItems || []).filter(item => {
              if (item.id === draggedBoardSubItem.subItemId) { movedSubItem = normalizeSubItem(item); return false; }
              return true;
            });
            return rebuildBlockWithSubItems(block, subItems);
          });
          if (!movedSubItem) return prev;

          const movedChild = subItemToChildItem(movedSubItem);
          return nextBlocks.map(block => {
            if (block.id !== targetBlockId) return block;
            const subItems = (block.subItems || []).map(item => {
              const normalizedItem = normalizeSubItem(item);
              if (normalizedItem.id !== targetSubItemId) return normalizedItem;
              let childItems = getChildItems(normalizedItem).map(child => ({ ...child }));
              // "기존 금액" 생성 없이 바로 병합
              childItems.push(movedChild); 
              return recalcSubItem(normalizedItem, childItems);
            });
            return rebuildBlockWithSubItems(block, subItems);
          });
        });
      };


      /* --- 통합 Drop 핸들러 (병합/순서변경 완벽 분리) --- */
      
      const handleDropOnBlockReorder = (e, targetAccountId, targetBlockId) => {
        e.preventDefault(); e.stopPropagation();
        setDragOverId(null);
        if (draggedBlockId) {
          if (draggedBlockId === targetBlockId) { clearAllDragStates(); return; }
          setBlocks(prev => {
            const bIndex = prev.findIndex(b => b.id === draggedBlockId);
            if (bIndex < 0) return prev;
            const newBlocks = [...prev];
            const [movedBlock] = newBlocks.splice(bIndex, 1);
            movedBlock.accountId = targetAccountId;

            const tIndex = newBlocks.findIndex(b => b.id === targetBlockId);
            newBlocks.splice(tIndex < 0 ? newBlocks.length : tIndex, 0, movedBlock);
            return newBlocks;
          });
        } else if (draggedBoardSubItem) {
          setBlocks(prev => {
            let movedSubItem = null;
            const newBlocks = prev.map(b => {
              if (b.id === draggedBoardSubItem.blockId) {
                const subItems = (b.subItems || []).filter(s => {
                  if (s.id === draggedBoardSubItem.subItemId) { movedSubItem = s; return false; }
                  return true;
                });
                return rebuildBlockWithSubItems(b, subItems);
              }
              return b;
            });
            if (movedSubItem) {
              const newBlock = {
                id: createId('b_ext'), accountId: targetAccountId, label: movedSubItem.label, amount: getSubItemAmount(movedSubItem),
                color: 'none', isPlanned: !!movedSubItem.isPlanned, subItems: getChildItems(movedSubItem).map(c => ({ ...c, childItems: [] }))
              };
              const tIndex = newBlocks.findIndex(b => b.id === targetBlockId);
              newBlocks.splice(tIndex < 0 ? newBlocks.length : tIndex, 0, newBlock);
            }
            return newBlocks;
          });
        } else if (draggedBoardChild) {
          setBlocks(prev => {
            let movedChild = null;
            const newBlocks = prev.map(b => {
              if (b.id === draggedBoardChild.blockId) {
                const subItems = (b.subItems || []).map(s => {
                  if (s.id === draggedBoardChild.subItemId) {
                    const childItems = getChildItems(s).filter(c => {
                      if (c.id === draggedBoardChild.childId) { movedChild = c; return false; }
                      return true;
                    });
                    return recalcSubItem(s, childItems);
                  }
                  return s;
                });
                return rebuildBlockWithSubItems(b, subItems);
              }
              return b;
            });
            if (movedChild) {
              const newBlock = {
                id: createId('b_ext'), accountId: targetAccountId, label: movedChild.label, amount: movedChild.amount,
                color: 'none', isPlanned: !!movedChild.isPlanned, subItems: []
              };
              const tIndex = newBlocks.findIndex(b => b.id === targetBlockId);
              newBlocks.splice(tIndex < 0 ? newBlocks.length : tIndex, 0, newBlock);
            }
            return newBlocks;
          });
        }
        clearAllDragStates();
      };

      const handleDropOnBlockMerge = (e, targetAccountId, targetBlockId) => {
        e.preventDefault(); e.stopPropagation();
        setDragOverId(null);
        if (draggedBlockId) {
          if (draggedBlockId === targetBlockId) { clearAllDragStates(); return; }
          setBlocks(prev => {
            const rawSource = prev.find(b => b.id === draggedBlockId);
            if (!rawSource) return prev;
            const source = normalizeBlock(rawSource);
            return prev.filter(b => b.id !== draggedBlockId).map(b => {
              if (b.id === targetBlockId) {
                let newSubItems = b.subItems ? b.subItems.map(item => ({ ...normalizeSubItem(item), isPlanned: !!b.isPlanned || !!item.isPlanned })) : [];
                // 💡 "기존 금액" 생성 없이 바로 병합
                newSubItems.push({
                  id: createId('s_mrg'), label: source.label, amount: getBlockAmount(source), isPlanned: !!source.isPlanned, amountColor: 'auto',
                  childItems: source.subItems ? source.subItems.map(item => ({ id: createId('c_mrg'), label: item.label, amount: getSubItemAmount(item), amountColor: item.amountColor || 'auto' })) : []
                });
                const newTotal = newSubItems.reduce((sum, item) => sum + getSubItemAmount(item), 0);
                return { ...b, isPlanned: false, subItems: newSubItems, amount: newTotal };
              }
              return b;
            });
          });
        }
        clearAllDragStates();
      };

      const handleDropOnSubItemMerge = (e, targetBlockId, targetSubItemId) => {
        e.preventDefault(); e.stopPropagation();
        setDragOverId(null);
        if (draggedBlockId) handleDropOnBlockMerge(e, null, targetBlockId); 
        else if (draggedBoardSubItem) moveBoardSubItemIntoChild(targetBlockId, targetSubItemId); 
        else if (draggedBoardChild) moveBoardChildTo(targetBlockId, targetSubItemId, null); // 자식을 중분류 바에 놓으면 자식의 맨 뒤로
        clearAllDragStates();
      };

      const handleDropOnSubItemReorder = (e, targetBlockId, targetSubItemId) => {
        e.preventDefault(); e.stopPropagation();
        setDragOverId(null);
        if (draggedBlockId) handleDropOnBlockReorder(e, null, targetBlockId); 
        else if (draggedBoardSubItem) moveBoardSubItemTo(targetBlockId, targetSubItemId);
        else if (draggedBoardChild) promoteBoardChildToSubItem(targetBlockId, targetSubItemId);
        clearAllDragStates();
      };

      const handleDropOnChildItemReorder = (e, targetBlockId, targetSubItemId, targetChildId) => {
        e.preventDefault(); e.stopPropagation();
        setDragOverId(null);
        if (draggedBlockId) handleDropOnBlockMerge(e, null, targetBlockId);
        else if (draggedBoardSubItem) moveBoardSubItemIntoChild(targetBlockId, targetSubItemId);
        else if (draggedBoardChild) moveBoardChildTo(targetBlockId, targetSubItemId, targetChildId);
        clearAllDragStates();
      };

      const handleDropOnChildItem = (e, targetBlockId, targetSubItemId, targetChildId) => {
        e.preventDefault(); e.stopPropagation();
        setDragOverId(null);
        if (draggedBlockId) handleDropOnBlockMerge(e, null, targetBlockId);
        else if (draggedBoardSubItem) moveBoardSubItemIntoChild(targetBlockId, targetSubItemId);
        else if (draggedBoardChild) moveBoardChildTo(targetBlockId, targetSubItemId, targetChildId);
        clearAllDragStates();
      };

      // 기둥(Column) 드롭 (다른 패널로 이동 / 대분류 분리)
      const handleDropOnColumn = (e, targetAccountId) => {
        e.preventDefault(); e.stopPropagation();
        setDragOverId(null);
        
        if (draggedAccountId) {
          const draggedIdx = accountsData.findIndex(a => a.id === draggedAccountId);
          const targetIdx = accountsData.findIndex(a => a.id === targetAccountId);
          if (draggedIdx !== -1 && targetIdx !== -1 && draggedIdx !== targetIdx) {
            const newAccs = [...accountsData];
            const [removed] = newAccs.splice(draggedIdx, 1);
            newAccs.splice(targetIdx, 0, removed);
            setAccountsData(newAccs);
          }
        } else if (draggedBoardSubItem) {
          setBlocks(prev => {
            let movedSubItem = null;
            const newBlocks = prev.map(b => {
              if (b.id === draggedBoardSubItem.blockId) {
                const subItems = (b.subItems || []).filter(s => {
                  if (s.id === draggedBoardSubItem.subItemId) { movedSubItem = s; return false; }
                  return true;
                });
                return rebuildBlockWithSubItems(b, subItems);
              }
              return b;
            });
            if (movedSubItem) {
              newBlocks.push({
                id: createId('b_ext'), accountId: targetAccountId, label: movedSubItem.label, amount: getSubItemAmount(movedSubItem),
                color: 'none', isPlanned: !!movedSubItem.isPlanned, subItems: getChildItems(movedSubItem).map(c => ({ ...c, childItems: [] }))
              });
            }
            return newBlocks;
          });
        } else if (draggedBoardChild) {
          setBlocks(prev => {
            let movedChild = null;
            const newBlocks = prev.map(b => {
              if (b.id === draggedBoardChild.blockId) {
                const subItems = (b.subItems || []).map(s => {
                  if (s.id === draggedBoardChild.subItemId) {
                    const childItems = getChildItems(s).filter(c => {
                      if (c.id === draggedBoardChild.childId) { movedChild = c; return false; }
                      return true;
                    });
                    return recalcSubItem(s, childItems);
                  }
                  return s;
                });
                return rebuildBlockWithSubItems(b, subItems);
              }
              return b;
            });
            if (movedChild) {
              newBlocks.push({
                id: createId('b_ext'), accountId: targetAccountId, label: movedChild.label, amount: movedChild.amount,
                color: 'none', isPlanned: !!movedChild.isPlanned, subItems: []
              });
            }
            return newBlocks;
          });
        } else if (draggedBlockId) {
          setBlocks(prev => {
            const draggedBlock = prev.find(b => b.id === draggedBlockId);
            const newBlocks = prev.filter(b => b.id !== draggedBlockId);
            newBlocks.push({ ...draggedBlock, accountId: targetAccountId });
            return newBlocks;
          });
        }
        clearAllDragStates();
      };

      /* --- 확장된 금액 나누기 (Split) --- */
      const openSplitModal = (e, type, block, subItem, childItem) => {
        e.stopPropagation();

        if (type === 'block' && block.subItems && block.subItems.length > 0) {
          return alert("하위 항목이 포함된 박스는 분할할 수 없습니다.\n먼저 항목을 밖으로 빼낸 뒤 분할해주세요.");
        }
        if (type === 'sub' && getChildItems(subItem).length > 0) {
          return alert("하위 항목이 포함된 박스는 분할할 수 없습니다.\n먼저 항목을 밖으로 빼낸 뒤 분할해주세요.");
        }

        let sourceAmount = 0; let label = '';
        if (type === 'block') { sourceAmount = block.amount; label = block.label; }
        else if (type === 'sub') { sourceAmount = getSubItemAmount(subItem); label = subItem.label; }
        else if (type === 'child') { sourceAmount = childItem.amount; label = childItem.label; }

        setSplitModal({
          isOpen: true, targetType: type,
          blockId: block?.id, subItemId: subItem?.id, childId: childItem?.id,
          sourceAmount, label, amountInput: ''
        });
      };

      const handleSplitAmountChange = (e) => {
        let val = e.target.value.replace(/[^0-9]/g, '');
        setSplitModal(p => ({ ...p, amountInput: val ? formatCurrency(parseInt(val, 10)) : '' }));
      };

      const executeSplit = (e) => {
        e.preventDefault();
        const val = parseInt(splitModal.amountInput.replace(/[^0-9]/g, ''), 10);
        if (!val || val <= 0) return alert('분리해 낼 금액을 정확히 입력하세요.');
        
        const sign = splitModal.sourceAmount >= 0 ? 1 : -1;
        const splitVal = val * sign;

        if (Math.abs(splitVal) >= Math.abs(splitModal.sourceAmount)) {
          return alert('기존 금액보다 작은 금액만 떼어낼 수 있습니다.');
        }

        setBlocks(prev => {
          let newBlocks = [...prev];

          if (splitModal.targetType === 'block') {
            newBlocks = newBlocks.map(b => {
              if (b.id === splitModal.blockId) return { ...b, amount: b.amount - splitVal };
              return b;
            });
            const sourceBlock = prev.find(b => b.id === splitModal.blockId);
            const targetIndex = newBlocks.findIndex(b => b.id === splitModal.blockId);
            newBlocks.splice(targetIndex + 1, 0, {
              id: createId('b_split'), accountId: sourceBlock.accountId, label: `${sourceBlock.label} (분할)`,
              amount: splitVal, color: sourceBlock.color, isPlanned: !!sourceBlock.isPlanned, subItems: []
            });
          }
          else if (splitModal.targetType === 'sub') {
            newBlocks = newBlocks.map(b => {
              if (b.id !== splitModal.blockId) return b;
              const newSubItems = [...b.subItems];
              const sIdx = newSubItems.findIndex(s => s.id === splitModal.subItemId);
              if(sIdx > -1) {
                const sourceSub = newSubItems[sIdx];
                newSubItems[sIdx] = { ...sourceSub, amount: sourceSub.amount - splitVal };
                newSubItems.splice(sIdx + 1, 0, {
                  id: createId('s_split'), label: `${sourceSub.label} (분할)`, amount: splitVal,
                  amountColor: sourceSub.amountColor, isPlanned: !!sourceSub.isPlanned, childItems: []
                });
              }
              return rebuildBlockWithSubItems(b, newSubItems);
            });
          }
          else if (splitModal.targetType === 'child') {
            newBlocks = newBlocks.map(b => {
              if (b.id !== splitModal.blockId) return b;
              const newSubItems = b.subItems.map(s => {
                if (s.id !== splitModal.subItemId) return s;
                const newChildItems = [...getChildItems(s)];
                const cIdx = newChildItems.findIndex(c => c.id === splitModal.childId);
                if (cIdx > -1) {
                  const sourceChild = newChildItems[cIdx];
                  newChildItems[cIdx] = { ...sourceChild, amount: sourceChild.amount - splitVal };
                  newChildItems.splice(cIdx + 1, 0, {
                    id: createId('c_split'), label: `${sourceChild.label} (분할)`, amount: splitVal, amountColor: sourceChild.amountColor
                  });
                }
                return recalcSubItem(s, newChildItems);
              });
              return rebuildBlockWithSubItems(b, newSubItems);
            });
          }
          return newBlocks;
        });

        setSplitModal({ isOpen: false, targetType: null, blockId: null, subItemId: null, childId: null, sourceAmount: 0, amountInput: '', label: '' });
      };

      /* --- 블록 다중 선택 로직 --- */
      const handleBlockClick = (e, blockId) => {
        if (e.target.closest('.no-select-trigger') || e.target.closest('button')) return;
        if (e.ctrlKey || e.metaKey) {
          setSelectedBlocks(prev => prev.includes(blockId) ? prev.filter(id => id !== blockId) : [...prev, blockId]);
        } else {
          setSelectedBlocks(prev => (prev.length === 1 && prev[0] === blockId) ? [] : [blockId]);
        }
      };

      const handleBgClick = (e) => {
        if (!e.target.closest('.block-item') && !e.target.closest('.selection-bar')) setSelectedBlocks([]);
      };

      /* --- 그 외 모달 관련 함수들 --- */
      const openCloseMonthModal = (accountId) => {
        const today = new Date();
        const defaultMonth = `${today.getFullYear()}. ${String(today.getMonth() + 1).padStart(2, '0')}월`;
        setCloseMonthModal({ isOpen: true, accountId, monthLabel: defaultMonth });
      };
      const executeCloseMonth = (e) => {
        e.preventDefault();
        const { accountId, monthLabel } = closeMonthModal;
        const accountBlocks = blocks.filter(b => b.accountId === accountId);
        const blocksSnapshot = accountBlocks.map(b => {
          const normalizedBlock = normalizeBlock(b);
          return { id: createId('snap'), label: normalizedBlock.label, amount: normalizedBlock.amount, color: normalizedBlock.color || 'none', isPlanned: !!normalizedBlock.isPlanned, subItems: normalizedBlock.subItems };
        });
        setAccountsData(prev => prev.map(acc => {
          if (acc.id === accountId) {
            const newReport = { id: createId('rep'), month: monthLabel, blocks: blocksSnapshot };
            return { ...acc, reportData: [newReport, ...(acc.reportData || [])] };
          }
          return acc;
        }));
        setCloseMonthModal({ isOpen: false, accountId: null, monthLabel: '' });
      };

      const handleReportBlockChange = (reportId, blockId, field, value) => {
        setAccountsData(prev => prev.map(acc => {
          if (acc.id === reportModal.accountId) {
            return {
              ...acc, reportData: acc.reportData.map(rep => {
                if (rep.id === reportId) {
                  return {
                    ...rep, blocks: rep.blocks.map(b => {
                      if (b.id === blockId) {
                        if (field === 'amount') {
                          let val = value.replace(/[^0-9-]/g, '');
                          if (val.lastIndexOf('-') > 0) val = val.replace(/-/g, '').replace(/^/, '-');
                          return { ...b, amountString: val, amount: parseInt(val, 10) || 0 };
                        }
                        return { ...b, [field]: value };
                      }
                      return b;
                    })
                  };
                }
                return rep;
              })
            };
          }
          return acc;
        }));
      };
      const addReportBlock = (reportId) => {
        setAccountsData(prev => prev.map(acc => {
          if (acc.id === reportModal.accountId) {
            return {
              ...acc, reportData: acc.reportData.map(rep => {
                if (rep.id === reportId) return { ...rep, blocks: [...rep.blocks, { id: createId('snap'), label: '', amount: 0, amountString: '', color: 'none', isPlanned: false, subItems: [] }] };
                return rep;
              })
            };
          }
          return acc;
        }));
      };
      const deleteReportBlock = (reportId, blockId) => {
        setAccountsData(prev => prev.map(acc => {
          if (acc.id === reportModal.accountId) {
            return { ...acc, reportData: acc.reportData.map(rep => { if (rep.id === reportId) return { ...rep, blocks: rep.blocks.filter(b => b.id !== blockId) }; return rep; }) };
          }
          return acc;
        }));
      };
      const deleteEntireReport = (reportId) => {
        if(!confirm('이 결산월의 모든 내역을 삭제하시겠습니까?')) return;
        setAccountsData(prev => prev.map(acc => {
          if (acc.id === reportModal.accountId) return { ...acc, reportData: acc.reportData.filter(r => r.id !== reportId) };
          return acc;
        }));
      };

      const addNewAccount = () => {
        const newAcc = { id: createId('acc'), name: '새로운 현장', bank: '은행명', accountNo: '계좌번호 입력', icon: 'ph-fill ph-hard-hat', theme: 'slate', cardHolder: '이사님', reportData: [] };
        setAccountsData([...accountsData, newAcc]);
      };
      const openSettingsModal = (account) => setSettingsModal({ isOpen: true, accountData: { ...account, cardHolder: account.cardHolder || DEFAULT_CARD_HOLDERS[account.id] || '' } });
      const saveSettings = (e) => {
        e.preventDefault();
        setAccountsData(prev => prev.map(acc => acc.id === settingsModal.accountData.id ? settingsModal.accountData : acc));
        setSettingsModal({ isOpen: false, accountData: null });
      };

      const openCreateModal = (accountId) => setModal({ isOpen: true, mode: 'create', amountInput: '', blockData: { id: createId('b_new'), accountId, label: '새 내역', amount: 0, color: 'none', isPlanned: false, subItems: [] } });
      const openEditModal = (block) => {
        const normalizedBlock = normalizeBlock({ isPlanned: false, subItems: [], ...block });
        setModal({ isOpen: true, mode: 'edit', amountInput: normalizedBlock.amount === 0 ? '' : formatCurrency(normalizedBlock.amount), blockData: normalizedBlock });
      };
      const closeModals = () => { setModal({ isOpen: false, mode: 'create', blockData: null, amountInput: '' }); setReportModal({ isOpen: false, accountId: null }); };
      const toggleBlockPlanned = (blockId) => setBlocks(prev => prev.map(b => b.id === blockId ? { ...b, isPlanned: !b.isPlanned } : b));
      const toggleSubItems = (blockId) => setCollapsedSubItems(prev => prev.includes(blockId) ? prev.filter(id => id !== blockId) : [...prev, blockId]);
      const saveBlock = (e) => {
        e.preventDefault();
        const blockToSave = normalizeBlock(modal.blockData);
        if (modal.mode === 'create') setBlocks(prev => [...prev, blockToSave]);
        else setBlocks(prev => prev.map(b => b.id === blockToSave.id ? blockToSave : b));
        closeModals();
      };
      const deleteBlock = (blockId) => {
        setBlocks(prev => prev.filter(b => b.id !== blockId));
        setSelectedBlocks(prev => prev.filter(id => id !== blockId));
        closeModals();
      };

      // Modal inner Logic
      const handleAmountChange = (e) => {
        let val = e.target.value.replace(/[^0-9-]/g, '');
        if (val.lastIndexOf('-') > 0) val = val.replace(/-/g, '').replace(/^/, '-');
        if (val === '' || val === '-') { setModal(prev => ({ ...prev, amountInput: val, blockData: { ...prev.blockData, amount: 0 } })); return; }
        const parsed = parseInt(val, 10);
        setModal(prev => ({ ...prev, amountInput: formatCurrency(parsed), blockData: { ...prev.blockData, amount: parsed } }));
      };
      const toggleModalPlanned = () => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, isPlanned: !prev.blockData.isPlanned } }));
      const handleSubItemChange = (id, field, value) => setModal(prev => {
        const newSubItems = prev.blockData.subItems.map(item => {
          if (item.id === id) {
            if (field === 'amount') {
              if (getChildItems(item).length > 0) return item;
              let val = value.replace(/[^0-9-]/g, '');
              if (val.lastIndexOf('-') > 0) val = val.replace(/-/g, '').replace(/^/, '-');
              return { ...item, amountString: val, amount: parseInt(val, 10) || 0 };
            }
            return { ...item, [field]: value };
          }
          return item;
        });
        return updateModalSubItems(prev, newSubItems);
      });
      const addSubItem = () => setModal(prev => updateModalSubItems(prev, [...(prev.blockData.subItems || []), { id: createId('s'), label: '', amount: 0, amountString: '', amountColor: 'auto', isPlanned: false, childItems: [] }]));
      const removeSubItem = (id) => setModal(prev => updateModalSubItems(prev, prev.blockData.subItems.filter(item => item.id !== id)));
      const setSubItemColor = (id, colorKey) => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, subItems: prev.blockData.subItems.map(item => item.id === id ? { ...item, amountColor: colorKey } : item) } }));
      const addChildItem = (subItemId) => setModal(prev => {
        const newSubItems = prev.blockData.subItems.map(item => {
          if (item.id !== subItemId) return item;
          let childItems = getChildItems(item).map(child => ({ ...child }));
          // 기존 금액 자동 생성 로직 삭제됨 (요청 반영)
          childItems.push({ id: createId('c'), label: '', amount: 0, amountString: '', amountColor: 'auto' });
          const newAmount = childItems.reduce((sum, child) => sum + getAmountValue(child), 0);
          return { ...item, childItems, amount: newAmount, amountString: String(newAmount) };
        });
        return updateModalSubItems(prev, newSubItems);
      });
      const handleChildItemChange = (subItemId, childId, field, value) => setModal(prev => {
        const newSubItems = prev.blockData.subItems.map(item => {
          if (item.id !== subItemId) return item;
          const childItems = getChildItems(item).map(child => {
            if (child.id !== childId) return child;
            if (field === 'amount') {
              let val = value.replace(/[^0-9-]/g, '');
              if (val.lastIndexOf('-') > 0) val = val.replace(/-/g, '').replace(/^/, '-');
              return { ...child, amountString: val, amount: parseInt(val, 10) || 0 };
            }
            return { ...child, [field]: value };
          });
          const newAmount = childItems.reduce((sum, child) => sum + getAmountValue(child), 0);
          return { ...item, childItems, amount: newAmount, amountString: String(newAmount) };
        });
        return updateModalSubItems(prev, newSubItems);
      });
      const removeChildItem = (subItemId, childId) => setModal(prev => {
        const newSubItems = prev.blockData.subItems.map(item => {
          if (item.id !== subItemId) return item;
          const childItems = getChildItems(item).filter(child => child.id !== childId);
          const newAmount = childItems.reduce((sum, child) => sum + getAmountValue(child), 0);
          return { ...item, childItems, amount: newAmount, amountString: String(newAmount) };
        });
        return updateModalSubItems(prev, newSubItems);
      });
      const setChildItemColor = (subItemId, childId, colorKey) => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, subItems: prev.blockData.subItems.map(item => item.id === subItemId ? { ...item, childItems: getChildItems(item).map(child => child.id === childId ? { ...child, amountColor: colorKey } : child) } : item) } }));
      
      const childToSubItem = (child) => {
        const amount = getAmountValue(child);
        return { id: createId('s_prm'), label: child.label || '이동된 항목', amount, amountString: String(amount), amountColor: child.amountColor || 'auto', isPlanned: !!child.isPlanned, childItems: [] };
      };
      const subItemToChildItem = (item) => {
        const amount = getSubItemAmount(item);
        return { id: createId('c_dmo'), label: item.label || '이동된 항목', amount, amountString: String(amount), amountColor: item.amountColor || 'auto' };
      };
      const recalcSubItem = (item, childItems) => {
        const newAmount = childItems.reduce((sum, child) => sum + getAmountValue(child), 0);
        return { ...item, childItems, amount: newAmount, amountString: String(newAmount) };
      };

      // Modal Drag & Drop Handlers
      const handleModalSubItemDragStart = (e, id) => {
        if (['BUTTON', 'INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
        e.stopPropagation();
        if (e.dataTransfer) { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', id); }
        setTimeout(() => {
          clearAllDragStates();
          setDraggedModalSubItemId(id);
        }, 0);
      };
      const handleModalChildDragStart = (e, subItemId, childId) => {
        if (['BUTTON', 'INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
        e.stopPropagation();
        if (e.dataTransfer) { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', childId); }
        setTimeout(() => {
          clearAllDragStates();
          setDraggedModalChild({ subItemId, childId });
        }, 0);
      };

      const handleModalSubItemDrop = (e, targetId) => {
        e.preventDefault(); e.stopPropagation();
        setDragOverId(null);
        if (draggedModalSubItemId) {
          if (draggedModalSubItemId === targetId) return;
          setModal(prev => {
            const newSubItems = [...(prev.blockData.subItems || [])];
            const sourceIndex = newSubItems.findIndex(item => item.id === draggedModalSubItemId);
            if (sourceIndex < 0) return prev;
            
            const [movedItem] = newSubItems.splice(sourceIndex, 1);
            let insertIndex = newSubItems.length;
            if (targetId) {
              insertIndex = newSubItems.findIndex(item => item.id === targetId);
            }
            newSubItems.splice(insertIndex < 0 ? newSubItems.length : insertIndex, 0, movedItem);
            return updateModalSubItems(prev, newSubItems);
          });
        } else if (draggedModalChild) {
          setModal(prev => {
            let movedChild = null;
            const withoutDragged = (prev.blockData.subItems || []).map(item => {
              let childItems = getChildItems(item).map(child => ({ ...child }));
              if (item.id === draggedModalChild.subItemId) {
                const currentIndex = childItems.findIndex(child => child.id === draggedModalChild.childId);
                if (currentIndex >= 0) [movedChild] = childItems.splice(currentIndex, 1);
                return recalcSubItem(item, childItems);
              }
              return { ...item, childItems };
            });
            if (!movedChild) return prev;
            const movedSubItem = childToSubItem(movedChild);
            const insertIndex = targetId ? withoutDragged.findIndex(item => item.id === targetId) : withoutDragged.length;
            withoutDragged.splice(insertIndex < 0 ? withoutDragged.length : insertIndex, 0, movedSubItem);
            return updateModalSubItems(prev, withoutDragged);
          });
        }
        clearAllDragStates();
      };

      const handleModalChildDrop = (e, targetSubItemId, targetChildId) => {
        e.preventDefault(); e.stopPropagation();
        setDragOverId(null);
        if (draggedModalSubItemId) {
          setModal(prev => {
            let movedSubItem = null;
            const withoutDragged = (prev.blockData.subItems || []).filter(item => {
              if (item.id === draggedModalSubItemId) { movedSubItem = normalizeSubItem(item); return false; }
              return true;
            });
            if (!movedSubItem) return prev;
            const movedChild = subItemToChildItem(movedSubItem);
            const newSubItems = withoutDragged.map(item => {
              if (item.id !== targetSubItemId) return item;
              let childItems = getChildItems(item).map(child => ({ ...child }));
              // 기존 금액 자동 생성 로직 삭제
              let insertIndex = targetChildId ? childItems.findIndex(child => child.id === targetChildId) : childItems.length;
              childItems.splice(insertIndex < 0 ? childItems.length : insertIndex, 0, movedChild);
              return recalcSubItem(item, childItems);
            });
            return updateModalSubItems(prev, newSubItems);
          });
        } else if (draggedModalChild) {
          if (draggedModalChild.subItemId === targetSubItemId && draggedModalChild.childId === targetChildId) return;
          setModal(prev => {
            let movedChild = null;
            const withoutDragged = (prev.blockData.subItems || []).map(item => {
              let childItems = getChildItems(item).map(child => ({ ...child }));
              if (item.id === draggedModalChild.subItemId) {
                const currentIndex = childItems.findIndex(child => child.id === draggedModalChild.childId);
                if (currentIndex >= 0) [movedChild] = childItems.splice(currentIndex, 1);
                return recalcSubItem(item, childItems);
              }
              return { ...item, childItems };
            });
            if (!movedChild) return prev;

            const newSubItems = withoutDragged.map(item => {
              if (item.id !== targetSubItemId) return item;
              let childItems = getChildItems(item).map(child => ({ ...child }));
              
              let insertIndex = childItems.length;
              if (targetChildId) {
                insertIndex = childItems.findIndex(child => child.id === targetChildId);
              }
              childItems.splice(insertIndex < 0 ? childItems.length : insertIndex, 0, movedChild);
              return recalcSubItem(item, childItems);
            });
            return updateModalSubItems(prev, newSubItems);
          });
        }
        clearAllDragStates();
      };


      return (
        <div className="min-h-screen bg-[#F5F2EC] text-[#3D2B1F] font-sans flex flex-col overflow-x-hidden" onClick={handleBgClick}>
          {isInitialLoading && (
            <div className="fixed inset-0 z-[100] bg-[#F5F2EC] flex flex-col items-center justify-center text-[#3D2B1F]">
              <div className="w-14 h-14 bg-white border border-[#E6E0D4] rounded-2xl shadow-lg flex items-center justify-center mb-5">
                <i className="ph-bold ph-spinner animate-spin text-[#8B5A2B]" style={{fontSize: 28}}></i>
              </div>
              <p className="text-lg font-black">최신 화면 불러오는 중</p>
              <p className="text-xs font-bold text-[#A69C8E] mt-2">클라우드 데이터 확인 후 화면을 보여드립니다.</p>
            </div>
          )}
          
          {/* 1. 상단 글로벌 헤더 */}
          <header className="min-h-[72px] bg-[#FDFCFB] border-b border-[#E6E0D4] flex flex-wrap items-center justify-between gap-4 px-4 sm:px-8 py-3 shrink-0 sticky top-0 z-30 shadow-sm">
            <div className="flex items-center gap-3 min-w-0">
              <HwarimLogo />
              <div>
                <h1 className="text-xl font-extrabold text-[#3D2B1F] tracking-tight">화림 ERP</h1>
                <p className="text-[10px] font-bold text-[#A69C8E] uppercase tracking-widest mt-0.5">Cloud Web Application</p>
              </div>
            </div>

            <div className="flex items-center gap-3 shrink-0">
              <div className="text-right max-w-[260px]">
                <p className="text-[10px] font-extrabold text-[#A69C8E] uppercase tracking-widest">마지막 클라우드 저장</p>
                <p className="text-[11px] font-bold text-[#6D5443] mt-0.5">{formatLastSavedAt(lastSavedAt)}</p>
              </div>
              <button 
                onClick={syncToCloud}
                disabled={isSyncing}
                className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold border transition-colors shadow-sm
                  ${isSyncing ? 'bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed' : 'bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border-indigo-200'}
                `}
              >
                {isSyncing ? <i className="ph-bold ph-spinner animate-spin" style={{fontSize: 16}}></i> : <i className="ph-fill ph-cloud-arrow-up" style={{fontSize: 16}}></i>} 
                {isSyncing ? '동기화 중...' : '클라우드 저장'}
              </button>
            </div>
          </header>

          {/* 2. 메인 칸반 보드 영역 */}
          <div className="flex-1 overflow-x-auto overflow-y-visible p-6 hide-scrollbar relative">
            <div className="flex gap-5 items-start min-w-max">
              
              {accountsData.map(account => {
                const accountBlocks = blocks.filter(b => b.accountId === account.id);
                const accountTotal = accountBlocks.reduce((sum, b) => sum + getEffectiveAmount(b), 0);
                const theme = COLUMN_THEMES[account.theme || 'wood'];
                const cardHolders = getCardHolders(account);

                return (
                  <div 
                    key={account.id}
                    onDragOver={(e) => handleDragOverItem(e, account.id)}
                    onDragLeave={(e) => handleDragLeaveItem(e, account.id)}
                    onDrop={(e) => { setDragOverId(null); handleDropOnColumn(e, account.id); }}
                    className={`w-[360px] flex flex-col rounded-xl border-2 shadow-lg overflow-hidden transition-colors duration-200 shrink-0 ${theme.panelBg}
                      ${dragOverId === account.id ? 'border-[#8B5A2B] ring-4 ring-indigo-200 bg-[#EFEBE4]' : theme.border}
                    `}
                  >
                    {/* 2-1. 패널 헤더 */}
                    <div 
                      draggable={true}
                      onDragStart={(e) => { 
                        if(e.dataTransfer) e.dataTransfer.effectAllowed = 'move'; 
                        setTimeout(() => { clearAllDragStates(); setDraggedAccountId(account.id); }, 0); 
                      }}
                      onDragEnd={clearAllDragStates}
                      className={`px-5 py-4 bg-white border-b border-[#E6E0D4] shrink-0 ${theme.light} bg-opacity-30 cursor-grab active:cursor-grabbing select-none`}
                      title="클릭하고 드래그하여 패널 순서 변경"
                    >
                      <div className="flex items-center gap-2 mb-1 min-w-0 pointer-events-none">
                        <i className={`ph-bold ph-dots-six-vertical text-[#A69C8E] mr-1`} style={{fontSize: 20}}></i>
                        <i className={`${account.icon} ${theme.text}`} style={{fontSize: 18}}></i>
                        <h2 className="font-black text-[16px] text-[#2A1D15] truncate flex-1 min-w-0">{account.name}</h2>
                        {cardHolders.map(holder => (
                          <span key={holder} className="shrink-0 text-[10px] font-black px-1.5 py-0.5 rounded-md bg-white border border-[#D2B48C] text-[#8B5A2B] flex items-center gap-1 shadow-sm">
                            <i className="ph-fill ph-credit-card" style={{fontSize: 11}}></i>카드[{holder}]
                          </span>
                        ))}
                      </div>
                      <div className="flex items-center gap-1.5 text-[11px] font-bold text-[#6D5443] ml-10 opacity-80 pointer-events-none">
                        <i className="ph-fill ph-credit-card" style={{fontSize: 12}}></i> {account.bank} | <span className="font-mono">{account.accountNo}</span>
                      </div>
                    </div>

                    {/* 2-2. 4버튼 툴바 */}
                    <div className="grid grid-cols-4 bg-white/60 backdrop-blur-sm border-b border-[#E6E0D4] shrink-0">
                      <button onClick={() => setReportModal({ isOpen: true, accountId: account.id })} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] border-r border-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-chart-bar ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">결산서</span>
                      </button>
                      <button onClick={() => openCloseMonthModal(account.id)} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] border-r border-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-calendar-check ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">월 마감</span>
                      </button>
                      <button onClick={() => openCreateModal(account.id)} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] border-r border-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-plus-circle ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">자금추가</span>
                      </button>
                      <button onClick={() => openSettingsModal(account)} className="py-2.5 flex flex-col items-center justify-center gap-1 hover:bg-[#EFEBE4] transition-colors group">
                        <i className={`ph-fill ph-gear ${theme.text} opacity-70 group-hover:opacity-100 group-hover:-translate-y-0.5 transition-all`} style={{fontSize: 16}}></i>
                        <span className="text-[10px] font-extrabold text-[#6D5443]">설정</span>
                      </button>
                    </div>

                    {/* 2-3. 블록 리스트 영역 */}
                    <div className="p-3 flex flex-col gap-2 flex-1 min-h-[150px]">
                      {accountBlocks.length === 0 ? (
                        <div className="min-h-[110px] flex items-center justify-center text-xs text-[#A69C8E] border-2 border-dashed border-[#DFD8CE] rounded-lg bg-white/50 m-2 pointer-events-none">
                          내역이 없습니다.
                        </div>
                      ) : (
                        accountBlocks.map(block => {
                          const isSelected = selectedBlocks.includes(block.id);
                          const tagColor = COLOR_TAGS[block.color || 'none'];
                          const hasSubItems = block.subItems && block.subItems.length > 0;
                          const blockAmount = getBlockAmount(block);
                          const isPlanned = !!block.isPlanned;
                          const isSubItemsCollapsed = collapsedSubItems.includes(block.id);
                           
                          return (
                            <Fragment key={block.id}>
                              {/* 💡 대분류 간 순서 변경 존 */}
                              <div
                                onDragOver={(e) => handleDragOverItem(e, `${block.id}_reorder`)}
                                onDragLeave={(e) => handleDragLeaveItem(e, `${block.id}_reorder`)}
                                onDrop={(e) => { setDragOverId(null); handleDropOnBlockReorder(e, account.id, block.id); }}
                                className={`h-2 rounded-full transition-colors z-10 ${dragOverId === `${block.id}_reorder` ? 'bg-[#8B5A2B] scale-y-150' : 'bg-transparent'}`}
                                title="여기에 드롭하여 순서 변경"
                              />
                              
                              {/* 💡 대분류 몸통 (병합 처리) */}
                              <div
                                draggable={true}
                                onDragStart={(e) => handleDragStart(e, block.id)}
                                onDragEnd={clearAllDragStates}
                                onDragOver={(e) => handleDragOverItem(e, block.id)}
                                onDragLeave={(e) => handleDragLeaveItem(e, block.id)}
                                onDrop={(e) => { setDragOverId(null); handleDropOnBlockMerge(e, account.id, block.id); }}
                                onClick={(e) => handleBlockClick(e, block.id)}
                                onDoubleClick={(e) => openSplitModal(e, 'block', block)}
                                className={`
                                  block-item relative flex flex-col border rounded-xl shadow-sm cursor-grab active:cursor-grabbing select-none transition-colors group/block
                                  ${isSelected ? `${theme.border} ring-1 ${theme.ring} ${theme.light} bg-opacity-40` : `${tagColor.bg} ${tagColor.border}`}
                                  ${draggedBlockId === block.id ? 'opacity-50' : 'hover:shadow-md'}
                                  ${dragOverId === block.id ? '!border-[#8B5A2B] ring-2 ring-[#8B5A2B] bg-[#FDFCFB]' : ''}
                                `}
                                title="더블클릭: 금액 나누기 / 드래그: 병합"
                              >
                                <div className="flex items-center p-3 pointer-events-none">
                                  <div className="flex-1 min-w-0 pr-1">
                                    <div className="flex items-center gap-2 mb-0.5">
                                      <p className="truncate text-[14px] text-[#2A1D15] font-extrabold leading-tight">{block.label}</p>
                                      {isPlanned && (
                                        <span className="shrink-0 text-[10px] font-black px-1.5 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">예정</span>
                                      )}
                                    </div>
                                    <p className={`font-mono text-[16px] font-black tracking-tight ${getAmountTextClass(blockAmount, 'auto', isPlanned)}`}>
                                      {blockAmount > 0 ? '+' : ''}{formatCurrency(blockAmount)}
                                    </p>
                                  </div>

                                  <div className="flex items-center gap-1 shrink-0 pointer-events-auto">
                                    <div 
                                      className="no-select-trigger p-1.5 rounded-md hover:bg-black/5 text-[#A69C8E] hover:text-[#0277BD] transition-colors cursor-pointer"
                                      onClick={(e) => { e.stopPropagation(); openSplitModal(e, 'block', block); }}
                                      title="금액 나누기 (분할)"
                                    >
                                      <i className="ph-bold ph-scissors" style={{fontSize: 16}}></i>
                                    </div>
                                    <button
                                      type="button"
                                      className={`no-select-trigger p-1.5 rounded-md hover:bg-black/5 transition-colors cursor-pointer ${isPlanned ? 'text-[#8B5A2B] bg-[#FDF6E9]' : 'text-[#A69C8E] hover:text-[#8B5A2B]'}`}
                                      onClick={(e) => { e.stopPropagation(); toggleBlockPlanned(block.id); }}
                                      title={isPlanned ? '현재 잔고 계산에 포함하기' : '예정금액으로 전환하여 현재 잔고에서 제외'}
                                    >
                                      <i className="ph-bold ph-clock" style={{fontSize: 16}}></i>
                                    </button>
                                    <div 
                                      className="no-select-trigger p-1.5 rounded-md hover:bg-black/5 text-[#A69C8E] hover:text-[#3D2B1F] transition-colors cursor-pointer"
                                      onClick={(e) => { e.stopPropagation(); openEditModal(block); }}
                                      title="내역 수정"
                                    >
                                      <i className="ph-bold ph-pencil-simple" style={{fontSize: 16}}></i>
                                    </div>
                                  </div>
                                </div>

                                {hasSubItems && (
                                  <div className="px-4 pb-3 pt-0">
                                    <div className="border-t border-black/10 pt-2">
                                      <button
                                        type="button"
                                        onClick={(e) => { e.stopPropagation(); toggleSubItems(block.id); }}
                                        className="no-select-trigger w-full flex items-center justify-between gap-2 px-2 py-1.5 mb-2 rounded-lg bg-white/70 border border-[#DFD8CE] text-[#6D5443] hover:bg-white transition-colors cursor-pointer"
                                        title={isSubItemsCollapsed ? '세부항목 펼치기' : '세부항목 접기'}
                                      >
                                        <span className="text-[11px] font-extrabold flex items-center gap-1.5">
                                          <i className="ph-bold ph-list-bullets" style={{fontSize: 13}}></i>
                                          하위 항목 {block.subItems.length}개
                                        </span>
                                        <span className="text-[10px] font-black text-[#8B5A2B] flex items-center gap-1">
                                          {isSubItemsCollapsed ? '펼치기' : '접기'}
                                          <i className={`ph-bold ${isSubItemsCollapsed ? 'ph-caret-down' : 'ph-caret-up'}`} style={{fontSize: 12}}></i>
                                        </span>
                                      </button>

                                      {!isSubItemsCollapsed && (
                                        <div className="flex flex-col">
                                          {block.subItems.map((sub, idx) => {
                                            const childItems = getChildItems(sub);
                                            const subAmount = getSubItemAmount(sub);
                                            return (
                                              <div key={sub.id || idx} className="flex flex-col">
                                                <div
                                                  onDragOver={(e) => handleDragOverItem(e, `${sub.id}_reorder`)}
                                                  onDragLeave={(e) => handleDragLeaveItem(e, `${sub.id}_reorder`)}
                                                  onDrop={(e) => handleDropOnSubItemReorder(e, block.id, sub.id)}
                                                  className={`h-2 rounded-full transition-colors z-10 my-0.5 ${dragOverId === `${sub.id}_reorder` ? 'bg-[#8B5A2B] scale-y-150' : 'bg-transparent'}`}
                                                  title="여기에 드롭하여 순서 변경"
                                                />
                                                <div
                                                  draggable={true}
                                                  onDragStart={(e) => handleBoardSubItemDragStart(e, block.id, sub.id)}
                                                  onDragEnd={clearAllDragStates}
                                                  onDragOver={(e) => handleDragOverItem(e, sub.id)}
                                                  onDragLeave={(e) => handleDragLeaveItem(e, sub.id)}
                                                  onDrop={(e) => handleDropOnSubItemMerge(e, block.id, sub.id)}
                                                  onDoubleClick={(e) => openSplitModal(e, 'sub', block, sub)}
                                                  className={`cursor-grab active:cursor-grabbing select-none rounded-lg border bg-white/70 px-2 py-1.5 text-[#6D5443] font-medium transition-colors
                                                    ${draggedBoardSubItem && draggedBoardSubItem.subItemId === sub.id ? 'opacity-50 border-[#8B5A2B]' : 'border-[#E6E0D4]'} 
                                                    ${dragOverId === sub.id ? '!border-[#8B5A2B] ring-2 ring-[#8B5A2B] bg-[#FDFCFB]' : ''}
                                                  `}
                                                  title="더블클릭: 금액 분할 / 드래그: 다른 박스 위에 올려서 합치기"
                                                >
                                                  <div className="flex justify-between items-center pointer-events-none">
                                                    <span className="truncate pr-2 flex items-center gap-1.5 pointer-events-auto">
                                                      <i className="ph-bold ph-corner-down-right text-[#A69C8E]" style={{fontSize: 14}}></i> 
                                                      <span className="text-[12px] font-bold text-[#3D2B1F]">{sub.label || '내용 없음'}</span>
                                                    </span>
                                                    <div className="flex items-center gap-2 pointer-events-auto">
                                                      <span className={`text-[12px] font-mono font-bold ${getAmountTextClass(subAmount, sub.amountColor || 'auto', sub.isPlanned)}`}>
                                                        {subAmount > 0 ? '+' : ''}{formatCurrency(subAmount)}
                                                      </span>
                                                      {sub.isPlanned && <span className="text-[10px] font-black px-1.5 py-0.5 rounded-full bg-[#FDF6E9] text-[#8B5A2B] border border-[#D2B48C]">예정</span>}
                                                    </div>
                                                  </div>
                                                  
                                                  {(childItems.length > 0) && (
                                                    <div className={`mt-1.5 ml-3 pl-2 border-l-2 border-[#EFEBE4] flex flex-col transition-colors`}>
                                                      {childItems.map((child, childIdx) => (
                                                        <div key={child.id || childIdx} className="flex flex-col">
                                                          <div
                                                            onDragOver={(e) => handleDragOverItem(e, `${child.id}_reorder`)}
                                                            onDragLeave={(e) => handleDragLeaveItem(e, `${child.id}_reorder`)}
                                                            onDrop={(e) => handleDropOnChildItemReorder(e, block.id, sub.id, child.id)}
                                                            className={`h-1.5 rounded-full transition-colors z-10 my-0.5 ${dragOverId === `${child.id}_reorder` ? 'bg-[#8B5A2B] scale-y-150' : 'bg-transparent'}`}
                                                            title="여기에 드롭하여 순서 변경"
                                                          />
                                                          <div
