      const errorDiv = document.createElement('div');
      errorDiv.style.cssText = 'position:fixed; top:0; left:0; width:100%; background:#C62828; color:white; padding:15px; z-index:9999; font-weight:bold; font-family:sans-serif; box-shadow:0 4px 6px rgba(0,0,0,0.3);';

    });

      if (item && VAT_MODES[item.vatMode]) return item.vatMode;

    const migrateLedgerItemTerms = (item) => {
      if (!item || typeof item !== 'object') return item;
      return {
        ...item,
        label: replaceLegacyPaymentTerm(item.label),
        ...(Array.isArray(item.subItems) ? { subItems: item.subItems.map(migrateLedgerItemTerms) } : {}),
        ...(Array.isArray(item.childItems) ? { childItems: item.childItems.map(migrateLedgerItemTerms) } : {}),
      };
    };
    const migrateAccountsTerms = (accounts) => (accounts || []).map(account => ({
      ...account,
      name: replaceLegacyPaymentTerm(account.name),
      reportData: Array.isArray(account.reportData) ? account.reportData.map(report => ({
        ...report,
        blocks: Array.isArray(report.blocks) ? report.blocks.map(migrateLedgerItemTerms) : [],

      /* --- 💡 기본 헬퍼 함수 --- */
      const formatCurrency = (amount) => new Intl.NumberFormat('ko-KR').format(amount || 0);
      const twoDigits = (value) => String(value).padStart(2, '0');
      const formatLastSavedAt = (value) => {
        if (!value) return '저장 기록 없음';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '저장 시간 확인 필요';
        return `${date.getFullYear()}년 ${twoDigits(date.getMonth() + 1)}월 ${twoDigits(date.getDate())}일 ${twoDigits(date.getHours())}시 ${twoDigits(date.getMinutes())}분 ${twoDigits(date.getSeconds())}초 데이터`;
      };

      const buildCloudUrl = () => `${GAS_URL}${GAS_URL.includes('?') ? '&' : '?'}t=${Date.now()}`;
      const loadCloudSnapshot = async () => {
        const res = await fetch(buildCloudUrl(), { method: "GET", cache: "no-store" });
        if (!res.ok) throw new Error(`클라우드 읽기 실패: HTTP ${res.status}`);
        const text = await res.text();
        try { return JSON.parse(text); }
        catch (e) {
          if (/<html/i.test(text)) throw new Error("구글 스크립트가 데이터 대신 로그인 페이지(HTML)를 반환했습니다.\n앱스 스크립트를 [새 배포] → 액세스 권한 '모든 사용자'로 다시 배포하고, 새 /exec URL을 GAS_URL에 넣어주세요.");
          throw new Error("구글 스크립트에서 데이터를 읽지 못했습니다. (응답이 JSON 형식이 아님)");
        }
      };
      const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));
      const isEmbeddedMobileBrowser = () => /KAKAOTALK|NAVER|DAUMAPPS|FBAN|FBAV|INSTAGRAM|LINE\/|;\s*wv\)/i.test(navigator.userAgent || '');
      const verifyCloudSave = async (syncId, delays = [700, 1200, 2000, 3000]) => {
        let latestSnapshot = null;
        let latestError = null;
        for (const delay of delays) {
          await wait(delay);
          try {
            latestSnapshot = await loadCloudSnapshot();
            if (isValidCloudSnapshot(latestSnapshot) && !isInitialDemoSnapshot(latestSnapshot) && latestSnapshot.syncId === syncId) {
              return { saved: true, snapshot: latestSnapshot, error: null };
            }
          } catch (err) {
            latestError = err;
          }
        }
        return { saved: false, snapshot: latestSnapshot, error: latestError };
      };
      const submitCloudSnapshot = async (body, mode = 'cors') => {
        const options = { method: "POST", body };
        if (mode === 'no-cors') options.mode = 'no-cors';
        await fetch(GAS_URL, options);
      };
      const submitCloudSnapshotForm = (body) => new Promise((resolve, reject) => {
        try {
          const frameName = createId('cloud_frame');
          const iframe = document.createElement('iframe');
          iframe.name = frameName;
          iframe.setAttribute('aria-hidden', 'true');
          iframe.style.display = 'none';

          const form = document.createElement('form');
          form.method = 'POST';
          form.action = GAS_URL;
          form.target = frameName;
          form.acceptCharset = 'UTF-8';
          form.style.display = 'none';

          const payloadField = document.createElement('textarea');
          payloadField.name = 'payload';
          payloadField.value = body;
          form.appendChild(payloadField);
          document.body.appendChild(iframe);
          document.body.appendChild(form);
          form.submit();
          form.remove();
          setTimeout(() => iframe.remove(), 30000);
          setTimeout(resolve, 100);
        } catch (error) {
          reject(error);
        }
      });
      const sendCloudSnapshotBeacon = (body) => {
        if (!navigator.sendBeacon || new Blob([body]).size >= 60000) return false;
        return navigator.sendBeacon(GAS_URL, new Blob([body], { type: 'text/plain;charset=UTF-8' }));
      };
      const isValidCloudSnapshot = (data) => !!(data && Array.isArray(data.accountsData) && Array.isArray(data.blocks));
      const blockSignature = (targetBlocks) => (targetBlocks || []).map(block => `${block.accountId}|${block.label}|${Number(block.amount) || 0}|${(block.subItems || []).length}`).join(';;');
      const initialBlockSignature = blockSignature(INITIAL_BLOCKS);
      const isInitialDemoBlocks = (targetBlocks) => (targetBlocks || []).length === INITIAL_BLOCKS.length && blockSignature(targetBlocks) === initialBlockSignature;
      const isInitialDemoSnapshot = (data) => isValidCloudSnapshot(data) && data.accountsData.length === INITIAL_ACCOUNTS.length && isInitialDemoBlocks(data.blocks);
      const isCurrentInitialDemo = () => accountsData.length === INITIAL_ACCOUNTS.length && isInitialDemoBlocks(blocks);
      const backupCloudSnapshot = (data, reason = 'cloud-load') => {
        if (!isValidCloudSnapshot(data) || isInitialDemoSnapshot(data)) return;
        try {
          const backups = JSON.parse(localStorage.getItem(LOCAL_BACKUP_KEY) || '[]');
          backups.unshift({
            reason,
            backedUpAt: new Date().toISOString(),
            lastSavedAt: data.lastSavedAt || '',
            data,
          });
          localStorage.setItem(LOCAL_BACKUP_KEY, JSON.stringify(backups.slice(0, 20)));
        } catch (err) {
          console.warn('Local backup failed:', err);
        }
      };
      const applyCloudSnapshot = (data) => {
        if (!isValidCloudSnapshot(data)) {
          throw new Error("클라우드 데이터 형식이 올바르지 않습니다. 저장소가 비어있거나 손상된 응답입니다.");
        }
        if (isInitialDemoSnapshot(data)) {
          throw new Error("클라우드에 초기 샘플 자료가 저장되어 있습니다. 기존 장부를 보호하기 위해 불러오기를 중단했습니다.");
        }
        backupCloudSnapshot(data);
        const normalizedSnapshot = normalizeCloudSnapshotForClient(data);
        const loadedAccounts = normalizedSnapshot.accountsData;
        setAccountsData(loadedAccounts);
        const loadedAppSettings = normalizedSnapshot.appSettings;
        setAppSettings(loadedAppSettings);
        // ⚠️ 개선: 불러온 데이터에 자동정리(cleanupBlocks)를 적용하지 않고 서버 원본 그대로 표시
        //    (불러오는 순간 항목이 합쳐지거나 삭제되어 내용이 꼬이던 원인 제거)
        const loadedBlocks = normalizedSnapshot.blocks;
        setBlocks(loadedBlocks);
        setCollapsedSubItems(getCollapsibleBlockIds(loadedBlocks));
        setLastLoadedFingerprint(getDataFingerprint(loadedAccounts, loadedBlocks, loadedAppSettings));
        setLastLoadedSyncId(String(data.syncId || ''));
        if (data.lastSavedAt) setLastSavedAt(data.lastSavedAt);
        const pending = pendingSaveRef.current;
        if (pending && data.syncId === pending.syncId) clearPendingSave();
        return true;
      };
      
      /* --- 💡 완벽 무결점 계산 엔진 --- */
      const getAmountValue = (item) => Number(item && item.amount) || 0;
      const getChildItems = (item) => (item && item.childItems) ? item.childItems : [];
      
      // 어떤 항목이든(대분류/중분류/소분류) UI에 표시될 때 가져야 할 '실질적 통합 금액'을 구하는 절대 함수
      const getUniversalAmount = (item) => {
        if (!item) return 0;
        if (item.subItems && item.subItems.length > 0) return getBlockAmount(item);
        return getAmountValue(item);
      };

      // 중분류: 소분류는 계산에서 완전 무시! 오직 자체 금액만 반환.
      const getSubItemAmount = (item) => getAmountValue(item);
      
      // 대분류 총액 = 하위 중분류들의 합 (없으면 자체 금액)
      const getBlockAmount = (block) => {
        if (!block) return 0;
        if (block.subItems && block.subItems.length > 0) {
          return block.subItems.reduce((sum, sub) => sum + getSubItemAmount(sub), 0);
        }
        return getAmountValue(block);
      };

      const getChildEffectiveAmount = (child) => child && !child.isPlanned ? getAmountValue(child) : 0;

      const getSubEffectiveAmount = (sub) => {
        if (!sub || sub.isPlanned) return 0;
        const children = getChildItems(sub);
        if (children.length > 0) return children.reduce((sum, child) => sum + getChildEffectiveAmount(child), 0);
        return getSubItemAmount(sub);
      };

      const getChildCreditAmount = (child) => child && child.isPlanned ? getAmountValue(child) : 0;

      const getSubCreditAmount = (sub) => {
        if (!sub) return 0;
        if (sub.isPlanned) return getSubItemAmount(sub);
        const children = getChildItems(sub);
        if (children.length > 0) return children.reduce((sum, child) => sum + getChildCreditAmount(child), 0);
        return 0;
      };

      const getCreditAmount = (block) => {
        if (!block) return 0;
        if (block.isPlanned) return getBlockAmount(block);
        if (block.subItems && block.subItems.length > 0) {
          return block.subItems.reduce((sum, sub) => sum + getSubCreditAmount(sub), 0);
        }
        return 0;
      };
      
      const getEffectiveAmount = (block) => {
        if (!block || block.isPlanned) return 0;
        if (block.subItems && block.subItems.length > 0) {
          return block.subItems.reduce((sum, sub) => sum + getSubEffectiveAmount(sub), 0);
        }
        return getAmountValue(block);
      };

      const getAmountTextClass = (amount, colorKey = 'auto', isPlanned = false) => {
        if (isPlanned) return 'text-[#8B5A2B]';
        if (colorKey && colorKey !== 'auto' && SUBITEM_AMOUNT_COLORS[colorKey]) return SUBITEM_AMOUNT_COLORS[colorKey].text;
        return amount >= 0 ? 'text-[#2E7D32]' : 'text-[#C62828]';
      };

      const getCardHolders = (account) => {
        const text = (account && (account.cardHolder || DEFAULT_CARD_HOLDERS[account.id])) || '';
        return text.split(/[,，\/|]+/).map(name => name.trim()).filter(Boolean);
      };
      const getColumnThemeLabel = (key) => appSettings.columnThemeLabels?.[key] || COLUMN_THEMES[key]?.label || key;
      const getBlockColorLabel = (key) => appSettings.blockColorLabels?.[key] || COLOR_TAGS[key]?.label || key;

      const getCollapsibleBlockIds = (targetBlocks) => targetBlocks.filter(block => block.subItems && block.subItems.length > 0).map(block => block.id);
      const getVatReports = (account) => Array.isArray(account?.vatReports) ? account.vatReports.filter(item => item && (item.date || item.amount)) : [];
      const parseMoneyInput = (value) => parseInt(String(value || '').replace(/[^0-9-]/g, ''), 10) || 0;
      const calculateIncludedVat = (amount) => {
        const numericAmount = Number(amount) || 0;
        return Math.sign(numericAmount) * Math.round(Math.abs(numericAmount) / 11);
      };
      const calculateVatAmount = (amount, itemOrMode) => {
        const numericAmount = Number(amount) || 0;
        const mode = typeof itemOrMode === 'string' ? itemOrMode : getStoredVatMode(itemOrMode);
        if (mode === 'included') return calculateIncludedVat(numericAmount);
        if (mode === 'additional') return Math.sign(numericAmount) * Math.round(Math.abs(numericAmount) * 0.1);
        if (mode === 'full') return numericAmount;
        return 0;
      };
      const getVatBadgeText = (item, amount) => {
        const mode = getStoredVatMode(item);
        if (mode === 'none') return '';
        return `${VAT_MODES[mode].shortLabel} ${formatSignedCurrency(calculateVatAmount(amount, mode))}`;
      };
      const collectVatEntries = (targetBlocks) => {
        const entries = [];
        const visit = (item, level, path) => {
          if (!item) return;
          if (level === 'block' && (item.isCarryover || item.isCarryoverDetail)) return;
          const amount = level === 'block' ? getBlockAmount(item) : getAmountValue(item);
          const nextPath = [...path, item.label || '이름 없음'];
          const vatMode = getStoredVatMode(item);
          if (vatMode !== 'none') {
            entries.push({ id: item.id, level, label: nextPath.join(' > '), grossAmount: amount, vatMode, vatModeLabel: VAT_MODES[vatMode].label, vatAmount: calculateVatAmount(amount, vatMode) });
            return;
          }
          if (level === 'block') (item.subItems || []).forEach(sub => visit(sub, 'sub', nextPath));
          if (level === 'sub') getChildItems(item).forEach(child => visit(child, 'child', nextPath));
        };
        (targetBlocks || []).forEach(block => visit(block, 'block', []));
        return entries;
      };
      const getCalculatedVatTotal = (targetBlocks) => collectVatEntries(targetBlocks).reduce((sum, entry) => sum + entry.vatAmount, 0);
      const getReportedVatTotal = (account) => getVatReports(account).reduce((sum, item) => sum + parseMoneyInput(item.amount), 0);
      const getReportPeriod = (report) => {
        if (report?.periodKey && /^\d{4}-\d{2}$/.test(report.periodKey)) {
          const [year, month] = report.periodKey.split('-').map(Number);
          return { year, month, quarter: Math.floor((month - 1) / 3) + 1, key: report.periodKey };
        }
        const match = String(report?.month || '').match(/(20\d{2})\D+(\d{1,2})/);
        if (!match) return null;
        const year = Number(match[1]);
        const month = Number(match[2]);
        if (month < 1 || month > 12) return null;
        return { year, month, quarter: Math.floor((month - 1) / 3) + 1, key: `${year}-${String(month).padStart(2, '0')}` };
      };
      const getReportedVatForPeriod = (account, period) => {
        if (!period) return getReportedVatTotal(account);
        return getVatReports(account).reduce((sum, item) => {
          const match = String(item.date || '').match(/^(\d{4})-(\d{2})/);
          return match && Number(match[1]) === period.year && Number(match[2]) === period.month ? sum + parseMoneyInput(item.amount) : sum;
        }, 0);
      };
      const getReportSummary = (account, report) => {
        const reportBlocks = Array.isArray(report?.blocks) ? report.blocks : [];
        const totals = getTotalsForBlocks(reportBlocks);
        const savedSummary = report?.summary || {};
        const period = getReportPeriod(report);
        return {
          income: Number(totals.income) || 0,
          expense: Number(totals.expense) || 0,
          credit: Number(totals.credit) || 0,
          balance: Number(totals.balance) || 0,
          openingBalance: Number(savedSummary.openingBalance ?? reportBlocks.filter(block => block.isCarryover || block.isCarryoverDetail).reduce((sum, block) => sum + getEffectiveAmount(block), 0)) || 0,
          calculatedVat: Number(getCalculatedVatTotal(reportBlocks)) || 0,
          reportedVat: Number(savedSummary.reportedVat ?? getReportedVatForPeriod(account, period)) || 0,
          blockCount: reportBlocks.length,
        };
      };
      const buildQuarterlyReports = (account, reports) => {
        const grouped = new Map();
        (reports || []).forEach(report => {
          const period = getReportPeriod(report);
          if (!period) return;
          const key = `${period.year}-Q${period.quarter}`;
          if (!grouped.has(key)) grouped.set(key, { key, year: period.year, quarter: period.quarter, reports: [] });
          grouped.get(key).reports.push(report);
        });
        return Array.from(grouped.values()).map(group => {
          group.reports.sort((a, b) => (getReportPeriod(a)?.month || 0) - (getReportPeriod(b)?.month || 0));
          group.summary = group.reports.reduce((acc, report) => {
            const summary = getReportSummary(account, report);
            Object.keys(acc).forEach(key => { acc[key] += Number(summary[key]) || 0; });
            return acc;
          }, { income: 0, expense: 0, credit: 0, balance: 0, calculatedVat: 0, reportedVat: 0, blockCount: 0 });
          const finalMonth = group.reports[group.reports.length - 1];
          group.summary.balance = finalMonth ? getReportSummary(account, finalMonth).balance : 0;
          return group;
        }).sort((a, b) => b.year - a.year || b.quarter - a.quarter);
      };
      const getReportOverview = (account, reports) => {
        const entries = (reports || []).map(report => ({
          report,
          period: getReportPeriod(report),
          summary: getReportSummary(account, report),
        })).filter(entry => entry.period).sort((a, b) => a.period.key.localeCompare(b.period.key));
        const totals = entries.reduce((acc, entry) => {
          acc.income += entry.summary.income;
          acc.expense += entry.summary.expense;
          acc.actualVat += entry.summary.calculatedVat;
          acc.bankVat += entry.summary.reportedVat;
          return acc;
        }, { income: 0, expense: 0, actualVat: 0, bankVat: 0 });
        const latest = entries[entries.length - 1] || null;
        const previous = entries[entries.length - 2] || null;
        const netCash = totals.income - totals.expense;
        const vatGap = totals.bankVat - totals.actualVat;
        const expenseRate = totals.income ? Math.round((totals.expense / Math.abs(totals.income)) * 1000) / 10 : 0;
        const alerts = [];
        if (latest?.summary.balance < 0) alerts.push({ tone: 'danger', label: '마이너스 잔고', value: latest.summary.balance, detail: '최신 결산 잔고가 0원 미만입니다.' });
        if (latest?.summary.credit !== 0) alerts.push({ tone: 'warning', label: '미지급 잔액', value: latest.summary.credit, detail: '최신 결산 미지급금액을 확인하세요.' });
        if (vatGap !== 0) alerts.push({ tone: 'info', label: '부가세 차이', value: vatGap, detail: '은행 부가세와 실제 부가세의 차이입니다.' });
        if (alerts.length === 0) alerts.push({ tone: 'success', label: '특이사항 없음', value: latest?.summary.balance || 0, detail: '현재 결산 지표에 즉시 확인할 항목이 없습니다.' });
        return {
          entries,
          latest,
          previous,
          income: totals.income,
          expense: totals.expense,
          netCash,
          latestBalance: latest?.summary.balance || 0,
          latestCredit: latest?.summary.credit || 0,
          actualVat: totals.actualVat,
          bankVat: totals.bankVat,
          vatGap,
          expenseRate,
          balanceChange: latest ? latest.summary.balance - (previous?.summary.balance || 0) : 0,
          alerts,
        };
      };
      const sanitizeFileName = (value) => String(value || 'report').replace(/[\\/:*?"<>|]/g, '_');
      const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));

      const collectReportRows = (blocksForReport) => {
        const rows = [];
        blocksForReport.forEach(block => {
          const blockAmount = getBlockAmount(block);
          rows.push({ level: '대분류', label: block.label, amount: blockAmount, status: [block.isCarryover || block.isCarryoverDetail ? '이월' : '', block.carryoverSelected ? '다음 달 이월' : '', block.isPlanned ? '미지급' : '', getVatBadgeText(block, blockAmount)].filter(Boolean).join(' / ') });
          (block.subItems || []).forEach(sub => {
            rows.push({ level: '중분류', label: sub.label, amount: getSubItemAmount(sub), status: [sub.isPlanned ? '미지급' : '', getVatBadgeText(sub, getSubItemAmount(sub))].filter(Boolean).join(' / ') });
            getChildItems(sub).forEach(child => {
              rows.push({ level: '소분류', label: child.label, amount: getAmountValue(child), status: [child.isPlanned ? '미지급' : '', getVatBadgeText(child, getAmountValue(child))].filter(Boolean).join(' / ') });
            });
          });
        });
        return rows;
      };

      const downloadReportAsExcel = (account, report) => {
        const rows = collectReportRows(report.blocks || []);
        const summary = getReportSummary(account, report);
        const tableRows = rows.map(row => `
          <tr>
            <td>${escapeHtml(row.level)}</td>
            <td>${escapeHtml(row.label)}</td>
            <td style="mso-number-format:'\\#\\,\\#\\#0'; text-align:right;">${row.amount}</td>
            <td>${escapeHtml(row.status)}</td>
          </tr>
        `).join('');
        const html = `
          <html>
            <head><meta charset="UTF-8"></head>
            <body>
              <table border="1">
                <tr><th colspan="4">${escapeHtml(account.name)} ${escapeHtml(report.month)} 결산서</th></tr>
                <tr><td>총 입금금액</td><td colspan="3" style="mso-number-format:'\\#\\,\\#\\#0'; text-align:right;">${summary.income}</td></tr>
                <tr><td>총 지출금액</td><td colspan="3" style="mso-number-format:'\\#\\,\\#\\#0'; text-align:right;">${summary.expense}</td></tr>
                <tr><td>미지급금액</td><td colspan="3" style="mso-number-format:'\\#\\,\\#\\#0'; text-align:right;">${summary.credit}</td></tr>
                <tr><td>기초 이월 잔고</td><td colspan="3" style="mso-number-format:'\\#\\,\\#\\#0'; text-align:right;">${summary.openingBalance}</td></tr>
                <tr><td>실제 부가세</td><td colspan="3" style="mso-number-format:'\\#\\,\\#\\#0'; text-align:right;">${summary.calculatedVat}</td></tr>
                <tr><td>은행 부가세</td><td colspan="3" style="mso-number-format:'\\#\\,\\#\\#0'; text-align:right;">${summary.reportedVat}</td></tr>
                <tr><td>최종 결산액</td><td colspan="3" style="mso-number-format:'\\#\\,\\#\\#0'; text-align:right;">${summary.balance}</td></tr>
                <tr><th>구분</th><th>내역</th><th>금액</th><th>상태</th></tr>
                ${tableRows}
              </table>
            </body>
          </html>
        `;
        const blob = new Blob(['\ufeff', html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${sanitizeFileName(account.name)}_${sanitizeFileName(report.month)}_결산서.xls`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      };

      /* --- 💡 자동 정리(Auto Cleanup) 엔진 (구조 보존형으로 개선) --- */
      // ⚠️ 개선 1: 언랩(승격) 시 하위 항목의 이름이 사라지던 문제 수정 → 이름을 합쳐서 보존
      // ⚠️ 개선 2: 금액이 0원이어도 이름이 입력된 항목은 삭제하지 않음 (메모/예정 항목 보호)
      const mergeLabels = (parentLabel, childLabel) => {
        const p = (parentLabel || '').trim();
        const c = (childLabel || '').trim();
        if (!p) return c;
        if (!c || p === c) return p;
        return `${p} - ${c}`;
      };
      const isEmptyLeaf = (item) => getAmountValue(item) === 0 && !((item && item.label) || '').trim();
      const cleanupBlocks = (blocksArray) => {
        return (blocksArray || []).map(b => {
          let newSubs = (b.subItems || []).map(s => {
            let newChildren = (s.childItems || []).filter(c => !isEmptyLeaf(c));
            // 중분류 알맹이가 1개고 자체금액이 0이면 자동 언랩 (소분류 -> 중분류 승격, 이름 보존)
            if (newChildren.length === 1 && getAmountValue(s) === 0) {
              const singleChild = newChildren[0];
              const vatMode = getStoredVatMode(s) !== 'none' ? getStoredVatMode(s) : getStoredVatMode(singleChild);
              return { ...s, label: mergeLabels(s.label, singleChild.label), amount: getAmountValue(singleChild), amountColor: singleChild.amountColor, isPlanned: !!(s.isPlanned || singleChild.isPlanned), vatMode, isVat: vatMode !== 'none', childItems: [] };
            }
            return { ...s, childItems: newChildren };
          }).filter(s => !(s.childItems.length === 0 && isEmptyLeaf(s)));

          // 대분류 알맹이가 1개고 자체금액이 0이면 자동 언랩 (중분류 -> 대분류 승격, 이름 보존)
          if (newSubs.length === 1 && getAmountValue(b) === 0) {
            const singleSub = newSubs[0];
            if (!singleSub.childItems || singleSub.childItems.length === 0) {
              const vatMode = getStoredVatMode(b) !== 'none' ? getStoredVatMode(b) : getStoredVatMode(singleSub);
              return { ...b, label: mergeLabels(b.label, singleSub.label), amount: getAmountValue(singleSub), isPlanned: !!singleSub.isPlanned, vatMode, isVat: vatMode !== 'none', color: b.color || 'none', subItems: [] };
            }
          }
          return { ...b, subItems: newSubs };
        }).filter(b => !((b.subItems || []).length === 0 && isEmptyLeaf(b)));
      };

      // 다이얼로그 헬퍼
      const openDialog = (type, message, defaultValue = '', onConfirm) => setDialog({ isOpen: true, type, message, defaultValue, onConfirm });
      const closeDialog = () => setDialog({ isOpen: false, type: '', message: '', defaultValue: '', onConfirm: null });
      const handleDialogConfirm = (val) => { if (dialog.onConfirm) dialog.onConfirm(val); closeDialog(); };

      const buildCurrentSnapshot = (savedAt = lastSavedAt || new Date().toISOString()) => ({
        accountsData,
        blocks: blocks.map(block => ({ ...block, id: block.id || createId('b') })),
        appSettings,
        lastSavedAt: savedAt,
      });

      const getLocalBackupEntries = () => {
        try {
          const backups = JSON.parse(localStorage.getItem(LOCAL_BACKUP_KEY) || '[]');
          return Array.isArray(backups) ? backups : [];
        } catch (err) {
          console.warn('Local backup read failed:', err);
          return [];
        }
      };

      const getLatestLocalBackup = () => getLocalBackupEntries().find(entry => (
        entry && isValidCloudSnapshot(entry.data) && !isInitialDemoSnapshot(entry.data)
      ));

      const downloadJsonFile = (data, filename) => {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      };

      const exportCurrentData = () => {
        if (isCurrentInitialDemo()) {
          return openDialog('alert', '현재 화면이 초기 샘플 자료라서 백업 파일을 만들지 않았습니다.');
        }
        const snapshot = buildCurrentSnapshot();
        backupCloudSnapshot(snapshot, 'manual-export');
        downloadJsonFile(snapshot, `hwarim-erp-backup-${new Date().toISOString().replace(/[:.]/g, '-')}.json`);
        openDialog('alert', '현재 화면 자료를 백업 파일로 저장했습니다.');
      };

      const applyLocalBackupEntry = (entry) => {
        if (!entry || !isValidCloudSnapshot(entry.data)) return false;
        applyCloudSnapshot(entry.data);
        return true;
      };

      const restoreLatestLocalBackup = () => {
        try {
          const latestBackup = getLatestLocalBackup();
          if (!latestBackup) return openDialog('alert', '이 PC에 복구할 수 있는 로컬 백업이 아직 없습니다.');
          applyLocalBackupEntry(latestBackup);
          openDialog('alert', `이 PC에 저장된 백업을 불러왔습니다.\n\n백업 시간: ${formatLastSavedAt(latestBackup.lastSavedAt || latestBackup.data.lastSavedAt)}`);
        } catch (err) {
          console.error('Local restore failed:', err);
          openDialog('alert', `로컬 백업 복구에 실패했습니다.\n\n원인: ${err.message || '백업 파일 오류'}`);
        }
      };

      const importBackupFile = (event) => {
        const file = event.target.files && event.target.files[0];
        event.target.value = '';
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(reader.result);
            const snapshot = parsed && isValidCloudSnapshot(parsed.data) ? parsed.data : parsed;
            if (!isValidCloudSnapshot(snapshot)) throw new Error('백업 파일 안에 ERP 자료가 없습니다.');
            applyCloudSnapshot({ ...snapshot, lastSavedAt: snapshot.lastSavedAt || new Date().toISOString() });
            openDialog('alert', '백업 파일을 화면에 불러왔습니다.\n\n내용을 확인한 뒤 문제가 없으면 클라우드 저장을 눌러 서버에 반영하세요.');
          } catch (err) {
            console.error('Backup import failed:', err);
            openDialog('alert', `백업 파일을 불러오지 못했습니다.\n\n원인: ${err.message || '파일 형식 오류'}`);
          }
        };
        reader.onerror = () => openDialog('alert', '백업 파일을 읽지 못했습니다.');
        reader.readAsText(file);
      };

      const openImportBackupPicker = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json,.json';
        input.onchange = importBackupFile;
        input.click();
      };

      // 변환 헬퍼 (드래그 시 금액 손실 방지 적용 - 안전한 색상 매핑)
      const toBlock = (item, accountId) => {
        const uAmt = getUniversalAmount(item);
        const hasSubs = (item.subItems && item.subItems.length > 0) || (item.childItems && item.childItems.length > 0);
        const validColor = COLOR_TAGS[item.color] ? item.color : (COLOR_TAGS[item.amountColor] ? item.amountColor : 'none');
        const vatMode = getStoredVatMode(item);
        return { id: createId('b'), accountId, label: item.label || '새 항목', amount: hasSubs ? 0 : uAmt, color: validColor, isPlanned: !!item.isPlanned, vatMode, isVat: vatMode !== 'none', subItems: item.subItems || item.childItems || [] };
      };
      const toSub = (item) => {
        const validColor = SUBITEM_AMOUNT_COLORS[item.amountColor] ? item.amountColor : (SUBITEM_AMOUNT_COLORS[item.color] ? item.color : 'auto');
        const vatMode = getStoredVatMode(item);
        return { id: createId('s'), label: item.label || '새 항목', amount: getUniversalAmount(item), amountColor: validColor, isPlanned: !!item.isPlanned, vatMode, isVat: vatMode !== 'none', childItems: item.childItems || item.subItems || [] };
      };
      const toChild = (item) => {
        const validColor = SUBITEM_AMOUNT_COLORS[item.amountColor] ? item.amountColor : (SUBITEM_AMOUNT_COLORS[item.color] ? item.color : 'auto');
        const vatMode = getStoredVatMode(item);
        return { id: createId('c'), label: item.label || '새 항목', amount: getUniversalAmount(item), amountColor: validColor, isPlanned: !!item.isPlanned, vatMode, isVat: vatMode !== 'none' };
      };

      const getSelectionKey = (type, id) => `${type}:${id}`;
      const getSummarySelectionKey = (accountId, metricKey) => `${accountId}:${metricKey}`;
      const splitSelectionKey = (selectionKey) => {
        if (!selectionKey) return { type: '', id: '' };
        if (!selectionKey.includes(':')) return { type: 'block', id: selectionKey };
        const [type, id] = selectionKey.split(':');
        return { type, id };
      };
      const getTargetId = (type, block, subItem, childItem) => type === 'block' ? block?.id : type === 'sub' ? subItem?.id : childItem?.id;
      const isItemSelected = (type, id) => selectedBlocks.includes(getSelectionKey(type, id)) || (type === 'block' && selectedBlocks.includes(id));
      const isSummarySelected = (accountId, metricKey) => selectedSummaryCards.includes(getSummarySelectionKey(accountId, metricKey));
      const toggleSummarySelection = (accountId, metricKey) => {
        const selectionKey = getSummarySelectionKey(accountId, metricKey);
        setSelectedSummaryCards(prev => prev.includes(selectionKey) ? prev.filter(key => key !== selectionKey) : [...prev, selectionKey]);
      };
      const resolveSelectionItem = (selectionKey) => {
        const { type, id } = splitSelectionKey(selectionKey);
        for (const block of blocks) {
          if (type === 'block' && block.id === id) {
            return { key: getSelectionKey('block', block.id), type, id, blockId: block.id, label: block.label, amount: getUniversalAmount(block) };
          }
          for (const sub of (block.subItems || [])) {
            if (type === 'sub' && sub.id === id) {
              return { key: getSelectionKey('sub', sub.id), type, id, blockId: block.id, subItemId: sub.id, label: sub.label, amount: getUniversalAmount(sub) };
            }
            for (const child of getChildItems(sub)) {
              if (type === 'child' && child.id === id) {
                return { key: getSelectionKey('child', child.id), type, id, blockId: block.id, subItemId: sub.id, childId: child.id, label: child.label, amount: getUniversalAmount(child) };
              }
            }
          }
        }
        return null;
      };

      const collectAmountEntries = (item) => {
        const entries = [];
        const visit = (current, inheritedPlanned = false) => {
          if (!current) return;
          const isPlanned = inheritedPlanned || !!current.isPlanned;
          const amount = getAmountValue(current);
          if (amount !== 0) entries.push({ amount, isPlanned });
          (current.subItems || []).forEach(child => visit(child, isPlanned));
          getChildItems(current).forEach(child => visit(child, isPlanned));
        };
        visit(item);
        return entries;
      };

      const setItemPlannedDeep = (item, isPlanned) => ({
        ...item,
        isPlanned,
        ...(item.subItems ? { subItems: item.subItems.map(child => setItemPlannedDeep(child, isPlanned)) } : {}),
        ...(item.childItems ? { childItems: item.childItems.map(child => setItemPlannedDeep(child, isPlanned)) } : {}),
      });

      const getTotalsForBlocks = (targetBlocks) => {
        const addMediumAmount = (acc, amount) => {
          if (amount > 0) acc.income += amount;
          if (amount < 0) acc.expense += Math.abs(amount);
        };
        const addCheckedChildrenToCredit = (acc, sub) => {
          getChildItems(sub).forEach(child => {
            if (child.isPlanned) acc.credit += getAmountValue(child);
          });
        };

        const totals = targetBlocks.reduce((acc, block) => {
          const subItems = block.subItems || [];
          if (block.isCarryover || block.isCarryoverDetail) {
            if (block.isCarryoverDetail) acc.credit += getCreditAmount(block);
            return acc;
          }
          if (block.isPlanned) {
            acc.credit += getBlockAmount(block);
            return acc;
          }
          if (subItems.length === 0) {
            addMediumAmount(acc, getAmountValue(block));
            return acc;
          }

          subItems.forEach(sub => {
            if (sub.isPlanned) {
              acc.credit += getSubItemAmount(sub);
              return;
            }

            addMediumAmount(acc, getSubEffectiveAmount(sub));
            addCheckedChildrenToCredit(acc, sub);
          });

          return acc;
        }, { income: 0, expense: 0, credit: 0 });

        const balance = targetBlocks.reduce((sum, block) => sum + getEffectiveAmount(block), 0);
        return { ...totals, balance };
      };

      const formatSignedCurrency = (amount) => `${amount > 0 ? '+' : ''}${formatCurrency(amount)}`;
      const selectedItems = useMemo(() => selectedBlocks.map(resolveSelectionItem).filter(Boolean), [blocks, selectedBlocks]);
      const selectedSummaryItems = useMemo(() => selectedSummaryCards.map(selectionKey => {
        const [accountId, metricKey] = selectionKey.split(':');
        const account = accountsData.find(acc => acc.id === accountId);
        const metric = SUMMARY_METRICS[metricKey];
        if (!account || !metric) return null;
        const accountTotals = getTotalsForBlocks(blocks.filter(block => block.accountId === accountId));
        const amount = metric.getValue(accountTotals);
        return {
          key: selectionKey,
          type: 'summary',
          label: `${account.name} ${metric.label}`,
          accountName: account.name,
          metricLabel: metric.label,
          amount,
          icon: metric.icon,
        };
      }).filter(Boolean), [accountsData, blocks, selectedSummaryCards]);
      const calculationItems = useMemo(() => [...selectedItems, ...selectedSummaryItems], [selectedItems, selectedSummaryItems]);
      const selectedSum = useMemo(() => calculationItems.reduce((sum, item) => sum + item.amount, 0), [calculationItems]);
      const clearCalculationSelection = () => {
        setSelectedBlocks([]);
        setSelectedSummaryCards([]);
      };

      useEffect(() => {
        if (!GAS_URL || GAS_URL.includes("여기에")) { setIsInitialLoading(false); return; }
        cloudLoadInFlight.current = true;
        loadCloudSnapshot()
          .then(data => applyCloudSnapshot(data))
          .catch(err => {
            console.error('Initial cloud load failed:', err);
            openDialog('alert', `최신 데이터를 불러오지 못했습니다.\n\n현재 화면의 샘플 자료는 저장할 수 없습니다. 인터넷 연결을 확인한 뒤 다시 접속해주세요.\n\n원인: ${err.message || '구글시트 연결 실패'}`);
          })
          .finally(() => {
            cloudLoadInFlight.current = false;
            setIsInitialLoading(false);
          });
      }, []);

      const refreshFromCloud = async (silent = false) => {
        if (!GAS_URL || GAS_URL.includes("여기에")) {
          if (!silent) openDialog('alert', "구글 스크립트 웹앱 URL이 입력되지 않았습니다!");
          return;
        }
        if (cloudLoadInFlight.current || isSyncing || isInitialLoading) return;
        if (silent && (hasUnsavedChanges || hasOpenEditor)) return;

        cloudLoadInFlight.current = true;
        setIsLoadingCloud(true);
        try {
          if (!silent && hasUnsavedChanges) backupCloudSnapshot(buildCurrentSnapshot(), 'before-manual-refresh');
          const data = await loadCloudSnapshot();
          applyCloudSnapshot(data);
          if (!silent) openDialog('alert', "최신 데이터를 불러왔습니다.");
        } catch (err) {
          console.error('Cloud refresh failed:', err);
          if (!silent) openDialog('alert', `최신 데이터를 불러오지 못했습니다.\n\n원인: ${err.message || '구글시트 연결 실패'}`);
        } finally {
          cloudLoadInFlight.current = false;
          setIsLoadingCloud(false);
        }
      };

      // ⚠️ 개선: 저장하지 않은 수정분이 있으면 창을 닫거나 새로고침할 때 경고
      useEffect(() => {
        const warnUnsaved = (e) => {
          if (!hasUnsavedChanges) return;
          e.preventDefault();
          e.returnValue = '';
        };
        window.addEventListener('beforeunload', warnUnsaved);
        return () => window.removeEventListener('beforeunload', warnUnsaved);
      }, [hasUnsavedChanges]);

      useEffect(() => {
        const refreshWhenActive = () => {
          if (document.visibilityState !== 'hidden') refreshFromCloud(true);
        };
        window.addEventListener('focus', refreshWhenActive);
        window.addEventListener('pageshow', refreshWhenActive);
        window.addEventListener('online', refreshWhenActive);
        document.addEventListener('visibilitychange', refreshWhenActive);
        return () => {
          window.removeEventListener('focus', refreshWhenActive);
          window.removeEventListener('pageshow', refreshWhenActive);
          window.removeEventListener('online', refreshWhenActive);
          document.removeEventListener('visibilitychange', refreshWhenActive);
        };
      }, [isInitialLoading, isSyncing, hasUnsavedChanges, hasOpenEditor, lastSavedAt]);

      const updateHorizontalScroll = () => {
        const node = boardScrollRef.current;
        if (!node) return;
        setHorizontalScroll({ value: node.scrollLeft, max: Math.max(0, node.scrollWidth - node.clientWidth) });
      };
      const scrollBoardTo = (value) => {
        const node = boardScrollRef.current;
        if (!node) return;
        node.scrollLeft = Number(value) || 0;
        updateHorizontalScroll();
      };
      const scrollBoardBy = (direction) => {
        const node = boardScrollRef.current;
        if (!node) return;
        node.scrollBy({ left: direction * Math.max(280, node.clientWidth * 0.8), behavior: 'smooth' });
        setTimeout(updateHorizontalScroll, 350);
      };
      useEffect(() => {
        const timer = setTimeout(updateHorizontalScroll, 50);
        window.addEventListener('resize', updateHorizontalScroll);
        return () => {
          clearTimeout(timer);
          window.removeEventListener('resize', updateHorizontalScroll);
        };
      }, [accountsData.length, isInitialLoading]);

      const syncToCloud = async () => {
        if (!GAS_URL || GAS_URL.includes("여기에")) return openDialog('alert', "구글 스크립트 웹앱 URL이 입력되지 않았습니다!");
        if (isInitialLoading || cloudLoadInFlight.current) return;
        setIsSyncing(true);
        try {
          if (isCurrentInitialDemo()) {
            throw new Error("현재 화면은 초기 샘플 자료입니다. 최신 자료를 불러오기 전에는 클라우드에 저장할 수 없습니다.");
          }

          const latestSnapshot = await loadCloudSnapshot();
          if (!isValidCloudSnapshot(latestSnapshot) || isInitialDemoSnapshot(latestSnapshot)) {
            throw new Error("저장 전 서버의 최신 자료를 확인하지 못했습니다.");
          }
          if (String(latestSnapshot.apiVersion || '') !== CLOUD_API_VERSION) {
            throw new Error("Google Apps Script가 이전 저장 방식입니다. ERP 폴더의 Code.gs를 Apps Script에 반영하고 새 버전으로 배포해주세요.");
          }

          const serverSavedAt = latestSnapshot.lastSavedAt || '';
          let screenSavedAt = lastSavedAt || '';
          const serverFingerprint = getCloudSnapshotFingerprint(latestSnapshot);
          let effectiveLoadedFingerprint = lastLoadedFingerprint;
          let effectiveLoadedSyncId = lastLoadedSyncId;
          const pendingSave = pendingSaveRef.current;
          const isOwnPendingSave = !!(pendingSave && latestSnapshot.syncId === pendingSave.syncId);
          if (isOwnPendingSave) {
            screenSavedAt = serverSavedAt;
            setLastSavedAt(serverSavedAt);
            setLastLoadedFingerprint(serverFingerprint);
            setLastLoadedSyncId(String(latestSnapshot.syncId || ''));
            effectiveLoadedFingerprint = serverFingerprint;
            effectiveLoadedSyncId = String(latestSnapshot.syncId || '');
            clearPendingSave();
          }
          const canCompareSyncVersion = !!(effectiveLoadedSyncId && latestSnapshot.syncId);
          const serverVersionChanged = canCompareSyncVersion
            ? String(latestSnapshot.syncId) !== effectiveLoadedSyncId
            : (!screenSavedAt
              || serverSavedAt !== screenSavedAt
              || (effectiveLoadedFingerprint && serverFingerprint !== effectiveLoadedFingerprint));
          if (serverVersionChanged) {
            backupCloudSnapshot(buildCurrentSnapshot(), 'conflict-detected');
            throw new Error(`다른 기기에서 자료가 변경되었습니다.\n현재 수정본은 이 PC에 자동 백업했으며 서버 자료를 덮어쓰지 않았습니다.\n\n최신 불러오기를 눌러 확인해주세요.\n내 화면: ${formatLastSavedAt(screenSavedAt)}\n서버: ${formatLastSavedAt(serverSavedAt)}`);
          }

          const savedAt = new Date().toISOString();
          const syncId = createId('sync');
          const payload = { ...buildCurrentSnapshot(savedAt), syncId, baseSavedAt: serverSavedAt };
          const body = JSON.stringify(payload);
          backupCloudSnapshot(payload, 'before-save');
          rememberPendingSave({ attemptedAt: savedAt, syncId });

          let transferError = null;
          try {
            await submitCloudSnapshotForm(body);
          } catch (err) {
            transferError = err;
            console.warn('Cloud form submit was blocked.', err);
          }

          let verification = await verifyCloudSave(syncId, [700, 1200, 2000, 3000]);
          if (!verification.saved) {
            try {
              await submitCloudSnapshot(body);
            } catch (err) {
              transferError = err;
              console.warn('Cloud fetch response was blocked. Checking the saved snapshot.', err);
            }
            verification = await verifyCloudSave(syncId, [800, 1500, 2500]);
          }

          if (!verification.saved) {
            try {
              await submitCloudSnapshot(body, 'no-cors');
            } catch (err) {
              transferError = err;
              console.warn('No-cors cloud retry was blocked.', err);
            }
            verification = await verifyCloudSave(syncId, [800, 1500, 2500]);
          }

          if (!verification.saved) {
            let beaconQueued = false;
            try {
              beaconQueued = sendCloudSnapshotBeacon(body);
            } catch (err) {
              transferError = err;
              console.warn('Cloud beacon retry failed.', err);
            }
            if (beaconQueued) verification = await verifyCloudSave(syncId, [800, 1500, 2500, 3500]);
          }

          if (!verification.saved) {
            const serverTime = verification.snapshot && verification.snapshot.lastSavedAt
              ? formatLastSavedAt(verification.snapshot.lastSavedAt)
              : '확인 불가';
            const browserHint = isEmbeddedMobileBrowser()
              ? '\n\n카카오톡 등 앱 내부 브라우저가 구글 저장 요청을 차단했습니다. 오른쪽 위 메뉴에서 이 링크를 삼성 인터넷 또는 크롬으로 열어 저장해주세요.'
              : '\n\n인터넷 연결을 확인한 뒤 [클라우드 저장]을 한 번 더 눌러주세요. 실제로 저장이 완료된 경우 자동으로 이어서 처리됩니다.';
            const detail = transferError || verification.error;
            throw new Error(`서버 저장이 확인되지 않았습니다.\n현재 서버: ${serverTime}${detail ? `\n연결 원인: ${detail.message || detail}` : ''}${browserHint}`);
          }

          const savedSnapshot = verification.snapshot;
          backupCloudSnapshot(savedSnapshot, 'after-save');
          setLastLoadedFingerprint(getCloudSnapshotFingerprint(savedSnapshot));
          setLastLoadedSyncId(String(savedSnapshot.syncId || syncId));
          setLastSavedAt(savedSnapshot.lastSavedAt || savedAt);
          clearPendingSave();
          openDialog('alert', "클라우드에 저장되었습니다.");
        } catch (err) {
          console.error('Cloud sync failed:', err);
          openDialog('alert', `동기화 오류가 발생했습니다.\n\n원인: ${err.message || '구글시트 저장 연결 실패'}`);
        } finally {
          setIsSyncing(false);
        }
      };

      /* --- 드래그 중 자동 스크롤 --- */
      useEffect(() => {
        let scrollInterval = null; let lastX = 0, lastY = 0;
        const isDragging = !!draggedItem;
        const handleWheel = (e) => {
          if (!isDragging) return;
          if (modal.isOpen) { const ms = document.querySelector('.custom-scrollbar'); if (ms) ms.scrollTop += e.deltaY; } 
          else { const hc = boardScrollRef.current; if (hc && (e.shiftKey || Math.abs(e.deltaX) > Math.abs(e.deltaY))) hc.scrollLeft += (e.deltaX || e.deltaY); else window.scrollBy({ top: e.deltaY, left: 0 }); }
        };
        const handleDragOverEdge = (e) => {
          if (!isDragging) return; lastX = e.clientX; lastY = e.clientY;
          if (!scrollInterval) {

          month: closeMonthModal.monthLabel,
          periodKey: period.key,
          createdAt: new Date().toISOString(),
          closeMode: closeMonthModal.mode,

            expense: totals.expense,

        setAccountsData(prev => prev.map(acc => {

        if (closeMonthModal.mode === 'reset') {
          const selectedCarryoverBlocks = accountBlocks.filter(block => carryoverIdSet.has(block.id) && !block.isCarryover);
          const selectedEffectiveAmount = selectedCarryoverBlocks.reduce((sum, block) => sum + getEffectiveAmount(block), 0);

          const carryoverDetails = selectedCarryoverBlocks.map(block => ({
            ...cloneBlockForAccount(block, closeMonthModal.accountId, 'b_forward'),

            isCarryoverDetail: true,
            carryoverFrom: period.key,
          }));
          setBlocks(prev => [...prev.filter(block => block.accountId !== closeMonthModal.accountId), carryoverBlock, ...carryoverDetails]);
          setSelectedBlocks([]);
          setCollapsedSubItems(prev => prev.filter(id => !accountBlocks.some(block => block.id === id)));
        }
        setCloseMonthModal({ isOpen: false, accountId: null, monthLabel: '', mode: 'keep', carryoverBlockIds: [] });
      };
      const executeCloseMonth = (e) => {
        e.preventDefault();
        const account = accountsData.find(acc => acc.id === closeMonthModal.accountId);
        const accountBlocks = blocks.filter(b => b.accountId === closeMonthModal.accountId);
        const labelPeriod = getReportPeriod({ month: closeMonthModal.monthLabel });
        const now = new Date();
        const period = labelPeriod || { year: now.getFullYear(), month: now.getMonth() + 1, key: `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}` };
        const existingReport = (account?.reportData || []).find(existing => getReportPeriod(existing)?.key === period.key);
        if (existingReport) {
          openDialog(
            'confirm',
            `${closeMonthModal.monthLabel} 결산이 이미 저장되어 있습니다.\n\n계속하면 기존 결산서를 현재 장부 내용으로 교체합니다. 특히 이미 초기화한 장부라면 이전 전체 내역이 이월 잔고 한 건으로 바뀔 수 있습니다.`,

        finalizeMonthClose(account, accountBlocks, period);

      const cloneReportForEdit = (report) => JSON.parse(JSON.stringify(report));

      const cancelReportEdit = () => setReportEditDraft(null);
      const updateReportEditDraft = (updater) => setReportEditDraft(prev => prev ? updater(prev) : prev);
      const handleReportMonthChange = (value) => updateReportEditDraft(prev => ({ ...prev, month: value }));
      const handleReportBlockChange = (reportId, blockId, field, value) => updateReportEditDraft(prev => {
        if (prev.id !== reportId) return prev;
        return { ...prev, blocks: prev.blocks.map(block => {
          if (block.id !== blockId) return block;
          if (field !== 'amount') return { ...block, [field]: value };
          const amountString = value.replace(/[^0-9-]/g, '');
          return { ...block, amountString, amount: parseInt(amountString, 10) || 0 };
        }) };
      });
      const handleReportSubChange = (reportId, blockId, subId, field, value) => updateReportEditDraft(prev => {
        if (prev.id !== reportId) return prev;
        return { ...prev, blocks: prev.blocks.map(block => block.id !== blockId ? block : {
          ...block,
          subItems: (block.subItems || []).map(sub => {
            if (sub.id !== subId) return sub;
            if (field !== 'amount') return { ...sub, [field]: value };
            const amountString = value.replace(/[^0-9-]/g, '');
            return { ...sub, amountString, amount: parseInt(amountString, 10) || 0 };
          }),
        }) };
      });
      const handleReportChildChange = (reportId, blockId, subId, childId, field, value) => updateReportEditDraft(prev => {
        if (prev.id !== reportId) return prev;
        return { ...prev, blocks: prev.blocks.map(block => block.id !== blockId ? block : {
          ...block,
          subItems: (block.subItems || []).map(sub => sub.id !== subId ? sub : {
            ...sub,
            childItems: getChildItems(sub).map(child => {
              if (child.id !== childId) return child;
              if (field !== 'amount') return { ...child, [field]: value };
              const amountString = value.replace(/[^0-9-]/g, '');
              return { ...child, amountString, amount: parseInt(amountString, 10) || 0 };
            }),
          }),
        }) };
      });
      const addReportBlock = (reportId) => updateReportEditDraft(prev => prev && prev.id === reportId ? { ...prev, blocks: [...prev.blocks, { id: createId('snap'), label: '', amount: 0, amountString: '', color: 'none', isPlanned: false, vatMode: 'none', isVat: false, subItems: [] }] } : prev);
      const deleteReportBlock = (reportId, blockId) => updateReportEditDraft(prev => prev && prev.id === reportId ? { ...prev, blocks: prev.blocks.filter(block => block.id !== blockId) } : prev);
      const saveReportEdit = () => {
        if (!reportEditDraft) return;
        const account = accountsData.find(item => item.id === reportModal.accountId);
        const period = getReportPeriod({ month: reportEditDraft.month });
        const duplicate = period && (account?.reportData || []).some(report => report.id !== reportEditDraft.id && getReportPeriod(report)?.key === period.key);
        if (duplicate) return openDialog('alert', '같은 월의 결산 기록이 이미 있습니다.\n\n결산 월을 다르게 입력해주세요.');
        const totals = getTotalsForBlocks(reportEditDraft.blocks || []);
        const nextReport = {
          ...reportEditDraft,
          ...(period ? { periodKey: period.key } : {}),
          updatedAt: new Date().toISOString(),
          summary: {
            ...(reportEditDraft.summary || {}),
            income: totals.income,
            expense: totals.expense,
            credit: totals.credit,
            balance: totals.balance,
            calculatedVat: getCalculatedVatTotal(reportEditDraft.blocks || []),
            reportedVat: period ? getReportedVatForPeriod(account, period) : Number(reportEditDraft.summary?.reportedVat) || 0,
          },
        };
        setAccountsData(prev => prev.map(item => item.id === reportModal.accountId ? { ...item, reportData: (item.reportData || []).map(report => report.id === nextReport.id ? nextReport : report) } : item));
        setReportEditDraft(null);
      };
      const deleteEntireReport = (reportId) => {
        openDialog('confirm', '이 결산월의 모든 내역을 삭제하시겠습니까?', '', () => {
          setAccountsData(prev => prev.map(acc => acc.id === reportModal.accountId ? { ...acc, reportData: acc.reportData.filter(r => r.id !== reportId) } : acc));
        });
      };

      const addNewAccount = () => setNewAccountModal({ isOpen: true, name: '새로운 현장', sourceAccountId: accountsData[0]?.id || '', selectedBlockIds: [] });
      const toggleNewAccountBlock = (blockId) => setNewAccountModal(prev => ({
        ...prev,
        selectedBlockIds: prev.selectedBlockIds.includes(blockId) ? prev.selectedBlockIds.filter(id => id !== blockId) : [...prev.selectedBlockIds, blockId],
      }));
      const executeAddNewAccount = (e) => {
        e.preventDefault();
        const accountId = createId('acc');
        const sourceAccount = accountsData.find(account => account.id === newAccountModal.sourceAccountId);
        const copiedBlocks = blocks
          .filter(block => newAccountModal.selectedBlockIds.includes(block.id))
          .map(block => cloneBlockForAccount(block, accountId));
        const newAccount = {
          id: accountId,
          name: newAccountModal.name.trim() || '새로운 현장',
          bank: '은행명',
          accountNo: '계좌번호 입력',
          icon: 'ph-fill ph-hard-hat',
          theme: sourceAccount?.theme || 'slate',
          cardHolder: '이사님',
          vatReports: [],
          reportData: [],
        };
        setAccountsData(prev => [...prev, newAccount]);
        if (copiedBlocks.length > 0) setBlocks(prev => [...prev, ...copiedBlocks]);
        setNewAccountModal({ isOpen: false, name: '', sourceAccountId: '', selectedBlockIds: [] });

      const openSettingsModal = (account) => {
        const storedVatReports = Array.isArray(account.vatReports)
          ? account.vatReports.map(item => ({ date: item?.date || '', amount: item?.amount || '' }))
          : [];
        setSettingsModal({
          isOpen: true,
          accountData: {
            ...account,
            cardHolder: account.cardHolder || DEFAULT_CARD_HOLDERS[account.id] || '',
            vatReports: storedVatReports.length > 0 ? storedVatReports : [{ date: '', amount: '' }],
          },
        });
      };
      const updateSettingsVatReport = (index, field, value) => setSettingsModal(prev => {
        const vatReports = [...(prev.accountData.vatReports || [{ date: '', amount: '' }])];
        if (!vatReports[index]) vatReports[index] = { date: '', amount: '' };
        vatReports[index] = { ...vatReports[index], [field]: field === 'amount' ? value.replace(/[^0-9-]/g, '') : value };
        return { ...prev, accountData: { ...prev.accountData, vatReports } };
      });
      const addSettingsVatReport = () => setSettingsModal(prev => ({
        ...prev,
        accountData: { ...prev.accountData, vatReports: [...(prev.accountData.vatReports || []), { date: '', amount: '' }] },
      }));
      const removeSettingsVatReport = (index) => setSettingsModal(prev => ({
        ...prev,
        accountData: {
          ...prev.accountData,
          vatReports: (prev.accountData.vatReports || []).filter((_, idx) => idx !== index),
        },
      }));
      const saveSettings = (e) => {
        e.preventDefault();
        const normalizedVatReports = (settingsModal.accountData.vatReports || [])
          .map(item => ({ date: item.date || '', amount: item.amount || '' }))
          .filter(item => item.date || item.amount);
        const accountData = { ...settingsModal.accountData, vatReports: normalizedVatReports };
        setAccountsData(prev => prev.map(acc => acc.id === accountData.id ? accountData : acc));
        setSettingsModal({ isOpen: false, accountData: null });
      };
      const deleteAccount = () => {
        const account = settingsModal.accountData;
        if (!account) return;
        openDialog(
          'confirm',
          `“${account.name}” 통장박스를 삭제하시겠습니까?\n\n이 통장에 포함된 모든 자금박스와 결산 기록도 함께 삭제됩니다. 삭제 후 클라우드 저장을 누르면 다른 기기에도 반영됩니다.`,
          '',
          () => {
            setAccountsData(prev => prev.filter(item => item.id !== account.id));
            setBlocks(prev => prev.filter(block => block.accountId !== account.id));
            setSelectedBlocks([]);
            setExpandedVatAccounts(prev => prev.filter(id => id !== account.id));
            setSettingsModal({ isOpen: false, accountData: null });
          }
        );
      };
      
      const openCreateModal = (accountId) => setModal({ isOpen: true, mode: 'create', amountInput: '', blockData: { id: createId('b_new'), accountId, label: '새 내역', amount: 0, color: 'none', isPlanned: false, vatMode: 'none', isVat: false, subItems: [] } });
      const openEditModal = (block) => setModal({ isOpen: true, mode: 'edit', amountInput: block.amount === 0 && block.subItems?.length > 0 ? '' : formatCurrency(block.amount), blockData: { ...block, subItems: block.subItems ? [...block.subItems] : [] } });
      const closeModals = () => { setModal({ isOpen: false, mode: 'create', blockData: null, amountInput: '' }); setReportEditDraft(null); setReportModal({ isOpen: false, accountId: null, viewMode: 'overview' }); };
      const toggleBlockPlanned = (blockId) => updateTargetItem('block', blockId, null, null, (item) => ({
        ...setItemPlannedDeep(item, !item.isPlanned),
        ...(item.isPlanned ? { isCarryoverDetail: false } : {}),
      }));
      const toggleSubItems = (blockId) => setCollapsedSubItems(prev => prev.includes(blockId) ? prev.filter(id => id !== blockId) : [...prev, blockId]);
      
      const saveBlock = (e) => { e.preventDefault(); if (modal.mode === 'create') setBlocks(prev => cleanupBlocks([...prev, modal.blockData])); else setBlocks(prev => cleanupBlocks(prev.map(b => b.id === modal.blockData.id ? modal.blockData : b))); closeModals(); };
      const deleteBlock = (blockId) => { setBlocks(prev => cleanupBlocks(prev.filter(b => b.id !== blockId))); setSelectedBlocks(prev => prev.filter(key => resolveSelectionItem(key)?.blockId !== blockId)); closeModals(); };

      // Modal inner Logic
      const handleAmountChange = (e) => {
        let val = e.target.value.replace(/[^0-9-]/g, ''); if (val.lastIndexOf('-') > 0) val = val.replace(/-/g, '').replace(/^/, '-');
        if (val === '' || val === '-') { setModal(prev => ({ ...prev, amountInput: val, blockData: { ...prev.blockData, amount: 0 } })); return; }
        setModal(prev => ({ ...prev, amountInput: formatCurrency(parseInt(val, 10)), blockData: { ...prev.blockData, amount: parseInt(val, 10) } }));
      };
      const toggleModalPlanned = () => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, isPlanned: !prev.blockData.isPlanned } }));
      const setModalVatMode = (vatMode) => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, vatMode, isVat: vatMode !== 'none' } }));
      
      const handleSubItemChange = (id, field, value) => setModal(prev => {
        const newSubItems = prev.blockData.subItems.map(item => {
          if (item.id === id) return { ...item, [field === 'amount' ? 'amountString' : field]: field === 'amount' ? value.replace(/[^0-9-]/g, '') : value, ...(field==='amount' && {amount: parseInt(value.replace(/[^0-9-]/g, ''), 10) || 0}) };
          return item;
        });
        return { ...prev, blockData: { ...prev.blockData, subItems: newSubItems } };
      });
      const addSubItem = () => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, subItems: [...(prev.blockData.subItems || []), { id: createId('s'), label: '', amount: 0, amountString: '', amountColor: 'auto', isPlanned: false, vatMode: 'none', isVat: false, childItems: [] }] } }));
      const removeSubItem = (id) => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, subItems: prev.blockData.subItems.filter(item => item.id !== id) } }));
      const setSubItemColor = (id, colorKey) => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, subItems: prev.blockData.subItems.map(item => item.id === id ? { ...item, amountColor: colorKey } : item) } }));
      
      const addChildItem = (subItemId) => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, subItems: prev.blockData.subItems.map(item => item.id === subItemId ? { ...item, childItems: [...(item.childItems||[]), { id: createId('c'), label: '', amount: 0, amountString: '', amountColor: 'auto', isPlanned: false, vatMode: 'none', isVat: false }] } : item) } }));
      const handleChildItemChange = (subItemId, childId, field, value) => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, subItems: prev.blockData.subItems.map(item => item.id === subItemId ? { ...item, childItems: item.childItems.map(child => child.id === childId ? { ...child, [field === 'amount' ? 'amountString' : field]: field === 'amount' ? value.replace(/[^0-9-]/g, '') : value, ...(field==='amount' && {amount: parseInt(value.replace(/[^0-9-]/g, ''), 10) || 0}) } : child) } : item) } }));
      const removeChildItem = (subItemId, childId) => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, subItems: prev.blockData.subItems.map(item => item.id === subItemId ? { ...item, childItems: item.childItems.filter(child => child.id !== childId) } : item) } }));
      const setChildItemColor = (subItemId, childId, colorKey) => setModal(prev => ({ ...prev, blockData: { ...prev.blockData, subItems: prev.blockData.subItems.map(item => item.id === subItemId ? { ...item, childItems: item.childItems.map(child => child.id === childId ? { ...child, amountColor: colorKey } : child) } : item) } }));

      // Modal Local DND (Same logic as global DND)
      const handleModalDragStart = (e, type, id) => { if (['BUTTON', 'INPUT'].includes(e.target.tagName)) return; e.stopPropagation(); setDraggedItem({ type, id }); e.dataTransfer.effectAllowed = 'move'; };
      const handleModalDrop = (e, targetType, targetId, position) => {
        e.preventDefault(); e.stopPropagation(); setDragOverZone(null);
        if (!draggedItem || draggedItem.id === targetId) { setDraggedItem(null); return; }
        const { type, id } = draggedItem;
        
        setModal(prev => {
           let extracted = null;
           let subItems = [...(prev.blockData.subItems || [])];
           
           if (type === 'sub') {
             const idx = subItems.findIndex(s => s.id === id);
             if (idx > -1) { extracted = subItems[idx]; subItems.splice(idx, 1); }
           } else if (type === 'child') {
             subItems = subItems.map(s => {
               const idx = (s.childItems||[]).findIndex(c => c.id === id);
               if (idx > -1) { extracted = s.childItems[idx]; const next = [...s.childItems]; next.splice(idx, 1); return { ...s, childItems: next }; }
               return s;
             });
           }
           if (!extracted) return prev;

           if (targetType === 'sub' && position === 'before') {
             const idx = subItems.findIndex(s => s.id === targetId);
             if (idx > -1) subItems.splice(idx, 0, extracted);
           } else if (targetType === 'child') {
             subItems = subItems.map(s => {
               const idx = (s.childItems||[]).findIndex(c => c.id === targetId);
               if (idx > -1) {
                 const next = [...s.childItems];
                 if(position === 'before') next.splice(idx, 0, extracted); else next.splice(idx+1, 0, extracted);
                 return { ...s, childItems: next };
               }
               return s;
             });
           } else if (targetType === 'sub' && position === 'inside') {
             subItems = subItems.map(s => {
               if (s.id === targetId) return { ...s, childItems: [...(s.childItems||[]), extracted] };
               return s;
             });
           }
           return { ...prev, blockData: { ...prev.blockData, subItems } };
        });
        setDraggedItem(null);
      };

      return (
        <div className="min-h-screen bg-[#F5F2EC] text-[#3D2B1F] font-sans flex flex-col overflow-x-hidden" onClick={handleBgClick} onContextMenu={(e) => { e.preventDefault(); handleBgClick(); }}>
          {isInitialLoading && (
            <div className="fixed inset-0 z-[100] bg-[#F5F2EC] flex flex-col items-center justify-center text-[#3D2B1F]">
              <div className="w-14 h-14 bg-white border border-[#E6E0D4] rounded-2xl shadow-lg flex items-center justify-center mb-5">
                <i className="ph-bold ph-spinner animate-spin text-[#8B5A2B]" style={{fontSize: 28}}></i>
              </div>
              <p className="text-lg font-black">최신 화면 불러오는 중</p>
              <p className="text-xs font-bold text-[#A69C8E] mt-2">클라우드 데이터 확인 후 화면을 보여드립니다.</p>
            </div>
          )}

          {/* 💡 자체 내장 커스텀 팝업 (Alert / Confirm / Prompt 대체) */}
          {dialog.isOpen && (
            <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" onClick={closeDialog}>
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl p-6 animate-in zoom-in-95 border border-[#E6E0D4]" onClick={e => e.stopPropagation()}>
                <h3 className="text-lg font-black text-[#3D2B1F] mb-2 flex items-center gap-2">
                  <i className={`ph-fill ${dialog.type === 'alert' ? 'ph-warning-circle text-[#C62828]' : 'ph-info text-[#0277BD]'}`} style={{fontSize: 24}}></i>
                  {dialog.type === 'alert' ? '알림' : dialog.type === 'confirm' ? '확인' : '이름 변경'}
                </h3>
                <p className="text-sm font-bold text-[#6D5443] mb-5 whitespace-pre-wrap">{dialog.message}</p>
                
                {dialog.type === 'prompt' && (
                  <input 
                    type="text" autoFocus
                    defaultValue={dialog.defaultValue}
                    id="dialogPromptInput"
                    className="w-full border-2 border-[#E6E0D4] rounded-xl p-3 text-sm font-bold text-[#2A1D15] focus:outline-none focus:border-[#8B5A2B] transition-colors mb-5"
                    onKeyDown={(e) => { if(e.key === 'Enter') { e.preventDefault(); handleDialogConfirm(e.target.value); } }}
                  />
                )}

                <div className="flex gap-2 justify-end">
                  {dialog.type !== 'alert' && (
                    <button onClick={closeDialog} className="px-4 py-2.5 bg-[#EFEBE4] text-[#6D5443] rounded-xl text-sm font-extrabold hover:bg-[#DFD8CE] transition-colors">취소</button>
                  )}
                  <button 
                    onClick={() => {
                      const val = dialog.type === 'prompt' ? document.getElementById('dialogPromptInput')?.value : true;
                      handleDialogConfirm(val);
                    }}
                    className="px-5 py-2.5 bg-[#8B5A2B] text-white rounded-xl text-sm font-extrabold hover:bg-[#6B4423] transition-colors shadow-md"
                  >
                    확인
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* 💡 우클릭 팝업 메뉴 (Context Menu) */}
          {contextMenu.isOpen && (() => {
            const target = contextMenu.target;
            const targetItem = target?.type === 'block' ? target.block : target?.type === 'sub' ? target.subItem : target?.childItem;
            const isCredit = !!targetItem?.isPlanned;
            const activeVatMode = getStoredVatMode(targetItem);
            return (
              <div
                className="context-menu-enter fixed z-[9999] bg-white rounded-xl shadow-2xl border border-[#DFD8CE] py-1.5 w-56 overflow-hidden"
                style={{ top: contextMenu.y, left: contextMenu.x }}
              >
                <button 
                  onClick={handleContextMenuRename} 
                  className="w-full text-left px-4 py-2.5 text-[12px] font-bold text-[#3D2B1F] hover:bg-[#F9F6F0] hover:text-[#8B5A2B] flex items-center gap-2 transition-colors"
                >
                  <i className="ph-bold ph-pencil-simple text-[#A69C8E]"></i> 이름 변경
                </button>
                <button 
                  onClick={handleContextMenuSplit} 
                  className="w-full text-left px-4 py-2.5 text-[12px] font-bold text-[#3D2B1F] hover:bg-[#F9F6F0] hover:text-[#8B5A2B] flex items-center gap-2 transition-colors"
                >
                  <i className="ph-bold ph-scissors text-[#A69C8E]"></i> 금액 분리
                </button>
                <button 
                  onClick={handleContextMenuCredit} 
                  className={`w-full text-left px-4 py-2.5 text-[12px] font-bold flex items-center gap-2 transition-colors ${isCredit ? 'text-[#8B5A2B] bg-[#FDF6E9] hover:bg-[#F9F6F0]' : 'text-[#3D2B1F] hover:bg-[#F9F6F0] hover:text-[#8B5A2B]'}`}
                >
                  <i className="ph-bold ph-clock text-[#A69C8E]"></i> {isCredit ? '미지급 해제' : '미지급 설정'}
                </button>
